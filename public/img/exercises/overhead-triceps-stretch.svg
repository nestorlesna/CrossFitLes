<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
<rect width="200" height="230" fill="#111827" rx="12"/>
<style>
.f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
@keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
@keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
@keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
</style>
<!-- F1: Standing, arm raised overhead (right arm up) -->
<g class="f1">
  <circle cx="100" cy="26" r="13" fill="#94a3b8"/>
  <line x1="100" y1="39" x2="100" y2="108" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="100" y1="53" x2="118" y2="38" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="118" y1="38" x2="125" y2="18" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="100" y1="53" x2="78" y2="75" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="78" y1="75" x2="72" y2="100" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="100" y1="108" x2="86" y2="162" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="86" y1="162" x2="82" y2="205" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="100" y1="108" x2="114" y2="162" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="114" y1="162" x2="118" y2="205" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
</g>
<!-- F2: Elbow bent behind head -->
<g class="f2">
  <circle cx="100" cy="26" r="13" fill="#94a3b8"/>
  <line x1="100" y1="39" x2="100" y2="108" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="100" y1="53" x2="120" y2="38" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="120" y1="38" x2="112" y2="62" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="100" y1="53" x2="78" y2="70" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="78" y1="70" x2="68" y2="95" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <circle cx="120" cy="38" r="5" fill="#64748b"/>
  <line x1="100" y1="108" x2="86" y2="162" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="86" y1="162" x2="82" y2="205" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="100" y1="108" x2="114" y2="162" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="114" y1="162" x2="118" y2="205" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
</g>
<!-- F3: Other hand pushing elbow down to deepen stretch -->
<g class="f3">
  <circle cx="100" cy="26" r="13" fill="#94a3b8"/>
  <line x1="100" y1="39" x2="100" y2="108" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="100" y1="53" x2="122" y2="36" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="122" y1="36" x2="112" y2="64" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="100" y1="53" x2="76" y2="66" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="76" y1="66" x2="105" y2="58" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <circle cx="122" cy="36" r="5" fill="#64748b"/>
  <line x1="100" y1="108" x2="86" y2="162" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="86" y1="162" x2="82" y2="205" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="100" y1="108" x2="114" y2="162" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="114" y1="162" x2="118" y2="205" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
</g>
<line x1="30" y1="210" x2="170" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
<text x="100" y="225" text-anchor="middle" font-family="monospace" font-size="10" fill="#475569">TRICEPS STRETCH</text>
</svg>
