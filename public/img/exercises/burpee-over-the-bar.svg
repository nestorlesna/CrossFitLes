<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="200" height="230" fill="#111827" rx="12"/>
  <!-- Barra en el suelo (siempre visible) -->
  <line x1="60" y1="205" x2="140" y2="205" stroke="#475569" stroke-width="6" stroke-linecap="round"/>
  <rect x="54" y="197" width="8" height="16" rx="2" fill="#475569"/>
  <rect x="138" y="197" width="8" height="16" rx="2" fill="#475569"/>
  <line x1="20" y1="208" x2="54" y2="208" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <line x1="146" y1="208" x2="180" y2="208" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="100" y="226" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" font-weight="700" fill="#475569" letter-spacing="2">BURPEE/BAR</text>
  <!-- Frame 1: De pie junto a la barra -->
  <g class="f1">
    <circle cx="44" cy="36" r="13" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="44" y1="49" x2="44" y2="112"/>
      <line x1="24" y1="62" x2="64" y2="62"/>
      <line x1="24" y1="62" x2="20" y2="106"/><line x1="64" y1="62" x2="68" y2="106"/>
      <line x1="39" y1="112" x2="37" y2="162"/><line x1="37" y1="162" x2="37" y2="205"/>
      <line x1="49" y1="112" x2="51" y2="162"/><line x1="51" y1="162" x2="51" y2="205"/>
      <line x1="23" y1="205" x2="55" y2="205"/>
    </g>
  </g>
  <!-- Frame 2: En el suelo (burpee abajo, junto a la barra) -->
  <g class="f2">
    <circle cx="44" cy="128" r="13" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="44" y1="141" x2="44" y2="162"/>
      <line x1="24" y1="152" x2="64" y2="152"/>
      <line x1="24" y1="152" x2="20" y2="200"/><line x1="64" y1="152" x2="68" y2="200"/>
      <line x1="20" y1="197" x2="30" y2="197"/><line x1="64" y1="197" x2="74" y2="197"/>
      <line x1="39" y1="162" x2="26" y2="190"/><line x1="26" y1="190" x2="24" y2="208"/>
      <line x1="49" y1="162" x2="56" y2="190"/><line x1="56" y1="190" x2="56" y2="208"/>
    </g>
  </g>
  <!-- Frame 3: Saltando por encima de la barra -->
  <g class="f3">
    <circle cx="100" cy="30" r="13" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="100" y1="43" x2="100" y2="102"/>
      <line x1="80" y1="56" x2="120" y2="56"/>
      <line x1="80" y1="56" x2="66" y2="30"/><line x1="120" y1="56" x2="134" y2="30"/>
      <!-- Piernas dobladas en el aire, cruzando la barra -->
      <line x1="95" y1="102" x2="78" y2="148"/><line x1="78" y1="148" x2="70" y2="178"/>
      <line x1="105" y1="102" x2="122" y2="148"/><line x1="122" y1="148" x2="130" y2="178"/>
    </g>
    <circle cx="78" cy="148" r="5" fill="#64748b"/><circle cx="122" cy="148" r="5" fill="#64748b"/>
  </g>
</svg>
