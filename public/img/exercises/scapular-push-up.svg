<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 180">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="260" height="180" fill="#111827" rx="12"/>
  <line x1="20" y1="150" x2="240" y2="150" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="130" y="168" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="9" font-weight="700" fill="#475569" letter-spacing="2">SCAPULAR PUSH-UP</text>
  <!-- Frame 1: Plank, scapulas retracted (body slightly lower) -->
  <g class="f1">
    <circle cx="200" cy="72" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Torso flat, scapulas pulled together (slight valley) -->
      <line x1="200" y1="84" x2="80" y2="92"/>
      <!-- Arms straight down -->
      <line x1="183" y1="87" x2="179" y2="150"/>
      <!-- Body/hips -->
      <line x1="80" y1="92" x2="60" y2="150"/>
      <line x1="82" y1="92" x2="64" y2="150"/>
    </g>
    <!-- Scapula indicator (retracted = slight dip) -->
    <path d="M165,84 Q175,88 185,84" stroke="#475569" stroke-width="2" fill="none" stroke-linecap="round"/>
    <circle cx="179" cy="150" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 2: Scapulas in neutral -->
  <g class="f2">
    <circle cx="200" cy="68" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="200" y1="80" x2="80" y2="86"/>
      <line x1="183" y1="83" x2="179" y2="150"/>
      <line x1="80" y1="86" x2="60" y2="150"/>
      <line x1="82" y1="86" x2="64" y2="150"/>
    </g>
    <circle cx="179" cy="150" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 3: Plank, scapulas protracted (body pushed up, rounded upper back) -->
  <g class="f3">
    <circle cx="200" cy="60" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Torso slightly higher, scapulas protracted (rounded upper back) -->
      <line x1="200" y1="72" x2="86" y2="80"/>
      <!-- Arms still straight -->
      <line x1="182" y1="76" x2="179" y2="150"/>
      <!-- Body/hips -->
      <line x1="86" y1="80" x2="60" y2="150"/>
      <line x1="88" y1="80" x2="64" y2="150"/>
    </g>
    <!-- Scapula indicator (protracted = rounded) -->
    <path d="M162,72 Q172,68 182,72" stroke="#475569" stroke-width="2" fill="none" stroke-linecap="round"/>
    <circle cx="179" cy="150" r="5" fill="#64748b"/>
  </g>
</svg>
