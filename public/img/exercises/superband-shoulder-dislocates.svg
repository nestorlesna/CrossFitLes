<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220">
  <style>
    .fr1{animation:f1 4s linear infinite}
    .fr2{animation:f2 4s linear infinite}
    .fr3{animation:f3 4s linear infinite}
    @keyframes f1{0%,33%{opacity:1}34%,100%{opacity:0}}
    @keyframes f2{0%,33%{opacity:0}34%,66%{opacity:1}67%,100%{opacity:0}}
    @keyframes f3{0%,66%{opacity:0}67%,100%{opacity:1}}
  </style>
  <rect width="200" height="220" fill="#111827"/>

  <!-- Frame 1: banda al frente, agarre ancho, brazos abajo -->
  <g class="fr1" fill="none" stroke-linecap="round">
    <circle cx="100" cy="35" r="10" fill="#94a3b8"/>
    <line x1="100" y1="45" x2="100" y2="118" stroke="#94a3b8" stroke-width="4"/>
    <!-- brazo izquierdo extendido hacia abajo-izquierda -->
    <line x1="100" y1="62" x2="40" y2="105" stroke="#94a3b8" stroke-width="4"/>
    <!-- brazo derecho extendido hacia abajo-derecha -->
    <line x1="100" y1="62" x2="160" y2="105" stroke="#94a3b8" stroke-width="4"/>
    <!-- banda elástica entre las manos -->
    <path d="M40,105 Q100,88 160,105" stroke="#6366f1" stroke-width="3" fill="none" stroke-dasharray="6,3"/>
    <!-- piernas -->
    <line x1="100" y1="118" x2="90" y2="170" stroke="#94a3b8" stroke-width="4"/>
    <line x1="90" y1="170" x2="86" y2="213" stroke="#94a3b8" stroke-width="4"/>
    <line x1="100" y1="118" x2="110" y2="170" stroke="#94a3b8" stroke-width="4"/>
    <line x1="110" y1="170" x2="114" y2="213" stroke="#94a3b8" stroke-width="4"/>
  </g>

  <!-- Frame 2: brazos arriba, banda sobre la cabeza -->
  <g class="fr2" fill="none" stroke-linecap="round">
    <circle cx="100" cy="38" r="10" fill="#94a3b8"/>
    <line x1="100" y1="48" x2="100" y2="120" stroke="#94a3b8" stroke-width="4"/>
    <!-- brazo izquierdo arriba-izquierda -->
    <line x1="100" y1="65" x2="38" y2="28" stroke="#94a3b8" stroke-width="4"/>
    <!-- brazo derecho arriba-derecha -->
    <line x1="100" y1="65" x2="162" y2="28" stroke="#94a3b8" stroke-width="4"/>
    <!-- banda sobre la cabeza -->
    <path d="M38,28 Q100,8 162,28" stroke="#6366f1" stroke-width="3" fill="none" stroke-dasharray="6,3"/>
    <!-- piernas -->
    <line x1="100" y1="120" x2="90" y2="172" stroke="#94a3b8" stroke-width="4"/>
    <line x1="90" y1="172" x2="86" y2="215" stroke="#94a3b8" stroke-width="4"/>
    <line x1="100" y1="120" x2="110" y2="172" stroke="#94a3b8" stroke-width="4"/>
    <line x1="110" y1="172" x2="114" y2="215" stroke="#94a3b8" stroke-width="4"/>
  </g>

  <!-- Frame 3: banda detrás del cuerpo, brazos atrás -->
  <g class="fr3" fill="none" stroke-linecap="round">
    <circle cx="100" cy="38" r="10" fill="#94a3b8"/>
    <line x1="100" y1="48" x2="100" y2="120" stroke="#94a3b8" stroke-width="4"/>
    <!-- brazos extendidos atrás/abajo -->
    <line x1="100" y1="65" x2="40" y2="105" stroke="#94a3b8" stroke-width="4"/>
    <line x1="100" y1="65" x2="160" y2="105" stroke="#94a3b8" stroke-width="4"/>
    <!-- banda detrás (curva hacia abajo-atrás) -->
    <path d="M40,105 Q100,128 160,105" stroke="#6366f1" stroke-width="3" fill="none" stroke-dasharray="6,3"/>
    <!-- piernas -->
    <line x1="100" y1="120" x2="90" y2="172" stroke="#94a3b8" stroke-width="4"/>
    <line x1="90" y1="172" x2="86" y2="215" stroke="#94a3b8" stroke-width="4"/>
    <line x1="100" y1="120" x2="110" y2="172" stroke="#94a3b8" stroke-width="4"/>
    <line x1="110" y1="172" x2="114" y2="215" stroke="#94a3b8" stroke-width="4"/>
  </g>
</svg>
