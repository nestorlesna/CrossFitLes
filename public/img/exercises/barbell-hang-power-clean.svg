<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 230">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="220" height="230" fill="#111827" rx="12"/>
  <line x1="20" y1="210" x2="200" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="110" y="225" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="9" font-weight="700" fill="#475569" letter-spacing="2">HANG POWER CLEAN</text>
  <!-- Frame 1: Hang position - bar at hip crease, hinged -->
  <g class="f1">
    <line x1="42" y1="148" x2="178" y2="148" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <rect x="36" y="140" width="8" height="16" rx="2" fill="#475569"/>
    <rect x="176" y="140" width="8" height="16" rx="2" fill="#475569"/>
    <circle cx="110" cy="68" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Slightly hinged forward -->
      <line x1="110" y1="80" x2="110" y2="130"/>
      <line x1="90" y1="92" x2="130" y2="92"/>
      <line x1="90" y1="92" x2="72" y2="148"/>
      <line x1="130" y1="92" x2="148" y2="148"/>
      <!-- Slight knee bend -->
      <line x1="104" y1="130" x2="98" y2="172"/><line x1="98" y1="172" x2="90" y2="210"/>
      <line x1="116" y1="130" x2="122" y2="172"/><line x1="122" y1="172" x2="130" y2="210"/>
    </g>
    <circle cx="98" cy="172" r="5" fill="#64748b"/>
    <circle cx="122" cy="172" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 2: High pull - shrug and pull, elbows rising -->
  <g class="f2">
    <line x1="42" y1="100" x2="178" y2="100" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <rect x="36" y="92" width="8" height="16" rx="2" fill="#475569"/>
    <rect x="176" y="92" width="8" height="16" rx="2" fill="#475569"/>
    <circle cx="110" cy="46" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="110" y1="58" x2="110" y2="114"/>
      <line x1="88" y1="70" x2="132" y2="70"/>
      <!-- Elbows up -->
      <line x1="88" y1="70" x2="66" y2="58"/><line x1="66" y1="58" x2="72" y2="100"/>
      <line x1="132" y1="70" x2="154" y2="58"/><line x1="154" y1="58" x2="148" y2="100"/>
      <line x1="104" y1="114" x2="98" y2="164"/><line x1="98" y1="164" x2="92" y2="210"/>
      <line x1="116" y1="114" x2="122" y2="164"/><line x1="122" y1="164" x2="128" y2="210"/>
    </g>
    <circle cx="66" cy="58" r="5" fill="#64748b"/>
    <circle cx="154" cy="58" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 3: Power catch - front rack, slight squat -->
  <g class="f3">
    <line x1="42" y1="104" x2="178" y2="104" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <rect x="36" y="96" width="8" height="16" rx="2" fill="#475569"/>
    <rect x="176" y="96" width="8" height="16" rx="2" fill="#475569"/>
    <circle cx="110" cy="52" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="110" y1="64" x2="110" y2="118"/>
      <line x1="90" y1="76" x2="130" y2="76"/>
      <line x1="90" y1="76" x2="76" y2="104"/>
      <line x1="130" y1="76" x2="144" y2="104"/>
      <!-- Power catch - above parallel -->
      <line x1="104" y1="118" x2="94" y2="158"/><line x1="94" y1="158" x2="86" y2="210"/>
      <line x1="116" y1="118" x2="126" y2="158"/><line x1="126" y1="158" x2="134" y2="210"/>
    </g>
    <circle cx="94" cy="158" r="5" fill="#64748b"/>
    <circle cx="126" cy="158" r="5" fill="#64748b"/>
  </g>
</svg>
