<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 190">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="240" height="190" fill="#111827" rx="12"/>
  <line x1="20" y1="158" x2="220" y2="158" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="120" y="175" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="7.5" font-weight="700" fill="#475569" letter-spacing="1">BENT-OVER DB LATERAL RAISE</text>
  <!-- Frame 1: Bent over, arms hanging straight down -->
  <g class="f1">
    <circle cx="172" cy="64" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Torso ~50° forward -->
      <line x1="160" y1="74" x2="92" y2="108"/>
      <!-- Shoulder bar -->
      <line x1="152" y1="82" x2="100" y2="100"/>
      <!-- Arms hanging down from shoulders -->
      <line x1="152" y1="82" x2="150" y2="126"/>
      <line x1="100" y1="100" x2="102" y2="126"/>
      <!-- Legs standing -->
      <line x1="92" y1="108" x2="82" y2="158"/>
      <line x1="92" y1="108" x2="106" y2="158"/>
    </g>
    <circle cx="82" cy="134" r="4" fill="#64748b"/>
    <circle cx="106" cy="134" r="4" fill="#64748b"/>
    <rect x="141" y="124" width="16" height="7" rx="2" fill="#475569"/>
    <rect x="96" y="124" width="16" height="7" rx="2" fill="#475569"/>
  </g>
  <!-- Frame 2: Arms at ~45° — spreading out (V-shape from shoulders) -->
  <g class="f2">
    <circle cx="172" cy="64" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="160" y1="74" x2="92" y2="108"/>
      <line x1="152" y1="82" x2="100" y2="100"/>
      <!-- Arms at 45° laterally (V-spread) -->
      <line x1="126" y1="91" x2="172" y2="70"/>
      <line x1="126" y1="91" x2="80" y2="72"/>
      <line x1="92" y1="108" x2="82" y2="158"/>
      <line x1="92" y1="108" x2="106" y2="158"/>
    </g>
    <circle cx="82" cy="134" r="4" fill="#64748b"/>
    <circle cx="106" cy="134" r="4" fill="#64748b"/>
    <rect x="166" y="63" width="16" height="7" rx="2" fill="#475569"/>
    <rect x="58" y="65" width="16" height="7" rx="2" fill="#475569"/>
  </g>
  <!-- Frame 3: Arms fully raised — T-shape relative to bent torso -->
  <g class="f3">
    <circle cx="172" cy="64" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="160" y1="74" x2="92" y2="108"/>
      <line x1="152" y1="82" x2="100" y2="100"/>
      <!-- Arms fully spread laterally, perpendicular to torso -->
      <line x1="126" y1="91" x2="184" y2="56"/>
      <line x1="126" y1="91" x2="68" y2="58"/>
      <line x1="92" y1="108" x2="82" y2="158"/>
      <line x1="92" y1="108" x2="106" y2="158"/>
    </g>
    <circle cx="82" cy="134" r="4" fill="#64748b"/>
    <circle cx="106" cy="134" r="4" fill="#64748b"/>
    <rect x="178" y="48" width="16" height="7" rx="2" fill="#475569"/>
    <rect x="46" y="51" width="16" height="7" rx="2" fill="#475569"/>
  </g>
</svg>
