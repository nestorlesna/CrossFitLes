<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
<rect width="200" height="230" fill="#111827" rx="12"/>
<style>
  .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
  @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
  @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
  @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
</style>
<line x1="30" y1="210" x2="170" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
<text x="100" y="225" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#475569">PARTNER WALL BALL</text>

<!-- F1: Lying back, knees bent, ball at chest -->
<g class="f1" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" fill="none">
  <circle cx="155" cy="165" r="12" fill="#94a3b8" stroke="none"/>
  <!-- Torso on floor (horizontal) -->
  <line x1="143" y1="168" x2="85" y2="172"/>
  <!-- Arms holding ball at chest -->
  <line x1="125" y1="163" x2="105" y2="158"/>
  <line x1="125" y1="168" x2="105" y2="165"/>
  <!-- Wall ball -->
  <circle cx="100" cy="160" r="10" fill="#374151" stroke="#64748b" stroke-width="2"/>
  <!-- Knees bent, feet flat -->
  <line x1="85" y1="172" x2="72" y2="148"/>
  <line x1="72" y1="148" x2="60" y2="172"/>
  <line x1="85" y1="172" x2="78" y2="145"/>
  <line x1="78" y1="145" x2="65" y2="170"/>
  <circle cx="72" cy="148" r="4" fill="#64748b" stroke="none"/>
  <circle cx="78" cy="145" r="4" fill="#64748b" stroke="none"/>
</g>

<!-- F2: Sitting up partway, ball at chest -->
<g class="f2" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" fill="none">
  <circle cx="138" cy="140" r="12" fill="#94a3b8" stroke="none"/>
  <!-- Torso at 45° (sit-up in progress) -->
  <line x1="128" y1="150" x2="95" y2="170"/>
  <!-- Arms holding ball -->
  <line x1="115" y1="142" x2="98" y2="152"/>
  <line x1="112" y1="148" x2="95" y2="158"/>
  <!-- Wall ball -->
  <circle cx="92" cy="153" r="10" fill="#374151" stroke="#64748b" stroke-width="2"/>
  <!-- Legs bent -->
  <line x1="95" y1="170" x2="72" y2="150"/>
  <line x1="72" y1="150" x2="62" y2="175"/>
  <line x1="95" y1="172" x2="76" y2="148"/>
  <line x1="76" y1="148" x2="65" y2="173"/>
  <circle cx="72" cy="150" r="4" fill="#64748b" stroke="none"/>
  <circle cx="76" cy="148" r="4" fill="#64748b" stroke="none"/>
</g>

<!-- F3: Full sit-up, ball raised overhead (passing to partner) -->
<g class="f3" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" fill="none">
  <circle cx="120" cy="108" r="12" fill="#94a3b8" stroke="none"/>
  <!-- Torso upright -->
  <line x1="120" y1="120" x2="100" y2="172"/>
  <!-- Arms raised overhead with ball -->
  <line x1="120" y1="130" x2="112" y2="88"/>
  <line x1="120" y1="130" x2="130" y2="88"/>
  <!-- Wall ball overhead -->
  <circle cx="121" cy="78" r="12" fill="#374151" stroke="#64748b" stroke-width="2"/>
  <!-- Legs bent, feet on floor -->
  <line x1="100" y1="172" x2="80" y2="152"/>
  <line x1="80" y1="152" x2="68" y2="178"/>
  <line x1="100" y1="174" x2="82" y2="150"/>
  <line x1="82" y1="150" x2="70" y2="176"/>
  <circle cx="80" cy="152" r="4" fill="#64748b" stroke="none"/>
  <circle cx="82" cy="150" r="4" fill="#64748b" stroke="none"/>
</g>
</svg>
