<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
<rect width="200" height="230" fill="#111827" rx="12"/>
<style>
.f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
@keyframes sh1{0%,27%{opacity:1}33%{opacity:0}90%{opacity:0}100%{opacity:1}}
@keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
@keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
</style>
<!-- Box (always visible) -->
<rect x="72" y="165" width="56" height="40" fill="#1e2937" stroke="#374151" stroke-width="2" rx="3"/>
<!-- F1: Standing beside box, KB in hand -->
<g class="f1">
  <circle cx="48" cy="28" r="13" fill="#94a3b8"/>
  <line x1="48" y1="41" x2="48" y2="108" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="48" y1="55" x2="28" y2="80" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="28" y1="80" x2="22" y2="115" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="48" y1="55" x2="68" y2="80" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="68" y1="80" x2="70" y2="115" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <circle cx="18" cy="122" r="10" fill="#64748b"/>
  <line x1="48" y1="108" x2="36" y2="162" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="36" y1="162" x2="32" y2="205" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="48" y1="108" x2="60" y2="162" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="60" y1="162" x2="64" y2="205" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <circle cx="36" cy="162" r="5" fill="#64748b"/>
  <circle cx="60" cy="162" r="5" fill="#64748b"/>
</g>
<!-- F2: Stepping up onto box -->
<g class="f2">
  <circle cx="100" cy="38" r="13" fill="#94a3b8"/>
  <line x1="100" y1="51" x2="100" y2="115" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="100" y1="65" x2="76" y2="85" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="76" y1="85" x2="68" y2="118" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="100" y1="65" x2="124" y2="85" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="124" y1="85" x2="132" y2="118" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <circle cx="64" cy="125" r="10" fill="#64748b"/>
  <line x1="100" y1="115" x2="84" y2="152" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="84" y1="152" x2="86" y2="165" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="100" y1="115" x2="120" y2="145" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="120" y1="145" x2="118" y2="165" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <circle cx="84" cy="152" r="5" fill="#64748b"/>
  <circle cx="120" cy="145" r="5" fill="#64748b"/>
</g>
<!-- F3: On the other side of box -->
<g class="f3">
  <circle cx="152" cy="28" r="13" fill="#94a3b8"/>
  <line x1="152" y1="41" x2="152" y2="108" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="152" y1="55" x2="132" y2="80" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="132" y1="80" x2="130" y2="115" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="152" y1="55" x2="172" y2="80" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="172" y1="80" x2="178" y2="115" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <circle cx="182" cy="122" r="10" fill="#64748b"/>
  <line x1="152" y1="108" x2="140" y2="162" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="140" y1="162" x2="136" y2="205" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="152" y1="108" x2="164" y2="162" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="164" y1="162" x2="168" y2="205" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <circle cx="140" cy="162" r="5" fill="#64748b"/>
  <circle cx="164" cy="162" r="5" fill="#64748b"/>
</g>
<line x1="30" y1="210" x2="170" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
<text x="100" y="225" text-anchor="middle" font-family="monospace" font-size="9" fill="#475569">KB BOX STEP-OVER</text>
</svg>
