<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 230">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="240" height="230" fill="#111827" rx="12"/>
  <line x1="20" y1="210" x2="220" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="120" y="225" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="8" font-weight="700" fill="#475569" letter-spacing="1">KB SUMO DL HIGH PULL</text>
  <!-- Frame 1: Sumo setup — wide stance, KB at floor -->
  <g class="f1">
    <!-- KB at floor (between feet) -->
    <circle cx="120" cy="186" r="10" fill="none" stroke="#475569" stroke-width="4"/>
    <line x1="114" y1="178" x2="126" y2="178" stroke="#475569" stroke-width="4" stroke-linecap="round"/>
    <circle cx="120" cy="72" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="120" y1="84" x2="120" y2="128"/>
      <line x1="100" y1="96" x2="140" y2="96"/>
      <!-- Arms converging down to KB handle -->
      <line x1="100" y1="96" x2="116" y2="178"/>
      <line x1="140" y1="96" x2="124" y2="178"/>
      <!-- Wide sumo stance -->
      <line x1="114" y1="128" x2="76" y2="172"/><line x1="76" y1="172" x2="60" y2="210"/>
      <line x1="126" y1="128" x2="164" y2="172"/><line x1="164" y1="172" x2="180" y2="210"/>
    </g>
    <circle cx="76" cy="172" r="5" fill="#64748b"/>
    <circle cx="164" cy="172" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 2: Mid pull — KB at waist, legs extending -->
  <g class="f2">
    <!-- KB at waist -->
    <circle cx="120" cy="132" r="10" fill="none" stroke="#475569" stroke-width="4"/>
    <line x1="114" y1="124" x2="126" y2="124" stroke="#475569" stroke-width="4" stroke-linecap="round"/>
    <circle cx="120" cy="50" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="120" y1="62" x2="120" y2="114"/>
      <line x1="100" y1="74" x2="140" y2="74"/>
      <!-- Arms bent, pulling KB up -->
      <line x1="100" y1="74" x2="110" y2="122"/>
      <line x1="140" y1="74" x2="130" y2="122"/>
      <!-- Legs partially extended -->
      <line x1="114" y1="114" x2="90" y2="158"/><line x1="90" y1="158" x2="72" y2="210"/>
      <line x1="126" y1="114" x2="150" y2="158"/><line x1="150" y1="158" x2="168" y2="210"/>
    </g>
    <circle cx="90" cy="158" r="5" fill="#64748b"/>
    <circle cx="150" cy="158" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 3: High pull — KB at chin, elbows flared high -->
  <g class="f3">
    <!-- KB at chin -->
    <circle cx="120" cy="80" r="10" fill="none" stroke="#475569" stroke-width="4"/>
    <line x1="114" y1="72" x2="126" y2="72" stroke="#475569" stroke-width="4" stroke-linecap="round"/>
    <circle cx="120" cy="40" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="120" y1="52" x2="120" y2="112"/>
      <line x1="100" y1="64" x2="140" y2="64"/>
      <!-- Elbows high and wide, forearms down to KB -->
      <line x1="100" y1="64" x2="72" y2="52"/><line x1="72" y1="52" x2="112" y2="80"/>
      <line x1="140" y1="64" x2="168" y2="52"/><line x1="168" y1="52" x2="128" y2="80"/>
      <!-- Standing legs -->
      <line x1="114" y1="112" x2="96" y2="162"/><line x1="96" y1="162" x2="84" y2="210"/>
      <line x1="126" y1="112" x2="144" y2="162"/><line x1="144" y1="162" x2="156" y2="210"/>
    </g>
    <circle cx="72" cy="52" r="5" fill="#64748b"/>
    <circle cx="168" cy="52" r="5" fill="#64748b"/>
    <circle cx="96" cy="162" r="5" fill="#64748b"/>
    <circle cx="144" cy="162" r="5" fill="#64748b"/>
  </g>
</svg>
