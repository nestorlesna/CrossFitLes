<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="200" height="230" fill="#111827" rx="12"/>
  <!-- Caja (siempre visible) -->
  <rect x="105" y="164" width="68" height="41" rx="4" fill="none" stroke="#374151" stroke-width="4"/>
  <line x1="30" y1="205" x2="105" y2="205" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="100" y="226" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" font-weight="700" fill="#475569" letter-spacing="2">BOX JUMP</text>
  <!-- Frame 1: De pie frente a la caja -->
  <g class="f1">
    <circle cx="68" cy="36" r="13" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="68" y1="49" x2="68" y2="112"/>
      <line x1="48" y1="62" x2="88" y2="62"/>
      <line x1="48" y1="62" x2="44" y2="108"/><line x1="88" y1="62" x2="92" y2="108"/>
      <line x1="63" y1="112" x2="60" y2="165"/><line x1="60" y1="165" x2="60" y2="205"/>
      <line x1="73" y1="112" x2="76" y2="165"/><line x1="76" y1="165" x2="76" y2="205"/>
      <line x1="46" y1="205" x2="74" y2="205"/><line x1="62" y1="205" x2="90" y2="205"/>
    </g>
  </g>
  <!-- Frame 2: Carga (semi-squat, listo para saltar) -->
  <g class="f2">
    <circle cx="68" cy="64" r="13" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="68" y1="77" x2="68" y2="130"/>
      <line x1="48" y1="88" x2="88" y2="88"/>
      <!-- Brazos atrás en carga -->
      <line x1="48" y1="88" x2="34" y2="118"/><line x1="88" y1="88" x2="98" y2="118"/>
      <!-- Rodillas dobladas -->
      <line x1="63" y1="130" x2="52" y2="172"/><line x1="52" y1="172" x2="55" y2="205"/>
      <line x1="73" y1="130" x2="84" y2="172"/><line x1="84" y1="172" x2="80" y2="205"/>
      <line x1="41" y1="205" x2="69" y2="205"/><line x1="68" y1="205" x2="96" y2="205"/>
    </g>
    <circle cx="52" cy="172" r="5" fill="#64748b"/><circle cx="84" cy="172" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 3: Encima de la caja, de pie -->
  <g class="f3">
    <circle cx="139" cy="124" r="13" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="139" y1="137" x2="139" y2="152"/>
      <line x1="118" y1="148" x2="160" y2="148"/>
      <line x1="118" y1="148" x2="114" y2="162"/><line x1="160" y1="148" x2="164" y2="162"/>
      <!-- Piernas rectas sobre la caja -->
      <line x1="134" y1="152" x2="132" y2="164"/><line x1="144" y1="152" x2="146" y2="164"/>
      <line x1="118" y1="164" x2="148" y2="164"/>
    </g>
  </g>
</svg>
