<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200">
  <style>
    .fr1{animation:f1 4s linear infinite}
    .fr2{animation:f2 4s linear infinite}
    .fr3{animation:f3 4s linear infinite}
    @keyframes f1{0%,33%{opacity:1}34%,100%{opacity:0}}
    @keyframes f2{0%,33%{opacity:0}34%,66%{opacity:1}67%,100%{opacity:0}}
    @keyframes f3{0%,66%{opacity:0}67%,100%{opacity:1}}
  </style>
  <rect width="240" height="200" fill="#111827"/>
  <!-- barra/rig superior -->
  <line x1="70" y1="10" x2="160" y2="10" stroke="#475569" stroke-width="4" stroke-linecap="round"/>
  <!-- suelo -->
  <line x1="10" y1="185" x2="230" y2="185" stroke="#374151" stroke-width="2"/>

  <!-- anillas fijas (siempre visibles) -->
  <line x1="95" y1="10" x2="95" y2="62" stroke="#64748b" stroke-width="2"/>
  <circle cx="95" cy="68" r="7" fill="none" stroke="#64748b" stroke-width="2"/>
  <line x1="135" y1="10" x2="135" y2="62" stroke="#64748b" stroke-width="2"/>
  <circle cx="135" cy="68" r="7" fill="none" stroke="#64748b" stroke-width="2"/>

  <!-- Frame 1: brazos extendidos, cuerpo inclinado hacia atrás -->
  <g class="fr1" fill="none" stroke-linecap="round">
    <!-- manos en anillas -->
    <line x1="95" y1="75" x2="90" y2="88" stroke="#94a3b8" stroke-width="4"/>
    <line x1="135" y1="75" x2="130" y2="88" stroke="#94a3b8" stroke-width="4"/>
    <!-- hombro/pecho al nivel de las anillas -->
    <line x1="90" y1="88" x2="130" y2="88" stroke="#94a3b8" stroke-width="4"/>
    <!-- torso inclinado hacia atrás (cuerpo diagonal) -->
    <line x1="110" y1="88" x2="175" y2="155" stroke="#94a3b8" stroke-width="4"/>
    <!-- cabeza -->
    <circle cx="98" cy="80" r="10" fill="#94a3b8"/>
    <!-- piernas extendidas con pies en el suelo -->
    <line x1="175" y1="155" x2="185" y2="183" stroke="#94a3b8" stroke-width="4"/>
    <line x1="185" y1="183" x2="200" y2="183" stroke="#94a3b8" stroke-width="3"/>
  </g>

  <!-- Frame 2: tirando a medio camino, codos doblados ~90° -->
  <g class="fr2" fill="none" stroke-linecap="round">
    <!-- manos en anillas -->
    <line x1="95" y1="75" x2="92" y2="84" stroke="#94a3b8" stroke-width="4"/>
    <line x1="135" y1="75" x2="132" y2="84" stroke="#94a3b8" stroke-width="4"/>
    <!-- brazos doblados, codos afuera -->
    <line x1="92" y1="84" x2="78" y2="100" stroke="#94a3b8" stroke-width="4"/>
    <line x1="132" y1="84" x2="148" y2="100" stroke="#94a3b8" stroke-width="4"/>
    <!-- pecho entre manos y codos -->
    <line x1="78" y1="100" x2="148" y2="100" stroke="#94a3b8" stroke-width="4"/>
    <!-- cabeza -->
    <circle cx="112" cy="90" r="10" fill="#94a3b8"/>
    <!-- torso menos inclinado -->
    <line x1="113" y1="100" x2="168" y2="155" stroke="#94a3b8" stroke-width="4"/>
    <!-- piernas -->
    <line x1="168" y1="155" x2="178" y2="183" stroke="#94a3b8" stroke-width="4"/>
    <line x1="178" y1="183" x2="193" y2="183" stroke="#94a3b8" stroke-width="3"/>
  </g>

  <!-- Frame 3: pecho a las anillas, brazos completamente recogidos -->
  <g class="fr3" fill="none" stroke-linecap="round">
    <!-- brazos muy doblados -->
    <line x1="95" y1="75" x2="88" y2="80" stroke="#94a3b8" stroke-width="4"/>
    <line x1="135" y1="75" x2="142" y2="80" stroke="#94a3b8" stroke-width="4"/>
    <line x1="88" y1="80" x2="70" y2="104" stroke="#94a3b8" stroke-width="4"/>
    <line x1="142" y1="80" x2="158" y2="104" stroke="#94a3b8" stroke-width="4"/>
    <!-- pecho a nivel de anillas -->
    <line x1="70" y1="104" x2="158" y2="104" stroke="#94a3b8" stroke-width="4"/>
    <!-- cabeza -->
    <circle cx="114" cy="92" r="10" fill="#94a3b8"/>
    <!-- torso más horizontal -->
    <line x1="114" y1="104" x2="162" y2="150" stroke="#94a3b8" stroke-width="4"/>
    <!-- piernas -->
    <line x1="162" y1="150" x2="172" y2="183" stroke="#94a3b8" stroke-width="4"/>
    <line x1="172" y1="183" x2="187" y2="183" stroke="#94a3b8" stroke-width="3"/>
  </g>
</svg>
