    <rect x="42" y="92" width="10" height="16" rx="2" fill="#475569" stroke="#64748b"/>
    <rect x="148" y="92" width="10" height="16" rx="2" fill="#475569" stroke="#64748b"/>
  </g>
  <!-- Frame 2: Clean - front rack -->
