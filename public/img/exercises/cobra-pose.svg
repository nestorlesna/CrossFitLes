<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
<rect width="200" height="230" fill="#111827" rx="12"/>
<style>
.f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
@keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
@keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
@keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
</style>
<!-- F1: Lying face down, flat -->
<g class="f1">
  <circle cx="160" cy="165" r="12" fill="#94a3b8"/>
  <line x1="148" y1="163" x2="55" y2="168" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="148" y1="155" x2="148" y2="145" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="148" y1="145" x2="135" y2="138" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="148" y1="145" x2="160" y2="138" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="55" y1="168" x2="38" y2="170" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="55" y1="168" x2="40" y2="174" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
</g>
<!-- F2: Pushing up, chest partially lifted -->
<g class="f2">
  <circle cx="148" cy="138" r="12" fill="#94a3b8"/>
  <line x1="138" y1="148" x2="65" y2="168" stroke="#94a3b8" stroke-width="5" stroke-linecap="round"/>
  <line x1="138" y1="148" x2="142" y2="175" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="142" y1="175" x2="148" y2="205" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="138" y1="158" x2="125" y2="152" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="125" y1="152" x2="112" y2="170" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="138" y1="158" x2="155" y2="155" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="155" y1="155" x2="168" y2="172" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <circle cx="112" cy="170" r="6" fill="#64748b"/>
  <circle cx="168" cy="172" r="6" fill="#64748b"/>
  <line x1="65" y1="168" x2="42" y2="170" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="65" y1="168" x2="42" y2="176" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
</g>
<!-- F3: Full cobra, chest high -->
<g class="f3">
  <circle cx="140" cy="115" r="12" fill="#94a3b8"/>
  <line x1="130" y1="125" x2="70" y2="168" stroke="#94a3b8" stroke-width="5" stroke-linecap="round"/>
  <line x1="130" y1="125" x2="135" y2="165" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="135" y1="165" x2="140" y2="205" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="130" y1="140" x2="112" y2="145" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="112" y1="145" x2="102" y2="172" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="130" y1="140" x2="155" y2="148" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="155" y1="148" x2="168" y2="175" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <circle cx="102" cy="172" r="6" fill="#64748b"/>
  <circle cx="168" cy="175" r="6" fill="#64748b"/>
  <line x1="70" y1="168" x2="44" y2="170" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="70" y1="168" x2="44" y2="176" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
</g>
<line x1="30" y1="210" x2="170" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
<text x="100" y="225" text-anchor="middle" font-family="monospace" font-size="10" fill="#475569">COBRA POSE</text>
</svg>
