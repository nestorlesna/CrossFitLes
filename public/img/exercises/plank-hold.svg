<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="200" height="230" fill="#111827" rx="12"/>
  <line x1="20" y1="155" x2="180" y2="155" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="100" y="226" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="9" font-weight="700" fill="#475569" letter-spacing="2">PLANK HOLD</text>

  <!-- Frame 1: Entering plank (slight hip hike) -->
  <g class="f1" stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <circle cx="28" cy="102" r="12" fill="#94a3b8" stroke="none"/>
    <line x1="40" y1="108" x2="172" y2="110"/>
    <line x1="55" y1="108" x2="50" y2="152"/>
    <line x1="75" y1="108" x2="70" y2="152"/>
    <line x1="160" y1="110" x2="164" y2="152"/>
    <line x1="172" y1="110" x2="176" y2="152"/>
    <circle cx="50" cy="152" r="4" fill="#64748b" stroke="none"/>
    <circle cx="70" cy="152" r="4" fill="#64748b" stroke="none"/>
    <circle cx="164" cy="152" r="4" fill="#64748b" stroke="none"/>
  </g>

  <!-- Frame 2: Perfect horizontal plank hold -->
  <g class="f2" stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <circle cx="28" cy="108" r="12" fill="#94a3b8" stroke="none"/>
    <line x1="40" y1="113" x2="172" y2="113"/>
    <line x1="55" y1="113" x2="50" y2="152"/>
    <line x1="75" y1="113" x2="70" y2="152"/>
    <line x1="160" y1="113" x2="164" y2="152"/>
    <line x1="172" y1="113" x2="176" y2="152"/>
    <circle cx="50" cy="152" r="4" fill="#64748b" stroke="none"/>
    <circle cx="70" cy="152" r="4" fill="#64748b" stroke="none"/>
    <circle cx="164" cy="152" r="4" fill="#64748b" stroke="none"/>
  </g>

  <!-- Frame 3: Sustained hold (same as frame 2) -->
  <g class="f3" stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <circle cx="28" cy="108" r="12" fill="#94a3b8" stroke="none"/>
    <line x1="40" y1="113" x2="172" y2="113"/>
    <line x1="55" y1="113" x2="50" y2="152"/>
    <line x1="75" y1="113" x2="70" y2="152"/>
    <line x1="160" y1="113" x2="164" y2="152"/>
    <line x1="172" y1="113" x2="176" y2="152"/>
    <circle cx="50" cy="152" r="4" fill="#64748b" stroke="none"/>
    <circle cx="70" cy="152" r="4" fill="#64748b" stroke="none"/>
    <circle cx="164" cy="152" r="4" fill="#64748b" stroke="none"/>
    <!-- Hold indicator dots -->
    <circle cx="112" cy="106" r="3" fill="#6ee7b7" stroke="none"/>
    <circle cx="120" cy="106" r="3" fill="#6ee7b7" stroke="none"/>
    <circle cx="128" cy="106" r="3" fill="#6ee7b7" stroke="none"/>
  </g>
</svg>
