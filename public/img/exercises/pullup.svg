<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240">
  <style>
    .f1{animation:sh1 4s linear infinite}
    .f2{animation:sh2 4s linear infinite}
    .f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>

  <rect width="200" height="240" fill="#111827" rx="12"/>
  <!-- Barra (siempre visible) -->
  <line x1="46"  y1="38" x2="154" y2="38" stroke="#475569" stroke-width="7" stroke-linecap="round"/>
  <line x1="46"  y1="24" x2="46"  y2="46" stroke="#374151" stroke-width="5" stroke-linecap="round"/>
  <line x1="154" y1="24" x2="154" y2="46" stroke="#374151" stroke-width="5" stroke-linecap="round"/>
  <text x="100" y="238" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" font-weight="700" fill="#475569" letter-spacing="2">PULL-UP</text>

  <!-- ── FRAME 1: Colgado (dead hang) ───────────────────────────────────── -->
  <g class="f1">
    <circle cx="100" cy="73" r="13" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Brazos casi rectos -->
      <line x1="75"  y1="38" x2="76"  y2="60"/>
      <line x1="76"  y1="60" x2="82"  y2="88"/>
      <line x1="125" y1="38" x2="124" y2="60"/>
      <line x1="124" y1="60" x2="118" y2="88"/>
      <!-- Hombros (elevados por el peso) -->
      <line x1="82"  y1="88" x2="118" y2="88"/>
      <!-- Torso -->
      <line x1="100" y1="88" x2="100" y2="152"/>
      <!-- Pierna izquierda -->
      <line x1="96"  y1="152" x2="92"  y2="194"/>
      <line x1="92"  y1="194" x2="94"  y2="224"/>
      <!-- Pierna derecha -->
      <line x1="104" y1="152" x2="108" y2="194"/>
      <line x1="108" y1="194" x2="106" y2="224"/>
      <!-- Pies -->
      <line x1="84"  y1="224" x2="104" y2="224"/>
      <line x1="96"  y1="224" x2="116" y2="224"/>
    </g>
    <circle cx="76"  cy="60"  r="5" fill="#64748b"/>
    <circle cx="124" cy="60"  r="5" fill="#64748b"/>
    <circle cx="92"  cy="194" r="5" fill="#64748b"/>
    <circle cx="108" cy="194" r="5" fill="#64748b"/>
  </g>

  <!-- ── FRAME 2: A mitad (codos a 90°) ────────────────────────────────── -->
  <g class="f2">
    <circle cx="100" cy="44" r="13" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Brazos doblados ~90° -->
      <line x1="75"  y1="38" x2="68"  y2="55"/>
      <line x1="68"  y1="55" x2="83"  y2="72"/>
      <line x1="125" y1="38" x2="132" y2="55"/>
      <line x1="132" y1="55" x2="117" y2="72"/>
      <!-- Hombros -->
      <line x1="83"  y1="72" x2="117" y2="72"/>
      <!-- Cuello (visible al subir) -->
      <line x1="100" y1="57" x2="100" y2="72"/>
      <!-- Torso -->
      <line x1="100" y1="72" x2="100" y2="140"/>
      <!-- Piernas -->
      <line x1="96"  y1="140" x2="91"  y2="188"/>
      <line x1="91"  y1="188" x2="93"  y2="224"/>
      <line x1="104" y1="140" x2="109" y2="188"/>
      <line x1="109" y1="188" x2="107" y2="224"/>
      <!-- Pies -->
      <line x1="83"  y1="224" x2="103" y2="224"/>
      <line x1="97"  y1="224" x2="117" y2="224"/>
    </g>
    <circle cx="68"  cy="55"  r="5" fill="#64748b"/>
    <circle cx="132" cy="55"  r="5" fill="#64748b"/>
    <circle cx="91"  cy="188" r="5" fill="#64748b"/>
    <circle cx="109" cy="188" r="5" fill="#64748b"/>
  </g>

  <!-- ── FRAME 3: Mentón sobre la barra ────────────────────────────────── -->
  <g class="f3">
    <circle cx="100" cy="22" r="13" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Brazos tirando fuerte -->
      <line x1="75"  y1="38" x2="68"  y2="52"/>
      <line x1="68"  y1="52" x2="83"  y2="68"/>
      <line x1="125" y1="38" x2="132" y2="52"/>
      <line x1="132" y1="52" x2="117" y2="68"/>
      <!-- Hombros -->
      <line x1="83"  y1="68" x2="117" y2="68"/>
      <!-- Cuello largo (cuerpo arriba) -->
      <line x1="100" y1="35" x2="100" y2="68"/>
      <!-- Torso -->
      <line x1="100" y1="68" x2="100" y2="136"/>
      <!-- Piernas -->
      <line x1="96"  y1="136" x2="91"  y2="186"/>
      <line x1="91"  y1="186" x2="93"  y2="224"/>
      <line x1="104" y1="136" x2="109" y2="186"/>
      <line x1="109" y1="186" x2="107" y2="224"/>
      <!-- Pies -->
      <line x1="83"  y1="224" x2="103" y2="224"/>
      <line x1="97"  y1="224" x2="117" y2="224"/>
    </g>
    <circle cx="68"  cy="52"  r="5" fill="#64748b"/>
    <circle cx="132" cy="52"  r="5" fill="#64748b"/>
    <circle cx="91"  cy="186" r="5" fill="#64748b"/>
    <circle cx="109" cy="186" r="5" fill="#64748b"/>
  </g>
</svg>
