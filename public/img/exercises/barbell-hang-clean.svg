<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 230">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="220" height="230" fill="#111827" rx="12"/>
  <line x1="20" y1="210" x2="200" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="110" y="225" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="9" font-weight="700" fill="#475569" letter-spacing="2">HANG CLEAN</text>
  <!-- Frame 1: Hang - bar at hip crease -->
  <g class="f1">
    <line x1="42" y1="148" x2="178" y2="148" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <rect x="36" y="140" width="8" height="16" rx="2" fill="#475569"/>
    <rect x="176" y="140" width="8" height="16" rx="2" fill="#475569"/>
    <circle cx="110" cy="66" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="110" y1="78" x2="110" y2="128"/>
      <line x1="90" y1="90" x2="130" y2="90"/>
      <line x1="90" y1="90" x2="72" y2="148"/>
      <line x1="130" y1="90" x2="148" y2="148"/>
      <line x1="104" y1="128" x2="98" y2="172"/><line x1="98" y1="172" x2="90" y2="210"/>
      <line x1="116" y1="128" x2="122" y2="172"/><line x1="122" y1="172" x2="130" y2="210"/>
    </g>
    <circle cx="98" cy="172" r="5" fill="#64748b"/>
    <circle cx="122" cy="172" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 2: High pull, shrug -->
  <g class="f2">
    <line x1="42" y1="102" x2="178" y2="102" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <rect x="36" y="94" width="8" height="16" rx="2" fill="#475569"/>
    <rect x="176" y="94" width="8" height="16" rx="2" fill="#475569"/>
    <circle cx="110" cy="46" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="110" y1="58" x2="110" y2="114"/>
      <line x1="90" y1="70" x2="130" y2="70"/>
      <line x1="90" y1="70" x2="66" y2="58"/><line x1="66" y1="58" x2="72" y2="102"/>
      <line x1="130" y1="70" x2="154" y2="58"/><line x1="154" y1="58" x2="148" y2="102"/>
      <line x1="104" y1="114" x2="96" y2="162"/><line x1="96" y1="162" x2="90" y2="210"/>
      <line x1="116" y1="114" x2="124" y2="162"/><line x1="124" y1="162" x2="130" y2="210"/>
    </g>
    <circle cx="66" cy="58" r="5" fill="#64748b"/>
    <circle cx="154" cy="58" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 3: Squat clean catch - deep front squat -->
  <g class="f3">
    <line x1="42" y1="120" x2="178" y2="120" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <rect x="36" y="112" width="8" height="16" rx="2" fill="#475569"/>
    <rect x="176" y="112" width="8" height="16" rx="2" fill="#475569"/>
    <circle cx="110" cy="84" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="110" y1="96" x2="110" y2="140"/>
      <line x1="90" y1="106" x2="130" y2="106"/>
      <line x1="90" y1="106" x2="72" y2="120"/>
      <line x1="130" y1="106" x2="148" y2="120"/>
      <!-- Deep squat -->
      <line x1="104" y1="140" x2="72" y2="178"/><line x1="72" y1="178" x2="60" y2="210"/>
      <line x1="116" y1="140" x2="148" y2="178"/><line x1="148" y1="178" x2="160" y2="210"/>
    </g>
    <circle cx="72" cy="178" r="5" fill="#64748b"/>
    <circle cx="148" cy="178" r="5" fill="#64748b"/>
  </g>
</svg>
