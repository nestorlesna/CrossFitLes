<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
  <rect width="200" height="230" fill="#111827" rx="12"/>
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <!-- Frame 1: Side plank start -->
  <g class="f1" stroke="#94a3b8" stroke-width="3.5" stroke-linecap="round" fill="none">
    <circle cx="52" cy="130" r="13"/>
    <line x1="64" y1="135" x2="120" y2="140"/>
    <line x1="120" y1="140" x2="165" y2="145"/>
    <line x1="120" y1="140" x2="125" y2="120"/>
    <line x1="125" y1="120" x2="140" y2="108"/>
    <line x1="165" y1="145" x2="160" y2="170"/>
    <circle cx="160" cy="170" r="4.5" fill="#64748b"/>
    <line x1="160" y1="170" x2="155" y2="195"/>
    <line x1="148" y1="195" x2="162" y2="195"/>
    <line x1="165" y1="145" x2="168" y2="168"/>
    <circle cx="168" cy="168" r="4.5" fill="#64748b"/>
    <line x1="168" y1="168" x2="165" y2="195"/>
    <line x1="158" y1="195" x2="172" y2="195"/>
    <!-- Support arm -->
    <line x1="64" y1="135" x2="72" y2="165"/>
    <line x1="72" y1="165" x2="80" y2="195"/>
    <!-- Weight plate on hip -->
    <ellipse cx="120" cy="152" rx="12" ry="8" fill="#475569" stroke="#64748b"/>
  </g>
  <!-- Frame 2: Hip dip down -->
  <g class="f2" stroke="#94a3b8" stroke-width="3.5" stroke-linecap="round" fill="none">
    <circle cx="52" cy="138" r="13"/>
    <line x1="64" y1="143" x2="120" y2="152"/>
    <line x1="120" y1="152" x2="165" y2="155"/>
    <line x1="120" y1="152" x2="125" y2="132"/>
    <line x1="125" y1="132" x2="140" y2="120"/>
    <line x1="165" y1="155" x2="160" y2="178"/>
    <circle cx="160" cy="178" r="4.5" fill="#64748b"/>
    <line x1="160" y1="178" x2="155" y2="200"/>
    <line x1="148" y1="200" x2="162" y2="200"/>
    <line x1="165" y1="155" x2="168" y2="176"/>
    <circle cx="168" cy="176" r="4.5" fill="#64748b"/>
    <line x1="168" y1="176" x2="165" y2="200"/>
    <line x1="158" y1="200" x2="172" y2="200"/>
    <!-- Support arm -->
    <line x1="64" y1="143" x2="72" y2="172"/>
    <line x1="72" y1="172" x2="80" y2="195"/>
    <!-- Weight plate on hip -->
    <ellipse cx="120" cy="164" rx="12" ry="8" fill="#475569" stroke="#64748b"/>
  </g>
  <!-- Frame 3: Hip raise up -->
  <g class="f3" stroke="#94a3b8" stroke-width="3.5" stroke-linecap="round" fill="none">
    <circle cx="52" cy="122" r="13"/>
    <line x1="64" y1="127" x2="120" y2="128"/>
    <line x1="120" y1="128" x2="165" y2="135"/>
    <line x1="120" y1="128" x2="125" y2="108"/>
    <line x1="125" y1="108" x2="140" y2="96"/>
    <line x1="165" y1="135" x2="160" y2="162"/>
    <circle cx="160" cy="162" r="4.5" fill="#64748b"/>
    <line x1="160" y1="162" x2="155" y2="190"/>
    <line x1="148" y1="190" x2="162" y2="190"/>
    <line x1="165" y1="135" x2="168" y2="160"/>
    <circle cx="168" cy="160" r="4.5" fill="#64748b"/>
    <line x1="168" y1="160" x2="165" y2="190"/>
    <line x1="158" y1="190" x2="172" y2="190"/>
    <!-- Support arm -->
    <line x1="64" y1="127" x2="72" y2="158"/>
    <line x1="72" y1="158" x2="80" y2="195"/>
    <!-- Weight plate on hip -->
    <ellipse cx="120" cy="140" rx="12" ry="8" fill="#475569" stroke="#64748b"/>
  </g>
  <line x1="30" y1="210" x2="170" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="100" y="225" font-family="sans-serif" font-size="9" fill="#475569" text-anchor="middle" letter-spacing="0.5">SIDE PLANK C/CARGA</text>
</svg>
