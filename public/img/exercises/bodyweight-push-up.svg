<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 180">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="240" height="180" fill="#111827" rx="12"/>
  <line x1="20" y1="148" x2="220" y2="148" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="120" y="167" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" font-weight="700" fill="#475569" letter-spacing="2">PUSH-UP</text>
  <!-- Frame 1: Top position - arms extended -->
  <g class="f1">
    <circle cx="185" cy="78" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Torso flat -->
      <line x1="185" y1="90" x2="90" y2="100"/>
      <!-- Arms straight down to floor -->
      <line x1="168" y1="94" x2="164" y2="148"/>
      <!-- Body straight line -->
      <line x1="90" y1="100" x2="68" y2="148"/>
      <line x1="92" y1="100" x2="72" y2="148"/>
    </g>
    <circle cx="164" cy="148" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 2: Mid position -->
  <g class="f2">
    <circle cx="182" cy="96" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="182" y1="108" x2="90" y2="116"/>
      <!-- Arm bent at ~45° -->
      <line x1="168" y1="112" x2="148" y2="148"/>
      <circle cx="148" cy="148" r="5" fill="#64748b"/>
      <line x1="90" y1="116" x2="68" y2="148"/>
      <line x1="92" y1="116" x2="72" y2="148"/>
    </g>
    <circle cx="148" cy="148" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 3: Bottom position - chest near floor -->
  <g class="f3">
    <circle cx="178" cy="112" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Torso nearly flat on ground -->
      <line x1="178" y1="124" x2="88" y2="130"/>
      <!-- Elbow fully bent, arm horizontal -->
      <line x1="166" y1="126" x2="138" y2="120"/><line x1="138" y1="120" x2="134" y2="148"/>
      <line x1="88" y1="130" x2="66" y2="148"/>
      <line x1="90" y1="130" x2="70" y2="148"/>
    </g>
    <circle cx="138" cy="120" r="5" fill="#64748b"/>
    <circle cx="134" cy="148" r="5" fill="#64748b"/>
  </g>
</svg>
