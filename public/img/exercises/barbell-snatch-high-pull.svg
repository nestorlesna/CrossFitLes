<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 230">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="220" height="230" fill="#111827" rx="12"/>
  <line x1="20" y1="210" x2="200" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="110" y="225" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="8" font-weight="700" fill="#475569" letter-spacing="1">SNATCH HIGH PULL</text>
  <!-- Frame 1: Start - hip hinge, bar at hip level, wide grip -->
  <g class="f1">
    <line x1="16" y1="125" x2="204" y2="125" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <rect x="10" y="117" width="8" height="16" rx="2" fill="#475569"/>
    <rect x="202" y="117" width="8" height="16" rx="2" fill="#475569"/>
    <circle cx="110" cy="56" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Hinged torso -->
      <line x1="110" y1="68" x2="112" y2="118"/>
      <line x1="86" y1="82" x2="136" y2="82"/>
      <!-- Wide grip arms to bar -->
      <line x1="86" y1="82" x2="50" y2="125"/>
      <line x1="136" y1="82" x2="172" y2="125"/>
      <!-- Legs slightly bent -->
      <line x1="106" y1="118" x2="100" y2="162"/><line x1="100" y1="162" x2="96" y2="210"/>
      <line x1="118" y1="118" x2="122" y2="162"/><line x1="122" y1="162" x2="126" y2="210"/>
    </g>
    <circle cx="100" cy="162" r="5" fill="#64748b"/>
    <circle cx="122" cy="162" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 2: Extension - standing tall, bar rising, shrug -->
  <g class="f2">
    <line x1="16" y1="90" x2="204" y2="90" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <rect x="10" y="82" width="8" height="16" rx="2" fill="#475569"/>
    <rect x="202" y="82" width="8" height="16" rx="2" fill="#475569"/>
    <circle cx="110" cy="38" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Upright torso, slight heel raise -->
      <line x1="110" y1="50" x2="110" y2="110"/>
      <line x1="86" y1="64" x2="134" y2="64"/>
      <!-- Arms pulling up (wide grip) -->
      <line x1="86" y1="64" x2="54" y2="90"/>
      <line x1="134" y1="64" x2="166" y2="90"/>
      <!-- Legs nearly straight, on toes -->
      <line x1="104" y1="110" x2="100" y2="160"/><line x1="100" y1="160" x2="98" y2="205"/>
      <line x1="116" y1="110" x2="120" y2="160"/><line x1="120" y1="160" x2="122" y2="205"/>
    </g>
    <circle cx="100" cy="160" r="5" fill="#64748b"/>
    <circle cx="120" cy="160" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 3: High pull - on toes, elbows high & wide, bar at chin -->
  <g class="f3">
    <line x1="16" y1="58" x2="204" y2="58" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <rect x="10" y="50" width="8" height="16" rx="2" fill="#475569"/>
    <rect x="202" y="50" width="8" height="16" rx="2" fill="#475569"/>
    <circle cx="110" cy="34" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="110" y1="46" x2="110" y2="112"/>
      <line x1="86" y1="60" x2="134" y2="60"/>
      <!-- Elbows high and wide, bar at chin/chest -->
      <line x1="86" y1="60" x2="46" y2="40"/>
      <line x1="46" y1="40" x2="52" y2="58"/>
      <line x1="134" y1="60" x2="174" y2="40"/>
      <line x1="174" y1="40" x2="168" y2="58"/>
      <!-- Legs - on toes -->
      <line x1="104" y1="112" x2="100" y2="158"/><line x1="100" y1="158" x2="98" y2="200"/>
      <line x1="116" y1="112" x2="120" y2="158"/><line x1="120" y1="158" x2="122" y2="200"/>
    </g>
    <circle cx="46" cy="40" r="5" fill="#64748b"/>
    <circle cx="174" cy="40" r="5" fill="#64748b"/>
    <circle cx="100" cy="158" r="5" fill="#64748b"/>
    <circle cx="120" cy="158" r="5" fill="#64748b"/>
  </g>
</svg>
