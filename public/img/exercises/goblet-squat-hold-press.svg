<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
  <rect width="200" height="230" fill="#111827" rx="12"/>
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>

  <!-- Frame 1: De pie, kettlebell a la altura del pecho -->
  <g class="f1" stroke="#94a3b8" stroke-width="3.5" stroke-linecap="round" fill="none">
    <circle cx="100" cy="26" r="13" fill="#94a3b8" stroke="none"/>
    <line x1="100" y1="39" x2="100" y2="108"/>
    <!-- Brazos sosteniendo kettlebell al pecho -->
    <line x1="100" y1="55" x2="80" y2="70"/>
    <line x1="100" y1="55" x2="120" y2="70"/>
    <!-- Kettlebell -->
    <circle cx="100" cy="72" r="8" fill="#475569" stroke="#64748b" stroke-width="2"/>
    <line x1="92" y1="66" x2="108" y2="66" stroke="#64748b" stroke-width="2.5"/>
    <line x1="85" y1="108" x2="115" y2="108"/>
    <line x1="87" y1="108" x2="85" y2="158"/>
    <line x1="85" y1="158" x2="84" y2="205"/>
    <line x1="113" y1="108" x2="115" y2="158"/>
    <line x1="115" y1="158" x2="116" y2="205"/>
    <circle cx="85" cy="158" r="4" fill="#64748b" stroke="none"/>
    <circle cx="115" cy="158" r="4" fill="#64748b" stroke="none"/>
  </g>

  <!-- Frame 2: En posición de squat goblet, rodillas hacia afuera -->
  <g class="f2" stroke="#94a3b8" stroke-width="3.5" stroke-linecap="round" fill="none">
    <circle cx="100" cy="65" r="13" fill="#94a3b8" stroke="none"/>
    <!-- Torso vertical en squat -->
    <line x1="100" y1="78" x2="100" y2="140"/>
    <!-- Brazos sosteniendo kettlebell -->
    <line x1="100" y1="95" x2="82" y2="110"/>
    <line x1="100" y1="95" x2="118" y2="110"/>
    <circle cx="100" cy="113" r="8" fill="#475569" stroke="#64748b" stroke-width="2"/>
    <line x1="92" y1="107" x2="108" y2="107" stroke="#64748b" stroke-width="2.5"/>
    <!-- Caderas en fondo del squat -->
    <line x1="82" y1="140" x2="118" y2="140"/>
    <!-- Muslos horizontales -->
    <line x1="84" y1="140" x2="62" y2="165"/>
    <line x1="116" y1="140" x2="138" y2="165"/>
    <!-- Piernas desde rodilla al suelo -->
    <line x1="62" y1="165" x2="68" y2="205"/>
    <line x1="138" y1="165" x2="132" y2="205"/>
    <circle cx="62" cy="165" r="4" fill="#64748b" stroke="none"/>
    <circle cx="138" cy="165" r="4" fill="#64748b" stroke="none"/>
  </g>

  <!-- Frame 3: Squat, brazos extendidos al frente (press-out) -->
  <g class="f3" stroke="#94a3b8" stroke-width="3.5" stroke-linecap="round" fill="none">
    <circle cx="100" cy="65" r="13" fill="#94a3b8" stroke="none"/>
    <line x1="100" y1="78" x2="100" y2="140"/>
    <!-- Brazos extendidos hacia adelante -->
    <line x1="100" y1="95" x2="70" y2="100"/>
    <line x1="100" y1="95" x2="130" y2="100"/>
    <circle cx="100" cy="103" r="8" fill="#475569" stroke="#64748b" stroke-width="2"/>
    <line x1="92" y1="97" x2="108" y2="97" stroke="#64748b" stroke-width="2.5"/>
    <!-- Caderas squat profundo -->
    <line x1="82" y1="140" x2="118" y2="140"/>
    <line x1="84" y1="140" x2="62" y2="165"/>
    <line x1="116" y1="140" x2="138" y2="165"/>
    <line x1="62" y1="165" x2="68" y2="205"/>
    <line x1="138" y1="165" x2="132" y2="205"/>
    <circle cx="62" cy="165" r="4" fill="#64748b" stroke="none"/>
    <circle cx="138" cy="165" r="4" fill="#64748b" stroke="none"/>
  </g>

  <line x1="30" y1="210" x2="170" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="100" y="225" font-family="sans-serif" font-size="8" fill="#475569" text-anchor="middle" letter-spacing="0.5">GOBLET SQUAT HOLD PRESS</text>
</svg>
