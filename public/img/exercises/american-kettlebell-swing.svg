<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
<rect width="200" height="230" fill="#111827" rx="12"/>
<style>
.f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
@keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
@keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
@keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
</style>
<!-- F1: Hinge position, KB between legs (backswing) -->
<g class="f1">
  <circle cx="128" cy="62" r="13" fill="#94a3b8"/>
  <line x1="118" y1="72" x2="95" y2="118" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="105" y1="85" x2="78" y2="95" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="78" y1="95" x2="62" y2="115" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="62" y1="115" x2="55" y2="148" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="95" y1="118" x2="80" y2="160" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="80" y1="160" x2="78" y2="205" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="95" y1="118" x2="118" y2="158" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="118" y1="158" x2="122" y2="205" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <circle cx="80" cy="160" r="5" fill="#64748b"/>
  <circle cx="118" cy="158" r="5" fill="#64748b"/>
  <circle cx="48" cy="155" r="10" fill="#64748b"/>
</g>
<!-- F2: Standing, KB at chest height -->
<g class="f2">
  <circle cx="100" cy="26" r="13" fill="#94a3b8"/>
  <line x1="100" y1="39" x2="100" y2="108" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="100" y1="53" x2="72" y2="70" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="72" y1="70" x2="68" y2="95" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="100" y1="53" x2="128" y2="70" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="128" y1="70" x2="132" y2="95" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <circle cx="100" cy="58" r="11" fill="#64748b" opacity="0.7"/>
  <line x1="100" y1="108" x2="86" y2="162" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="86" y1="162" x2="82" y2="205" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="100" y1="108" x2="114" y2="162" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="114" y1="162" x2="118" y2="205" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
</g>
<!-- F3: Standing, KB fully overhead -->
<g class="f3">
  <circle cx="100" cy="40" r="13" fill="#94a3b8"/>
  <line x1="100" y1="53" x2="100" y2="118" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="100" y1="65" x2="75" y2="45" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="75" y1="45" x2="68" y2="22" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="100" y1="65" x2="125" y2="45" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="125" y1="45" x2="132" y2="22" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <circle cx="100" cy="12" r="10" fill="#64748b" opacity="0.8"/>
  <line x1="100" y1="118" x2="86" y2="168" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="86" y1="168" x2="82" y2="205" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="100" y1="118" x2="114" y2="168" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="114" y1="168" x2="118" y2="205" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
</g>
<line x1="30" y1="210" x2="170" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
<text x="100" y="225" text-anchor="middle" font-family="monospace" font-size="9" fill="#475569">AMERICAN KB SWING</text>
</svg>
