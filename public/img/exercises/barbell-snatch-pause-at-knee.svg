<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 230">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="220" height="230" fill="#111827" rx="12"/>
  <line x1="20" y1="210" x2="200" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="110" y="225" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="8" font-weight="700" fill="#475569" letter-spacing="1">SNATCH PAUSE AT KNEE</text>
  <!-- Frame 1: Bar leaving floor (pull start) -->
  <g class="f1">
    <line x1="16" y1="185" x2="204" y2="185" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <rect x="10" y="177" width="8" height="16" rx="2" fill="#475569"/>
    <rect x="202" y="177" width="8" height="16" rx="2" fill="#475569"/>
    <circle cx="110" cy="68" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="110" y1="80" x2="110" y2="128"/>
      <line x1="84" y1="90" x2="136" y2="90"/>
      <line x1="84" y1="90" x2="44" y2="185"/>
      <line x1="136" y1="90" x2="176" y2="185"/>
      <line x1="104" y1="128" x2="96" y2="172"/><line x1="96" y1="172" x2="88" y2="210"/>
      <line x1="116" y1="128" x2="124" y2="172"/><line x1="124" y1="172" x2="132" y2="210"/>
    </g>
    <circle cx="96" cy="172" r="5" fill="#64748b"/>
    <circle cx="124" cy="172" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 2: PAUSE at knee - bar at knee height (2s hold) -->
  <g class="f2">
    <line x1="16" y1="158" x2="204" y2="158" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <rect x="10" y="150" width="8" height="16" rx="2" fill="#475569"/>
    <rect x="202" y="150" width="8" height="16" rx="2" fill="#475569"/>
    <!-- PAUSE indicator -->
    <text x="110" y="146" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="9" font-weight="700" fill="#f59e0b">PAUSA 2s</text>
    <circle cx="110" cy="56" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="110" y1="68" x2="112" y2="120"/>
      <line x1="86" y1="80" x2="138" y2="80"/>
      <!-- Shoulders over bar (arms reaching down-wide) -->
      <line x1="86" y1="80" x2="48" y2="158"/>
      <line x1="138" y1="80" x2="172" y2="158"/>
      <!-- Knees bent, thighs nearly horizontal -->
      <line x1="106" y1="120" x2="96" y2="162"/><line x1="96" y1="162" x2="88" y2="210"/>
      <line x1="118" y1="120" x2="126" y2="162"/><line x1="126" y1="162" x2="132" y2="210"/>
    </g>
    <circle cx="96" cy="162" r="5" fill="#f59e0b"/>
    <circle cx="126" cy="162" r="5" fill="#f59e0b"/>
  </g>
  <!-- Frame 3: Snatch received overhead (squat) -->
  <g class="f3">
    <line x1="16" y1="38" x2="204" y2="38" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <rect x="10" y="30" width="8" height="16" rx="2" fill="#475569"/>
    <rect x="202" y="30" width="8" height="16" rx="2" fill="#475569"/>
    <circle cx="110" cy="72" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="110" y1="84" x2="110" y2="132"/>
      <line x1="84" y1="96" x2="136" y2="96"/>
      <!-- Arms locked out overhead wide -->
      <line x1="84" y1="96" x2="44" y2="38"/>
      <line x1="136" y1="96" x2="176" y2="38"/>
      <!-- Deep squat legs -->
      <line x1="104" y1="132" x2="88" y2="168"/><line x1="88" y1="168" x2="82" y2="210"/>
      <line x1="116" y1="132" x2="132" y2="168"/><line x1="132" y1="168" x2="138" y2="210"/>
    </g>
    <circle cx="88" cy="168" r="5" fill="#64748b"/>
    <circle cx="132" cy="168" r="5" fill="#64748b"/>
  </g>
</svg>
