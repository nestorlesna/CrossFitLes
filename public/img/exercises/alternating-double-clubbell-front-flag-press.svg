<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
  <rect width="200" height="230" fill="#111827" rx="12"/>
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>

  <!-- Frame 1: De pie, ambos brazos al frente sosteniendo clubbells -->
  <g class="f1" stroke="#94a3b8" stroke-width="3.5" stroke-linecap="round" fill="none">
    <circle cx="72" cy="26" r="13" fill="#94a3b8" stroke="none"/>
    <!-- Torso -->
    <line x1="72" y1="39" x2="72" y2="108"/>
    <!-- Brazo derecho al frente -->
    <line x1="72" y1="52" x2="140" y2="52"/>
    <!-- Clubbell derecho -->
    <line x1="140" y1="52" x2="155" y2="52" stroke="#64748b" stroke-width="5"/>
    <circle cx="158" cy="52" r="6" fill="#475569" stroke="#64748b"/>
    <!-- Brazo izquierdo al frente -->
    <line x1="72" y1="52" x2="130" y2="62"/>
    <!-- Clubbell izquierdo -->
    <line x1="130" y1="62" x2="145" y2="62" stroke="#64748b" stroke-width="5"/>
    <circle cx="148" cy="62" r="6" fill="#475569" stroke="#64748b"/>
    <!-- Cadera -->
    <line x1="72" y1="108" x2="72" y2="120"/>
    <!-- Pierna derecha -->
    <line x1="72" y1="120" x2="66" y2="165"/>
    <line x1="66" y1="165" x2="64" y2="205"/>
    <circle cx="66" cy="165" r="4.5" fill="#64748b" stroke="none"/>
    <line x1="52" y1="205" x2="76" y2="205"/>
    <!-- Pierna izquierda -->
    <line x1="72" y1="120" x2="80" y2="165"/>
    <line x1="80" y1="165" x2="78" y2="205"/>
    <circle cx="80" cy="165" r="4.5" fill="#64748b" stroke="none"/>
    <line x1="66" y1="205" x2="90" y2="205"/>
  </g>

  <!-- Frame 2: Brazo derecho hace press arriba, izquierdo sostiene -->
  <g class="f2" stroke="#94a3b8" stroke-width="3.5" stroke-linecap="round" fill="none">
    <circle cx="72" cy="26" r="13" fill="#94a3b8" stroke="none"/>
    <!-- Torso -->
    <line x1="72" y1="39" x2="72" y2="108"/>
    <!-- Brazo derecho arriba (press) -->
    <line x1="72" y1="52" x2="110" y2="12"/>
    <!-- Clubbell derecho arriba -->
    <line x1="110" y1="12" x2="120" y2="2" stroke="#64748b" stroke-width="5"/>
    <circle cx="123" cy="0" r="6" fill="#475569" stroke="#64748b"/>
    <!-- Brazo izquierdo al frente (sostiene) -->
    <line x1="72" y1="52" x2="130" y2="62"/>
    <!-- Clubbell izquierdo -->
    <line x1="130" y1="62" x2="145" y2="62" stroke="#64748b" stroke-width="5"/>
    <circle cx="148" cy="62" r="6" fill="#475569" stroke="#64748b"/>
    <!-- Cadera -->
    <line x1="72" y1="108" x2="72" y2="120"/>
    <!-- Pierna derecha -->
    <line x1="72" y1="120" x2="66" y2="165"/>
    <line x1="66" y1="165" x2="64" y2="205"/>
    <circle cx="66" cy="165" r="4.5" fill="#64748b" stroke="none"/>
    <line x1="52" y1="205" x2="76" y2="205"/>
    <!-- Pierna izquierda -->
    <line x1="72" y1="120" x2="80" y2="165"/>
    <line x1="80" y1="165" x2="78" y2="205"/>
    <circle cx="80" cy="165" r="4.5" fill="#64748b" stroke="none"/>
    <line x1="66" y1="205" x2="90" y2="205"/>
  </g>

  <!-- Frame 3: Brazo izquierdo hace press arriba, derecho baja -->
  <g class="f3" stroke="#94a3b8" stroke-width="3.5" stroke-linecap="round" fill="none">
    <circle cx="72" cy="26" r="13" fill="#94a3b8" stroke="none"/>
    <!-- Torso -->
    <line x1="72" y1="39" x2="72" y2="108"/>
    <!-- Brazo derecho al frente (baja) -->
    <line x1="72" y1="52" x2="140" y2="52"/>
    <!-- Clubbell derecho -->
    <line x1="140" y1="52" x2="155" y2="52" stroke="#64748b" stroke-width="5"/>
    <circle cx="158" cy="52" r="6" fill="#475569" stroke="#64748b"/>
    <!-- Brazo izquierdo arriba (press) -->
    <line x1="72" y1="52" x2="105" y2="12"/>
    <!-- Clubbell izquierdo arriba -->
    <line x1="105" y1="12" x2="115" y2="2" stroke="#64748b" stroke-width="5"/>
    <circle cx="118" cy="0" r="6" fill="#475569" stroke="#64748b"/>
    <!-- Cadera -->
    <line x1="72" y1="108" x2="72" y2="120"/>
    <!-- Pierna derecha -->
    <line x1="72" y1="120" x2="66" y2="165"/>
    <line x1="66" y1="165" x2="64" y2="205"/>
    <circle cx="66" cy="165" r="4.5" fill="#64748b" stroke="none"/>
    <line x1="52" y1="205" x2="76" y2="205"/>
    <!-- Pierna izquierda -->
    <line x1="72" y1="120" x2="80" y2="165"/>
    <line x1="80" y1="165" x2="78" y2="205"/>
    <circle cx="80" cy="165" r="4.5" fill="#64748b" stroke="none"/>
    <line x1="66" y1="205" x2="90" y2="205"/>
  </g>

  <line x1="30" y1="210" x2="170" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="100" y="225" font-family="sans-serif" font-size="8" fill="#475569" text-anchor="middle" letter-spacing="0.5">DB CLUBBELL FLAG PRESS</text>
</svg>
