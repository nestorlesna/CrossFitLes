<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 230">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="220" height="230" fill="#111827" rx="12"/>
  <line x1="20" y1="210" x2="200" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="110" y="225" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="8" font-weight="700" fill="#475569" letter-spacing="2">SL DB ROMANIAN DL</text>
  <!-- Frame 1: Standing on one leg, DB at side -->
  <g class="f1">
    <circle cx="110" cy="42" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="110" y1="54" x2="110" y2="114"/>
      <line x1="90" y1="66" x2="130" y2="66"/>
      <line x1="90" y1="66" x2="78" y2="112"/>
      <line x1="130" y1="66" x2="142" y2="112"/>
      <!-- Standing leg -->
      <line x1="104" y1="114" x2="100" y2="165"/><line x1="100" y1="165" x2="96" y2="210"/>
      <!-- Floating leg hanging -->
      <line x1="116" y1="114" x2="120" y2="155"/>
    </g>
    <circle cx="100" cy="165" r="5" fill="#64748b"/>
    <!-- DB in hand -->
    <rect x="66" y="108" width="18" height="8" rx="2" fill="#475569"/>
  </g>
  <!-- Frame 2: Hinging forward, rear leg rising, DB lowering -->
  <g class="f2">
    <circle cx="110" cy="68" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Torso tilting forward -->
      <line x1="110" y1="80" x2="110" y2="130"/>
      <line x1="90" y1="90" x2="128" y2="88"/>
      <!-- Arm reaching down -->
      <line x1="90" y1="90" x2="82" y2="138"/>
      <line x1="128" y1="88" x2="132" y2="120"/>
      <!-- Support leg slight bend -->
      <line x1="104" y1="130" x2="100" y2="178"/><line x1="100" y1="178" x2="94" y2="210"/>
      <!-- Rear leg rising behind -->
      <line x1="116" y1="130" x2="140" y2="120"/>
    </g>
    <circle cx="100" cy="178" r="5" fill="#64748b"/>
    <rect x="70" y="134" width="18" height="8" rx="2" fill="#475569"/>
  </g>
  <!-- Frame 3: T-position - torso parallel, rear leg extended back -->
  <g class="f3">
    <circle cx="82" cy="100" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Torso horizontal -->
      <line x1="82" y1="112" x2="110" y2="130"/>
      <!-- Arms hanging toward ground -->
      <line x1="88" y1="115" x2="84" y2="150"/>
      <line x1="98" y1="120" x2="104" y2="148"/>
      <!-- Support leg -->
      <line x1="110" y1="130" x2="106" y2="178"/><line x1="106" y1="178" x2="100" y2="210"/>
      <!-- Rear leg extended horizontally -->
      <line x1="110" y1="130" x2="162" y2="118"/>
    </g>
    <circle cx="106" cy="178" r="5" fill="#64748b"/>
    <rect x="72" y="146" width="18" height="8" rx="2" fill="#475569"/>
  </g>
</svg>
