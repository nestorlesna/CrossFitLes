<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 230">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="220" height="230" fill="#111827" rx="12"/>
  <line x1="20" y1="210" x2="200" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="110" y="225" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" font-weight="700" fill="#475569" letter-spacing="2">BARBELL LUNGE</text>
  <!-- Frame 1: Standing with bar on back -->
  <g class="f1">
    <line x1="40" y1="86" x2="180" y2="86" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <rect x="34" y="78" width="8" height="16" rx="2" fill="#475569"/>
    <rect x="178" y="78" width="8" height="16" rx="2" fill="#475569"/>
    <circle cx="110" cy="48" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="110" y1="60" x2="110" y2="118"/>
      <line x1="90" y1="74" x2="130" y2="74"/>
      <line x1="90" y1="74" x2="70" y2="86"/><line x1="130" y1="74" x2="150" y2="86"/>
      <line x1="104" y1="118" x2="100" y2="164"/><line x1="100" y1="164" x2="96" y2="210"/>
      <line x1="116" y1="118" x2="120" y2="164"/><line x1="120" y1="164" x2="124" y2="210"/>
    </g>
    <circle cx="100" cy="164" r="5" fill="#64748b"/>
    <circle cx="120" cy="164" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 2: Mid-lunge step forward -->
  <g class="f2">
    <line x1="40" y1="90" x2="180" y2="90" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <rect x="34" y="82" width="8" height="16" rx="2" fill="#475569"/>
    <rect x="178" y="82" width="8" height="16" rx="2" fill="#475569"/>
    <circle cx="110" cy="58" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="110" y1="70" x2="110" y2="126"/>
      <line x1="90" y1="80" x2="130" y2="80"/>
      <line x1="90" y1="80" x2="70" y2="90"/><line x1="130" y1="80" x2="150" y2="90"/>
      <!-- Front leg stepping -->
      <line x1="104" y1="126" x2="78" y2="158"/><line x1="78" y1="158" x2="64" y2="210"/>
      <!-- Back leg -->
      <line x1="116" y1="126" x2="130" y2="162"/><line x1="130" y1="162" x2="138" y2="210"/>
    </g>
    <circle cx="78" cy="158" r="5" fill="#64748b"/>
    <circle cx="130" cy="162" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 3: Full lunge - back knee near ground -->
  <g class="f3">
    <line x1="40" y1="92" x2="180" y2="92" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <rect x="34" y="84" width="8" height="16" rx="2" fill="#475569"/>
    <rect x="178" y="84" width="8" height="16" rx="2" fill="#475569"/>
    <circle cx="110" cy="64" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="110" y1="76" x2="110" y2="130"/>
      <line x1="90" y1="86" x2="130" y2="86"/>
      <line x1="90" y1="86" x2="70" y2="92"/><line x1="130" y1="86" x2="150" y2="92"/>
      <!-- Front leg deep lunge -->
      <line x1="104" y1="130" x2="72" y2="168"/><line x1="72" y1="168" x2="54" y2="210"/>
      <!-- Back leg, knee near ground -->
      <line x1="116" y1="130" x2="138" y2="168"/><line x1="138" y1="168" x2="150" y2="198"/>
    </g>
    <circle cx="72" cy="168" r="5" fill="#64748b"/>
    <circle cx="138" cy="168" r="5" fill="#64748b"/>
  </g>
</svg>
