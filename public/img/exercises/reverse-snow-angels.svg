<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
<rect width="200" height="230" fill="#111827" rx="12"/>
<style>
  .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
  @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
  @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
  @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
</style>
<line x1="30" y1="210" x2="170" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
<text x="100" y="225" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#475569">REVERSE SNOW ANGELS</text>

<!-- Top-down view of prone figure -->
<!-- F1: Arms along body -->
<g class="f1" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" fill="none">
  <circle cx="100" cy="35" r="12" fill="#94a3b8" stroke="none"/>
  <!-- Body -->
  <line x1="100" y1="47" x2="100" y2="185"/>
  <!-- Arms close to body -->
  <line x1="100" y1="72" x2="80" y2="95"/>
  <line x1="100" y1="72" x2="120" y2="95"/>
  <!-- Legs together -->
  <line x1="100" y1="185" x2="94" y2="205"/>
  <line x1="100" y1="185" x2="106" y2="205"/>
  <circle cx="100" cy="72" r="4" fill="#64748b" stroke="none"/>
</g>

<!-- F2: Arms sweeping out to the sides -->
<g class="f2" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" fill="none">
  <circle cx="100" cy="35" r="12" fill="#94a3b8" stroke="none"/>
  <line x1="100" y1="47" x2="100" y2="185"/>
  <!-- Arms sweeping out at 45° -->
  <line x1="100" y1="72" x2="60" y2="112"/>
  <line x1="100" y1="72" x2="140" y2="112"/>
  <!-- Legs slightly spread -->
  <line x1="100" y1="185" x2="90" y2="205"/>
  <line x1="100" y1="185" x2="110" y2="205"/>
  <circle cx="100" cy="72" r="4" fill="#64748b" stroke="none"/>
</g>

<!-- F3: Arms fully overhead, legs spread -->
<g class="f3" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" fill="none">
  <circle cx="100" cy="35" r="12" fill="#94a3b8" stroke="none"/>
  <line x1="100" y1="47" x2="100" y2="185"/>
  <!-- Arms overhead (in front of head in prone) -->
  <line x1="100" y1="72" x2="72" y2="45"/>
  <line x1="100" y1="72" x2="128" y2="45"/>
  <!-- Legs spread -->
  <line x1="100" y1="185" x2="85" y2="205"/>
  <line x1="100" y1="185" x2="115" y2="205"/>
  <circle cx="100" cy="72" r="4" fill="#64748b" stroke="none"/>
</g>
</svg>
