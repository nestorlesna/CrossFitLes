<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
  <rect width="200" height="230" fill="#111827" rx="12"/>
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>

  <!-- Frame 1: De pie junto a la pared, brazo apoyado a 90° -->
  <g class="f1" stroke="#94a3b8" stroke-width="3.5" stroke-linecap="round" fill="none">
    <line x1="155" y1="20" x2="155" y2="210" stroke="#374151" stroke-width="4"/>
    <circle cx="95" cy="28" r="13" fill="#94a3b8" stroke="none"/>
    <line x1="95" y1="41" x2="95" y2="108"/>
    <!-- Brazo derecho a 90° apoyado en pared (codo arriba, antebrazo hacia la pared) -->
    <line x1="95" y1="55" x2="130" y2="55"/>
    <line x1="130" y1="55" x2="155" y2="70"/>
    <circle cx="130" cy="55" r="4" fill="#64748b" stroke="none"/>
    <!-- Brazo izquierdo colgando -->
    <line x1="95" y1="55" x2="72" y2="88"/>
    <line x1="85" y1="108" x2="115" y2="108"/>
    <line x1="87" y1="108" x2="85" y2="158"/>
    <line x1="85" y1="158" x2="84" y2="205"/>
    <line x1="113" y1="108" x2="115" y2="158"/>
    <line x1="115" y1="158" x2="116" y2="205"/>
    <circle cx="85" cy="158" r="4" fill="#64748b" stroke="none"/>
    <circle cx="115" cy="158" r="4" fill="#64748b" stroke="none"/>
  </g>

  <!-- Frame 2: Rotación externa media, antebrazo alejándose de la pared -->
  <g class="f2" stroke="#94a3b8" stroke-width="3.5" stroke-linecap="round" fill="none">
    <line x1="155" y1="20" x2="155" y2="210" stroke="#374151" stroke-width="4"/>
    <circle cx="95" cy="28" r="13" fill="#94a3b8" stroke="none"/>
    <line x1="95" y1="41" x2="95" y2="108"/>
    <!-- Codo a 90°, antebrazo rotando hacia afuera -->
    <line x1="95" y1="55" x2="130" y2="55"/>
    <line x1="130" y1="55" x2="148" y2="40"/>
    <circle cx="130" cy="55" r="4" fill="#64748b" stroke="none"/>
    <!-- Brazo izquierdo -->
    <line x1="95" y1="55" x2="72" y2="88"/>
    <line x1="85" y1="108" x2="115" y2="108"/>
    <line x1="87" y1="108" x2="85" y2="158"/>
    <line x1="85" y1="158" x2="84" y2="205"/>
    <line x1="113" y1="108" x2="115" y2="158"/>
    <line x1="115" y1="158" x2="116" y2="205"/>
    <circle cx="85" cy="158" r="4" fill="#64748b" stroke="none"/>
    <circle cx="115" cy="158" r="4" fill="#64748b" stroke="none"/>
  </g>

  <!-- Frame 3: Rotación externa completa, antebrazo perpendicular al torso -->
  <g class="f3" stroke="#94a3b8" stroke-width="3.5" stroke-linecap="round" fill="none">
    <line x1="155" y1="20" x2="155" y2="210" stroke="#374151" stroke-width="4"/>
    <circle cx="95" cy="28" r="13" fill="#94a3b8" stroke="none"/>
    <line x1="95" y1="41" x2="95" y2="108"/>
    <!-- Codo a 90°, antebrazo completamente hacia arriba -->
    <line x1="95" y1="55" x2="130" y2="55"/>
    <line x1="130" y1="55" x2="130" y2="28"/>
    <circle cx="130" cy="55" r="4" fill="#64748b" stroke="none"/>
    <!-- Brazo izquierdo -->
    <line x1="95" y1="55" x2="72" y2="88"/>
    <line x1="85" y1="108" x2="115" y2="108"/>
    <line x1="87" y1="108" x2="85" y2="158"/>
    <line x1="85" y1="158" x2="84" y2="205"/>
    <line x1="113" y1="108" x2="115" y2="158"/>
    <line x1="115" y1="158" x2="116" y2="205"/>
    <circle cx="85" cy="158" r="4" fill="#64748b" stroke="none"/>
    <circle cx="115" cy="158" r="4" fill="#64748b" stroke="none"/>
  </g>

  <line x1="30" y1="210" x2="170" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="100" y="225" font-family="sans-serif" font-size="9" fill="#475569" text-anchor="middle" letter-spacing="0.5">WALL SHOULDER CAR</text>
</svg>
