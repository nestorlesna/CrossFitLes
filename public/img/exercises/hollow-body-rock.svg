<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
  <rect width="200" height="230" fill="#111827" rx="12"/>
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <!-- Frame 1: Rocked back -->
  <g class="f1" stroke="#94a3b8" stroke-width="3.5" stroke-linecap="round" fill="none">
    <circle cx="62" cy="175" r="13"/>
    <line x1="74" y1="170" x2="118" y2="160"/>
    <line x1="118" y1="160" x2="160" y2="158"/>
    <line x1="118" y1="160" x2="115" y2="140"/>
    <line x1="115" y1="140" x2="105" y2="125"/>
    <line x1="118" y1="160" x2="120" y2="142"/>
    <line x1="120" y1="142" x2="130" y2="128"/>
    <line x1="160" y1="158" x2="175" y2="162"/>
    <circle cx="175" cy="162" r="4.5" fill="#64748b"/>
    <line x1="175" y1="162" x2="185" y2="168"/>
    <line x1="160" y1="158" x2="170" y2="155"/>
    <circle cx="170" cy="155" r="4.5" fill="#64748b"/>
    <line x1="170" y1="155" x2="178" y2="160"/>
  </g>
  <!-- Frame 2: Neutral hollow hold -->
  <g class="f2" stroke="#94a3b8" stroke-width="3.5" stroke-linecap="round" fill="none">
    <circle cx="55" cy="170" r="13"/>
    <line x1="67" y1="165" x2="115" y2="162"/>
    <line x1="115" y1="162" x2="162" y2="165"/>
    <line x1="115" y1="162" x2="110" y2="142"/>
    <line x1="110" y1="142" x2="100" y2="128"/>
    <line x1="115" y1="162" x2="118" y2="144"/>
    <line x1="118" y1="144" x2="128" y2="130"/>
    <line x1="162" y1="165" x2="178" y2="168"/>
    <circle cx="178" cy="168" r="4.5" fill="#64748b"/>
    <line x1="178" y1="168" x2="188" y2="172"/>
    <line x1="162" y1="165" x2="174" y2="162"/>
    <circle cx="174" cy="162" r="4.5" fill="#64748b"/>
    <line x1="174" y1="162" x2="182" y2="166"/>
  </g>
  <!-- Frame 3: Rocked forward -->
  <g class="f3" stroke="#94a3b8" stroke-width="3.5" stroke-linecap="round" fill="none">
    <circle cx="50" cy="165" r="13"/>
    <line x1="62" y1="160" x2="112" y2="165"/>
    <line x1="112" y1="165" x2="165" y2="172"/>
    <line x1="112" y1="165" x2="106" y2="145"/>
    <line x1="106" y1="145" x2="96" y2="130"/>
    <line x1="112" y1="165" x2="116" y2="147"/>
    <line x1="116" y1="147" x2="126" y2="132"/>
    <line x1="165" y1="172" x2="180" y2="176"/>
    <circle cx="180" cy="176" r="4.5" fill="#64748b"/>
    <line x1="180" y1="176" x2="190" y2="180"/>
    <line x1="165" y1="172" x2="176" y2="170"/>
    <circle cx="176" cy="170" r="4.5" fill="#64748b"/>
    <line x1="176" y1="170" x2="184" y2="174"/>
  </g>
  <line x1="30" y1="210" x2="170" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="100" y="225" font-family="sans-serif" font-size="10" fill="#475569" text-anchor="middle" letter-spacing="0.5">HOLLOW BODY ROCK</text>
</svg>
