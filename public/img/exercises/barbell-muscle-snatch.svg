<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 230">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="220" height="230" fill="#111827" rx="12"/>
  <line x1="20" y1="210" x2="200" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="110" y="225" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="9" font-weight="700" fill="#475569" letter-spacing="2">MUSCLE SNATCH</text>
  <!-- Frame 1: Setup floor, wide grip -->
  <g class="f1">
    <line x1="22" y1="185" x2="198" y2="185" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <rect x="16" y="177" width="8" height="16" rx="2" fill="#475569"/>
    <rect x="196" y="177" width="8" height="16" rx="2" fill="#475569"/>
    <circle cx="110" cy="72" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="110" y1="84" x2="110" y2="132"/>
      <line x1="84" y1="94" x2="136" y2="94"/>
      <line x1="84" y1="94" x2="54" y2="185"/>
      <line x1="136" y1="94" x2="166" y2="185"/>
      <line x1="104" y1="132" x2="96" y2="172"/><line x1="96" y1="172" x2="88" y2="210"/>
      <line x1="116" y1="132" x2="124" y2="172"/><line x1="124" y1="172" x2="132" y2="210"/>
    </g>
    <circle cx="96" cy="172" r="5" fill="#64748b"/>
    <circle cx="124" cy="172" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 2: High pull - bar at chest/face, elbows high -->
  <g class="f2">
    <line x1="22" y1="88" x2="198" y2="88" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <rect x="16" y="80" width="8" height="16" rx="2" fill="#475569"/>
    <rect x="196" y="80" width="8" height="16" rx="2" fill="#475569"/>
    <circle cx="110" cy="44" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="110" y1="56" x2="110" y2="110"/>
      <line x1="84" y1="68" x2="136" y2="68"/>
      <!-- Elbows very high, bar at face -->
      <line x1="84" y1="68" x2="52" y2="52"/><line x1="52" y1="52" x2="58" y2="88"/>
      <line x1="136" y1="68" x2="168" y2="52"/><line x1="168" y1="52" x2="162" y2="88"/>
      <line x1="104" y1="110" x2="96" y2="160"/><line x1="96" y1="160" x2="88" y2="210"/>
      <line x1="116" y1="110" x2="124" y2="160"/><line x1="124" y1="160" x2="132" y2="210"/>
    </g>
    <circle cx="52" cy="52" r="5" fill="#64748b"/>
    <circle cx="168" cy="52" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 3: Lockout overhead, NO squat (muscle = no re-bend) -->
  <g class="f3">
    <line x1="22" y1="40" x2="198" y2="40" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <rect x="16" y="32" width="8" height="16" rx="2" fill="#475569"/>
    <rect x="196" y="32" width="8" height="16" rx="2" fill="#475569"/>
    <circle cx="110" cy="64" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="110" y1="76" x2="110" y2="130"/>
      <line x1="84" y1="88" x2="136" y2="88"/>
      <line x1="84" y1="88" x2="48" y2="40"/>
      <line x1="136" y1="88" x2="172" y2="40"/>
      <!-- NO squat - legs straight -->
      <line x1="104" y1="130" x2="100" y2="170"/><line x1="100" y1="170" x2="96" y2="210"/>
      <line x1="116" y1="130" x2="120" y2="170"/><line x1="120" y1="170" x2="124" y2="210"/>
    </g>
    <circle cx="100" cy="170" r="5" fill="#64748b"/>
    <circle cx="120" cy="170" r="5" fill="#64748b"/>
  </g>
</svg>
