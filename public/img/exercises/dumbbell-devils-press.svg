<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 230">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="240" height="230" fill="#111827" rx="12"/>
  <line x1="20" y1="210" x2="220" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="120" y="225" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="9" font-weight="700" fill="#475569" letter-spacing="2">DEVIL'S PRESS</text>
  <!-- Frame 1: Prone burpee - DBs on floor, lying down -->
  <g class="f1">
    <!-- DBs on floor -->
    <rect x="58" y="192" width="20" height="8" rx="2" fill="#475569"/>
    <rect x="162" y="192" width="20" height="8" rx="2" fill="#475569"/>
    <circle cx="200" cy="152" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Lying prone, holding DBs -->
      <line x1="200" y1="164" x2="120" y2="174"/>
      <line x1="172" y1="168" x2="162" y2="158"/><line x1="162" y1="158" x2="78" y2="192"/>
      <line x1="120" y1="174" x2="80" y2="164"/><line x1="80" y1="164" x2="58" y2="192"/>
      <line x1="120" y1="174" x2="118" y2="210"/>
      <line x1="122" y1="174" x2="126" y2="210"/>
    </g>
  </g>
  <!-- Frame 2: Standing, explosive pull/clean position - DBs at shoulders -->
  <g class="f2">
    <circle cx="120" cy="58" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="120" y1="70" x2="120" y2="126"/>
      <line x1="96" y1="82" x2="144" y2="82"/>
      <line x1="96" y1="82" x2="78" y2="62"/>
      <line x1="144" y1="82" x2="162" y2="62"/>
      <line x1="114" y1="126" x2="106" y2="172"/><line x1="106" y1="172" x2="96" y2="210"/>
      <line x1="126" y1="126" x2="134" y2="172"/><line x1="134" y1="172" x2="144" y2="210"/>
    </g>
    <circle cx="106" cy="172" r="5" fill="#64748b"/>
    <rect x="64" y="58" width="20" height="8" rx="2" fill="#475569"/>
    <rect x="156" y="58" width="20" height="8" rx="2" fill="#475569"/>
  </g>
  <!-- Frame 3: Both DBs locked overhead - snatch finish -->
  <g class="f3">
    <circle cx="120" cy="52" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="120" y1="64" x2="120" y2="120"/>
      <line x1="96" y1="76" x2="144" y2="76"/>
      <line x1="96" y1="76" x2="64" y2="30"/>
      <line x1="144" y1="76" x2="176" y2="30"/>
      <line x1="114" y1="120" x2="108" y2="165"/><line x1="108" y1="165" x2="100" y2="210"/>
      <line x1="126" y1="120" x2="132" y2="165"/><line x1="132" y1="165" x2="140" y2="210"/>
    </g>
    <circle cx="108" cy="165" r="5" fill="#64748b"/>
    <circle cx="132" cy="165" r="5" fill="#64748b"/>
    <rect x="52" y="26" width="20" height="8" rx="2" fill="#475569"/>
    <rect x="168" y="26" width="20" height="8" rx="2" fill="#475569"/>
  </g>
</svg>
