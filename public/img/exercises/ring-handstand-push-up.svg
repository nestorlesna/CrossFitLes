<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="200" height="240" fill="#111827" rx="12"/>
  <!-- Ring straps from top -->
  <line x1="68" y1="10" x2="68" y2="50" stroke="#475569" stroke-width="3" stroke-linecap="round"/>
  <line x1="132" y1="10" x2="132" y2="50" stroke="#475569" stroke-width="3" stroke-linecap="round"/>
  <!-- Rings -->
  <circle cx="68" cy="54" r="8" fill="none" stroke="#475569" stroke-width="4"/>
  <circle cx="132" cy="54" r="8" fill="none" stroke="#475569" stroke-width="4"/>
  <text x="100" y="237" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="9" font-weight="700" fill="#475569" letter-spacing="2">RING HSPU</text>
  <!-- Frame 1: Handstand on rings, arms extended -->
  <g class="f1">
    <!-- Inverted person: head down, feet up -->
    <circle cx="100" cy="200" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Arms extended holding rings -->
      <line x1="88" y1="190" x2="76" y2="162"/><line x1="76" y1="162" x2="68" y2="154"/>
      <line x1="112" y1="190" x2="124" y2="162"/><line x1="124" y1="162" x2="132" y2="154"/>
      <!-- Shoulders -->
      <line x1="88" y1="190" x2="112" y2="190"/>
      <!-- Torso vertical inverted -->
      <line x1="100" y1="188" x2="100" y2="112"/>
      <!-- Legs up, feet together -->
      <line x1="96" y1="112" x2="92" y2="72"/><line x1="92" y1="72" x2="90" y2="32"/>
      <line x1="104" y1="112" x2="108" y2="72"/><line x1="108" y1="72" x2="110" y2="32"/>
      <line x1="90" y1="32" x2="110" y2="32"/>
    </g>
    <circle cx="68" cy="154" r="5" fill="#64748b"/>
    <circle cx="132" cy="154" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 2: Dipping down, elbows bent -->
  <g class="f2">
    <circle cx="100" cy="208" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Arms bent at elbow -->
      <line x1="88" y1="198" x2="66" y2="190"/><line x1="66" y1="190" x2="64" y2="170"/>
      <line x1="112" y1="198" x2="134" y2="190"/><line x1="134" y1="190" x2="136" y2="170"/>
      <line x1="88" y1="198" x2="112" y2="198"/>
      <line x1="100" y1="196" x2="100" y2="120"/>
      <line x1="96" y1="120" x2="92" y2="80"/><line x1="92" y1="80" x2="90" y2="36"/>
      <line x1="104" y1="120" x2="108" y2="80"/><line x1="108" y1="80" x2="110" y2="36"/>
      <line x1="90" y1="36" x2="110" y2="36"/>
    </g>
    <circle cx="66" cy="190" r="5" fill="#64748b"/>
    <circle cx="134" cy="190" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 3: Head near floor level, elbows fully bent -->
  <g class="f3">
    <circle cx="100" cy="214" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Arms deeply bent, rings turned -->
      <line x1="88" y1="204" x2="60" y2="200"/><line x1="60" y1="200" x2="62" y2="222"/>
      <line x1="112" y1="204" x2="140" y2="200"/><line x1="140" y1="200" x2="138" y2="222"/>
      <line x1="88" y1="204" x2="112" y2="204"/>
      <line x1="100" y1="202" x2="100" y2="126"/>
      <line x1="96" y1="126" x2="92" y2="84"/><line x1="92" y1="84" x2="90" y2="40"/>
      <line x1="104" y1="126" x2="108" y2="84"/><line x1="108" y1="84" x2="110" y2="40"/>
      <line x1="90" y1="40" x2="110" y2="40"/>
    </g>
    <circle cx="60" cy="200" r="5" fill="#64748b"/>
    <circle cx="140" cy="200" r="5" fill="#64748b"/>
  </g>
</svg>
