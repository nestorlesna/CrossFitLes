<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 230">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="220" height="230" fill="#111827" rx="12"/>
  <line x1="20" y1="210" x2="200" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="110" y="225" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="8" font-weight="700" fill="#475569" letter-spacing="1">DB LATERAL STEP-OVER</text>
  <!-- Object to step over (barbell/cone on floor) -->
  <line x1="88" y1="210" x2="132" y2="210" stroke="#475569" stroke-width="6" stroke-linecap="round"/>
  <line x1="110" y1="210" x2="110" y2="186" stroke="#475569" stroke-width="4" stroke-linecap="round"/>
  <!-- Frame 1: Standing to the left of the object, DBs at sides -->
  <g class="f1">
    <circle cx="72" cy="28" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="72" y1="40" x2="72" y2="110"/>
      <line x1="50" y1="54" x2="94" y2="54"/>
      <line x1="50" y1="54" x2="44" y2="108"/>
      <line x1="94" y1="54" x2="100" y2="108"/>
      <line x1="72" y1="110" x2="65" y2="162"/><line x1="65" y1="162" x2="62" y2="205"/>
      <line x1="72" y1="110" x2="79" y2="162"/><line x1="79" y1="162" x2="82" y2="205"/>
      <line x1="47" y1="205" x2="75" y2="205"/>
      <line x1="68" y1="205" x2="96" y2="205"/>
    </g>
    <circle cx="65" cy="162" r="4" fill="#64748b"/>
    <circle cx="79" cy="162" r="4" fill="#64748b"/>
    <rect x="28" y="104" width="18" height="7" rx="2" fill="#475569"/>
    <rect x="98" y="104" width="18" height="7" rx="2" fill="#475569"/>
  </g>
  <!-- Frame 2: Stepping over - one leg lifted over the object -->
  <g class="f2">
    <circle cx="100" cy="28" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="100" y1="40" x2="100" y2="108"/>
      <line x1="76" y1="54" x2="124" y2="54"/>
      <line x1="76" y1="54" x2="66" y2="106"/>
      <line x1="124" y1="54" x2="130" y2="106"/>
      <!-- Left leg still on left side -->
      <line x1="94" y1="108" x2="80" y2="162"/><line x1="80" y1="162" x2="74" y2="205"/>
      <!-- Right leg raised, crossing over object -->
      <line x1="106" y1="108" x2="128" y2="152"/>
      <line x1="128" y1="152" x2="138" y2="186"/>
    </g>
    <circle cx="80" cy="162" r="4" fill="#64748b"/>
    <circle cx="128" cy="152" r="4" fill="#64748b"/>
    <rect x="52" y="102" width="16" height="7" rx="2" fill="#475569"/>
    <rect x="128" y="102" width="16" height="7" rx="2" fill="#475569"/>
  </g>
  <!-- Frame 3: Standing to the right of the object, DBs at sides -->
  <g class="f3">
    <circle cx="148" cy="28" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="148" y1="40" x2="148" y2="110"/>
      <line x1="124" y1="54" x2="172" y2="54"/>
      <line x1="124" y1="54" x2="118" y2="108"/>
      <line x1="172" y1="54" x2="178" y2="108"/>
      <line x1="148" y1="110" x2="141" y2="162"/><line x1="141" y1="162" x2="138" y2="205"/>
      <line x1="148" y1="110" x2="155" y2="162"/><line x1="155" y1="162" x2="158" y2="205"/>
      <line x1="124" y1="205" x2="152" y2="205"/>
      <line x1="144" y1="205" x2="172" y2="205"/>
    </g>
    <circle cx="141" cy="162" r="4" fill="#64748b"/>
    <circle cx="155" cy="162" r="4" fill="#64748b"/>
    <rect x="102" y="104" width="18" height="7" rx="2" fill="#475569"/>
    <rect x="176" y="104" width="18" height="7" rx="2" fill="#475569"/>
  </g>
</svg>
