<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="240" height="200" fill="#111827" rx="12"/>
  <line x1="20" y1="170" x2="220" y2="170" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="120" y="188" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" font-weight="700" fill="#475569" letter-spacing="2">RUSSIAN TWIST</text>
  <!-- Frame 1: Leaning back, arms right side with weight -->
  <g class="f1">
    <circle cx="120" cy="68" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Torso leaned back ~45° -->
      <line x1="120" y1="80" x2="108" y2="128"/>
      <line x1="100" y1="90" x2="138" y2="88"/>
      <!-- Arms extended to right with weight -->
      <line x1="138" y1="88" x2="170" y2="80"/>
      <line x1="100" y1="90" x2="112" y2="78"/>
      <!-- Legs raised, knees bent -->
      <line x1="108" y1="128" x2="82" y2="114"/><line x1="82" y1="114" x2="74" y2="148"/>
      <line x1="108" y1="128" x2="126" y2="116"/><line x1="126" y1="116" x2="136" y2="148"/>
    </g>
    <circle cx="108" cy="128" r="5" fill="#64748b"/>
    <circle cx="82" cy="114" r="5" fill="#64748b"/>
    <circle cx="126" cy="116" r="5" fill="#64748b"/>
    <!-- Weight plate -->
    <circle cx="176" cy="79" r="9" fill="#475569"/>
  </g>
  <!-- Frame 2: Center position -->
  <g class="f2">
    <circle cx="120" cy="68" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="120" y1="80" x2="108" y2="128"/>
      <line x1="100" y1="90" x2="140" y2="90"/>
      <!-- Arms center, weight in front -->
      <line x1="100" y1="90" x2="88" y2="76"/>
      <line x1="140" y1="90" x2="152" y2="76"/>
      <line x1="108" y1="128" x2="82" y2="114"/><line x1="82" y1="114" x2="74" y2="148"/>
      <line x1="108" y1="128" x2="126" y2="116"/><line x1="126" y1="116" x2="136" y2="148"/>
    </g>
    <circle cx="108" cy="128" r="5" fill="#64748b"/>
    <circle cx="82" cy="114" r="5" fill="#64748b"/>
    <circle cx="126" cy="116" r="5" fill="#64748b"/>
    <circle cx="120" cy="66" r="9" fill="#475569"/>
  </g>
  <!-- Frame 3: Arms extended to left with weight -->
  <g class="f3">
    <circle cx="120" cy="68" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="120" y1="80" x2="108" y2="128"/>
      <line x1="100" y1="90" x2="138" y2="92"/>
      <!-- Arms to left -->
      <line x1="100" y1="90" x2="68" y2="80"/>
      <line x1="138" y1="92" x2="128" y2="78"/>
      <line x1="108" y1="128" x2="82" y2="114"/><line x1="82" y1="114" x2="74" y2="148"/>
      <line x1="108" y1="128" x2="126" y2="116"/><line x1="126" y1="116" x2="136" y2="148"/>
    </g>
    <circle cx="108" cy="128" r="5" fill="#64748b"/>
    <circle cx="82" cy="114" r="5" fill="#64748b"/>
    <circle cx="126" cy="116" r="5" fill="#64748b"/>
    <circle cx="62" cy="79" r="9" fill="#475569"/>
  </g>
</svg>
