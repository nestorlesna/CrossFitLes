<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 240">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="220" height="240" fill="#111827" rx="12"/>
  <line x1="20" y1="218" x2="200" y2="218" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="110" y="233" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="8" font-weight="700" fill="#475569" letter-spacing="1">90/90 HIP ROTATION</text>
  <!-- Frame 1: Seated, right leg forward, left leg to side -->
  <g class="f1">
    <circle cx="110" cy="48" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Torso sitting -->
      <line x1="110" y1="60" x2="110" y2="130"/>
      <line x1="88" y1="74" x2="132" y2="74"/>
      <!-- Arms resting on knees -->
      <line x1="88" y1="74" x2="96" y2="106"/>
      <line x1="132" y1="74" x2="140" y2="140"/>
      <!-- Hips sitting on floor -->
      <!-- Right leg forward (down) -->
      <line x1="116" y1="130" x2="118" y2="175"/>
      <line x1="118" y1="175" x2="120" y2="218"/>
      <!-- Left leg to side (left) -->
      <line x1="104" y1="130" x2="70" y2="148"/>
      <line x1="70" y1="148" x2="50" y2="180"/>
    </g>
    <circle cx="118" cy="175" r="4" fill="#64748b"/>
    <circle cx="70" cy="148" r="4" fill="#64748b"/>
  </g>
  <!-- Frame 2: Transitioning (torso rotating) -->
  <g class="f2">
    <circle cx="110" cy="44" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Torso tilting -->
      <line x1="110" y1="56" x2="112" y2="128"/>
      <line x1="88" y1="70" x2="136" y2="72"/>
      <line x1="88" y1="70" x2="80" y2="104"/>
      <line x1="136" y1="72" x2="150" y2="100"/>
      <!-- Legs in transition -->
      <line x1="116" y1="128" x2="138" y2="168"/>
      <line x1="138" y1="168" x2="155" y2="200"/>
      <line x1="108" y1="128" x2="82" y2="152"/>
      <line x1="82" y1="152" x2="65" y2="184"/>
    </g>
    <circle cx="138" cy="168" r="4" fill="#64748b"/>
    <circle cx="82" cy="152" r="4" fill="#64748b"/>
  </g>
  <!-- Frame 3: Seated other side - left leg forward, right leg to side -->
  <g class="f3">
    <circle cx="110" cy="48" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Torso sitting -->
      <line x1="110" y1="60" x2="110" y2="130"/>
      <line x1="88" y1="74" x2="132" y2="74"/>
      <!-- Arms -->
      <line x1="132" y1="74" x2="124" y2="106"/>
      <line x1="88" y1="74" x2="80" y2="140"/>
      <!-- Left leg forward (down) -->
      <line x1="104" y1="130" x2="102" y2="175"/>
      <line x1="102" y1="175" x2="100" y2="218"/>
      <!-- Right leg to side (right) -->
      <line x1="116" y1="130" x2="150" y2="148"/>
      <line x1="150" y1="148" x2="170" y2="180"/>
    </g>
    <circle cx="102" cy="175" r="4" fill="#64748b"/>
    <circle cx="150" cy="148" r="4" fill="#64748b"/>
  </g>
</svg>
