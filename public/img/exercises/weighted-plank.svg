<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
  <rect width="200" height="230" fill="#111827" rx="12"/>
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>

  <!-- Frame 1: plancha baja (antebrazos), cuerpo recto, peso en espalda -->
  <g class="f1" stroke="#94a3b8" stroke-width="3.5" stroke-linecap="round" fill="none">
    <circle cx="55" cy="130" r="13" fill="#94a3b8" stroke="none"/>
    <!-- Torso horizontal -->
    <line x1="55" y1="143" x2="145" y2="148"/>
    <!-- Antebrazo izquierdo apoyado -->
    <line x1="55" y1="150" x2="42" y2="175"/>
    <line x1="42" y1="175" x2="65" y2="178"/>
    <!-- Antebrazo derecho apoyado -->
    <line x1="55" y1="150" x2="80" y2="175"/>
    <line x1="80" y1="175" x2="100" y2="178"/>
    <!-- Piernas extendidas -->
    <line x1="145" y1="148" x2="148" y2="178"/>
    <line x1="148" y1="178" x2="165" y2="178"/>
    <!-- Disco/peso sobre la espalda -->
    <ellipse cx="100" cy="138" rx="12" ry="8" fill="#475569" stroke="#64748b" stroke-width="1.5"/>
    <text x="100" y="141" font-family="sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">kg</text>
    <!-- Codos en suelo -->
    <circle cx="43" cy="175" r="4" fill="#64748b" stroke="none"/>
    <circle cx="80" cy="175" r="4" fill="#64748b" stroke="none"/>
  </g>

  <!-- Frame 2: plancha mantenida, ligera tensión (cadera levemente baja) -->
  <g class="f2" stroke="#94a3b8" stroke-width="3.5" stroke-linecap="round" fill="none">
    <circle cx="55" cy="128" r="13" fill="#94a3b8" stroke="none"/>
    <line x1="55" y1="141" x2="145" y2="152"/>
    <line x1="55" y1="148" x2="42" y2="173"/>
    <line x1="42" y1="173" x2="65" y2="176"/>
    <line x1="55" y1="148" x2="80" y2="173"/>
    <line x1="80" y1="173" x2="100" y2="176"/>
    <line x1="145" y1="152" x2="148" y2="180"/>
    <line x1="148" y1="180" x2="165" y2="180"/>
    <ellipse cx="100" cy="140" rx="12" ry="8" fill="#475569" stroke="#64748b" stroke-width="1.5"/>
    <text x="100" y="143" font-family="sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">kg</text>
    <circle cx="43" cy="173" r="4" fill="#64748b" stroke="none"/>
    <circle cx="80" cy="173" r="4" fill="#64748b" stroke="none"/>
  </g>

  <!-- Frame 3: plancha perfecta, cadera alineada -->
  <g class="f3" stroke="#94a3b8" stroke-width="3.5" stroke-linecap="round" fill="none">
    <circle cx="55" cy="125" r="13" fill="#94a3b8" stroke="none"/>
    <line x1="55" y1="138" x2="145" y2="145"/>
    <line x1="55" y1="145" x2="42" y2="170"/>
    <line x1="42" y1="170" x2="65" y2="173"/>
    <line x1="55" y1="145" x2="80" y2="170"/>
    <line x1="80" y1="170" x2="100" y2="173"/>
    <line x1="145" y1="145" x2="148" y2="175"/>
    <line x1="148" y1="175" x2="165" y2="175"/>
    <ellipse cx="100" cy="135" rx="12" ry="8" fill="#475569" stroke="#64748b" stroke-width="1.5"/>
    <text x="100" y="138" font-family="sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">kg</text>
    <circle cx="43" cy="170" r="4" fill="#64748b" stroke="none"/>
    <circle cx="80" cy="170" r="4" fill="#64748b" stroke="none"/>
  </g>

  <line x1="30" y1="210" x2="170" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="100" y="225" font-family="sans-serif" font-size="10" fill="#475569" text-anchor="middle" letter-spacing="0.5">WEIGHTED PLANK</text>
</svg>
