<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
  <rect width="200" height="230" fill="#111827" rx="12"/>
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>

  <!-- Frame 1: posición alta del lunge isométrico, mancuerna al costado -->
  <g class="f1" stroke="#94a3b8" stroke-width="3.5" stroke-linecap="round" fill="none">
    <circle cx="100" cy="28" r="13" fill="#94a3b8" stroke="none"/>
    <line x1="100" y1="41" x2="100" y2="105"/>
    <!-- Brazos sosteniendo mancuerna izquierda -->
    <line x1="100" y1="58" x2="70" y2="90"/>
    <line x1="100" y1="58" x2="128" y2="75"/>
    <!-- Mancuerna -->
    <rect x="55" y="88" width="18" height="6" fill="#64748b" rx="2" stroke="none"/>
    <!-- Lunge: pierna delantera -->
    <line x1="100" y1="105" x2="82" y2="155"/>
    <line x1="82" y1="155" x2="80" y2="200"/>
    <!-- Pierna trasera extendida -->
    <line x1="100" y1="105" x2="128" y2="155"/>
    <line x1="128" y1="155" x2="130" y2="200"/>
    <line x1="73" y1="200" x2="87" y2="200"/>
    <line x1="123" y1="200" x2="137" y2="200"/>
  </g>

  <!-- Frame 2: posición baja mantenida (isométrica), rodilla trasera casi en el suelo -->
  <g class="f2" stroke="#94a3b8" stroke-width="3.5" stroke-linecap="round" fill="none">
    <circle cx="100" cy="45" r="13" fill="#94a3b8" stroke="none"/>
    <line x1="100" y1="58" x2="100" y2="118"/>
    <line x1="100" y1="72" x2="68" y2="105"/>
    <line x1="100" y1="72" x2="130" y2="90"/>
    <rect x="52" y="102" width="18" height="6" fill="#64748b" rx="2" stroke="none"/>
    <!-- Pierna delantera, rodilla a 90° -->
    <line x1="100" y1="118" x2="75" y2="158"/>
    <line x1="75" y1="158" x2="72" y2="200"/>
    <!-- Pierna trasera, rodilla al suelo -->
    <line x1="100" y1="118" x2="132" y2="155"/>
    <line x1="132" y1="155" x2="140" y2="190"/>
    <line x1="65" y1="200" x2="79" y2="200"/>
    <!-- Rodilla trasera cerca del suelo -->
    <circle cx="140" cy="190" r="5" fill="#64748b" stroke="none"/>
  </g>

  <!-- Frame 3: manteniendo bajo con torso erguido -->
  <g class="f3" stroke="#94a3b8" stroke-width="3.5" stroke-linecap="round" fill="none">
    <circle cx="100" cy="42" r="13" fill="#94a3b8" stroke="none"/>
    <line x1="100" y1="55" x2="100" y2="115"/>
    <line x1="100" y1="68" x2="70" y2="100"/>
    <line x1="100" y1="68" x2="132" y2="88"/>
    <rect x="54" y="97" width="18" height="6" fill="#64748b" rx="2" stroke="none"/>
    <line x1="100" y1="115" x2="76" y2="160"/>
    <line x1="76" y1="160" x2="73" y2="200"/>
    <line x1="100" y1="115" x2="130" y2="153"/>
    <line x1="130" y1="153" x2="138" y2="192"/>
    <line x1="66" y1="200" x2="80" y2="200"/>
    <circle cx="138" cy="192" r="5" fill="#64748b" stroke="none"/>
  </g>

  <line x1="30" y1="210" x2="170" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="100" y="225" font-family="sans-serif" font-size="10" fill="#475569" text-anchor="middle" letter-spacing="0.5">ISOMETRIC LUNGE</text>
</svg>
