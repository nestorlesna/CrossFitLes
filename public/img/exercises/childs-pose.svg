<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
<rect width="200" height="230" fill="#111827" rx="12"/>
<style>
.f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
@keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
@keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
@keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
</style>
<!-- F1: Kneeling upright (starting position) -->
<g class="f1">
  <circle cx="100" cy="55" r="13" fill="#94a3b8"/>
  <line x1="100" y1="68" x2="100" y2="130" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="100" y1="85" x2="78" y2="100" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="100" y1="85" x2="122" y2="100" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="100" y1="130" x2="80" y2="168" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="80" y1="168" x2="72" y2="205" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="100" y1="130" x2="120" y2="168" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="120" y1="168" x2="128" y2="205" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
</g>
<!-- F2: Halfway down, arms reaching forward -->
<g class="f2">
  <circle cx="128" cy="100" r="12" fill="#94a3b8"/>
  <line x1="117" y1="108" x2="78" y2="140" stroke="#94a3b8" stroke-width="5" stroke-linecap="round"/>
  <line x1="98" y1="122" x2="60" y2="128" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="60" y1="128" x2="38" y2="148" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="98" y1="122" x2="125" y2="132" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="78" y1="140" x2="62" y2="175" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="62" y1="175" x2="55" y2="205" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="78" y1="140" x2="120" y2="158" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="120" y1="158" x2="132" y2="178" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <circle cx="38" cy="148" r="6" fill="#64748b"/>
  <circle cx="125" cy="132" r="6" fill="#64748b"/>
</g>
<!-- F3: Full child's pose, forehead near floor, arms extended -->
<g class="f3">
  <circle cx="142" cy="148" r="12" fill="#94a3b8"/>
  <line x1="130" y1="155" x2="80" y2="165" stroke="#94a3b8" stroke-width="5" stroke-linecap="round"/>
  <line x1="105" y1="160" x2="55" y2="155" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="55" y1="155" x2="32" y2="162" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="105" y1="160" x2="140" y2="162" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="80" y1="165" x2="62" y2="185" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="62" y1="185" x2="55" y2="205" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="80" y1="165" x2="128" y2="175" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="128" y1="175" x2="140" y2="188" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <circle cx="32" cy="162" r="6" fill="#64748b"/>
  <circle cx="140" cy="162" r="6" fill="#64748b"/>
</g>
<line x1="30" y1="210" x2="170" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
<text x="100" y="225" text-anchor="middle" font-family="monospace" font-size="10" fill="#475569">CHILD'S POSE</text>
</svg>
