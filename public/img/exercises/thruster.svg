<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="200" height="230" fill="#111827" rx="12"/>
  <line x1="30" y1="210" x2="170" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="100" y="226" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" font-weight="700" fill="#475569" letter-spacing="2">THRUSTER</text>
  <!-- Frame 1: Squat profundo, barra en front rack -->
  <g class="f1">
    <line x1="56" y1="116" x2="144" y2="116" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <rect x="50" y="108" width="7" height="16" rx="2" fill="#475569"/>
    <rect x="143" y="108" width="7" height="16" rx="2" fill="#475569"/>
    <circle cx="100" cy="88" r="13" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="100" y1="101" x2="97" y2="150"/>
      <line x1="78" y1="114" x2="122" y2="114"/>
      <!-- Codos adelante y arriba (front rack) -->
      <line x1="78" y1="114" x2="60" y2="108"/><line x1="122" y1="114" x2="140" y2="108"/>
      <line x1="93" y1="150" x2="66" y2="168"/><line x1="66" y1="168" x2="70" y2="205"/>
      <line x1="101" y1="150" x2="134" y2="168"/><line x1="134" y1="168" x2="130" y2="205"/>
      <line x1="54" y1="205" x2="82" y2="205"/><line x1="118" y1="205" x2="144" y2="205"/>
    </g>
    <circle cx="66" cy="168" r="5" fill="#64748b"/><circle cx="134" cy="168" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 2: Subiendo, barra a la altura de la cara -->
  <g class="f2">
    <line x1="52" y1="50" x2="148" y2="50" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <rect x="46" y="42" width="7" height="16" rx="2" fill="#475569"/>
    <rect x="147" y="42" width="7" height="16" rx="2" fill="#475569"/>
    <circle cx="100" cy="66" r="13" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="100" y1="79" x2="99" y2="132"/>
      <line x1="78" y1="90" x2="122" y2="90"/>
      <!-- Brazos empujando hacia arriba -->
      <line x1="78" y1="90" x2="66" y2="62"/><line x1="122" y1="90" x2="134" y2="62"/>
      <line x1="66" y1="62" x2="66" y2="50"/><line x1="134" y1="62" x2="134" y2="50"/>
      <!-- Medio squat -->
      <line x1="94" y1="132" x2="78" y2="168"/><line x1="78" y1="168" x2="80" y2="205"/>
      <line x1="104" y1="132" x2="122" y2="168"/><line x1="122" y1="168" x2="120" y2="205"/>
      <line x1="66" y1="205" x2="94" y2="205"/><line x1="108" y1="205" x2="134" y2="205"/>
    </g>
    <circle cx="78" cy="168" r="5" fill="#64748b"/><circle cx="122" cy="168" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 3: De pie, barra overhead -->
  <g class="f3">
    <line x1="52" y1="18" x2="148" y2="18" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <rect x="46" y="10" width="7" height="16" rx="2" fill="#475569"/>
    <rect x="147" y="10" width="7" height="16" rx="2" fill="#475569"/>
    <circle cx="100" cy="48" r="13" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="100" y1="61" x2="100" y2="122"/>
      <line x1="78" y1="73" x2="122" y2="73"/>
      <!-- Brazos extendidos -->
      <line x1="78" y1="73" x2="68" y2="38"/><line x1="122" y1="73" x2="132" y2="38"/>
      <line x1="68" y1="38" x2="68" y2="18"/><line x1="132" y1="38" x2="132" y2="18"/>
      <line x1="95" y1="122" x2="93" y2="172"/><line x1="93" y1="172" x2="93" y2="205"/>
      <line x1="105" y1="122" x2="107" y2="172"/><line x1="107" y1="172" x2="107" y2="205"/>
      <line x1="79" y1="205" x2="107" y2="205"/><line x1="93" y1="205" x2="121" y2="205"/>
    </g>
  </g>
</svg>
