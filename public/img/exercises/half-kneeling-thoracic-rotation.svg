<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
<rect width="200" height="230" fill="#111827" rx="12"/>
<style>
.f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
@keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
@keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
@keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
</style>
<!-- F1: Half kneeling neutral, hands at chest -->
<g class="f1">
  <circle cx="97" cy="36" r="13" fill="#94a3b8"/>
  <line x1="97" y1="49" x2="97" y2="105" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="97" y1="59" x2="76" y2="77" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="76" y1="77" x2="72" y2="95" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="97" y1="59" x2="118" y2="77" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="118" y1="77" x2="122" y2="95" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="97" y1="105" x2="80" y2="158" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="80" y1="158" x2="76" y2="205" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="97" y1="105" x2="114" y2="153" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="114" y1="153" x2="114" y2="205" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <circle cx="80" cy="158" r="5" fill="#64748b"/>
  <circle cx="114" cy="153" r="5" fill="#64748b"/>
</g>
<!-- F2: Rotating right, arms extended right -->
<g class="f2">
  <circle cx="97" cy="36" r="13" fill="#94a3b8"/>
  <line x1="97" y1="49" x2="97" y2="105" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="97" y1="62" x2="128" y2="57" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="128" y1="57" x2="148" y2="53" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="97" y1="62" x2="132" y2="70" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="132" y1="70" x2="150" y2="68" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="97" y1="105" x2="80" y2="158" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="80" y1="158" x2="76" y2="205" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="97" y1="105" x2="114" y2="153" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="114" y1="153" x2="114" y2="205" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <circle cx="80" cy="158" r="5" fill="#64748b"/>
  <circle cx="114" cy="153" r="5" fill="#64748b"/>
</g>
<!-- F3: Rotating left, arms extended left -->
<g class="f3">
  <circle cx="97" cy="36" r="13" fill="#94a3b8"/>
  <line x1="97" y1="49" x2="97" y2="105" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="97" y1="62" x2="66" y2="57" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="66" y1="57" x2="46" y2="53" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="97" y1="62" x2="62" y2="70" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="62" y1="70" x2="44" y2="68" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="97" y1="105" x2="80" y2="158" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="80" y1="158" x2="76" y2="205" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="97" y1="105" x2="114" y2="153" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="114" y1="153" x2="114" y2="205" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <circle cx="80" cy="158" r="5" fill="#64748b"/>
  <circle cx="114" cy="153" r="5" fill="#64748b"/>
</g>
<line x1="30" y1="210" x2="170" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
<text x="100" y="225" text-anchor="middle" font-family="monospace" font-size="9" fill="#475569">THORACIC ROTATION</text>
</svg>
