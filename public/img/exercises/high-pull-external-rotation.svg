<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 230">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="220" height="230" fill="#111827" rx="12"/>
  <line x1="20" y1="210" x2="200" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="110" y="225" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="8" font-weight="700" fill="#475569" letter-spacing="1">HIGH PULL + EXT ROT</text>
  <!-- Frame 1: Arms at sides with discs -->
  <g class="f1">
    <circle cx="110" cy="26" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="110" y1="38" x2="110" y2="110"/>
      <line x1="86" y1="50" x2="134" y2="50"/>
      <line x1="86" y1="50" x2="78" y2="98"/>
      <line x1="134" y1="50" x2="142" y2="98"/>
      <line x1="110" y1="110" x2="103" y2="162"/><line x1="103" y1="162" x2="103" y2="205"/>
      <line x1="110" y1="110" x2="117" y2="162"/><line x1="117" y1="162" x2="117" y2="205"/>
      <line x1="88" y1="205" x2="116" y2="205"/>
      <line x1="104" y1="205" x2="132" y2="205"/>
    </g>
    <circle cx="103" cy="162" r="4" fill="#64748b"/>
    <circle cx="117" cy="162" r="4" fill="#64748b"/>
    <rect x="64" y="95" width="16" height="7" rx="2" fill="#475569"/>
    <rect x="139" y="95" width="16" height="7" rx="2" fill="#475569"/>
  </g>
  <!-- Frame 2: High pull - elbows high and wide, discs at face height -->
  <g class="f2">
    <circle cx="110" cy="26" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="110" y1="38" x2="110" y2="110"/>
      <line x1="86" y1="50" x2="134" y2="50"/>
      <!-- Left: elbow high and wide, forearm down to hands at face -->
      <line x1="86" y1="50" x2="56" y2="36"/>
      <line x1="56" y1="36" x2="80" y2="58"/>
      <!-- Right: elbow high and wide, forearm down -->
      <line x1="134" y1="50" x2="164" y2="36"/>
      <line x1="164" y1="36" x2="140" y2="58"/>
      <line x1="110" y1="110" x2="103" y2="162"/><line x1="103" y1="162" x2="103" y2="205"/>
      <line x1="110" y1="110" x2="117" y2="162"/><line x1="117" y1="162" x2="117" y2="205"/>
      <line x1="88" y1="205" x2="116" y2="205"/>
      <line x1="104" y1="205" x2="132" y2="205"/>
    </g>
    <circle cx="56" cy="36" r="5" fill="#64748b"/>
    <circle cx="164" cy="36" r="5" fill="#64748b"/>
    <circle cx="103" cy="162" r="4" fill="#64748b"/>
    <circle cx="117" cy="162" r="4" fill="#64748b"/>
    <rect x="71" y="52" width="16" height="7" rx="2" fill="#475569"/>
    <rect x="132" y="52" width="16" height="7" rx="2" fill="#475569"/>
  </g>
  <!-- Frame 3: External rotation - forearms flipped overhead (snatch catch start) -->
  <g class="f3">
    <circle cx="110" cy="26" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="110" y1="38" x2="110" y2="110"/>
      <line x1="86" y1="50" x2="134" y2="50"/>
      <!-- Left: elbow wide, forearm now pointing UP (external rotation complete) -->
      <line x1="86" y1="50" x2="54" y2="46"/>
      <line x1="54" y1="46" x2="56" y2="14"/>
      <!-- Right: same, forearm pointing up -->
      <line x1="134" y1="50" x2="166" y2="46"/>
      <line x1="166" y1="46" x2="164" y2="14"/>
      <line x1="110" y1="110" x2="103" y2="162"/><line x1="103" y1="162" x2="103" y2="205"/>
      <line x1="110" y1="110" x2="117" y2="162"/><line x1="117" y1="162" x2="117" y2="205"/>
      <line x1="88" y1="205" x2="116" y2="205"/>
      <line x1="104" y1="205" x2="132" y2="205"/>
    </g>
    <circle cx="54" cy="46" r="5" fill="#64748b"/>
    <circle cx="166" cy="46" r="5" fill="#64748b"/>
    <circle cx="103" cy="162" r="4" fill="#64748b"/>
    <circle cx="117" cy="162" r="4" fill="#64748b"/>
    <rect x="44" y="7" width="16" height="7" rx="2" fill="#475569"/>
    <rect x="158" y="7" width="16" height="7" rx="2" fill="#475569"/>
  </g>
</svg>
