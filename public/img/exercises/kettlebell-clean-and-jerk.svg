<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="200" height="230" fill="#111827" rx="12"/>
  <line x1="20" y1="210" x2="180" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="100" y="225" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="9" font-weight="700" fill="#475569" letter-spacing="2">KB CLEAN AND JERK</text>
  <!-- Frame 1: Hip hinge, KB swinging back -->
  <g class="f1">
    <!-- KB hanging low -->
    <circle cx="82" cy="178" r="11" fill="none" stroke="#475569" stroke-width="4"/>
    <line x1="76" y1="168" x2="88" y2="168" stroke="#475569" stroke-width="4" stroke-linecap="round"/>
    <circle cx="100" cy="76" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="100" y1="88" x2="100" y2="134"/>
      <line x1="80" y1="98" x2="120" y2="98"/>
      <line x1="80" y1="98" x2="74" y2="168"/>
      <line x1="120" y1="98" x2="126" y2="126"/>
      <line x1="94" y1="134" x2="88" y2="178"/><line x1="88" y1="178" x2="80" y2="210"/>
      <line x1="106" y1="134" x2="112" y2="178"/><line x1="112" y1="178" x2="118" y2="210"/>
    </g>
  </g>
  <!-- Frame 2: KB in rack position at shoulder -->
  <g class="f2">
    <!-- KB racked at shoulder -->
    <circle cx="72" cy="88" r="11" fill="none" stroke="#475569" stroke-width="4"/>
    <line x1="66" y1="98" x2="78" y2="98" stroke="#475569" stroke-width="4" stroke-linecap="round"/>
    <circle cx="100" cy="50" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="100" y1="62" x2="100" y2="118"/>
      <line x1="80" y1="74" x2="120" y2="74"/>
      <line x1="80" y1="74" x2="66" y2="96"/>
      <line x1="120" y1="74" x2="126" y2="100"/>
      <!-- Dip for jerk -->
      <line x1="94" y1="118" x2="88" y2="162"/><line x1="88" y1="162" x2="80" y2="210"/>
      <line x1="106" y1="118" x2="112" y2="162"/><line x1="112" y1="162" x2="118" y2="210"/>
    </g>
    <circle cx="88" cy="162" r="5" fill="#64748b"/>
    <circle cx="112" cy="162" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 3: KB locked overhead -->
  <g class="f3">
    <!-- KB overhead -->
    <circle cx="68" cy="30" r="11" fill="none" stroke="#475569" stroke-width="4"/>
    <line x1="62" y1="40" x2="74" y2="40" stroke="#475569" stroke-width="4" stroke-linecap="round"/>
    <circle cx="100" cy="60" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="100" y1="72" x2="100" y2="128"/>
      <line x1="80" y1="84" x2="120" y2="84"/>
      <!-- Arm extended overhead -->
      <line x1="80" y1="84" x2="68" y2="56"/><line x1="68" y1="56" x2="74" y2="40"/>
      <line x1="120" y1="84" x2="126" y2="108"/>
      <line x1="94" y1="128" x2="90" y2="168"/><line x1="90" y1="168" x2="82" y2="210"/>
      <line x1="106" y1="128" x2="110" y2="168"/><line x1="110" y1="168" x2="118" y2="210"/>
    </g>
    <circle cx="90" cy="168" r="5" fill="#64748b"/>
    <circle cx="110" cy="168" r="5" fill="#64748b"/>
  </g>
</svg>
