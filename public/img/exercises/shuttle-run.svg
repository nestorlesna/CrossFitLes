<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 200">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="260" height="200" fill="#111827" rx="12"/>
  <line x1="20" y1="165" x2="240" y2="165" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <!-- Touch cones -->
  <rect x="22" y="148" width="10" height="17" rx="2" fill="#374151"/>
  <rect x="228" y="148" width="10" height="17" rx="2" fill="#374151"/>
  <text x="130" y="182" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" font-weight="700" fill="#475569" letter-spacing="2">SHUTTLE RUN</text>
  <!-- Frame 1: Sprinting right - left cone touched -->
  <g class="f1">
    <circle cx="78" cy="88" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Torso forward lean -->
      <line x1="78" y1="100" x2="80" y2="148"/>
      <line x1="60" y1="110" x2="96" y2="108"/>
      <!-- Arms driving: right arm forward, left back -->
      <line x1="60" y1="110" x2="44" y2="130"/>
      <line x1="96" y1="108" x2="112" y2="88"/>
      <!-- Legs: left push-off, right swing forward -->
      <line x1="76" y1="148" x2="52" y2="128"/><line x1="52" y1="128" x2="44" y2="162"/>
      <line x1="84" y1="148" x2="108" y2="130"/><line x1="108" y1="130" x2="114" y2="162"/>
    </g>
    <circle cx="52" cy="128" r="5" fill="#64748b"/>
    <circle cx="108" cy="130" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 2: Touch/turn - crouched at right cone -->
  <g class="f2">
    <circle cx="200" cy="108" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Crouched to touch cone -->
      <line x1="200" y1="120" x2="198" y2="152"/>
      <line x1="182" y1="126" x2="218" y2="124"/>
      <!-- One arm reaching down to touch -->
      <line x1="218" y1="124" x2="232" y2="148"/>
      <line x1="182" y1="126" x2="170" y2="108"/>
      <!-- Low crouched legs -->
      <line x1="194" y1="152" x2="178" y2="164"/>
      <line x1="202" y1="152" x2="214" y2="162"/>
    </g>
    <circle cx="194" cy="152" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 3: Sprinting left - returning -->
  <g class="f3">
    <circle cx="180" cy="88" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Torso forward lean left -->
      <line x1="180" y1="100" x2="178" y2="148"/>
      <line x1="162" y1="108" x2="198" y2="110"/>
      <!-- Arms opposing -->
      <line x1="198" y1="110" x2="214" y2="130"/>
      <line x1="162" y1="108" x2="148" y2="88"/>
      <!-- Legs -->
      <line x1="174" y1="148" x2="150" y2="130"/><line x1="150" y1="130" x2="144" y2="162"/>
      <line x1="182" y1="148" x2="206" y2="128"/><line x1="206" y1="128" x2="212" y2="162"/>
    </g>
    <circle cx="150" cy="130" r="5" fill="#64748b"/>
    <circle cx="206" cy="128" r="5" fill="#64748b"/>
  </g>
</svg>
