<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 230">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="220" height="230" fill="#111827" rx="12"/>
  <line x1="20" y1="210" x2="200" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="110" y="225" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="9" font-weight="700" fill="#475569" letter-spacing="2">CLEAN AND JERK</text>
  <!-- Frame 1: Clean - front rack catch, partial squat -->
  <g class="f1">
    <line x1="42" y1="108" x2="178" y2="108" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <rect x="36" y="100" width="8" height="16" rx="2" fill="#475569"/>
    <rect x="176" y="100" width="8" height="16" rx="2" fill="#475569"/>
    <circle cx="110" cy="52" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="110" y1="64" x2="110" y2="118"/>
      <!-- Front rack -->
      <line x1="90" y1="76" x2="130" y2="76"/>
      <line x1="90" y1="76" x2="76" y2="108"/>
      <line x1="130" y1="76" x2="144" y2="108"/>
      <!-- Slight squat catch -->
      <line x1="104" y1="118" x2="96" y2="158"/><line x1="96" y1="158" x2="88" y2="210"/>
      <line x1="116" y1="118" x2="124" y2="158"/><line x1="124" y1="158" x2="132" y2="210"/>
    </g>
    <circle cx="96" cy="158" r="5" fill="#64748b"/>
    <circle cx="124" cy="158" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 2: Dip for jerk -->
  <g class="f2">
    <line x1="42" y1="104" x2="178" y2="104" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <rect x="36" y="96" width="8" height="16" rx="2" fill="#475569"/>
    <rect x="176" y="96" width="8" height="16" rx="2" fill="#475569"/>
    <circle cx="110" cy="56" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="110" y1="68" x2="110" y2="118"/>
      <line x1="90" y1="80" x2="130" y2="80"/>
      <line x1="90" y1="80" x2="76" y2="104"/>
      <line x1="130" y1="80" x2="144" y2="104"/>
      <!-- Slight dip, knees bent -->
      <line x1="104" y1="118" x2="98" y2="160"/><line x1="98" y1="160" x2="90" y2="210"/>
      <line x1="116" y1="118" x2="122" y2="160"/><line x1="122" y1="160" x2="130" y2="210"/>
    </g>
    <circle cx="98" cy="160" r="5" fill="#64748b"/>
    <circle cx="122" cy="160" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 3: Split jerk - bar overhead, split stance -->
  <g class="f3">
    <line x1="42" y1="40" x2="178" y2="40" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <rect x="36" y="32" width="8" height="16" rx="2" fill="#475569"/>
    <rect x="176" y="32" width="8" height="16" rx="2" fill="#475569"/>
    <circle cx="110" cy="70" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="110" y1="82" x2="110" y2="134"/>
      <!-- Arms locked out overhead -->
      <line x1="90" y1="94" x2="130" y2="94"/>
      <line x1="90" y1="94" x2="72" y2="40"/>
      <line x1="130" y1="94" x2="148" y2="40"/>
      <!-- Split lunge -->
      <line x1="104" y1="134" x2="82" y2="160"/><line x1="82" y1="160" x2="68" y2="210"/>
      <line x1="116" y1="134" x2="138" y2="160"/><line x1="138" y1="160" x2="148" y2="190"/>
    </g>
    <circle cx="82" cy="160" r="5" fill="#64748b"/>
    <circle cx="138" cy="160" r="5" fill="#64748b"/>
  </g>
</svg>
