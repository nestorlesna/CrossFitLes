<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="200" height="230" fill="#111827" rx="12"/>
  <line x1="20" y1="210" x2="180" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="100" y="225" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="8" font-weight="700" fill="#475569" letter-spacing="2">KB GROUND TO OVERHEAD</text>
  <!-- Frame 1: KB on ground, hinged to pick up -->
  <g class="f1">
    <!-- KB on floor -->
    <circle cx="100" cy="195" r="11" fill="none" stroke="#475569" stroke-width="4"/>
    <line x1="94" y1="185" x2="106" y2="185" stroke="#475569" stroke-width="4" stroke-linecap="round"/>
    <circle cx="100" cy="78" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Hinged body -->
      <line x1="100" y1="90" x2="100" y2="138"/>
      <line x1="80" y1="100" x2="120" y2="100"/>
      <line x1="80" y1="100" x2="74" y2="184"/>
      <line x1="120" y1="100" x2="122" y2="130"/>
      <line x1="94" y1="138" x2="88" y2="178"/><line x1="88" y1="178" x2="82" y2="210"/>
      <line x1="106" y1="138" x2="112" y2="178"/><line x1="112" y1="178" x2="118" y2="210"/>
    </g>
    <circle cx="88" cy="178" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 2: KB at shoulder (clean/swing position) -->
  <g class="f2">
    <!-- KB at shoulder height -->
    <circle cx="82" cy="94" r="11" fill="none" stroke="#475569" stroke-width="4"/>
    <line x1="76" y1="104" x2="88" y2="104" stroke="#475569" stroke-width="4" stroke-linecap="round"/>
    <circle cx="100" cy="52" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="100" y1="64" x2="100" y2="120"/>
      <line x1="80" y1="76" x2="120" y2="76"/>
      <!-- One arm holding KB at shoulder -->
      <line x1="80" y1="76" x2="72" y2="92"/>
      <line x1="120" y1="76" x2="126" y2="102"/>
      <line x1="94" y1="120" x2="88" y2="166"/><line x1="88" y1="166" x2="82" y2="210"/>
      <line x1="106" y1="120" x2="112" y2="166"/><line x1="112" y1="166" x2="118" y2="210"/>
    </g>
    <circle cx="88" cy="166" r="5" fill="#64748b"/>
    <circle cx="112" cy="166" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 3: KB overhead, arm locked out -->
  <g class="f3">
    <!-- KB overhead -->
    <circle cx="82" cy="28" r="11" fill="none" stroke="#475569" stroke-width="4"/>
    <line x1="76" y1="38" x2="88" y2="38" stroke="#475569" stroke-width="4" stroke-linecap="round"/>
    <circle cx="100" cy="60" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="100" y1="72" x2="100" y2="128"/>
      <line x1="80" y1="84" x2="120" y2="84"/>
      <!-- Arm fully extended overhead -->
      <line x1="80" y1="84" x2="68" y2="56"/><line x1="68" y1="56" x2="76" y2="38"/>
      <line x1="120" y1="84" x2="126" y2="108"/>
      <line x1="94" y1="128" x2="90" y2="170"/><line x1="90" y1="170" x2="84" y2="210"/>
      <line x1="106" y1="128" x2="110" y2="170"/><line x1="110" y1="170" x2="116" y2="210"/>
    </g>
    <circle cx="90" cy="170" r="5" fill="#64748b"/>
    <circle cx="110" cy="170" r="5" fill="#64748b"/>
  </g>
</svg>
