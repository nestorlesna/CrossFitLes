<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="240" height="200" fill="#111827" rx="12"/>
  <line x1="20" y1="172" x2="220" y2="172" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="120" y="190" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="9" font-weight="700" fill="#475569" letter-spacing="2">NORDIC HAMSTRING CURL</text>
  <!-- Foot anchor pad -->
  <rect x="150" y="152" width="40" height="20" rx="4" fill="#374151"/>
  <!-- Frame 1: Kneeling upright, feet anchored -->
  <g class="f1">
    <circle cx="120" cy="50" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Torso vertical -->
      <line x1="120" y1="62" x2="120" y2="120"/>
      <line x1="100" y1="74" x2="140" y2="74"/>
      <!-- Arms relaxed at sides -->
      <line x1="100" y1="74" x2="96" y2="110"/>
      <line x1="140" y1="74" x2="144" y2="110"/>
      <!-- Knees on ground, ankles anchored -->
      <line x1="114" y1="120" x2="110" y2="158"/><line x1="110" y1="158" x2="158" y2="162"/>
      <line x1="126" y1="120" x2="130" y2="158"/>
    </g>
    <circle cx="114" cy="120" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 2: Falling forward, eccentric, body at ~45° -->
  <g class="f2">
    <circle cx="100" cy="80" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Torso 45° forward -->
      <line x1="100" y1="92" x2="120" y2="130"/>
      <line x1="82" y1="100" x2="118" y2="96"/>
      <!-- Arms forward for catch -->
      <line x1="82" y1="100" x2="60" y2="110"/>
      <line x1="118" y1="96" x2="100" y2="82"/>
      <!-- Legs still kneeling -->
      <line x1="120" y1="130" x2="118" y2="162"/><line x1="118" y1="162" x2="158" y2="162"/>
      <line x1="120" y1="130" x2="126" y2="158"/>
    </g>
    <circle cx="120" cy="130" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 3: Near ground, arms catching body weight -->
  <g class="f3">
    <circle cx="62" cy="118" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Torso nearly horizontal -->
      <line x1="62" y1="130" x2="110" y2="148"/>
      <line x1="62" y1="125" x2="86" y2="118"/>
      <!-- Arms catching on floor -->
      <line x1="62" y1="125" x2="40" y2="140"/>
      <line x1="86" y1="118" x2="70" y2="110"/>
      <!-- Legs kneeling -->
      <line x1="110" y1="148" x2="112" y2="166"/><line x1="112" y1="166" x2="158" y2="162"/>
      <line x1="110" y1="148" x2="118" y2="162"/>
    </g>
    <circle cx="110" cy="148" r="5" fill="#64748b"/>
  </g>
</svg>
