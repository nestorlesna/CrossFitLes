<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
<rect width="200" height="230" fill="#111827" rx="12"/>
<style>
  .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
  @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
  @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
  @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
</style>
<line x1="30" y1="210" x2="170" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
<text x="100" y="225" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#475569">BARBELL BICEP CURL</text>

<!-- F1: Arms extended, barbell at hips -->
<g class="f1" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" fill="none">
  <circle cx="100" cy="26" r="12" fill="#94a3b8" stroke="none"/>
  <line x1="100" y1="38" x2="100" y2="108"/>
  <!-- Upper arms -->
  <line x1="100" y1="52" x2="78" y2="108"/>
  <line x1="100" y1="52" x2="122" y2="108"/>
  <!-- Forearms -->
  <line x1="78" y1="108" x2="75" y2="145"/>
  <line x1="122" y1="108" x2="125" y2="145"/>
  <!-- Barbell -->
  <line x1="65" y1="145" x2="135" y2="145" stroke="#94a3b8" stroke-width="5"/>
  <circle cx="62" cy="145" r="7" fill="#64748b" stroke="none"/>
  <circle cx="138" cy="145" r="7" fill="#64748b" stroke="none"/>
  <line x1="100" y1="108" x2="87" y2="158"/>
  <line x1="87" y1="158" x2="83" y2="200"/>
  <line x1="100" y1="108" x2="113" y2="158"/>
  <line x1="113" y1="158" x2="117" y2="200"/>
  <line x1="77" y1="200" x2="91" y2="200"/>
  <line x1="114" y1="200" x2="126" y2="200"/>
  <circle cx="78" cy="108" r="4" fill="#64748b" stroke="none"/>
  <circle cx="122" cy="108" r="4" fill="#64748b" stroke="none"/>
  <circle cx="87" cy="158" r="4" fill="#64748b" stroke="none"/>
  <circle cx="113" cy="158" r="4" fill="#64748b" stroke="none"/>
</g>

<!-- F2: 90° curl, bar at mid-height -->
<g class="f2" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" fill="none">
  <circle cx="100" cy="26" r="12" fill="#94a3b8" stroke="none"/>
  <line x1="100" y1="38" x2="100" y2="108"/>
  <!-- Upper arms (vertical, elbows at hip level) -->
  <line x1="100" y1="52" x2="78" y2="108"/>
  <line x1="100" y1="52" x2="122" y2="108"/>
  <!-- Forearms at 90° (horizontal, angling up toward center) -->
  <line x1="78" y1="108" x2="95" y2="85"/>
  <line x1="122" y1="108" x2="105" y2="85"/>
  <!-- Barbell -->
  <line x1="85" y1="80" x2="115" y2="80" stroke="#94a3b8" stroke-width="5"/>
  <circle cx="82" cy="80" r="7" fill="#64748b" stroke="none"/>
  <circle cx="118" cy="80" r="7" fill="#64748b" stroke="none"/>
  <line x1="100" y1="108" x2="87" y2="158"/>
  <line x1="87" y1="158" x2="83" y2="200"/>
  <line x1="100" y1="108" x2="113" y2="158"/>
  <line x1="113" y1="158" x2="117" y2="200"/>
  <line x1="77" y1="200" x2="91" y2="200"/>
  <line x1="114" y1="200" x2="126" y2="200"/>
  <circle cx="78" cy="108" r="4" fill="#64748b" stroke="none"/>
  <circle cx="122" cy="108" r="4" fill="#64748b" stroke="none"/>
  <circle cx="87" cy="158" r="4" fill="#64748b" stroke="none"/>
  <circle cx="113" cy="158" r="4" fill="#64748b" stroke="none"/>
</g>

<!-- F3: Full curl, bar near shoulders -->
<g class="f3" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" fill="none">
  <circle cx="100" cy="26" r="12" fill="#94a3b8" stroke="none"/>
  <line x1="100" y1="38" x2="100" y2="108"/>
  <!-- Upper arms (vertical at sides) -->
  <line x1="100" y1="52" x2="78" y2="108"/>
  <line x1="100" y1="52" x2="122" y2="108"/>
  <!-- Forearms fully curled (nearly vertical, bar at shoulder height) -->
  <line x1="78" y1="108" x2="85" y2="58"/>
  <line x1="122" y1="108" x2="115" y2="58"/>
  <!-- Barbell at shoulder level -->
  <line x1="75" y1="52" x2="125" y2="52" stroke="#94a3b8" stroke-width="5"/>
  <circle cx="72" cy="52" r="7" fill="#64748b" stroke="none"/>
  <circle cx="128" cy="52" r="7" fill="#64748b" stroke="none"/>
  <line x1="100" y1="108" x2="87" y2="158"/>
  <line x1="87" y1="158" x2="83" y2="200"/>
  <line x1="100" y1="108" x2="113" y2="158"/>
  <line x1="113" y1="158" x2="117" y2="200"/>
  <line x1="77" y1="200" x2="91" y2="200"/>
  <line x1="114" y1="200" x2="126" y2="200"/>
  <circle cx="78" cy="108" r="4" fill="#64748b" stroke="none"/>
  <circle cx="122" cy="108" r="4" fill="#64748b" stroke="none"/>
  <circle cx="87" cy="158" r="4" fill="#64748b" stroke="none"/>
  <circle cx="113" cy="158" r="4" fill="#64748b" stroke="none"/>
</g>
</svg>
