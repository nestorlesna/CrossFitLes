<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
<rect width="200" height="230" fill="#111827" rx="12"/>
<style>
  .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
  @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
  @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
  @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
</style>
<line x1="30" y1="210" x2="170" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
<text x="100" y="225" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#475569">JUMP ROPE</text>

<!-- F1: Standing, rope behind (ready position) -->
<g class="f1" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" fill="none">
  <circle cx="100" cy="26" r="12" fill="#94a3b8" stroke="none"/>
  <line x1="100" y1="38" x2="100" y2="108"/>
  <!-- Arms holding rope handles at sides/slightly back -->
  <line x1="100" y1="55" x2="65" y2="80"/>
  <line x1="100" y1="55" x2="135" y2="80"/>
  <!-- Rope behind (arc above the head going back) -->
  <path d="M 65,80 Q 100,185 135,80" fill="none" stroke="#64748b" stroke-width="2"/>
  <line x1="100" y1="108" x2="88" y2="158"/>
  <line x1="88" y1="158" x2="84" y2="200"/>
  <line x1="100" y1="108" x2="112" y2="158"/>
  <line x1="112" y1="158" x2="116" y2="200"/>
  <line x1="78" y1="200" x2="92" y2="200"/>
  <line x1="112" y1="200" x2="126" y2="200"/>
  <circle cx="88" cy="158" r="4" fill="#64748b" stroke="none"/>
  <circle cx="112" cy="158" r="4" fill="#64748b" stroke="none"/>
</g>

<!-- F2: Jumping, rope under feet -->
<g class="f2" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" fill="none">
  <circle cx="100" cy="18" r="12" fill="#94a3b8" stroke="none"/>
  <line x1="100" y1="30" x2="100" y2="100"/>
  <!-- Arms at sides holding handles -->
  <line x1="100" y1="47" x2="65" y2="70"/>
  <line x1="100" y1="47" x2="135" y2="70"/>
  <!-- Legs slightly bent, feet off ground (jumping) -->
  <line x1="100" y1="100" x2="88" y2="145"/>
  <line x1="88" y1="145" x2="85" y2="182"/>
  <line x1="100" y1="100" x2="112" y2="145"/>
  <line x1="112" y1="145" x2="115" y2="182"/>
  <!-- Rope passing under feet (arc below) -->
  <path d="M 65,70 Q 100,215 135,70" fill="none" stroke="#64748b" stroke-width="2"/>
  <line x1="78" y1="182" x2="93" y2="182"/>
  <line x1="111" y1="182" x2="125" y2="182"/>
  <circle cx="88" cy="145" r="4" fill="#64748b" stroke="none"/>
  <circle cx="112" cy="145" r="4" fill="#64748b" stroke="none"/>
</g>

<!-- F3: Landing, rope in front -->
<g class="f3" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" fill="none">
  <circle cx="100" cy="26" r="12" fill="#94a3b8" stroke="none"/>
  <line x1="100" y1="38" x2="100" y2="108"/>
  <!-- Arms forward/down as rope comes forward -->
  <line x1="100" y1="55" x2="65" y2="85"/>
  <line x1="100" y1="55" x2="135" y2="85"/>
  <!-- Rope in front (arc passing forward from below) -->
  <path d="M 65,85 Q 100,-10 135,85" fill="none" stroke="#64748b" stroke-width="2"/>
  <line x1="100" y1="108" x2="88" y2="158"/>
  <line x1="88" y1="158" x2="84" y2="200"/>
  <line x1="100" y1="108" x2="112" y2="158"/>
  <line x1="112" y1="158" x2="116" y2="200"/>
  <line x1="78" y1="200" x2="92" y2="200"/>
  <line x1="112" y1="200" x2="126" y2="200"/>
  <circle cx="88" cy="158" r="4" fill="#64748b" stroke="none"/>
  <circle cx="112" cy="158" r="4" fill="#64748b" stroke="none"/>
</g>
</svg>
