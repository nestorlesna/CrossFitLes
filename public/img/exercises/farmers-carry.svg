<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 220">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="240" height="220" fill="#111827" rx="12"/>
  <line x1="20" y1="190" x2="220" y2="190" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="120" y="207" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" font-weight="700" fill="#475569" letter-spacing="2">FARMER'S CARRY</text>
  <!-- Frame 1: Right foot forward, left foot back -->
  <g class="f1">
    <circle cx="120" cy="40" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="120" y1="52" x2="120" y2="106"/>
      <line x1="98" y1="68" x2="142" y2="68"/>
      <!-- Arms straight down holding KBs -->
      <line x1="98" y1="68" x2="88" y2="107"/>
      <line x1="142" y1="68" x2="152" y2="107"/>
      <!-- Right leg forward -->
      <line x1="127" y1="106" x2="144" y2="148"/><line x1="144" y1="148" x2="158" y2="190"/>
      <!-- Left leg back -->
      <line x1="113" y1="106" x2="100" y2="148"/><line x1="100" y1="148" x2="88" y2="190"/>
    </g>
    <circle cx="144" cy="148" r="5" fill="#64748b"/>
    <circle cx="100" cy="148" r="5" fill="#64748b"/>
    <!-- KB left -->
    <circle cx="83" cy="117" r="9" fill="none" stroke="#475569" stroke-width="4"/>
    <line x1="77" y1="109" x2="89" y2="109" stroke="#475569" stroke-width="4" stroke-linecap="round"/>
    <!-- KB right -->
    <circle cx="157" cy="117" r="9" fill="none" stroke="#475569" stroke-width="4"/>
    <line x1="151" y1="109" x2="163" y2="109" stroke="#475569" stroke-width="4" stroke-linecap="round"/>
  </g>
  <!-- Frame 2: Mid-stride (weight shift, legs under body) -->
  <g class="f2">
    <circle cx="120" cy="38" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="120" y1="50" x2="120" y2="104"/>
      <line x1="98" y1="66" x2="142" y2="66"/>
      <line x1="98" y1="66" x2="88" y2="105"/>
      <line x1="142" y1="66" x2="152" y2="105"/>
      <!-- Both legs more vertical (midstride) -->
      <line x1="127" y1="104" x2="132" y2="150"/><line x1="132" y1="150" x2="134" y2="190"/>
      <line x1="113" y1="104" x2="108" y2="150"/><line x1="108" y1="150" x2="106" y2="190"/>
    </g>
    <circle cx="132" cy="150" r="5" fill="#64748b"/>
    <circle cx="108" cy="150" r="5" fill="#64748b"/>
    <circle cx="83" cy="115" r="9" fill="none" stroke="#475569" stroke-width="4"/>
    <line x1="77" y1="107" x2="89" y2="107" stroke="#475569" stroke-width="4" stroke-linecap="round"/>
    <circle cx="157" cy="115" r="9" fill="none" stroke="#475569" stroke-width="4"/>
    <line x1="151" y1="107" x2="163" y2="107" stroke="#475569" stroke-width="4" stroke-linecap="round"/>
  </g>
  <!-- Frame 3: Left foot forward, right foot back -->
  <g class="f3">
    <circle cx="120" cy="40" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="120" y1="52" x2="120" y2="106"/>
      <line x1="98" y1="68" x2="142" y2="68"/>
      <line x1="98" y1="68" x2="88" y2="107"/>
      <line x1="142" y1="68" x2="152" y2="107"/>
      <!-- Left leg forward -->
      <line x1="113" y1="106" x2="98" y2="148"/><line x1="98" y1="148" x2="84" y2="190"/>
      <!-- Right leg back -->
      <line x1="127" y1="106" x2="142" y2="148"/><line x1="142" y1="148" x2="156" y2="190"/>
    </g>
    <circle cx="98" cy="148" r="5" fill="#64748b"/>
    <circle cx="142" cy="148" r="5" fill="#64748b"/>
    <circle cx="83" cy="117" r="9" fill="none" stroke="#475569" stroke-width="4"/>
    <line x1="77" y1="109" x2="89" y2="109" stroke="#475569" stroke-width="4" stroke-linecap="round"/>
    <circle cx="157" cy="117" r="9" fill="none" stroke="#475569" stroke-width="4"/>
    <line x1="151" y1="109" x2="163" y2="109" stroke="#475569" stroke-width="4" stroke-linecap="round"/>
  </g>
</svg>
