<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 180">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="240" height="180" fill="#111827" rx="12"/>
  <!-- Banco (siempre visible) -->
  <rect x="40" y="120" width="160" height="14" rx="4" fill="#374151"/>
  <line x1="60" y1="134" x2="60" y2="155" stroke="#374151" stroke-width="5" stroke-linecap="round"/>
  <line x1="180" y1="134" x2="180" y2="155" stroke="#374151" stroke-width="5" stroke-linecap="round"/>
  <text x="120" y="172" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" font-weight="700" fill="#475569" letter-spacing="2">BENCH PRESS</text>
  <!-- Frame 1: Barra al pecho (fondo) -->
  <g class="f1">
    <line x1="42" y1="90" x2="198" y2="90" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <rect x="36" y="82" width="8" height="16" rx="2" fill="#475569"/>
    <rect x="196" y="82" width="8" height="16" rx="2" fill="#475569"/>
    <circle cx="120" cy="108" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Cuerpo tumbado, cabeza a la derecha -->
      <line x1="120" y1="116" x2="46" y2="120"/>
      <!-- Hombros -->
      <line x1="96" y1="118" x2="92" y2="108"/>
      <!-- Brazos doblados sosteniendo barra -->
      <line x1="92" y1="112" x2="78" y2="90"/><line x1="148" y1="118" x2="162" y2="90"/>
      <!-- Piernas sobre el banco -->
      <line x1="46" y1="120" x2="36" y2="120"/>
    </g>
    <circle cx="78" cy="90" r="5" fill="#64748b"/><circle cx="162" cy="90" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 2: Barra a mitad -->
  <g class="f2">
    <line x1="42" y1="74" x2="198" y2="74" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <rect x="36" y="66" width="8" height="16" rx="2" fill="#475569"/>
    <rect x="196" y="66" width="8" height="16" rx="2" fill="#475569"/>
    <circle cx="120" cy="110" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="120" y1="118" x2="46" y2="120"/>
      <line x1="96" y1="118" x2="88" y2="108"/>
      <line x1="88" y1="110" x2="78" y2="74"/><line x1="152" y1="118" x2="162" y2="74"/>
      <line x1="46" y1="120" x2="36" y2="120"/>
    </g>
    <circle cx="78" cy="74" r="5" fill="#64748b"/><circle cx="162" cy="74" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 3: Brazos extendidos (arriba) -->
  <g class="f3">
    <line x1="42" y1="52" x2="198" y2="52" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <rect x="36" y="44" width="8" height="16" rx="2" fill="#475569"/>
    <rect x="196" y="44" width="8" height="16" rx="2" fill="#475569"/>
    <circle cx="120" cy="110" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="120" y1="118" x2="46" y2="120"/>
      <line x1="96" y1="118" x2="90" y2="108"/>
      <!-- Brazos extendidos verticalmente -->
      <line x1="90" y1="110" x2="80" y2="52"/><line x1="150" y1="118" x2="160" y2="52"/>
      <line x1="46" y1="120" x2="36" y2="120"/>
    </g>
  </g>
</svg>
