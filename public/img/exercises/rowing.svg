<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 200">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="260" height="200" fill="#111827" rx="12"/>
  <!-- Remo ergómetro (riel, asiento y reposa-pies, siempre visibles) -->
  <line x1="30" y1="155" x2="230" y2="155" stroke="#374151" stroke-width="4" stroke-linecap="round"/>
  <rect x="105" y="138" width="30" height="10" rx="3" fill="#374151"/><!-- asiento -->
  <rect x="195" y="130" width="18" height="22" rx="3" fill="#374151"/><!-- reposa-pies -->
  <text x="130" y="186" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" font-weight="700" fill="#475569" letter-spacing="2">ROWING</text>
  <!-- Frame 1: Posición inicial (catch) — inclinado adelante, piernas dobladas -->
  <g class="f1">
    <circle cx="155" cy="90" r="13" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Torso inclinado adelante -->
      <line x1="155" y1="103" x2="120" y2="120"/>
      <line x1="140" y1="110" x2="136" y2="122"/><!-- shoulder -->
      <!-- Brazos extendidos al frente (tomando el remo) -->
      <line x1="136" y1="116" x2="80" y2="112"/>
      <line x1="80" y1="112" x2="74" y2="112"/><!-- mango -->
      <!-- Piernas muy dobladas -->
      <line x1="120" y1="120" x2="145" y2="140"/><line x1="145" y1="140" x2="195" y2="138"/>
    </g>
    <circle cx="145" cy="140" r="5" fill="#64748b"/>
    <!-- Remo/handle -->
    <line x1="60" y1="112" x2="80" y2="112" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <line x1="60" y1="105" x2="60" y2="155" stroke="#475569" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- Frame 2: Drive (piernas empujando, torso neutro) -->
  <g class="f2">
    <circle cx="140" cy="85" r="13" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Torso erguido -->
      <line x1="140" y1="98" x2="128" y2="128"/>
      <line x1="132" y1="106" x2="128" y2="118"/>
      <!-- Brazos al frente, remo a media altura -->
      <line x1="128" y1="112" x2="80" y2="108"/>
      <!-- Piernas a media extensión -->
      <line x1="128" y1="128" x2="155" y2="140"/><line x1="155" y1="140" x2="195" y2="138"/>
    </g>
    <circle cx="155" cy="140" r="5" fill="#64748b"/>
    <line x1="60" y1="108" x2="80" y2="108" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <line x1="60" y1="105" x2="60" y2="155" stroke="#475569" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- Frame 3: Finish (piernas extendidas, remo al pecho, torso levemente atrás) -->
  <g class="f3">
    <circle cx="118" cy="80" r="13" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Torso levemente inclinado atrás -->
      <line x1="118" y1="93" x2="130" y2="128"/>
      <line x1="120" y1="102" x2="116" y2="114"/>
      <!-- Brazos halando al pecho -->
      <line x1="116" y1="110" x2="82" y2="104"/>
      <line x1="82" y1="104" x2="76" y2="104"/>
      <!-- Piernas casi rectas -->
      <line x1="130" y1="128" x2="165" y2="140"/><line x1="165" y1="140" x2="195" y2="138"/>
    </g>
    <circle cx="165" cy="140" r="5" fill="#64748b"/>
    <line x1="60" y1="104" x2="80" y2="104" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <line x1="60" y1="100" x2="60" y2="155" stroke="#475569" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
