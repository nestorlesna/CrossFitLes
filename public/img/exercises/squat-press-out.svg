<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
<rect width="200" height="230" fill="#111827" rx="12"/>
<style>
.f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
@keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
@keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
@keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
</style>
<!-- F1: Standing, hands clasped at chest -->
<g class="f1">
  <circle cx="100" cy="26" r="13" fill="#94a3b8"/>
  <line x1="100" y1="39" x2="100" y2="108" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="100" y1="53" x2="78" y2="72" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="78" y1="72" x2="88" y2="88" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="100" y1="53" x2="122" y2="72" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="122" y1="72" x2="112" y2="88" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <circle cx="100" cy="90" r="5" fill="#64748b"/>
  <line x1="100" y1="108" x2="86" y2="162" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="86" y1="162" x2="82" y2="205" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="100" y1="108" x2="114" y2="162" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="114" y1="162" x2="118" y2="205" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <circle cx="86" cy="162" r="5" fill="#64748b"/>
  <circle cx="114" cy="162" r="5" fill="#64748b"/>
</g>
<!-- F2: Quarter squat, arms pressing outward -->
<g class="f2">
  <circle cx="100" cy="45" r="13" fill="#94a3b8"/>
  <line x1="100" y1="58" x2="100" y2="120" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="100" y1="72" x2="68" y2="82" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="68" y1="82" x2="50" y2="82" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="100" y1="72" x2="132" y2="82" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="132" y1="82" x2="150" y2="82" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="100" y1="120" x2="80" y2="165" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="80" y1="165" x2="78" y2="205" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="100" y1="120" x2="120" y2="165" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="120" y1="165" x2="122" y2="205" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <circle cx="80" cy="165" r="5" fill="#64748b"/>
  <circle cx="120" cy="165" r="5" fill="#64748b"/>
</g>
<!-- F3: Full squat, arms fully extended forward-out -->
<g class="f3">
  <circle cx="100" cy="60" r="13" fill="#94a3b8"/>
  <line x1="100" y1="73" x2="100" y2="130" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="100" y1="85" x2="62" y2="90" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="62" y1="90" x2="44" y2="88" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="100" y1="85" x2="138" y2="90" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="138" y1="90" x2="156" y2="88" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="100" y1="130" x2="76" y2="172" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="76" y1="172" x2="74" y2="205" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="100" y1="130" x2="124" y2="172" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="124" y1="172" x2="126" y2="205" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <circle cx="76" cy="172" r="5" fill="#64748b"/>
  <circle cx="124" cy="172" r="5" fill="#64748b"/>
</g>
<line x1="30" y1="210" x2="170" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
<text x="100" y="225" text-anchor="middle" font-family="monospace" font-size="10" fill="#475569">SQUAT PRESS-OUT</text>
</svg>
