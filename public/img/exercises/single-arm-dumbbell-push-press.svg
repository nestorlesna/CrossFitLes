<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="200" height="230" fill="#111827" rx="12"/>
  <line x1="30" y1="210" x2="170" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="100" y="226" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="8" font-weight="700" fill="#475569" letter-spacing="1">SINGLE-ARM DB PUSH PRESS</text>

  <!-- Frame 1: Dip — dumbbell at shoulder, knees slightly bent -->
  <g class="f1" stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <circle cx="100" cy="26" r="12" fill="#94a3b8" stroke="none"/>
    <line x1="100" y1="38" x2="100" y2="110"/>
    <line x1="78" y1="50" x2="68" y2="75"/>
    <line x1="122" y1="50" x2="122" y2="50"/>
    <line x1="122" y1="50" x2="136" y2="50"/>
    <circle cx="138" cy="48" r="6" fill="#64748b" stroke="none"/>
    <line x1="100" y1="110" x2="86" y2="168"/>
    <line x1="100" y1="110" x2="114" y2="168"/>
    <line x1="86" y1="168" x2="82" y2="205"/>
    <line x1="114" y1="168" x2="118" y2="205"/>
    <line x1="72" y1="205" x2="90" y2="205"/>
    <line x1="108" y1="205" x2="128" y2="205"/>
    <circle cx="86" cy="168" r="4" fill="#64748b" stroke="none"/>
    <circle cx="114" cy="168" r="4" fill="#64748b" stroke="none"/>
  </g>

  <!-- Frame 2: Drive — legs extending, dumbbell mid-way up -->
  <g class="f2" stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <circle cx="100" cy="26" r="12" fill="#94a3b8" stroke="none"/>
    <line x1="100" y1="38" x2="100" y2="108"/>
    <line x1="78" y1="50" x2="68" y2="75"/>
    <line x1="122" y1="50" x2="130" y2="35"/>
    <circle cx="131" cy="31" r="6" fill="#64748b" stroke="none"/>
    <line x1="100" y1="108" x2="90" y2="165"/>
    <line x1="100" y1="108" x2="110" y2="165"/>
    <line x1="90" y1="165" x2="84" y2="205"/>
    <line x1="110" y1="165" x2="116" y2="205"/>
    <line x1="74" y1="205" x2="92" y2="205"/>
    <line x1="106" y1="205" x2="126" y2="205"/>
    <circle cx="90" cy="165" r="4" fill="#64748b" stroke="none"/>
    <circle cx="110" cy="165" r="4" fill="#64748b" stroke="none"/>
  </g>

  <!-- Frame 3: Lockout — arm fully extended overhead with dumbbell -->
  <g class="f3" stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <circle cx="100" cy="26" r="12" fill="#94a3b8" stroke="none"/>
    <line x1="100" y1="38" x2="100" y2="108"/>
    <line x1="78" y1="50" x2="68" y2="75"/>
    <line x1="122" y1="50" x2="126" y2="20"/>
    <circle cx="126" cy="15" r="6" fill="#64748b" stroke="none"/>
    <line x1="100" y1="108" x2="88" y2="162"/>
    <line x1="100" y1="108" x2="112" y2="162"/>
    <line x1="88" y1="162" x2="82" y2="205"/>
    <line x1="112" y1="162" x2="118" y2="205"/>
    <line x1="72" y1="205" x2="90" y2="205"/>
    <line x1="108" y1="205" x2="128" y2="205"/>
    <circle cx="88" cy="162" r="4" fill="#64748b" stroke="none"/>
    <circle cx="112" cy="162" r="4" fill="#64748b" stroke="none"/>
  </g>
</svg>
