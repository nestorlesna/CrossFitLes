<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="200" height="230" fill="#111827" rx="12"/>
  <!-- Caja centrada (siempre visible) -->
  <rect x="78" y="168" width="44" height="37" rx="3" fill="none" stroke="#374151" stroke-width="4"/>
  <line x1="20" y1="205" x2="78" y2="205" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <line x1="122" y1="205" x2="180" y2="205" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="100" y="226" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" font-weight="700" fill="#475569" letter-spacing="2">BOX JUMP OVER</text>
  <!-- Frame 1: De pie a la izquierda de la caja -->
  <g class="f1">
    <circle cx="46" cy="38" r="13" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="46" y1="51" x2="46" y2="114"/>
      <line x1="28" y1="64" x2="64" y2="64"/>
      <line x1="28" y1="64" x2="24" y2="108"/><line x1="64" y1="64" x2="68" y2="108"/>
      <line x1="41" y1="114" x2="40" y2="165"/><line x1="40" y1="165" x2="40" y2="205"/>
      <line x1="51" y1="114" x2="52" y2="165"/><line x1="52" y1="165" x2="52" y2="205"/>
      <line x1="26" y1="205" x2="56" y2="205"/><line x1="38" y1="205" x2="66" y2="205"/>
    </g>
  </g>
  <!-- Frame 2: En el aire por encima de la caja -->
  <g class="f2">
    <circle cx="100" cy="22" r="13" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="100" y1="35" x2="100" y2="96"/>
      <line x1="78" y1="48" x2="122" y2="48"/>
      <!-- Brazos arriba en el salto -->
      <line x1="78" y1="48" x2="62" y2="24"/><line x1="122" y1="48" x2="138" y2="24"/>
      <!-- Piernas dobladas en el aire -->
      <line x1="95" y1="96" x2="80" y2="138"/><line x1="80" y1="138" x2="68" y2="162"/>
      <line x1="105" y1="96" x2="120" y2="138"/><line x1="120" y1="138" x2="132" y2="162"/>
    </g>
    <circle cx="80" cy="138" r="5" fill="#64748b"/><circle cx="120" cy="138" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 3: Aterrizando a la derecha de la caja -->
  <g class="f3">
    <circle cx="154" cy="52" r="13" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="154" y1="65" x2="154" y2="122"/>
      <line x1="136" y1="78" x2="172" y2="78"/>
      <line x1="136" y1="78" x2="130" y2="116"/><line x1="172" y1="78" x2="178" y2="116"/>
      <!-- Rodillas dobladas al aterrizar -->
      <line x1="149" y1="122" x2="140" y2="168"/><line x1="140" y1="168" x2="142" y2="205"/>
      <line x1="159" y1="122" x2="168" y2="168"/><line x1="168" y1="168" x2="166" y2="205"/>
      <line x1="128" y1="205" x2="156" y2="205"/><line x1="154" y1="205" x2="180" y2="205"/>
    </g>
    <circle cx="140" cy="168" r="5" fill="#64748b"/><circle cx="168" cy="168" r="5" fill="#64748b"/>
  </g>
</svg>
