<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="200" height="230" fill="#111827" rx="12"/>
  <line x1="20" y1="210" x2="180" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="100" y="225" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" font-weight="700" fill="#475569" letter-spacing="2">KB SNATCH</text>
  <!-- Frame 1: Hip hinge, KB swinging back between legs -->
  <g class="f1">
    <!-- KB -->
    <circle cx="80" cy="178" r="10" fill="none" stroke="#475569" stroke-width="4"/>
    <line x1="74" y1="169" x2="86" y2="169" stroke="#475569" stroke-width="4" stroke-linecap="round"/>
    <circle cx="100" cy="74" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="100" y1="86" x2="100" y2="132"/>
      <line x1="80" y1="96" x2="120" y2="96"/>
      <line x1="80" y1="96" x2="72" y2="168"/>
      <line x1="120" y1="96" x2="130" y2="130"/>
      <line x1="94" y1="132" x2="88" y2="175"/><line x1="88" y1="175" x2="82" y2="210"/>
      <line x1="106" y1="132" x2="112" y2="175"/><line x1="112" y1="175" x2="118" y2="210"/>
    </g>
    <circle cx="88" cy="175" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 2: High pull one arm - KB traveling up, elbow high -->
  <g class="f2">
    <circle cx="88" cy="100" r="10" fill="none" stroke="#475569" stroke-width="4"/>
    <line x1="82" y1="91" x2="94" y2="91" stroke="#475569" stroke-width="4" stroke-linecap="round"/>
    <circle cx="100" cy="48" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="100" y1="60" x2="100" y2="116"/>
      <line x1="80" y1="72" x2="120" y2="72"/>
      <!-- One arm pulling up, elbow high -->
      <line x1="80" y1="72" x2="64" y2="56"/><line x1="64" y1="56" x2="76" y2="90"/>
      <line x1="120" y1="72" x2="128" y2="100"/>
      <line x1="94" y1="116" x2="88" y2="164"/><line x1="88" y1="164" x2="82" y2="210"/>
      <line x1="106" y1="116" x2="112" y2="164"/><line x1="112" y1="164" x2="118" y2="210"/>
    </g>
    <circle cx="64" cy="56" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 3: Lockout overhead, arm fully extended -->
  <g class="f3">
    <!-- KB overhead -->
    <circle cx="78" cy="34" r="10" fill="none" stroke="#475569" stroke-width="4"/>
    <line x1="72" y1="44" x2="84" y2="44" stroke="#475569" stroke-width="4" stroke-linecap="round"/>
    <circle cx="100" cy="68" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="100" y1="80" x2="100" y2="134"/>
      <line x1="80" y1="92" x2="120" y2="92"/>
      <!-- One arm fully extended overhead -->
      <line x1="80" y1="92" x2="68" y2="58"/><line x1="68" y1="58" x2="78" y2="44"/>
      <!-- Other arm resting -->
      <line x1="120" y1="92" x2="128" y2="120"/>
      <line x1="94" y1="134" x2="90" y2="175"/><line x1="90" y1="175" x2="84" y2="210"/>
      <line x1="106" y1="134" x2="110" y2="175"/><line x1="110" y1="175" x2="116" y2="210"/>
    </g>
    <circle cx="90" cy="175" r="5" fill="#64748b"/>
    <circle cx="110" cy="175" r="5" fill="#64748b"/>
  </g>
</svg>
