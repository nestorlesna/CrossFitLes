<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 180">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="260" height="180" fill="#111827" rx="12"/>
  <line x1="20" y1="148" x2="240" y2="148" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="130" y="167" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" font-weight="700" fill="#475569" letter-spacing="2">COSSACK SQUAT</text>
  <!-- Frame 1: Standing, feet shoulder-width -->
  <g class="f1">
    <circle cx="130" cy="58" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="130" y1="70" x2="130" y2="108"/>
      <line x1="130" y1="84" x2="112" y2="102"/>
      <line x1="130" y1="84" x2="148" y2="102"/>
      <line x1="130" y1="108" x2="114" y2="148"/>
      <line x1="130" y1="108" x2="146" y2="148"/>
    </g>
  </g>
  <!-- Frame 2: Shifting left, right leg extending, arms forward -->
  <g class="f2">
    <circle cx="112" cy="66" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="112" y1="78" x2="115" y2="114"/>
      <line x1="113" y1="93" x2="84" y2="86"/>
      <line x1="113" y1="93" x2="140" y2="84"/>
      <line x1="115" y1="114" x2="96" y2="148"/>
      <line x1="115" y1="114" x2="175" y2="138"/>
    </g>
    <circle cx="96" cy="148" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 3: Full cossack squat — left leg bent deep, right leg extended -->
  <g class="f3">
    <circle cx="88" cy="82" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="88" y1="94" x2="91" y2="122"/>
      <line x1="89" y1="105" x2="58" y2="96"/>
      <line x1="89" y1="105" x2="115" y2="95"/>
      <line x1="91" y1="122" x2="75" y2="148"/>
      <line x1="91" y1="122" x2="208" y2="143"/>
    </g>
    <circle cx="75" cy="148" r="5" fill="#64748b"/>
  </g>
</svg>
