<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="220" height="220" fill="#111827" rx="12"/>
  <line x1="20" y1="200" x2="200" y2="200" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="110" y="215" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="9" font-weight="700" fill="#475569" letter-spacing="2">BENT OVER ROW</text>
  <!-- Frame 1: Hinged, bar at hang -->
  <g class="f1">
    <line x1="36" y1="168" x2="184" y2="168" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <rect x="30" y="160" width="8" height="16" rx="2" fill="#475569"/>
    <rect x="182" y="160" width="8" height="16" rx="2" fill="#475569"/>
    <circle cx="110" cy="56" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Torso ~45° forward -->
      <line x1="110" y1="68" x2="110" y2="120"/>
      <line x1="90" y1="78" x2="130" y2="78"/>
      <line x1="90" y1="78" x2="68" y2="168"/>
      <line x1="130" y1="78" x2="152" y2="168"/>
      <!-- Legs slightly bent -->
      <line x1="104" y1="120" x2="96" y2="168"/><line x1="96" y1="168" x2="88" y2="200"/>
      <line x1="116" y1="120" x2="124" y2="168"/><line x1="124" y1="168" x2="132" y2="200"/>
    </g>
    <circle cx="96" cy="168" r="5" fill="#64748b"/>
    <circle cx="124" cy="168" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 2: Row mid-pull -->
  <g class="f2">
    <line x1="36" y1="140" x2="184" y2="140" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <rect x="30" y="132" width="8" height="16" rx="2" fill="#475569"/>
    <rect x="182" y="132" width="8" height="16" rx="2" fill="#475569"/>
    <circle cx="110" cy="52" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="110" y1="64" x2="110" y2="116"/>
      <line x1="90" y1="74" x2="130" y2="74"/>
      <!-- Elbows back, pulling -->
      <line x1="90" y1="74" x2="68" y2="60"/><line x1="68" y1="60" x2="72" y2="140"/>
      <line x1="130" y1="74" x2="152" y2="60"/><line x1="152" y1="60" x2="148" y2="140"/>
      <line x1="104" y1="116" x2="96" y2="164"/><line x1="96" y1="164" x2="88" y2="200"/>
      <line x1="116" y1="116" x2="124" y2="164"/><line x1="124" y1="164" x2="132" y2="200"/>
    </g>
    <circle cx="68" cy="60" r="5" fill="#64748b"/>
    <circle cx="152" cy="60" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 3: Bar at torso, elbows fully back -->
  <g class="f3">
    <line x1="36" y1="122" x2="184" y2="122" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <rect x="30" y="114" width="8" height="16" rx="2" fill="#475569"/>
    <rect x="182" y="114" width="8" height="16" rx="2" fill="#475569"/>
    <circle cx="110" cy="48" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="110" y1="60" x2="110" y2="112"/>
      <line x1="90" y1="70" x2="130" y2="70"/>
      <!-- Elbows fully retracted past torso -->
      <line x1="90" y1="70" x2="60" y2="52"/><line x1="60" y1="52" x2="66" y2="122"/>
      <line x1="130" y1="70" x2="160" y2="52"/><line x1="160" y1="52" x2="154" y2="122"/>
      <line x1="104" y1="112" x2="96" y2="162"/><line x1="96" y1="162" x2="88" y2="200"/>
      <line x1="116" y1="112" x2="124" y2="162"/><line x1="124" y1="162" x2="132" y2="200"/>
    </g>
    <circle cx="60" cy="52" r="5" fill="#64748b"/>
    <circle cx="160" cy="52" r="5" fill="#64748b"/>
  </g>
</svg>
