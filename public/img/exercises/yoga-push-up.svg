<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
  <rect width="200" height="230" fill="#111827" rx="12"/>
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>

  <!-- Frame 1: Posición downward dog (V invertida) -->
  <g class="f1" stroke="#94a3b8" stroke-width="3.5" stroke-linecap="round" fill="none">
    <circle cx="100" cy="68" r="13" fill="#94a3b8" stroke="none"/>
    <!-- Torso inclinado formando V invertida -->
    <line x1="100" y1="81" x2="100" y2="110"/>
    <!-- Brazos hacia el suelo -->
    <line x1="100" y1="90" x2="60" y2="148"/>
    <line x1="100" y1="90" x2="140" y2="148"/>
    <!-- Piernas hacia atrás/suelo -->
    <line x1="100" y1="110" x2="68" y2="158"/>
    <line x1="100" y1="110" x2="132" y2="158"/>
    <!-- Pies en suelo -->
    <line x1="60" y1="196" x2="74" y2="196"/>
    <line x1="126" y1="196" x2="140" y2="196"/>
    <line x1="68" y1="158" x2="67" y2="196"/>
    <line x1="132" y1="158" x2="133" y2="196"/>
    <!-- Manos en suelo -->
    <line x1="52" y1="196" x2="66" y2="196"/>
    <line x1="52" y1="193" x2="52" y2="197"/>
    <line x1="134" y1="193" x2="134" y2="197"/>
    <line x1="128" y1="196" x2="142" y2="196"/>
    <circle cx="60" cy="148" r="4" fill="#64748b" stroke="none"/>
    <circle cx="140" cy="148" r="4" fill="#64748b" stroke="none"/>
  </g>

  <!-- Frame 2: bajando a push-up bajo (cobra bajo) -->
  <g class="f2" stroke="#94a3b8" stroke-width="3.5" stroke-linecap="round" fill="none">
    <circle cx="100" cy="120" r="13" fill="#94a3b8" stroke="none"/>
    <!-- Torso horizontal -->
    <line x1="100" y1="133" x2="100" y2="158"/>
    <!-- Brazos semiflexionados -->
    <line x1="100" y1="140" x2="62" y2="168"/>
    <line x1="100" y1="140" x2="138" y2="168"/>
    <!-- Piernas extendidas atrás -->
    <line x1="100" y1="158" x2="75" y2="185"/>
    <line x1="100" y1="158" x2="125" y2="185"/>
    <line x1="75" y1="185" x2="72" y2="200"/>
    <line x1="125" y1="185" x2="128" y2="200"/>
    <circle cx="62" cy="168" r="4" fill="#64748b" stroke="none"/>
    <circle cx="138" cy="168" r="4" fill="#64748b" stroke="none"/>
  </g>

  <!-- Frame 3: cobra / upward dog (pecho arriba) -->
  <g class="f3" stroke="#94a3b8" stroke-width="3.5" stroke-linecap="round" fill="none">
    <circle cx="100" cy="95" r="13" fill="#94a3b8" stroke="none"/>
    <!-- Torso erguido -->
    <line x1="100" y1="108" x2="100" y2="148"/>
    <!-- Brazos extendidos apoyados -->
    <line x1="100" y1="118" x2="62" y2="158"/>
    <line x1="100" y1="118" x2="138" y2="158"/>
    <!-- Caderas bajas, piernas extendidas -->
    <line x1="100" y1="148" x2="78" y2="190"/>
    <line x1="100" y1="148" x2="122" y2="190"/>
    <line x1="78" y1="190" x2="75" y2="205"/>
    <line x1="122" y1="190" x2="125" y2="205"/>
    <circle cx="62" cy="158" r="4" fill="#64748b" stroke="none"/>
    <circle cx="138" cy="158" r="4" fill="#64748b" stroke="none"/>
  </g>

  <line x1="30" y1="210" x2="170" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="100" y="225" font-family="sans-serif" font-size="10" fill="#475569" text-anchor="middle" letter-spacing="0.5">YOGA PUSH-UP</text>
</svg>
