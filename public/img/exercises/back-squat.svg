<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="200" height="230" fill="#111827" rx="12"/>
  <line x1="30" y1="210" x2="170" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="100" y="226" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" font-weight="700" fill="#475569" letter-spacing="2">BACK SQUAT</text>
  <!-- Frame 1: De pie, barra en la espalda -->
  <g class="f1">
    <line x1="52" y1="52" x2="148" y2="52" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <rect x="46" y="44" width="8" height="16" rx="2" fill="#475569"/>
    <rect x="146" y="44" width="8" height="16" rx="2" fill="#475569"/>
    <circle cx="100" cy="28" r="13" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="100" y1="41" x2="100" y2="110"/>
      <line x1="78" y1="52" x2="122" y2="52"/>
      <!-- Brazos sobre la barra -->
      <line x1="78" y1="52" x2="58" y2="68"/><line x1="122" y1="52" x2="142" y2="68"/>
      <line x1="95" y1="110" x2="93" y2="162"/><line x1="93" y1="162" x2="93" y2="205"/>
      <line x1="105" y1="110" x2="107" y2="162"/><line x1="107" y1="162" x2="107" y2="205"/>
      <line x1="79" y1="205" x2="107" y2="205"/><line x1="93" y1="205" x2="121" y2="205"/>
    </g>
  </g>
  <!-- Frame 2: Squat paralelo, barra en la espalda -->
  <g class="f2">
    <line x1="52" y1="86" x2="148" y2="86" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <rect x="46" y="78" width="8" height="16" rx="2" fill="#475569"/>
    <rect x="146" y="78" width="8" height="16" rx="2" fill="#475569"/>
    <circle cx="100" cy="62" r="13" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="100" y1="75" x2="97" y2="132"/>
      <line x1="78" y1="86" x2="122" y2="86"/>
      <line x1="78" y1="86" x2="58" y2="100"/><line x1="122" y1="86" x2="142" y2="100"/>
      <line x1="93" y1="132" x2="68" y2="164"/><line x1="68" y1="164" x2="72" y2="205"/>
      <line x1="101" y1="132" x2="132" y2="164"/><line x1="132" y1="164" x2="128" y2="205"/>
      <line x1="56" y1="205" x2="84" y2="205"/><line x1="116" y1="205" x2="142" y2="205"/>
    </g>
    <circle cx="68" cy="164" r="5" fill="#64748b"/><circle cx="132" cy="164" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 3: Squat profundo, barra baja -->
  <g class="f3">
    <line x1="52" y1="112" x2="148" y2="112" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <rect x="46" y="104" width="8" height="16" rx="2" fill="#475569"/>
    <rect x="146" y="104" width="8" height="16" rx="2" fill="#475569"/>
    <circle cx="100" cy="88" r="13" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="100" y1="101" x2="97" y2="152"/>
      <line x1="78" y1="112" x2="122" y2="112"/>
      <line x1="78" y1="112" x2="56" y2="124"/><line x1="122" y1="112" x2="144" y2="124"/>
      <line x1="93" y1="152" x2="66" y2="170"/><line x1="66" y1="170" x2="70" y2="205"/>
      <line x1="101" y1="152" x2="134" y2="170"/><line x1="134" y1="170" x2="130" y2="205"/>
      <line x1="54" y1="205" x2="82" y2="205"/><line x1="118" y1="205" x2="144" y2="205"/>
    </g>
    <circle cx="66" cy="170" r="5" fill="#64748b"/><circle cx="134" cy="170" r="5" fill="#64748b"/>
  </g>
</svg>
