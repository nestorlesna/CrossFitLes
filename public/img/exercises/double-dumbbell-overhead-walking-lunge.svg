<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240">
  <style>
    .fr1{animation:f1 4s linear infinite}
    .fr2{animation:f2 4s linear infinite}
    .fr3{animation:f3 4s linear infinite}
    @keyframes f1{0%,33%{opacity:1}34%,100%{opacity:0}}
    @keyframes f2{0%,33%{opacity:0}34%,66%{opacity:1}67%,100%{opacity:0}}
    @keyframes f3{0%,66%{opacity:0}67%,100%{opacity:1}}
  </style>
  <rect width="200" height="240" fill="#111827"/>

  <!-- Frame 1: de pie, mancuernas overhead -->
  <g class="fr1" fill="none" stroke-linecap="round">
    <circle cx="100" cy="36" r="10" fill="#94a3b8"/>
    <line x1="100" y1="46" x2="100" y2="122" stroke="#94a3b8" stroke-width="4"/>
    <!-- brazo izquierdo overhead -->
    <line x1="100" y1="65" x2="80" y2="42" stroke="#94a3b8" stroke-width="4"/>
    <line x1="80" y1="42" x2="76" y2="14" stroke="#94a3b8" stroke-width="4"/>
    <!-- brazo derecho overhead -->
    <line x1="100" y1="65" x2="120" y2="42" stroke="#94a3b8" stroke-width="4"/>
    <line x1="120" y1="42" x2="124" y2="14" stroke="#94a3b8" stroke-width="4"/>
    <!-- piernas derechas -->
    <line x1="100" y1="122" x2="90" y2="178" stroke="#94a3b8" stroke-width="4"/>
    <line x1="90" y1="178" x2="86" y2="230" stroke="#94a3b8" stroke-width="4"/>
    <line x1="100" y1="122" x2="110" y2="178" stroke="#94a3b8" stroke-width="4"/>
    <line x1="110" y1="178" x2="114" y2="230" stroke="#94a3b8" stroke-width="4"/>
    <!-- mancuernas -->
    <rect x="60" y="8" width="20" height="6" rx="2" fill="#475569"/>
    <rect x="58" y="6" width="4" height="10" rx="1" fill="#64748b"/>
    <rect x="78" y="6" width="4" height="10" rx="1" fill="#64748b"/>
    <rect x="118" y="8" width="20" height="6" rx="2" fill="#475569"/>
    <rect x="116" y="6" width="4" height="10" rx="1" fill="#64748b"/>
    <rect x="136" y="6" width="4" height="10" rx="1" fill="#64748b"/>
  </g>

  <!-- Frame 2: zancada izquierda adelante -->
  <g class="fr2" fill="none" stroke-linecap="round">
    <circle cx="96" cy="36" r="10" fill="#94a3b8"/>
    <line x1="96" y1="46" x2="98" y2="122" stroke="#94a3b8" stroke-width="4"/>
    <!-- brazos overhead -->
    <line x1="96" y1="65" x2="76" y2="42" stroke="#94a3b8" stroke-width="4"/>
    <line x1="76" y1="42" x2="72" y2="14" stroke="#94a3b8" stroke-width="4"/>
    <line x1="96" y1="65" x2="116" y2="42" stroke="#94a3b8" stroke-width="4"/>
    <line x1="116" y1="42" x2="120" y2="14" stroke="#94a3b8" stroke-width="4"/>
    <!-- pierna izquierda adelante -->
    <line x1="98" y1="122" x2="74" y2="175" stroke="#94a3b8" stroke-width="4"/>
    <line x1="74" y1="175" x2="68" y2="230" stroke="#94a3b8" stroke-width="4"/>
    <!-- pierna derecha atrás (rodilla baja) -->
    <line x1="98" y1="122" x2="118" y2="168" stroke="#94a3b8" stroke-width="4"/>
    <line x1="118" y1="168" x2="124" y2="215" stroke="#94a3b8" stroke-width="4"/>
    <!-- mancuernas -->
    <rect x="56" y="8" width="20" height="6" rx="2" fill="#475569"/>
    <rect x="54" y="6" width="4" height="10" rx="1" fill="#64748b"/>
    <rect x="74" y="6" width="4" height="10" rx="1" fill="#64748b"/>
    <rect x="114" y="8" width="20" height="6" rx="2" fill="#475569"/>
    <rect x="112" y="6" width="4" height="10" rx="1" fill="#64748b"/>
    <rect x="132" y="6" width="4" height="10" rx="1" fill="#64748b"/>
  </g>

  <!-- Frame 3: zancada derecha adelante -->
  <g class="fr3" fill="none" stroke-linecap="round">
    <circle cx="104" cy="36" r="10" fill="#94a3b8"/>
    <line x1="104" y1="46" x2="102" y2="122" stroke="#94a3b8" stroke-width="4"/>
    <!-- brazos overhead -->
    <line x1="104" y1="65" x2="84" y2="42" stroke="#94a3b8" stroke-width="4"/>
    <line x1="84" y1="42" x2="80" y2="14" stroke="#94a3b8" stroke-width="4"/>
    <line x1="104" y1="65" x2="124" y2="42" stroke="#94a3b8" stroke-width="4"/>
    <line x1="124" y1="42" x2="128" y2="14" stroke="#94a3b8" stroke-width="4"/>
    <!-- pierna izquierda atrás -->
    <line x1="102" y1="122" x2="82" y2="168" stroke="#94a3b8" stroke-width="4"/>
    <line x1="82" y1="168" x2="76" y2="215" stroke="#94a3b8" stroke-width="4"/>
    <!-- pierna derecha adelante -->
    <line x1="102" y1="122" x2="126" y2="175" stroke="#94a3b8" stroke-width="4"/>
    <line x1="126" y1="175" x2="132" y2="230" stroke="#94a3b8" stroke-width="4"/>
    <!-- mancuernas -->
    <rect x="64" y="8" width="20" height="6" rx="2" fill="#475569"/>
    <rect x="62" y="6" width="4" height="10" rx="1" fill="#64748b"/>
    <rect x="82" y="6" width="4" height="10" rx="1" fill="#64748b"/>
    <rect x="122" y="8" width="20" height="6" rx="2" fill="#475569"/>
    <rect x="120" y="6" width="4" height="10" rx="1" fill="#64748b"/>
    <rect x="140" y="6" width="4" height="10" rx="1" fill="#64748b"/>
  </g>
</svg>
