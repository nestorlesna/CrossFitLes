<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 230">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="220" height="230" fill="#111827" rx="12"/>
  <line x1="20" y1="210" x2="200" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="110" y="225" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="9" font-weight="700" fill="#475569" letter-spacing="2">BARBELL PUSH PRESS</text>
  <!-- Frame 1: Front rack standing -->
  <g class="f1">
    <line x1="42" y1="108" x2="178" y2="108" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <rect x="36" y="100" width="8" height="16" rx="2" fill="#475569"/>
    <rect x="176" y="100" width="8" height="16" rx="2" fill="#475569"/>
    <circle cx="110" cy="48" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="110" y1="60" x2="110" y2="116"/>
      <line x1="90" y1="72" x2="130" y2="72"/>
      <line x1="90" y1="72" x2="76" y2="108"/><line x1="130" y1="72" x2="144" y2="108"/>
      <line x1="104" y1="116" x2="100" y2="164"/><line x1="100" y1="164" x2="96" y2="210"/>
      <line x1="116" y1="116" x2="120" y2="164"/><line x1="120" y1="164" x2="124" y2="210"/>
    </g>
    <circle cx="100" cy="164" r="5" fill="#64748b"/>
    <circle cx="120" cy="164" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 2: Dip - knees bent, loading -->
  <g class="f2">
    <line x1="42" y1="112" x2="178" y2="112" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <rect x="36" y="104" width="8" height="16" rx="2" fill="#475569"/>
    <rect x="176" y="104" width="8" height="16" rx="2" fill="#475569"/>
    <circle cx="110" cy="56" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="110" y1="68" x2="110" y2="122"/>
      <line x1="90" y1="78" x2="130" y2="78"/>
      <line x1="90" y1="78" x2="76" y2="112"/><line x1="130" y1="78" x2="144" y2="112"/>
      <!-- Bent knees dip -->
      <line x1="104" y1="122" x2="96" y2="166"/><line x1="96" y1="166" x2="88" y2="210"/>
      <line x1="116" y1="122" x2="124" y2="166"/><line x1="124" y1="166" x2="132" y2="210"/>
    </g>
    <circle cx="96" cy="166" r="5" fill="#64748b"/>
    <circle cx="124" cy="166" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 3: Overhead lockout, legs straight -->
  <g class="f3">
    <line x1="42" y1="40" x2="178" y2="40" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <rect x="36" y="32" width="8" height="16" rx="2" fill="#475569"/>
    <rect x="176" y="32" width="8" height="16" rx="2" fill="#475569"/>
    <circle cx="110" cy="62" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="110" y1="74" x2="110" y2="128"/>
      <line x1="90" y1="86" x2="130" y2="86"/>
      <line x1="90" y1="86" x2="72" y2="40"/><line x1="130" y1="86" x2="148" y2="40"/>
      <line x1="104" y1="128" x2="100" y2="170"/><line x1="100" y1="170" x2="96" y2="210"/>
      <line x1="116" y1="128" x2="120" y2="170"/><line x1="120" y1="170" x2="124" y2="210"/>
    </g>
    <circle cx="100" cy="170" r="5" fill="#64748b"/>
    <circle cx="120" cy="170" r="5" fill="#64748b"/>
  </g>
</svg>
