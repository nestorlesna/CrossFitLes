<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
  <rect width="200" height="230" fill="#111827" rx="12"/>
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>

  <!-- pared/ancla -->
  <line x1="42" y1="100" x2="42" y2="210" stroke="#374151" stroke-width="4" stroke-linecap="round"/>

  <!-- F1: de pie, pie cerca de la pared, postura neutral -->
  <g class="f1" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" fill="none">
    <circle cx="108" cy="28" r="14" fill="#94a3b8" stroke="none"/>
    <line x1="108" y1="42" x2="108" y2="110"/>
    <line x1="108" y1="62" x2="86" y2="90"/>
    <line x1="108" y1="62" x2="130" y2="90"/>
    <line x1="108" y1="110" x2="95" y2="158"/>
    <line x1="95" y1="158" x2="90" y2="205"/>
    <line x1="108" y1="110" x2="120" y2="158"/>
    <line x1="120" y1="158" x2="125" y2="205"/>
    <line x1="80" y1="205" x2="100" y2="205"/>
    <line x1="115" y1="205" x2="135" y2="205"/>
    <!-- banda (amarillo) en tobillo delantero -->
    <path d="M42,200 Q65,192 90,205" stroke="#f59e0b" stroke-width="2.5" fill="none"/>
  </g>

  <!-- F2: rodilla avanzando sobre el pie, dorsiflexión media -->
  <g class="f2" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" fill="none">
    <circle cx="115" cy="40" r="14" fill="#94a3b8" stroke="none"/>
    <!-- torso inclinado levemente hacia adelante -->
    <line x1="115" y1="54" x2="108" y2="118"/>
    <line x1="112" y1="78" x2="88" y2="105"/>
    <line x1="112" y1="78" x2="134" y2="102"/>
    <!-- pierna delantera: rodilla bien hacia adelante -->
    <line x1="108" y1="118" x2="78" y2="158"/>
    <line x1="78" y1="158" x2="68" y2="205"/>
    <!-- pierna trasera recta -->
    <line x1="108" y1="118" x2="128" y2="162"/>
    <line x1="128" y1="162" x2="135" y2="205"/>
    <line x1="58" y1="205" x2="78" y2="205"/>
    <line x1="125" y1="205" x2="145" y2="205"/>
    <!-- banda -->
    <path d="M42,198 Q55,190 68,205" stroke="#f59e0b" stroke-width="2.5" fill="none"/>
  </g>

  <!-- F3: dorsiflexión máxima, rodilla muy adelantada sobre los dedos -->
  <g class="f3" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" fill="none">
    <circle cx="120" cy="52" r="14" fill="#94a3b8" stroke="none"/>
    <!-- torso más inclinado, mano en la pared -->
    <line x1="120" y1="66" x2="108" y2="128"/>
    <line x1="115" y1="90" x2="78" y2="115"/>
    <line x1="115" y1="90" x2="140" y2="108"/>
    <!-- pierna delantera: rodilla más allá de los dedos -->
    <line x1="108" y1="128" x2="68" y2="162"/>
    <line x1="68" y1="162" x2="58" y2="205"/>
    <!-- pierna trasera -->
    <line x1="108" y1="128" x2="132" y2="165"/>
    <line x1="132" y1="165" x2="140" y2="205"/>
    <line x1="48" y1="205" x2="68" y2="205"/>
    <line x1="130" y1="205" x2="150" y2="205"/>
    <!-- banda tensa -->
    <path d="M42,196 Q50,186 58,205" stroke="#f59e0b" stroke-width="2.5" fill="none"/>
  </g>

  <line x1="30" y1="210" x2="170" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="100" y="225" text-anchor="middle" font-family="monospace" font-size="10" fill="#475569">ANKLE DORSIFLEXION</text>
</svg>
