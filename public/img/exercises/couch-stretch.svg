<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
  <rect width="200" height="230" fill="#111827" rx="12"/>
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>

  <!-- F1: de pie, posición inicial -->
  <g class="f1" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" fill="none">
    <circle cx="100" cy="26" r="14" fill="#94a3b8" stroke="none"/>
    <line x1="100" y1="40" x2="100" y2="108"/>
    <line x1="100" y1="60" x2="78" y2="88"/>
    <line x1="100" y1="60" x2="122" y2="88"/>
    <line x1="100" y1="108" x2="88" y2="158"/>
    <line x1="88" y1="158" x2="88" y2="205"/>
    <line x1="100" y1="108" x2="112" y2="158"/>
    <line x1="112" y1="158" x2="112" y2="205"/>
    <line x1="78" y1="205" x2="98" y2="205"/>
    <line x1="102" y1="205" x2="122" y2="205"/>
  </g>

  <!-- F2: lunge de rodillas, rodilla trasera en suelo -->
  <g class="f2" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" fill="none">
    <circle cx="90" cy="38" r="14" fill="#94a3b8" stroke="none"/>
    <line x1="90" y1="52" x2="90" y2="118"/>
    <line x1="90" y1="72" x2="70" y2="98"/>
    <line x1="90" y1="72" x2="110" y2="98"/>
    <!-- pierna delantera (izq) hacia adelante -->
    <line x1="90" y1="118" x2="65" y2="165"/>
    <line x1="65" y1="165" x2="55" y2="205"/>
    <line x1="45" y1="205" x2="65" y2="205"/>
    <!-- pierna trasera, rodilla en suelo -->
    <line x1="90" y1="118" x2="118" y2="165"/>
    <line x1="118" y1="165" x2="128" y2="200"/>
    <circle cx="128" cy="200" r="5" fill="#64748b" stroke="none"/>
  </g>

  <!-- F3: couch stretch profundo, torso erguido, brazo arriba -->
  <g class="f3" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" fill="none">
    <circle cx="86" cy="34" r="14" fill="#94a3b8" stroke="none"/>
    <line x1="86" y1="48" x2="88" y2="116"/>
    <!-- brazo arriba indicando estiramiento -->
    <line x1="86" y1="66" x2="93" y2="35"/>
    <!-- brazo sobre rodilla delantera -->
    <line x1="86" y1="66" x2="62" y2="105"/>
    <!-- pierna delantera muy doblada -->
    <line x1="88" y1="116" x2="58" y2="168"/>
    <line x1="58" y1="168" x2="48" y2="205"/>
    <line x1="38" y1="205" x2="58" y2="205"/>
    <!-- pierna trasera, rodilla en suelo -->
    <line x1="88" y1="116" x2="120" y2="162"/>
    <line x1="120" y1="162" x2="136" y2="200"/>
    <circle cx="136" cy="200" r="5" fill="#64748b" stroke="none"/>
  </g>

  <line x1="30" y1="210" x2="170" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="100" y="225" text-anchor="middle" font-family="monospace" font-size="10" fill="#475569">COUCH STRETCH</text>
</svg>
