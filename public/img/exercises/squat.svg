<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
  <style>
    .f1{animation:sh1 4s linear infinite}
    .f2{animation:sh2 4s linear infinite}
    .f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>

  <rect width="200" height="230" fill="#111827" rx="12"/>
  <!-- Suelo (siempre visible) -->
  <line x1="30" y1="210" x2="170" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="100" y="226" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" font-weight="700" fill="#475569" letter-spacing="2">SQUAT</text>

  <!-- ── FRAME 1: De pie ──────────────────────────────────────────────────── -->
  <g class="f1">
    <circle cx="100" cy="26" r="14" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Columna -->
      <line x1="100" y1="40" x2="100" y2="108"/>
      <!-- Hombros -->
      <line x1="78" y1="52" x2="122" y2="52"/>
      <!-- Brazos a los lados -->
      <line x1="78"  y1="52"  x2="74"  y2="100"/>
      <line x1="122" y1="52"  x2="126" y2="100"/>
      <!-- Piernas rectas -->
      <line x1="95"  y1="108" x2="93"  y2="162"/>
      <line x1="93"  y1="162" x2="93"  y2="202"/>
      <line x1="105" y1="108" x2="107" y2="162"/>
      <line x1="107" y1="162" x2="107" y2="202"/>
      <!-- Pies -->
      <line x1="78"  y1="202" x2="107" y2="202"/>
      <line x1="93"  y1="202" x2="122" y2="202"/>
    </g>
  </g>

  <!-- ── FRAME 2: Squat paralelo ─────────────────────────────────────────── -->
  <g class="f2">
    <circle cx="100" cy="60" r="14" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Columna (leve inclinación) -->
      <line x1="100" y1="74"  x2="97"  y2="132"/>
      <!-- Hombros -->
      <line x1="78"  y1="86"  x2="122" y2="86"/>
      <!-- Brazos extendidos al frente -->
      <line x1="78"  y1="86"  x2="48"  y2="108"/>
      <line x1="122" y1="86"  x2="152" y2="106"/>
      <!-- Piernas: muslo → rodilla → tobillo -->
      <line x1="93"  y1="132" x2="68"  y2="164"/>
      <line x1="68"  y1="164" x2="72"  y2="202"/>
      <line x1="101" y1="132" x2="132" y2="164"/>
      <line x1="132" y1="164" x2="128" y2="202"/>
      <!-- Pies (más abiertos) -->
      <line x1="56"  y1="202" x2="84"  y2="202"/>
      <line x1="116" y1="202" x2="142" y2="202"/>
    </g>
    <circle cx="68"  cy="164" r="5.5" fill="#64748b"/>
    <circle cx="132" cy="164" r="5.5" fill="#64748b"/>
  </g>

  <!-- ── FRAME 3: Squat profundo ─────────────────────────────────────────── -->
  <g class="f3">
    <circle cx="100" cy="88" r="14" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Columna (más inclinada) -->
      <line x1="100" y1="102" x2="97"  y2="152"/>
      <!-- Hombros -->
      <line x1="78"  y1="114" x2="122" y2="114"/>
      <!-- Brazos extendidos -->
      <line x1="78"  y1="114" x2="46"  y2="136"/>
      <line x1="122" y1="114" x2="154" y2="134"/>
      <!-- Piernas: muslo casi horizontal → rodilla → tobillo -->
      <line x1="93"  y1="152" x2="66"  y2="170"/>
      <line x1="66"  y1="170" x2="70"  y2="202"/>
      <line x1="101" y1="152" x2="134" y2="170"/>
      <line x1="134" y1="170" x2="130" y2="202"/>
      <!-- Pies -->
      <line x1="54"  y1="202" x2="82"  y2="202"/>
      <line x1="118" y1="202" x2="144" y2="202"/>
    </g>
    <circle cx="66"  cy="170" r="5.5" fill="#64748b"/>
    <circle cx="134" cy="170" r="5.5" fill="#64748b"/>
  </g>
</svg>
