<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
  <rect width="200" height="230" fill="#111827" rx="12"/>
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>

  <!-- Frame 1: De pie en pike, rueda cerca de los pies -->
  <g class="f1" stroke="#94a3b8" stroke-width="3.5" stroke-linecap="round" fill="none">
    <circle cx="80" cy="30" r="13" fill="#94a3b8" stroke="none"/>
    <!-- Torso inclinado hacia adelante (pike) -->
    <line x1="80" y1="43" x2="92" y2="95"/>
    <!-- Brazos extendidos hacia la rueda en el suelo -->
    <line x1="88" y1="62" x2="118" y2="195"/>
    <!-- Cadera -->
    <line x1="92" y1="95" x2="100" y2="120"/>
    <!-- Piernas rectas hacia abajo -->
    <line x1="100" y1="120" x2="102" y2="165"/>
    <line x1="102" y1="165" x2="100" y2="205"/>
    <!-- Rodilla -->
    <circle cx="102" cy="165" r="4.5" fill="#64748b" stroke="none"/>
    <!-- Pie -->
    <line x1="88" y1="205" x2="112" y2="205"/>
    <!-- Rueda ab wheel en el suelo -->
    <circle cx="124" cy="200" r="10" stroke="#64748b" stroke-width="2.5"/>
    <line x1="116" y1="192" x2="132" y2="208" stroke="#64748b" stroke-width="2"/>
  </g>

  <!-- Frame 2: Rod rollout a medio camino, cuerpo ~45° -->
  <g class="f2" stroke="#94a3b8" stroke-width="3.5" stroke-linecap="round" fill="none">
    <circle cx="100" cy="72" r="13" fill="#94a3b8" stroke="none"/>
    <!-- Torso extendiéndose -->
    <line x1="100" y1="85" x2="88" y2="140"/>
    <!-- Brazos extendidos hacia adelante -->
    <line x1="96" y1="100" x2="148" y2="165"/>
    <!-- Cadera -->
    <line x1="88" y1="140" x2="78" y2="162"/>
    <!-- Piernas extendiéndose -->
    <line x1="78" y1="162" x2="72" y2="185"/>
    <line x1="72" y1="185" x2="68" y2="205"/>
    <!-- Rodilla -->
    <circle cx="72" cy="185" r="4.5" fill="#64748b" stroke="none"/>
    <!-- Pie -->
    <line x1="56" y1="205" x2="80" y2="205"/>
    <!-- Rueda ab wheel -->
    <circle cx="156" cy="172" r="10" stroke="#64748b" stroke-width="2.5"/>
    <line x1="148" y1="164" x2="164" y2="180" stroke="#64748b" stroke-width="2"/>
  </g>

  <!-- Frame 3: Totalmente extendido, cuerpo horizontal hollow -->
  <g class="f3" stroke="#94a3b8" stroke-width="3.5" stroke-linecap="round" fill="none">
    <circle cx="130" cy="115" r="13" fill="#94a3b8" stroke="none"/>
    <!-- Torso casi horizontal -->
    <line x1="130" y1="128" x2="88" y2="155"/>
    <!-- Brazos completamente extendidos -->
    <line x1="124" y1="138" x2="170" y2="168"/>
    <!-- Cadera -->
    <line x1="88" y1="155" x2="72" y2="172"/>
    <!-- Piernas extendidas -->
    <line x1="72" y1="172" x2="58" y2="190"/>
    <line x1="58" y1="190" x2="52" y2="205"/>
    <!-- Rodilla -->
    <circle cx="58" cy="190" r="4.5" fill="#64748b" stroke="none"/>
    <!-- Pie -->
    <line x1="40" y1="205" x2="64" y2="205"/>
    <!-- Rueda ab wheel -->
    <circle cx="178" cy="175" r="10" stroke="#64748b" stroke-width="2.5"/>
    <line x1="170" y1="167" x2="186" y2="183" stroke="#64748b" stroke-width="2"/>
  </g>

  <line x1="30" y1="210" x2="170" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="100" y="225" font-family="sans-serif" font-size="9" fill="#475569" text-anchor="middle" letter-spacing="0.5">AB WHEEL ST ROLLOUT</text>
</svg>
