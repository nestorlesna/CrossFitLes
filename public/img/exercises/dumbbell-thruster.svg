<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 230">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="220" height="230" fill="#111827" rx="12"/>
  <line x1="20" y1="210" x2="200" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="110" y="225" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="9" font-weight="700" fill="#475569" letter-spacing="2">DUMBBELL THRUSTER</text>
  <!-- Frame 1: Deep squat, DBs at shoulders -->
  <g class="f1">
    <circle cx="110" cy="110" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="110" y1="122" x2="110" y2="160"/>
      <line x1="88" y1="130" x2="132" y2="130"/>
      <line x1="88" y1="130" x2="76" y2="114"/>
      <line x1="132" y1="130" x2="144" y2="114"/>
      <line x1="104" y1="160" x2="74" y2="188"/><line x1="74" y1="188" x2="62" y2="210"/>
      <line x1="116" y1="160" x2="146" y2="188"/><line x1="146" y1="188" x2="158" y2="210"/>
    </g>
    <circle cx="74" cy="188" r="5" fill="#64748b"/>
    <circle cx="146" cy="188" r="5" fill="#64748b"/>
    <rect x="62" y="110" width="18" height="8" rx="2" fill="#475569"/>
    <rect x="140" y="110" width="18" height="8" rx="2" fill="#475569"/>
  </g>
  <!-- Frame 2: Rising, DBs being pushed up -->
  <g class="f2">
    <circle cx="110" cy="72" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="110" y1="84" x2="110" y2="138"/>
      <line x1="88" y1="96" x2="132" y2="96"/>
      <line x1="88" y1="96" x2="72" y2="76"/>
      <line x1="132" y1="96" x2="148" y2="76"/>
      <line x1="104" y1="138" x2="96" y2="176"/><line x1="96" y1="176" x2="88" y2="210"/>
      <line x1="116" y1="138" x2="124" y2="176"/><line x1="124" y1="176" x2="132" y2="210"/>
    </g>
    <circle cx="96" cy="176" r="5" fill="#64748b"/>
    <rect x="58" y="72" width="18" height="8" rx="2" fill="#475569"/>
    <rect x="144" y="72" width="18" height="8" rx="2" fill="#475569"/>
  </g>
  <!-- Frame 3: Standing, DBs overhead -->
  <g class="f3">
    <circle cx="110" cy="46" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="110" y1="58" x2="110" y2="116"/>
      <line x1="88" y1="70" x2="132" y2="70"/>
      <line x1="88" y1="70" x2="70" y2="38"/>
      <line x1="132" y1="70" x2="150" y2="38"/>
      <line x1="104" y1="116" x2="100" y2="162"/><line x1="100" y1="162" x2="96" y2="210"/>
      <line x1="116" y1="116" x2="120" y2="162"/><line x1="120" y1="162" x2="124" y2="210"/>
    </g>
    <circle cx="100" cy="162" r="5" fill="#64748b"/>
    <circle cx="120" cy="162" r="5" fill="#64748b"/>
    <rect x="58" y="34" width="18" height="8" rx="2" fill="#475569"/>
    <rect x="144" y="34" width="18" height="8" rx="2" fill="#475569"/>
  </g>
</svg>
