<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 230">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="220" height="230" fill="#111827" rx="12"/>
  <!-- Box -->
  <rect x="80" y="158" width="100" height="52" rx="4" fill="#374151"/>
  <line x1="20" y1="210" x2="220" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="110" y="225" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="9" font-weight="700" fill="#475569" letter-spacing="2">WEIGHTED BOX STEP UP</text>
  <!-- Frame 1: Standing beside box with DB, foot on box -->
  <g class="f1">
    <circle cx="80" cy="48" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="80" y1="60" x2="80" y2="118"/>
      <line x1="60" y1="72" x2="100" y2="72"/>
      <line x1="60" y1="72" x2="48" y2="110"/>
      <line x1="100" y1="72" x2="114" y2="108"/>
      <!-- Foot on box, other on ground -->
      <line x1="74" y1="118" x2="68" y2="162"/><line x1="68" y1="162" x2="56" y2="210"/>
      <!-- Foot on box -->
      <line x1="86" y1="118" x2="100" y2="152"/><line x1="100" y1="152" x2="108" y2="158"/>
    </g>
    <circle cx="68" cy="162" r="5" fill="#64748b"/>
    <!-- DB in hand -->
    <rect x="36" y="106" width="18" height="8" rx="2" fill="#475569"/>
  </g>
  <!-- Frame 2: Stepping up, one leg on box driving up -->
  <g class="f2">
    <circle cx="112" cy="68" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="112" y1="80" x2="112" y2="134"/>
      <line x1="92" y1="92" x2="132" y2="92"/>
      <line x1="92" y1="92" x2="78" y2="128"/>
      <line x1="132" y1="92" x2="144" y2="126"/>
      <!-- Driving leg on box -->
      <line x1="106" y1="134" x2="108" y2="172"/><line x1="108" y1="172" x2="110" y2="210"/>
      <!-- Trail leg coming up -->
      <line x1="118" y1="134" x2="130" y2="162"/>
    </g>
    <circle cx="108" cy="172" r="5" fill="#64748b"/>
    <rect x="66" y="124" width="18" height="8" rx="2" fill="#475569"/>
  </g>
  <!-- Frame 3: Standing on top of box -->
  <g class="f3">
    <circle cx="130" cy="82" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="130" y1="94" x2="130" y2="148"/>
      <line x1="110" y1="106" x2="150" y2="106"/>
      <line x1="110" y1="106" x2="96" y2="140"/>
      <line x1="150" y1="106" x2="160" y2="138"/>
      <!-- Both legs standing on box -->
      <line x1="124" y1="148" x2="120" y2="175"/><line x1="120" y1="175" x2="114" y2="210"/>
      <line x1="136" y1="148" x2="140" y2="175"/><line x1="140" y1="175" x2="146" y2="210"/>
    </g>
    <circle cx="120" cy="175" r="5" fill="#64748b"/>
    <circle cx="140" cy="175" r="5" fill="#64748b"/>
    <rect x="84" y="136" width="18" height="8" rx="2" fill="#475569"/>
  </g>
</svg>
