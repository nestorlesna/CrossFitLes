<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
  <rect width="200" height="230" fill="#111827" rx="12"/>
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>

  <!-- F1: cuadrupedia neutral (manos y rodillas en suelo) -->
  <g class="f1" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" fill="none">
    <circle cx="150" cy="80" r="13" fill="#94a3b8" stroke="none"/>
    <!-- espalda horizontal -->
    <line x1="137" y1="94" x2="68" y2="94"/>
    <!-- brazos (manos en suelo) -->
    <line x1="137" y1="94" x2="122" y2="130"/>
    <line x1="122" y1="130" x2="118" y2="160"/>
    <line x1="137" y1="94" x2="148" y2="130"/>
    <line x1="148" y1="130" x2="152" y2="160"/>
    <!-- piernas (rodillas en suelo) -->
    <line x1="68" y1="94" x2="55" y2="130"/>
    <line x1="55" y1="130" x2="50" y2="160"/>
    <line x1="68" y1="94" x2="80" y2="130"/>
    <line x1="80" y1="130" x2="85" y2="160"/>
    <circle cx="118" cy="162" r="4" fill="#64748b" stroke="none"/>
    <circle cx="152" cy="162" r="4" fill="#64748b" stroke="none"/>
    <circle cx="50" cy="162" r="4" fill="#64748b" stroke="none"/>
    <circle cx="85" cy="162" r="4" fill="#64748b" stroke="none"/>
  </g>

  <!-- F2: brazo derecho extendido con peso, pierna izq extendida atrás -->
  <g class="f2" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" fill="none">
    <circle cx="150" cy="80" r="13" fill="#94a3b8" stroke="none"/>
    <line x1="137" y1="94" x2="68" y2="94"/>
    <!-- brazo extendido hacia adelante con mancuerna -->
    <line x1="137" y1="94" x2="170" y2="76"/>
    <rect x="172" y="70" width="16" height="10" rx="3" fill="#64748b" stroke="none"/>
    <!-- otro brazo en suelo -->
    <line x1="137" y1="94" x2="148" y2="130"/>
    <line x1="148" y1="130" x2="152" y2="160"/>
    <circle cx="152" cy="162" r="4" fill="#64748b" stroke="none"/>
    <!-- pierna extendida hacia atrás -->
    <line x1="68" y1="94" x2="35" y2="76"/>
    <!-- otra pierna en suelo -->
    <line x1="68" y1="94" x2="80" y2="130"/>
    <line x1="80" y1="130" x2="85" y2="160"/>
    <circle cx="85" cy="162" r="4" fill="#64748b" stroke="none"/>
  </g>

  <!-- F3: brazo izq extendido con peso, pierna der extendida atrás -->
  <g class="f3" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" fill="none">
    <circle cx="150" cy="80" r="13" fill="#94a3b8" stroke="none"/>
    <line x1="137" y1="94" x2="68" y2="94"/>
    <!-- brazo en suelo -->
    <line x1="137" y1="94" x2="122" y2="130"/>
    <line x1="122" y1="130" x2="118" y2="160"/>
    <circle cx="118" cy="162" r="4" fill="#64748b" stroke="none"/>
    <!-- otro brazo extendido con peso -->
    <line x1="137" y1="94" x2="170" y2="76"/>
    <rect x="172" y="70" width="16" height="10" rx="3" fill="#64748b" stroke="none"/>
    <!-- pierna en suelo -->
    <line x1="68" y1="94" x2="55" y2="130"/>
    <line x1="55" y1="130" x2="50" y2="160"/>
    <circle cx="50" cy="162" r="4" fill="#64748b" stroke="none"/>
    <!-- otra pierna extendida -->
    <line x1="68" y1="94" x2="35" y2="76"/>
  </g>

  <line x1="30" y1="210" x2="170" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="100" y="225" text-anchor="middle" font-family="monospace" font-size="10" fill="#475569">WEIGHTED BIRD DOG</text>
</svg>
