<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
  <rect width="200" height="230" fill="#111827" rx="12"/>
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>

  <!-- F1: hollow hold, peso en mano derecha (extendida arriba-izq) -->
  <g class="f1" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" fill="none">
    <circle cx="32" cy="118" r="12" fill="#94a3b8" stroke="none"/>
    <!-- cuerpo curvo (hollow) -->
    <path d="M44,114 Q90,106 135,112" stroke="#94a3b8" stroke-width="3" fill="none"/>
    <!-- brazos hacia arriba -->
    <line x1="52" y1="112" x2="38" y2="70"/>
    <line x1="52" y1="112" x2="56" y2="68"/>
    <!-- peso en mano derecha (arriba) -->
    <rect x="30" y="60" width="16" height="9" rx="3" fill="#64748b" stroke="none"/>
    <!-- piernas elevadas -->
    <line x1="135" y1="112" x2="162" y2="94"/>
    <line x1="162" y1="94" x2="188" y2="82"/>
    <!-- pies -->
    <line x1="183" y1="80" x2="188" y2="86"/>
  </g>

  <!-- F2: pasando el peso entre manos (brazo derecho baja, izq sube) -->
  <g class="f2" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" fill="none">
    <circle cx="32" cy="118" r="12" fill="#94a3b8" stroke="none"/>
    <path d="M44,114 Q90,106 135,112" stroke="#94a3b8" stroke-width="3" fill="none"/>
    <!-- brazos abiertos (uno baja, otro sube) -->
    <line x1="52" y1="112" x2="30" y2="78"/>
    <line x1="52" y1="112" x2="70" y2="75"/>
    <!-- peso en el centro (pasándose) -->
    <rect x="46" y="66" width="16" height="9" rx="3" fill="#64748b" stroke="none"/>
    <line x1="135" y1="112" x2="162" y2="94"/>
    <line x1="162" y1="94" x2="188" y2="82"/>
    <line x1="183" y1="80" x2="188" y2="86"/>
  </g>

  <!-- F3: hollow hold, peso en mano izquierda (extendida arriba-der) -->
  <g class="f3" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" fill="none">
    <circle cx="32" cy="118" r="12" fill="#94a3b8" stroke="none"/>
    <path d="M44,114 Q90,106 135,112" stroke="#94a3b8" stroke-width="3" fill="none"/>
    <!-- brazos hacia arriba -->
    <line x1="52" y1="112" x2="38" y2="70"/>
    <line x1="52" y1="112" x2="56" y2="68"/>
    <!-- peso en mano izquierda (otro lado) -->
    <rect x="50" y="60" width="16" height="9" rx="3" fill="#64748b" stroke="none"/>
    <line x1="135" y1="112" x2="162" y2="94"/>
    <line x1="162" y1="94" x2="188" y2="82"/>
    <line x1="183" y1="80" x2="188" y2="86"/>
  </g>

  <line x1="30" y1="210" x2="170" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="100" y="225" text-anchor="middle" font-family="monospace" font-size="10" fill="#475569">HOLLOW HOLD PASS</text>
</svg>
