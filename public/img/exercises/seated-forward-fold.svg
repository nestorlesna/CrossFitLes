<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
<rect width="200" height="230" fill="#111827" rx="12"/>
<style>
.f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
@keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
@keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
@keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
</style>
<!-- F1: Sitting upright, legs extended -->
<g class="f1">
  <circle cx="65" cy="90" r="13" fill="#94a3b8"/>
  <line x1="65" y1="103" x2="65" y2="155" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="65" y1="115" x2="45" y2="125" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="65" y1="115" x2="85" y2="125" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="65" y1="155" x2="150" y2="158" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="65" y1="155" x2="148" y2="165" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
</g>
<!-- F2: Leaning forward halfway -->
<g class="f2">
  <circle cx="80" cy="100" r="13" fill="#94a3b8"/>
  <line x1="72" y1="111" x2="60" y2="155" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="70" y1="128" x2="95" y2="125" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="95" y1="125" x2="128" y2="140" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="70" y1="128" x2="45" y2="130" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="60" y1="155" x2="148" y2="158" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="60" y1="155" x2="148" y2="165" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
</g>
<!-- F3: Full forward fold, hands reaching toward feet -->
<g class="f3">
  <circle cx="110" cy="120" r="13" fill="#94a3b8"/>
  <line x1="99" y1="128" x2="58" y2="155" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="80" y1="143" x2="112" y2="148" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="112" y1="148" x2="148" y2="158" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="80" y1="143" x2="52" y2="148" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="52" y1="148" x2="38" y2="158" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="58" y1="155" x2="148" y2="158" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="58" y1="155" x2="148" y2="165" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
</g>
<line x1="30" y1="210" x2="170" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
<text x="100" y="225" text-anchor="middle" font-family="monospace" font-size="9" fill="#475569">SEATED FORWARD FOLD</text>
</svg>
