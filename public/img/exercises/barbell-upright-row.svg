<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="200" height="230" fill="#111827" rx="12"/>
  <line x1="20" y1="210" x2="180" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="100" y="225" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="9" font-weight="700" fill="#475569" letter-spacing="2">UPRIGHT ROW</text>
  <!-- Frame 1: Standing, bar at hips -->
  <g class="f1">
    <line x1="32" y1="120" x2="168" y2="120" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <rect x="26" y="112" width="8" height="16" rx="2" fill="#475569"/>
    <rect x="166" y="112" width="8" height="16" rx="2" fill="#475569"/>
    <circle cx="100" cy="46" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="100" y1="58" x2="100" y2="116"/>
      <line x1="80" y1="70" x2="120" y2="70"/>
      <!-- Arms hanging straight -->
      <line x1="80" y1="70" x2="66" y2="120"/>
      <line x1="120" y1="70" x2="134" y2="120"/>
      <line x1="94" y1="116" x2="90" y2="164"/><line x1="90" y1="164" x2="86" y2="210"/>
      <line x1="106" y1="116" x2="110" y2="164"/><line x1="110" y1="164" x2="114" y2="210"/>
    </g>
    <circle cx="90" cy="164" r="5" fill="#64748b"/>
    <circle cx="110" cy="164" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 2: Bar at waist, elbows beginning to rise -->
  <g class="f2">
    <line x1="32" y1="96" x2="168" y2="96" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <rect x="26" y="88" width="8" height="16" rx="2" fill="#475569"/>
    <rect x="166" y="88" width="8" height="16" rx="2" fill="#475569"/>
    <circle cx="100" cy="44" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="100" y1="56" x2="100" y2="114"/>
      <line x1="80" y1="68" x2="120" y2="68"/>
      <!-- Elbows rising -->
      <line x1="80" y1="68" x2="60" y2="58"/><line x1="60" y1="58" x2="62" y2="96"/>
      <line x1="120" y1="68" x2="140" y2="58"/><line x1="140" y1="58" x2="138" y2="96"/>
      <line x1="94" y1="114" x2="90" y2="162"/><line x1="90" y1="162" x2="86" y2="210"/>
      <line x1="106" y1="114" x2="110" y2="162"/><line x1="110" y1="162" x2="114" y2="210"/>
    </g>
    <circle cx="60" cy="58" r="5" fill="#64748b"/>
    <circle cx="140" cy="58" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 3: Bar at chin, elbows high and wide -->
  <g class="f3">
    <line x1="32" y1="68" x2="168" y2="68" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <rect x="26" y="60" width="8" height="16" rx="2" fill="#475569"/>
    <rect x="166" y="60" width="8" height="16" rx="2" fill="#475569"/>
    <circle cx="100" cy="40" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="100" y1="52" x2="100" y2="112"/>
      <line x1="80" y1="64" x2="120" y2="64"/>
      <!-- Elbows flared high -->
      <line x1="80" y1="64" x2="52" y2="46"/><line x1="52" y1="46" x2="56" y2="68"/>
      <line x1="120" y1="64" x2="148" y2="46"/><line x1="148" y1="46" x2="144" y2="68"/>
      <line x1="94" y1="112" x2="90" y2="162"/><line x1="90" y1="162" x2="86" y2="210"/>
      <line x1="106" y1="112" x2="110" y2="162"/><line x1="110" y1="162" x2="114" y2="210"/>
    </g>
    <circle cx="52" cy="46" r="5" fill="#64748b"/>
    <circle cx="148" cy="46" r="5" fill="#64748b"/>
  </g>
</svg>
