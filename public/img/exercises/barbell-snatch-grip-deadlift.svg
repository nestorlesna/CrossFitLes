<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 230">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="220" height="230" fill="#111827" rx="12"/>
  <line x1="20" y1="210" x2="200" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="110" y="225" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="8" font-weight="700" fill="#475569" letter-spacing="1">SNATCH GRIP DEADLIFT</text>
  <!-- Frame 1: Setup - wide grip, bar on floor, hinged -->
  <g class="f1">
    <line x1="16" y1="185" x2="204" y2="185" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <rect x="10" y="177" width="8" height="16" rx="2" fill="#475569"/>
    <rect x="202" y="177" width="8" height="16" rx="2" fill="#475569"/>
    <circle cx="110" cy="68" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="110" y1="80" x2="110" y2="128"/>
      <line x1="86" y1="90" x2="134" y2="90"/>
      <!-- Wide grip arms reaching far to bar -->
      <line x1="86" y1="90" x2="46" y2="185"/>
      <line x1="134" y1="90" x2="174" y2="185"/>
      <!-- Legs bent, setup position -->
      <line x1="104" y1="128" x2="96" y2="172"/><line x1="96" y1="172" x2="88" y2="210"/>
      <line x1="116" y1="128" x2="124" y2="172"/><line x1="124" y1="172" x2="132" y2="210"/>
    </g>
    <circle cx="96" cy="172" r="5" fill="#64748b"/>
    <circle cx="124" cy="172" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 2: Mid pull - bar at knees, torso more upright -->
  <g class="f2">
    <line x1="16" y1="152" x2="204" y2="152" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <rect x="10" y="144" width="8" height="16" rx="2" fill="#475569"/>
    <rect x="202" y="144" width="8" height="16" rx="2" fill="#475569"/>
    <circle cx="110" cy="50" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="110" y1="62" x2="110" y2="118"/>
      <line x1="86" y1="74" x2="134" y2="74"/>
      <line x1="86" y1="74" x2="50" y2="152"/>
      <line x1="134" y1="74" x2="170" y2="152"/>
      <line x1="104" y1="118" x2="98" y2="162"/><line x1="98" y1="162" x2="90" y2="210"/>
      <line x1="116" y1="118" x2="122" y2="162"/><line x1="122" y1="162" x2="130" y2="210"/>
    </g>
    <circle cx="98" cy="162" r="5" fill="#64748b"/>
    <circle cx="122" cy="162" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 3: Lockout - standing, bar at hips with wide grip -->
  <g class="f3">
    <line x1="16" y1="118" x2="204" y2="118" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <rect x="10" y="110" width="8" height="16" rx="2" fill="#475569"/>
    <rect x="202" y="110" width="8" height="16" rx="2" fill="#475569"/>
    <circle cx="110" cy="36" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="110" y1="48" x2="110" y2="112"/>
      <line x1="86" y1="62" x2="134" y2="62"/>
      <!-- Wide grip arms to bar at hips -->
      <line x1="86" y1="62" x2="44" y2="118"/>
      <line x1="134" y1="62" x2="176" y2="118"/>
      <!-- Straight legs -->
      <line x1="104" y1="112" x2="100" y2="162"/><line x1="100" y1="162" x2="96" y2="210"/>
      <line x1="116" y1="112" x2="120" y2="162"/><line x1="120" y1="162" x2="124" y2="210"/>
    </g>
    <circle cx="100" cy="162" r="5" fill="#64748b"/>
    <circle cx="120" cy="162" r="5" fill="#64748b"/>
  </g>
</svg>
