<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 200">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="260" height="200" fill="#111827" rx="12"/>
  <!-- Bike frame (always visible) -->
  <circle cx="80" cy="158" r="28" fill="none" stroke="#374151" stroke-width="5"/>
  <circle cx="200" cy="158" r="28" fill="none" stroke="#374151" stroke-width="5"/>
  <!-- Bike body -->
  <line x1="80" y1="158" x2="140" y2="110" stroke="#374151" stroke-width="4" stroke-linecap="round"/>
  <line x1="140" y1="110" x2="200" y2="158" stroke="#374151" stroke-width="4" stroke-linecap="round"/>
  <line x1="140" y1="110" x2="130" y2="80" stroke="#374151" stroke-width="4" stroke-linecap="round"/>
  <!-- Seat post -->
  <line x1="140" y1="110" x2="152" y2="82" stroke="#374151" stroke-width="4" stroke-linecap="round"/>
  <line x1="146" y1="82" x2="158" y2="82" stroke="#374151" stroke-width="5" stroke-linecap="round"/>
  <!-- Handlebar fan -->
  <rect x="110" y="66" width="40" height="18" rx="4" fill="#374151"/>
  <line x1="120" y1="75" x2="120" y2="56" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <line x1="140" y1="75" x2="140" y2="56" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <!-- Crank center -->
  <circle cx="140" cy="140" r="8" fill="#374151"/>
  <text x="130" y="192" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" font-weight="700" fill="#475569" letter-spacing="2">ASSAULT BIKE</text>
  <!-- Frame 1: Pedal forward, arm push -->
  <g class="f1">
    <!-- Crank arm position 1 -->
    <line x1="140" y1="140" x2="158" y2="152" stroke="#475569" stroke-width="4" stroke-linecap="round"/>
    <circle cx="152" cy="80" r="11" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="152" y1="91" x2="154" y2="118"/>
      <line x1="138" y1="100" x2="166" y2="100"/>
      <!-- Right arm pushing forward -->
      <line x1="138" y1="100" x2="122" y2="80"/>
      <!-- Left arm pulling back -->
      <line x1="166" y1="100" x2="150" y2="72"/>
      <!-- Legs pedaling: right forward -->
      <line x1="150" y1="118" x2="160" y2="148"/><line x1="160" y1="148" x2="158" y2="152"/>
      <!-- Left leg back -->
      <line x1="158" y1="118" x2="150" y2="140"/><line x1="150" y1="140" x2="138" y2="150"/>
    </g>
  </g>
  <!-- Frame 2: Mid stroke -->
  <g class="f2">
    <line x1="140" y1="140" x2="140" y2="158" stroke="#475569" stroke-width="4" stroke-linecap="round"/>
    <circle cx="152" cy="80" r="11" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="152" y1="91" x2="154" y2="118"/>
      <line x1="136" y1="100" x2="168" y2="100"/>
      <!-- Arms neutral -->
      <line x1="136" y1="100" x2="128" y2="76"/>
      <line x1="168" y1="100" x2="144" y2="68"/>
      <line x1="150" y1="118" x2="148" y2="152"/>
      <line x1="158" y1="118" x2="156" y2="134"/><line x1="156" y1="134" x2="148" y2="148"/>
    </g>
  </g>
  <!-- Frame 3: Pedal back, arm pull -->
  <g class="f3">
    <line x1="140" y1="140" x2="122" y2="152" stroke="#475569" stroke-width="4" stroke-linecap="round"/>
    <circle cx="152" cy="80" r="11" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="152" y1="91" x2="154" y2="118"/>
      <line x1="136" y1="100" x2="168" y2="100"/>
      <!-- Arms switch -->
      <line x1="136" y1="100" x2="124" y2="76"/>
      <line x1="168" y1="100" x2="148" y2="66"/>
      <line x1="150" y1="118" x2="138" y2="148"/><line x1="138" y1="148" x2="122" y2="152"/>
      <line x1="158" y1="118" x2="162" y2="146"/>
    </g>
  </g>
</svg>
