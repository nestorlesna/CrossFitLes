<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
  <rect width="200" height="230" fill="#111827" rx="12"/>
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>

  <!-- F1: de pie, torso inclinado hacia adelante, manos tocando el suelo -->
  <g class="f1" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" fill="none">
    <circle cx="100" cy="30" r="14" fill="#94a3b8" stroke="none"/>
    <!-- torso inclinado: cabeza abajo hacia las piernas -->
    <line x1="100" y1="44" x2="100" y2="118"/>
    <!-- brazos colgando hacia suelo -->
    <line x1="100" y1="70" x2="80" y2="145"/>
    <line x1="100" y1="70" x2="118" y2="148"/>
    <!-- manos tocando el suelo -->
    <circle cx="80" cy="147" r="4" fill="#64748b" stroke="none"/>
    <circle cx="118" cy="150" r="4" fill="#64748b" stroke="none"/>
    <!-- piernas rectas -->
    <line x1="100" y1="118" x2="90" y2="165"/>
    <line x1="90" y1="165" x2="88" y2="205"/>
    <line x1="100" y1="118" x2="110" y2="165"/>
    <line x1="110" y1="165" x2="112" y2="205"/>
    <line x1="78" y1="205" x2="98" y2="205"/>
    <line x1="102" y1="205" x2="122" y2="205"/>
  </g>

  <!-- F2: manos caminando hacia adelante, cuerpo en forma de V invertida -->
  <g class="f2" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" fill="none">
    <circle cx="130" cy="68" r="13" fill="#94a3b8" stroke="none"/>
    <!-- caderas arriba (pico de la V) -->
    <line x1="130" y1="82" x2="100" y2="118"/>
    <!-- brazos extendidos hacia manos en suelo -->
    <line x1="100" y1="118" x2="65" y2="148"/>
    <circle cx="65" cy="150" r="4" fill="#64748b" stroke="none"/>
    <line x1="100" y1="118" x2="78" y2="152"/>
    <circle cx="78" cy="154" r="4" fill="#64748b" stroke="none"/>
    <!-- piernas rectas desde caderas -->
    <line x1="130" y1="82" x2="140" y2="130"/>
    <line x1="140" y1="130" x2="142" y2="175"/>
    <line x1="130" y1="82" x2="155" y2="125"/>
    <line x1="155" y1="125" x2="158" y2="175"/>
    <line x1="132" y1="175" x2="152" y2="175"/>
    <line x1="148" y1="175" x2="168" y2="175"/>
  </g>

  <!-- F3: plancha completa (push-up position) -->
  <g class="f3" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" fill="none">
    <circle cx="155" cy="78" r="13" fill="#94a3b8" stroke="none"/>
    <!-- cuerpo horizontal en plancha -->
    <line x1="142" y1="90" x2="62" y2="100"/>
    <!-- brazos extendidos hacia suelo -->
    <line x1="142" y1="90" x2="136" y2="120"/>
    <line x1="142" y1="90" x2="148" y2="120"/>
    <circle cx="136" cy="122" r="4" fill="#64748b" stroke="none"/>
    <circle cx="148" cy="122" r="4" fill="#64748b" stroke="none"/>
    <!-- piernas rectas hasta los pies -->
    <line x1="62" y1="100" x2="50" y2="135"/>
    <line x1="50" y1="135" x2="45" y2="165"/>
    <line x1="62" y1="100" x2="70" y2="135"/>
    <line x1="70" y1="135" x2="68" y2="165"/>
    <line x1="35" y1="165" x2="55" y2="165"/>
    <line x1="58" y1="165" x2="78" y2="165"/>
  </g>

  <line x1="30" y1="210" x2="170" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="100" y="225" text-anchor="middle" font-family="monospace" font-size="10" fill="#475569">INCHWORM</text>
</svg>
