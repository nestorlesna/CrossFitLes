<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
<rect width="200" height="230" fill="#111827" rx="12"/>
<style>
  .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
  @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
  @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
  @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
</style>
<line x1="30" y1="210" x2="170" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
<text x="100" y="225" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#475569">DUMBBELL WALL SIT</text>

<!-- Wall indicator -->
<line x1="145" y1="15" x2="145" y2="210" stroke="#374151" stroke-width="3" stroke-dasharray="6,4"/>

<!-- F1: Standing with dumbbells -->
<g class="f1" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" fill="none">
  <circle cx="95" cy="26" r="12" fill="#94a3b8" stroke="none"/>
  <line x1="95" y1="38" x2="95" y2="108"/>
  <!-- Arms down with dumbbells -->
  <line x1="95" y1="55" x2="72" y2="70"/>
  <line x1="72" y1="70" x2="70" y2="115"/>
  <line x1="95" y1="55" x2="118" y2="70"/>
  <line x1="118" y1="70" x2="120" y2="115"/>
  <!-- Dumbbell symbols -->
  <rect x="62" y="112" width="16" height="7" rx="2" fill="#64748b" stroke="none"/>
  <rect x="112" y="112" width="16" height="7" rx="2" fill="#64748b" stroke="none"/>
  <line x1="95" y1="108" x2="83" y2="158"/>
  <line x1="83" y1="158" x2="80" y2="200"/>
  <line x1="95" y1="108" x2="107" y2="158"/>
  <line x1="107" y1="158" x2="110" y2="200"/>
  <line x1="74" y1="200" x2="88" y2="200"/>
  <line x1="107" y1="200" x2="120" y2="200"/>
  <circle cx="83" cy="158" r="4" fill="#64748b" stroke="none"/>
  <circle cx="107" cy="158" r="4" fill="#64748b" stroke="none"/>
</g>

<!-- F2: Lowering (partial squat ~45°) -->
<g class="f2" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" fill="none">
  <circle cx="95" cy="38" r="12" fill="#94a3b8" stroke="none"/>
  <line x1="95" y1="50" x2="95" y2="112"/>
  <line x1="95" y1="65" x2="72" y2="80"/>
  <line x1="72" y1="80" x2="70" y2="122"/>
  <line x1="95" y1="65" x2="118" y2="80"/>
  <line x1="118" y1="80" x2="120" y2="122"/>
  <rect x="62" y="120" width="16" height="7" rx="2" fill="#64748b" stroke="none"/>
  <rect x="112" y="120" width="16" height="7" rx="2" fill="#64748b" stroke="none"/>
  <line x1="95" y1="112" x2="78" y2="148"/>
  <line x1="78" y1="148" x2="75" y2="200"/>
  <line x1="95" y1="112" x2="112" y2="148"/>
  <line x1="112" y1="148" x2="115" y2="200"/>
  <line x1="69" y1="200" x2="83" y2="200"/>
  <line x1="111" y1="200" x2="124" y2="200"/>
  <circle cx="78" cy="148" r="4" fill="#64748b" stroke="none"/>
  <circle cx="112" cy="148" r="4" fill="#64748b" stroke="none"/>
</g>

<!-- F3: Full wall sit (90°) with DB on thighs -->
<g class="f3" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" fill="none">
  <circle cx="95" cy="50" r="12" fill="#94a3b8" stroke="none"/>
  <!-- Torso vertical -->
  <line x1="95" y1="62" x2="95" y2="118"/>
  <!-- Arms resting on thighs -->
  <line x1="95" y1="78" x2="72" y2="118"/>
  <line x1="95" y1="78" x2="118" y2="118"/>
  <!-- DB on thighs -->
  <rect x="62" y="115" width="18" height="7" rx="2" fill="#64748b" stroke="none"/>
  <rect x="108" y="115" width="18" height="7" rx="2" fill="#64748b" stroke="none"/>
  <!-- Thighs nearly horizontal -->
  <line x1="95" y1="118" x2="72" y2="125"/>
  <line x1="95" y1="118" x2="118" y2="125"/>
  <!-- Shins vertical (90° wall sit) -->
  <line x1="72" y1="125" x2="68" y2="200"/>
  <line x1="118" y1="125" x2="122" y2="200"/>
  <line x1="62" y1="200" x2="76" y2="200"/>
  <line x1="118" y1="200" x2="132" y2="200"/>
  <circle cx="72" cy="125" r="4" fill="#64748b" stroke="none"/>
  <circle cx="118" cy="125" r="4" fill="#64748b" stroke="none"/>
</g>
</svg>
