<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 230">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="220" height="230" fill="#111827" rx="12"/>
  <line x1="20" y1="210" x2="200" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="110" y="225" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="9" font-weight="700" fill="#475569" letter-spacing="2">PUSH JERK</text>
  <!-- Frame 1: Front rack, standing -->
  <g class="f1">
    <line x1="42" y1="104" x2="178" y2="104" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <rect x="36" y="96" width="8" height="16" rx="2" fill="#475569"/>
    <rect x="176" y="96" width="8" height="16" rx="2" fill="#475569"/>
    <circle cx="110" cy="48" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="110" y1="60" x2="110" y2="116"/>
      <line x1="90" y1="72" x2="130" y2="72"/>
      <line x1="90" y1="72" x2="76" y2="104"/><line x1="130" y1="72" x2="144" y2="104"/>
      <line x1="104" y1="116" x2="100" y2="164"/><line x1="100" y1="164" x2="96" y2="210"/>
      <line x1="116" y1="116" x2="120" y2="164"/><line x1="120" y1="164" x2="124" y2="210"/>
    </g>
    <circle cx="100" cy="164" r="5" fill="#64748b"/>
    <circle cx="120" cy="164" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 2: Dip drive - slight bend, driving bar up -->
  <g class="f2">
    <line x1="42" y1="90" x2="178" y2="90" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <rect x="36" y="82" width="8" height="16" rx="2" fill="#475569"/>
    <rect x="176" y="82" width="8" height="16" rx="2" fill="#475569"/>
    <circle cx="110" cy="52" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="110" y1="64" x2="110" y2="118"/>
      <line x1="90" y1="76" x2="130" y2="76"/>
      <line x1="90" y1="76" x2="76" y2="90"/><line x1="130" y1="76" x2="144" y2="90"/>
      <!-- Dipped knees -->
      <line x1="104" y1="118" x2="98" y2="162"/><line x1="98" y1="162" x2="92" y2="210"/>
      <line x1="116" y1="118" x2="122" y2="162"/><line x1="122" y1="162" x2="128" y2="210"/>
    </g>
    <circle cx="98" cy="162" r="5" fill="#64748b"/>
    <circle cx="122" cy="162" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 3: Catch in quarter squat - bar overhead, slight squat -->
  <g class="f3">
    <line x1="42" y1="38" x2="178" y2="38" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <rect x="36" y="30" width="8" height="16" rx="2" fill="#475569"/>
    <rect x="176" y="30" width="8" height="16" rx="2" fill="#475569"/>
    <circle cx="110" cy="68" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="110" y1="80" x2="110" y2="130"/>
      <!-- Arms locked overhead -->
      <line x1="90" y1="92" x2="130" y2="92"/>
      <line x1="90" y1="92" x2="72" y2="38"/><line x1="130" y1="92" x2="148" y2="38"/>
      <!-- Quarter squat catch -->
      <line x1="104" y1="130" x2="96" y2="168"/><line x1="96" y1="168" x2="88" y2="210"/>
      <line x1="116" y1="130" x2="124" y2="168"/><line x1="124" y1="168" x2="132" y2="210"/>
    </g>
    <circle cx="96" cy="168" r="5" fill="#64748b"/>
    <circle cx="124" cy="168" r="5" fill="#64748b"/>
  </g>
</svg>
