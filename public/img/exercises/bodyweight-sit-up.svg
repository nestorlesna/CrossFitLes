<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="240" height="200" fill="#111827" rx="12"/>
  <line x1="20" y1="162" x2="220" y2="162" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="120" y="180" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" font-weight="700" fill="#475569" letter-spacing="2">SIT-UP</text>
  <!-- Frame 1: Acostado, rodillas dobladas -->
  <g class="f1">
    <circle cx="195" cy="136" r="13" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Torso plano -->
      <line x1="195" y1="149" x2="120" y2="158"/>
      <!-- Brazos cruzados al pecho -->
      <line x1="168" y1="152" x2="158" y2="145"/><line x1="150" y1="154" x2="160" y2="147"/>
      <!-- Piernas dobladas -->
      <line x1="120" y1="158" x2="98" y2="140"/><line x1="98" y1="140" x2="82" y2="162"/>
      <line x1="122" y1="158" x2="100" y2="145"/><line x1="100" y1="145" x2="88" y2="162"/>
    </g>
    <circle cx="98" cy="140" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 2: A mitad (45°) -->
  <g class="f2">
    <circle cx="170" cy="100" r="13" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Torso a 45° -->
      <line x1="170" y1="113" x2="118" y2="152"/>
      <!-- Brazos extendidos al frente -->
      <line x1="152" y1="124" x2="132" y2="108"/>
      <!-- Cadera como pivote -->
      <line x1="118" y1="152" x2="98" y2="138"/><line x1="98" y1="138" x2="84" y2="162"/>
      <line x1="120" y1="153" x2="100" y2="144"/><line x1="100" y1="144" x2="90" y2="162"/>
    </g>
    <circle cx="118" cy="152" r="5" fill="#64748b"/><circle cx="98" cy="138" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 3: Completamente erguido -->
  <g class="f3">
    <circle cx="128" cy="52" r="13" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Torso vertical -->
      <line x1="128" y1="65" x2="122" y2="128"/>
      <line x1="108" y1="78" x2="146" y2="75"/>
      <!-- Brazos relajados -->
      <line x1="108" y1="78" x2="100" y2="118"/><line x1="146" y1="75" x2="152" y2="115"/>
      <!-- Cadera y piernas dobladas -->
      <line x1="122" y1="128" x2="102" y2="140"/><line x1="102" y1="140" x2="88" y2="162"/>
      <line x1="124" y1="128" x2="104" y2="146"/><line x1="104" y1="146" x2="94" y2="162"/>
    </g>
    <circle cx="102" cy="140" r="5" fill="#64748b"/>
  </g>
</svg>
