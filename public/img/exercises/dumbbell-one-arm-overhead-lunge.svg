<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 230">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="220" height="230" fill="#111827" rx="12"/>
  <line x1="20" y1="210" x2="200" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="110" y="225" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="8" font-weight="700" fill="#475569" letter-spacing="1">DB ONE-ARM OH LUNGE</text>
  <!-- Frame 1: Standing, one arm overhead -->
  <g class="f1">
    <circle cx="110" cy="44" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="110" y1="56" x2="110" y2="114"/>
      <line x1="88" y1="68" x2="132" y2="68"/>
      <!-- One arm overhead -->
      <line x1="88" y1="68" x2="72" y2="24"/>
      <!-- Other arm at side -->
      <line x1="132" y1="68" x2="138" y2="100"/>
      <line x1="104" y1="114" x2="100" y2="162"/><line x1="100" y1="162" x2="96" y2="210"/>
      <line x1="116" y1="114" x2="120" y2="162"/><line x1="120" y1="162" x2="124" y2="210"/>
    </g>
    <circle cx="100" cy="162" r="5" fill="#64748b"/>
    <circle cx="120" cy="162" r="5" fill="#64748b"/>
    <!-- DB overhead -->
    <rect x="60" y="20" width="18" height="8" rx="2" fill="#475569"/>
  </g>
  <!-- Frame 2: Step and lunge, DB stays overhead -->
  <g class="f2">
    <circle cx="110" cy="56" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="110" y1="68" x2="110" y2="124"/>
      <line x1="88" y1="80" x2="132" y2="80"/>
      <line x1="88" y1="80" x2="72" y2="36"/>
      <line x1="132" y1="80" x2="138" y2="112"/>
      <line x1="104" y1="124" x2="76" y2="164"/><line x1="76" y1="164" x2="64" y2="210"/>
      <line x1="116" y1="124" x2="132" y2="162"/><line x1="132" y1="162" x2="140" y2="210"/>
    </g>
    <circle cx="76" cy="164" r="5" fill="#64748b"/>
    <rect x="60" y="32" width="18" height="8" rx="2" fill="#475569"/>
  </g>
  <!-- Frame 3: Deep lunge, arm locked overhead -->
  <g class="f3">
    <circle cx="110" cy="64" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="110" y1="76" x2="110" y2="130"/>
      <line x1="88" y1="88" x2="132" y2="88"/>
      <!-- Arm fully extended overhead -->
      <line x1="88" y1="88" x2="72" y2="44"/>
      <line x1="132" y1="88" x2="140" y2="118"/>
      <line x1="104" y1="130" x2="70" y2="175"/><line x1="70" y1="175" x2="56" y2="210"/>
      <line x1="116" y1="130" x2="140" y2="168"/><line x1="140" y1="168" x2="152" y2="196"/>
    </g>
    <circle cx="70" cy="175" r="5" fill="#64748b"/>
    <circle cx="140" cy="168" r="5" fill="#64748b"/>
    <rect x="60" y="40" width="18" height="8" rx="2" fill="#475569"/>
  </g>
</svg>
