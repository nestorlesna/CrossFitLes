<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
<rect width="200" height="230" fill="#111827" rx="12"/>
<style>
  .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
  @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
  @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
  @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
</style>
<line x1="30" y1="210" x2="170" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
<text x="100" y="225" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#475569">SALLY UP SALLY DOWN</text>

<!-- F1: Standing (Sally Up) -->
<g class="f1" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" fill="none">
  <circle cx="100" cy="26" r="12" fill="#94a3b8" stroke="none"/>
  <line x1="100" y1="38" x2="100" y2="108"/>
  <line x1="78" y1="55" x2="122" y2="55"/>
  <line x1="100" y1="108" x2="87" y2="158"/>
  <line x1="87" y1="158" x2="82" y2="200"/>
  <line x1="100" y1="108" x2="113" y2="158"/>
  <line x1="113" y1="158" x2="118" y2="200"/>
  <line x1="76" y1="200" x2="90" y2="200"/>
  <line x1="115" y1="200" x2="128" y2="200"/>
  <circle cx="87" cy="158" r="4" fill="#64748b" stroke="none"/>
  <circle cx="113" cy="158" r="4" fill="#64748b" stroke="none"/>
</g>

<!-- F2: Parallel squat (90°) -->
<g class="f2" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" fill="none">
  <circle cx="100" cy="45" r="12" fill="#94a3b8" stroke="none"/>
  <!-- Torso upright but lower -->
  <line x1="100" y1="57" x2="100" y2="112"/>
  <!-- Arms forward for balance -->
  <line x1="100" y1="75" x2="72" y2="88"/>
  <line x1="100" y1="75" x2="128" y2="88"/>
  <!-- Thighs angled down at 45° -->
  <line x1="100" y1="112" x2="78" y2="145"/>
  <line x1="100" y1="112" x2="122" y2="145"/>
  <!-- Shins nearly vertical -->
  <line x1="78" y1="145" x2="74" y2="200"/>
  <line x1="122" y1="145" x2="126" y2="200"/>
  <line x1="68" y1="200" x2="82" y2="200"/>
  <line x1="122" y1="200" x2="135" y2="200"/>
  <circle cx="78" cy="145" r="4" fill="#64748b" stroke="none"/>
  <circle cx="122" cy="145" r="4" fill="#64748b" stroke="none"/>
</g>

<!-- F3: Deep squat (Sally Down) -->
<g class="f3" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" fill="none">
  <circle cx="100" cy="62" r="12" fill="#94a3b8" stroke="none"/>
  <!-- Torso slightly forward -->
  <line x1="100" y1="74" x2="100" y2="120"/>
  <!-- Arms extended forward for balance -->
  <line x1="100" y1="88" x2="68" y2="100"/>
  <line x1="100" y1="88" x2="132" y2="100"/>
  <!-- Thighs nearly horizontal -->
  <line x1="100" y1="120" x2="72" y2="135"/>
  <line x1="100" y1="120" x2="128" y2="135"/>
  <!-- Shins vertical -->
  <line x1="72" y1="135" x2="68" y2="200"/>
  <line x1="128" y1="135" x2="132" y2="200"/>
  <line x1="62" y1="200" x2="76" y2="200"/>
  <line x1="128" y1="200" x2="142" y2="200"/>
  <circle cx="72" cy="135" r="4" fill="#64748b" stroke="none"/>
  <circle cx="128" cy="135" r="4" fill="#64748b" stroke="none"/>
</g>
</svg>
