<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
<rect width="200" height="230" fill="#111827" rx="12"/>
<style>
  .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
  @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
  @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
  @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
</style>
<line x1="30" y1="210" x2="170" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
<text x="100" y="225" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#475569">BARBELL GOOD MORNING</text>

<!-- F1: Standing with barbell on back -->
<g class="f1" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" fill="none">
  <circle cx="100" cy="26" r="12" fill="#94a3b8" stroke="none"/>
  <line x1="100" y1="38" x2="100" y2="108"/>
  <!-- Barbell on back -->
  <line x1="68" y1="50" x2="132" y2="50" stroke="#94a3b8" stroke-width="5"/>
  <circle cx="68" cy="50" r="7" fill="#64748b" stroke="none"/>
  <circle cx="132" cy="50" r="7" fill="#64748b" stroke="none"/>
  <!-- Arms holding bar -->
  <line x1="100" y1="55" x2="82" y2="50"/>
  <line x1="100" y1="55" x2="118" y2="50"/>
  <line x1="100" y1="108" x2="87" y2="158"/>
  <line x1="87" y1="158" x2="82" y2="200"/>
  <line x1="100" y1="108" x2="113" y2="158"/>
  <line x1="113" y1="158" x2="118" y2="200"/>
  <line x1="76" y1="200" x2="90" y2="200"/>
  <line x1="115" y1="200" x2="128" y2="200"/>
  <circle cx="87" cy="158" r="4" fill="#64748b" stroke="none"/>
  <circle cx="113" cy="158" r="4" fill="#64748b" stroke="none"/>
</g>

<!-- F2: 90° hinge, torso horizontal, legs straight -->
<g class="f2" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" fill="none">
  <circle cx="38" cy="100" r="12" fill="#94a3b8" stroke="none"/>
  <!-- Horizontal torso -->
  <line x1="50" y1="100" x2="105" y2="100"/>
  <!-- Barbell on back (horizontal) -->
  <line x1="45" y1="100" x2="112" y2="100" stroke="#94a3b8" stroke-width="5"/>
  <circle cx="42" cy="100" r="7" fill="#64748b" stroke="none"/>
  <circle cx="112" cy="100" r="7" fill="#64748b" stroke="none"/>
  <!-- Arms hanging from shoulders -->
  <line x1="68" y1="100" x2="65" y2="135"/>
  <line x1="85" y1="100" x2="82" y2="135"/>
  <!-- Legs straight down from hips -->
  <line x1="100" y1="100" x2="93" y2="155"/>
  <line x1="93" y1="155" x2="90" y2="200"/>
  <line x1="105" y1="100" x2="108" y2="155"/>
  <line x1="108" y1="155" x2="110" y2="200"/>
  <line x1="84" y1="200" x2="98" y2="200"/>
  <line x1="107" y1="200" x2="118" y2="200"/>
  <circle cx="93" cy="155" r="4" fill="#64748b" stroke="none"/>
  <circle cx="108" cy="155" r="4" fill="#64748b" stroke="none"/>
</g>

<!-- F3: 45° angle returning -->
<g class="f3" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" fill="none">
  <circle cx="65" cy="72" r="12" fill="#94a3b8" stroke="none"/>
  <!-- Torso at 45° -->
  <line x1="72" y1="82" x2="100" y2="112"/>
  <!-- Barbell at same angle -->
  <line x1="58" y1="76" x2="108" y2="116" stroke="#94a3b8" stroke-width="5"/>
  <circle cx="55" cy="74" r="7" fill="#64748b" stroke="none"/>
  <circle cx="112" cy="118" r="7" fill="#64748b" stroke="none"/>
  <!-- Arms -->
  <line x1="72" y1="90" x2="62" y2="115"/>
  <line x1="80" y1="95" x2="78" y2="122"/>
  <!-- Legs -->
  <line x1="100" y1="112" x2="88" y2="160"/>
  <line x1="88" y1="160" x2="84" y2="200"/>
  <line x1="100" y1="112" x2="112" y2="160"/>
  <line x1="112" y1="160" x2="116" y2="200"/>
  <line x1="78" y1="200" x2="92" y2="200"/>
  <line x1="113" y1="200" x2="124" y2="200"/>
  <circle cx="88" cy="160" r="4" fill="#64748b" stroke="none"/>
  <circle cx="112" cy="160" r="4" fill="#64748b" stroke="none"/>
</g>
</svg>
