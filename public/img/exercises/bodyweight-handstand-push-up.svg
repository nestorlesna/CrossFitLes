<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="200" height="240" fill="#111827" rx="12"/>
  <!-- Pared y suelo -->
  <line x1="165" y1="12" x2="165" y2="215" stroke="#374151" stroke-width="4" stroke-linecap="round"/>
  <line x1="20" y1="215" x2="165" y2="215" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="95" y="233" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="9" font-weight="700" fill="#475569" letter-spacing="2">HSPU</text>
  <!-- Frame 1: Handstand completo (brazos extendidos) -->
  <g class="f1">
    <!-- Persona invertida: pies arriba (en la pared), cabeza abajo -->
    <circle cx="90" cy="198" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Brazos extendidos al suelo -->
      <line x1="78" y1="188" x2="72" y2="215"/><line x1="72" y1="215" x2="62" y2="215"/>
      <line x1="102" y1="188" x2="108" y2="215"/><line x1="108" y1="215" x2="118" y2="215"/>
      <!-- Hombros -->
      <line x1="78" y1="188" x2="102" y2="188"/>
      <!-- Torso vertical (cuerpo recto invertido) -->
      <line x1="90" y1="186" x2="90" y2="108"/>
      <!-- Cadera y piernas hacia arriba -->
      <line x1="85" y1="108" x2="80" y2="60"/><line x1="80" y1="60" x2="78" y2="24"/>
      <line x1="95" y1="108" x2="100" y2="60"/><line x1="100" y1="60" x2="102" y2="24"/>
      <!-- Pies en la pared -->
      <line x1="78" y1="24" x2="102" y2="24"/>
    </g>
  </g>
  <!-- Frame 2: Bajando (codos doblados ~90°) -->
  <g class="f2">
    <circle cx="90" cy="204" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Brazos doblados -->
      <line x1="78" y1="194" x2="60" y2="202"/><line x1="60" y1="202" x2="62" y2="215"/>
      <line x1="62" y1="215" x2="52" y2="215"/>
      <line x1="102" y1="194" x2="120" y2="202"/><line x1="120" y1="202" x2="118" y2="215"/>
      <line x1="118" y1="215" x2="128" y2="215"/>
      <!-- Hombros -->
      <line x1="78" y1="194" x2="102" y2="194"/>
      <!-- Torso -->
      <line x1="90" y1="192" x2="90" y2="114"/>
      <!-- Piernas -->
      <line x1="85" y1="114" x2="80" y2="64"/><line x1="80" y1="64" x2="80" y2="26"/>
      <line x1="95" y1="114" x2="100" y2="64"/><line x1="100" y1="64" x2="100" y2="26"/>
      <line x1="80" y1="26" x2="100" y2="26"/>
    </g>
    <circle cx="60" cy="202" r="5" fill="#64748b"/><circle cx="120" cy="202" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 3: Cabeza cerca del suelo (fondo del HSPU) -->
  <g class="f3">
    <circle cx="90" cy="208" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Brazos totalmente doblados -->
      <line x1="78" y1="198" x2="56" y2="196"/><line x1="56" y1="196" x2="62" y2="215"/>
      <line x1="62" y1="215" x2="50" y2="215"/>
      <line x1="102" y1="198" x2="124" y2="196"/><line x1="124" y1="196" x2="118" y2="215"/>
      <line x1="118" y1="215" x2="130" y2="215"/>
      <!-- Hombros -->
      <line x1="78" y1="198" x2="102" y2="198"/>
      <!-- Torso -->
      <line x1="90" y1="196" x2="90" y2="118"/>
      <!-- Piernas -->
      <line x1="85" y1="118" x2="80" y2="68"/><line x1="80" y1="68" x2="80" y2="28"/>
      <line x1="95" y1="118" x2="100" y2="68"/><line x1="100" y1="68" x2="100" y2="28"/>
      <line x1="80" y1="28" x2="100" y2="28"/>
    </g>
    <circle cx="56" cy="196" r="5" fill="#64748b"/><circle cx="124" cy="196" r="5" fill="#64748b"/>
  </g>
</svg>
