<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
<rect width="200" height="230" fill="#111827" rx="12"/>
<style>
.f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
@keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
@keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
@keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
</style>
<!-- F1: Half kneeling neutral (one knee down) -->
<g class="f1">
  <circle cx="95" cy="35" r="13" fill="#94a3b8"/>
  <line x1="95" y1="48" x2="95" y2="108" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="95" y1="65" x2="74" y2="80" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="95" y1="65" x2="116" y2="80" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="95" y1="108" x2="72" y2="158" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="72" y1="158" x2="65" y2="205" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="95" y1="108" x2="115" y2="155" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="115" y1="155" x2="115" y2="205" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <circle cx="72" cy="158" r="5" fill="#64748b"/>
  <circle cx="115" cy="155" r="5" fill="#64748b"/>
</g>
<!-- F2: Hips shifted forward, slight lean -->
<g class="f2">
  <circle cx="90" cy="32" r="13" fill="#94a3b8"/>
  <line x1="90" y1="45" x2="92" y2="108" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="90" y1="62" x2="68" y2="78" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="90" y1="62" x2="115" y2="75" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="92" y1="108" x2="62" y2="155" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="62" y1="155" x2="52" y2="205" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="92" y1="108" x2="118" y2="152" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="118" y1="152" x2="118" y2="205" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <circle cx="62" cy="155" r="5" fill="#64748b"/>
  <circle cx="118" cy="152" r="5" fill="#64748b"/>
</g>
<!-- F3: Full stretch, arm raised opposite side -->
<g class="f3">
  <circle cx="88" cy="28" r="13" fill="#94a3b8"/>
  <line x1="88" y1="41" x2="92" y2="108" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="88" y1="58" x2="62" y2="42" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="62" y1="42" x2="52" y2="25" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="88" y1="58" x2="112" y2="72" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="92" y1="108" x2="58" y2="155" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="58" y1="155" x2="46" y2="205" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="92" y1="108" x2="120" y2="150" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="120" y1="150" x2="120" y2="205" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <circle cx="58" cy="155" r="5" fill="#64748b"/>
  <circle cx="120" cy="150" r="5" fill="#64748b"/>
</g>
<line x1="30" y1="210" x2="170" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
<text x="100" y="225" text-anchor="middle" font-family="monospace" font-size="9" fill="#475569">HIP FLEXOR STRETCH</text>
</svg>
