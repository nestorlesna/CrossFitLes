<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
<rect width="200" height="230" fill="#111827" rx="12"/>
<style>
  .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
  @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
  @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
  @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
</style>
<line x1="30" y1="210" x2="170" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
<text x="100" y="225" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#475569">SINGLE-LEG V-UP</text>

<!-- F1: Lying flat on back, arms overhead -->
<g class="f1" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" fill="none">
  <circle cx="162" cy="170" r="12" fill="#94a3b8" stroke="none"/>
  <!-- Torso horizontal -->
  <line x1="150" y1="170" x2="55" y2="170"/>
  <!-- Arms overhead (to the left) -->
  <line x1="130" y1="165" x2="38" y2="165"/>
  <line x1="130" y1="175" x2="38" y2="175"/>
  <!-- Legs (to the right, feet pointing right — wait, head at right, feet at left) -->
  <!-- Actually: lying on back, head at right, feet at left, arms extended overhead (to right/over head) -->
  <!-- Let me redo: head at right (x≈162), body going left, arms going right (overhead) -->
  <!-- Arms: from shoulder area going RIGHT and UP -->
  <line x1="130" y1="163" x2="175" y2="148"/>
  <line x1="130" y1="165" x2="178" y2="152"/>
  <!-- Legs straight left, together -->
  <line x1="62" y1="168" x2="35" y2="168"/>
  <line x1="62" y1="172" x2="35" y2="172"/>
  <circle cx="130" cy="165" r="4" fill="#64748b" stroke="none"/>
</g>

<!-- F2: One leg raised, arms reaching toward it -->
<g class="f2" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" fill="none">
  <circle cx="148" cy="158" r="12" fill="#94a3b8" stroke="none"/>
  <!-- Torso slightly raised (core engaging) -->
  <line x1="136" y1="162" x2="62" y2="170"/>
  <!-- One leg raised (right leg up) -->
  <line x1="62" y1="168" x2="38" y2="140"/>
  <!-- Other leg still down -->
  <line x1="62" y1="172" x2="38" y2="175"/>
  <!-- Arms reaching toward raised leg -->
  <line x1="120" y1="155" x2="48" y2="138"/>
  <line x1="120" y1="158" x2="50" y2="143"/>
  <circle cx="120" cy="155" r="4" fill="#64748b" stroke="none"/>
</g>

<!-- F3: Full V-Up, both legs up, touching hands -->
<g class="f3" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" fill="none">
  <circle cx="130" cy="140" r="12" fill="#94a3b8" stroke="none"/>
  <!-- Torso raised at 45° (sitting up) -->
  <line x1="118" y1="148" x2="88" y2="170"/>
  <!-- Both legs raised up meeting arms -->
  <line x1="88" y1="168" x2="65" y2="135"/>
  <line x1="88" y1="172" x2="60" y2="140"/>
  <!-- Arms reaching up toward feet -->
  <line x1="105" y1="145" x2="65" y2="130"/>
  <line x1="108" y1="148" x2="68" y2="135"/>
  <!-- Touch point at top -->
  <circle cx="63" cy="133" r="5" fill="#64748b" stroke="none"/>
  <circle cx="105" cy="145" r="4" fill="#64748b" stroke="none"/>
</g>
</svg>
