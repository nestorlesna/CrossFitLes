<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="200" height="240" fill="#111827" rx="12"/>
  <!-- Anillos (siempre visibles) -->
  <line x1="68" y1="15" x2="68" y2="52" stroke="#475569" stroke-width="3" stroke-linecap="round"/>
  <line x1="132" y1="15" x2="132" y2="52" stroke="#475569" stroke-width="3" stroke-linecap="round"/>
  <circle cx="68" cy="56" r="8" fill="none" stroke="#475569" stroke-width="4"/>
  <circle cx="132" cy="56" r="8" fill="none" stroke="#475569" stroke-width="4"/>
  <text x="100" y="237" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" font-weight="700" fill="#475569" letter-spacing="2">RING DIP</text>
  <!-- Frame 1: Arriba (brazos extendidos, en los anillos) -->
  <g class="f1">
    <circle cx="100" cy="36" r="13" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="100" y1="49" x2="100" y2="112"/>
      <line x1="80" y1="62" x2="120" y2="62"/>
      <line x1="80" y1="62" x2="68" y2="56"/><line x1="120" y1="62" x2="132" y2="56"/>
      <line x1="95" y1="112" x2="93" y2="172"/><line x1="93" y1="172" x2="95" y2="220"/>
      <line x1="105" y1="112" x2="107" y2="172"/><line x1="107" y1="172" x2="105" y2="220"/>
    </g>
  </g>
  <!-- Frame 2: A mitad (codos doblados, anillos rotando) -->
  <g class="f2">
    <circle cx="100" cy="60" r="13" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="100" y1="73" x2="100" y2="132"/>
      <line x1="80" y1="85" x2="120" y2="85"/>
      <line x1="80" y1="85" x2="64" y2="72"/><line x1="64" y1="72" x2="68" y2="56"/>
      <line x1="120" y1="85" x2="136" y2="72"/><line x1="136" y1="72" x2="132" y2="56"/>
      <line x1="95" y1="132" x2="93" y2="188"/><line x1="93" y1="188" x2="95" y2="222"/>
      <line x1="105" y1="132" x2="107" y2="188"/><line x1="107" y1="188" x2="105" y2="222"/>
    </g>
    <circle cx="64" cy="72" r="5" fill="#64748b"/><circle cx="136" cy="72" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 3: Abajo (anillos girados hacia adentro, codos atrás) -->
  <g class="f3">
    <circle cx="100" cy="80" r="13" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="100" y1="93" x2="100" y2="148"/>
      <line x1="80" y1="105" x2="120" y2="105"/>
      <line x1="80" y1="105" x2="58" y2="85"/><line x1="58" y1="85" x2="60" y2="64"/>
      <line x1="120" y1="105" x2="142" y2="85"/><line x1="142" y1="85" x2="140" y2="64"/>
      <!-- Anillos ahora girados más hacia adentro -->
      <line x1="95" y1="148" x2="93" y2="200"/><line x1="93" y1="200" x2="95" y2="225"/>
      <line x1="105" y1="148" x2="107" y2="200"/><line x1="107" y1="200" x2="105" y2="225"/>
    </g>
    <circle cx="58" cy="85" r="5" fill="#64748b"/><circle cx="142" cy="85" r="5" fill="#64748b"/>
  </g>
</svg>
