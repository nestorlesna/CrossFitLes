<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 180">
  <style>
    .fr1{animation:f1 4s linear infinite}
    .fr2{animation:f2 4s linear infinite}
    .fr3{animation:f3 4s linear infinite}
    @keyframes f1{0%,33%{opacity:1}34%,100%{opacity:0}}
    @keyframes f2{0%,33%{opacity:0}34%,66%{opacity:1}67%,100%{opacity:0}}
    @keyframes f3{0%,66%{opacity:0}67%,100%{opacity:1}}
  </style>
  <rect width="240" height="180" fill="#111827"/>
  <!-- suelo -->
  <line x1="10" y1="162" x2="230" y2="162" stroke="#374151" stroke-width="2"/>

  <!-- Frame 1: acostado plano -->
  <g class="fr1" fill="none" stroke-linecap="round">
    <circle cx="25" cy="148" r="10" fill="#94a3b8"/>
    <!-- torso en el suelo -->
    <line x1="35" y1="155" x2="128" y2="155" stroke="#94a3b8" stroke-width="4"/>
    <!-- brazo al lado -->
    <line x1="80" y1="155" x2="82" y2="164" stroke="#94a3b8" stroke-width="3"/>
    <!-- muslo hacia arriba -->
    <line x1="128" y1="155" x2="152" y2="132" stroke="#94a3b8" stroke-width="4"/>
    <!-- pierna hacia el suelo -->
    <line x1="152" y1="132" x2="170" y2="155" stroke="#94a3b8" stroke-width="4"/>
    <!-- pies en el suelo -->
    <line x1="168" y1="155" x2="182" y2="155" stroke="#94a3b8" stroke-width="3"/>
  </g>

  <!-- Frame 2: puente a medio camino -->
  <g class="fr2" fill="none" stroke-linecap="round">
    <circle cx="25" cy="148" r="10" fill="#94a3b8"/>
    <!-- hombros en suelo -->
    <line x1="35" y1="155" x2="82" y2="155" stroke="#94a3b8" stroke-width="4"/>
    <!-- torso diagonal, caderas subiendo -->
    <line x1="82" y1="155" x2="128" y2="136" stroke="#94a3b8" stroke-width="4"/>
    <!-- brazo al lado -->
    <line x1="60" y1="155" x2="62" y2="164" stroke="#94a3b8" stroke-width="3"/>
    <!-- muslo -->
    <line x1="128" y1="136" x2="152" y2="128" stroke="#94a3b8" stroke-width="4"/>
    <!-- pierna -->
    <line x1="152" y1="128" x2="170" y2="155" stroke="#94a3b8" stroke-width="4"/>
    <!-- pies -->
    <line x1="168" y1="155" x2="182" y2="155" stroke="#94a3b8" stroke-width="3"/>
  </g>

  <!-- Frame 3: puente completo, caderas arriba -->
  <g class="fr3" fill="none" stroke-linecap="round">
    <circle cx="25" cy="148" r="10" fill="#94a3b8"/>
    <!-- hombros en suelo -->
    <line x1="35" y1="155" x2="72" y2="155" stroke="#94a3b8" stroke-width="4"/>
    <!-- torso en alto (arco) -->
    <line x1="72" y1="155" x2="128" y2="112" stroke="#94a3b8" stroke-width="4"/>
    <!-- brazo al lado, ligeramente presionando suelo -->
    <line x1="54" y1="155" x2="56" y2="164" stroke="#94a3b8" stroke-width="3"/>
    <!-- muslo -->
    <line x1="128" y1="112" x2="155" y2="128" stroke="#94a3b8" stroke-width="4"/>
    <!-- pierna -->
    <line x1="155" y1="128" x2="170" y2="155" stroke="#94a3b8" stroke-width="4"/>
    <!-- pies -->
    <line x1="168" y1="155" x2="182" y2="155" stroke="#94a3b8" stroke-width="3"/>
  </g>
</svg>
