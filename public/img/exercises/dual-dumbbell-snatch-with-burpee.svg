<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
  <rect width="200" height="230" fill="#111827" rx="12"/>
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>

  <!-- Frame 1: Posición en el suelo (burpee), mancuernas a los costados -->
  <g class="f1" stroke="#94a3b8" stroke-width="3.5" stroke-linecap="round" fill="none">
    <!-- Figura en plancha/burpee -->
    <circle cx="50" cy="100" r="13" fill="#94a3b8" stroke="none"/>
    <!-- Cuerpo horizontal -->
    <line x1="60" y1="104" x2="150" y2="112"/>
    <!-- Brazos apoyados -->
    <line x1="63" y1="100" x2="50" y2="125"/>
    <line x1="80" y1="105" x2="70" y2="128"/>
    <!-- Piernas extendidas -->
    <line x1="150" y1="112" x2="165" y2="140"/>
    <line x1="150" y1="112" x2="160" y2="142"/>
    <!-- Mancuernas en el suelo -->
    <rect x="38" y="126" width="14" height="5" fill="#475569" rx="2" stroke="#64748b" stroke-width="1.5"/>
    <rect x="58" y="128" width="14" height="5" fill="#475569" rx="2" stroke="#64748b" stroke-width="1.5"/>
  </g>

  <!-- Frame 2: Saltando de pie, mancuernas en la cadera (inicio del tirón) -->
  <g class="f2" stroke="#94a3b8" stroke-width="3.5" stroke-linecap="round" fill="none">
    <circle cx="100" cy="36" r="13" fill="#94a3b8" stroke="none"/>
    <line x1="100" y1="49" x2="100" y2="120"/>
    <!-- Brazos con mancuernas jalando hacia arriba, codos altos -->
    <line x1="100" y1="65" x2="72" y2="52"/>
    <line x1="100" y1="65" x2="128" y2="52"/>
    <!-- Mancuernas a la altura del pecho -->
    <rect x="55" y="44" width="14" height="5" fill="#475569" rx="2" stroke="#64748b" stroke-width="1.5"/>
    <rect x="131" y="44" width="14" height="5" fill="#475569" rx="2" stroke="#64748b" stroke-width="1.5"/>
    <!-- Piernas ligeramente dobladas (impulso) -->
    <line x1="85" y1="120" x2="115" y2="120"/>
    <line x1="87" y1="120" x2="84" y2="165"/>
    <line x1="84" y1="165" x2="82" y2="205"/>
    <line x1="113" y1="120" x2="116" y2="165"/>
    <line x1="116" y1="165" x2="118" y2="205"/>
    <circle cx="84" cy="165" r="4" fill="#64748b" stroke="none"/>
    <circle cx="116" cy="165" r="4" fill="#64748b" stroke="none"/>
  </g>

  <!-- Frame 3: De pie, mancuernas overhead (snatch completo) -->
  <g class="f3" stroke="#94a3b8" stroke-width="3.5" stroke-linecap="round" fill="none">
    <circle cx="100" cy="26" r="13" fill="#94a3b8" stroke="none"/>
    <line x1="100" y1="39" x2="100" y2="108"/>
    <!-- Brazos extendidos overhead con mancuernas -->
    <line x1="100" y1="52" x2="68" y2="28"/>
    <line x1="100" y1="52" x2="132" y2="28"/>
    <!-- Mancuernas overhead -->
    <rect x="55" y="20" width="14" height="5" fill="#475569" rx="2" stroke="#64748b" stroke-width="1.5"/>
    <rect x="131" y="20" width="14" height="5" fill="#475569" rx="2" stroke="#64748b" stroke-width="1.5"/>
    <line x1="85" y1="108" x2="115" y2="108"/>
    <line x1="87" y1="108" x2="85" y2="158"/>
    <line x1="85" y1="158" x2="84" y2="205"/>
    <line x1="113" y1="108" x2="115" y2="158"/>
    <line x1="115" y1="158" x2="116" y2="205"/>
    <circle cx="85" cy="158" r="4" fill="#64748b" stroke="none"/>
    <circle cx="115" cy="158" r="4" fill="#64748b" stroke="none"/>
  </g>

  <line x1="30" y1="210" x2="170" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="100" y="225" font-family="sans-serif" font-size="7.5" fill="#475569" text-anchor="middle" letter-spacing="0.5">DUAL DB SNATCH + BURPEE</text>
</svg>
