<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="200" height="230" fill="#111827" rx="12"/>
  <line x1="30" y1="210" x2="170" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="100" y="226" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" font-weight="700" fill="#475569" letter-spacing="2">PISTOL SQUAT</text>
  <!-- Frame 1: De pie en una pierna, otra elevada al frente -->
  <g class="f1">
    <circle cx="100" cy="28" r="13" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="100" y1="41" x2="100" y2="110"/>
      <line x1="80" y1="54" x2="120" y2="54"/>
      <line x1="80" y1="54" x2="52" y2="78"/><line x1="120" y1="54" x2="148" y2="78"/>
      <!-- Pierna de apoyo (derecha) recta -->
      <line x1="104" y1="110" x2="106" y2="162"/><line x1="106" y1="162" x2="106" y2="205"/>
      <line x1="94" y1="205" x2="120" y2="205"/>
      <!-- Pierna elevada (izquierda) extendida al frente -->
      <line x1="96" y1="110" x2="68" y2="132"/><line x1="68" y1="132" x2="48" y2="142"/>
    </g>
    <circle cx="106" cy="162" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 2: Bajando en pistol (media sentadilla) -->
  <g class="f2">
    <circle cx="100" cy="62" r="13" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="100" y1="75" x2="100" y2="130"/>
      <line x1="80" y1="88" x2="120" y2="88"/>
      <!-- Brazos al frente para balance -->
      <line x1="80" y1="88" x2="52" y2="110"/><line x1="120" y1="88" x2="148" y2="110"/>
      <!-- Pierna de apoyo doblándose -->
      <line x1="104" y1="130" x2="112" y2="178"/><line x1="112" y1="178" x2="112" y2="205"/>
      <line x1="100" y1="205" x2="126" y2="205"/>
      <!-- Pierna libre hacia el frente, más elevada -->
      <line x1="96" y1="130" x2="64" y2="130"/><line x1="64" y1="130" x2="38" y2="128"/>
    </g>
    <circle cx="112" cy="178" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 3: Pistol completo (sentado en una pierna) -->
  <g class="f3">
    <circle cx="100" cy="100" r="13" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="100" y1="113" x2="100" y2="155"/>
      <line x1="80" y1="126" x2="120" y2="126"/>
      <!-- Brazos extendidos al frente para balance -->
      <line x1="80" y1="126" x2="46" y2="138"/><line x1="120" y1="126" x2="154" y2="138"/>
      <!-- Pierna de apoyo totalmente doblada (sentado) -->
      <line x1="104" y1="155" x2="112" y2="185"/><line x1="112" y1="185" x2="114" y2="205"/>
      <line x1="102" y1="205" x2="128" y2="205"/>
      <!-- Pierna libre extendida al frente, a altura de cadera -->
      <line x1="96" y1="155" x2="56" y2="148"/><line x1="56" y1="148" x2="26" y2="142"/>
    </g>
    <circle cx="112" cy="185" r="5" fill="#64748b"/>
  </g>
</svg>
