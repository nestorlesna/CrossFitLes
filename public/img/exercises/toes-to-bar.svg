<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="200" height="240" fill="#111827" rx="12"/>
  <!-- Barra -->
  <line x1="46" y1="38" x2="154" y2="38" stroke="#475569" stroke-width="7" stroke-linecap="round"/>
  <line x1="46" y1="24" x2="46" y2="46" stroke="#374151" stroke-width="5" stroke-linecap="round"/>
  <line x1="154" y1="24" x2="154" y2="46" stroke="#374151" stroke-width="5" stroke-linecap="round"/>
  <text x="100" y="238" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" font-weight="700" fill="#475569" letter-spacing="2">TOES TO BAR</text>
  <!-- Frame 1: Colgado (dead hang) -->
  <g class="f1">
    <circle cx="100" cy="74" r="13" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="76" y1="38" x2="76" y2="62"/><line x1="76" y1="62" x2="83" y2="88"/>
      <line x1="124" y1="38" x2="124" y2="62"/><line x1="124" y1="62" x2="117" y2="88"/>
      <line x1="83" y1="88" x2="117" y2="88"/>
      <line x1="100" y1="88" x2="100" y2="152"/>
      <line x1="96" y1="152" x2="92" y2="195"/><line x1="92" y1="195" x2="94" y2="224"/>
      <line x1="104" y1="152" x2="108" y2="195"/><line x1="108" y1="195" x2="106" y2="224"/>
    </g>
    <circle cx="76" cy="62" r="5" fill="#64748b"/><circle cx="124" cy="62" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 2: Piernas subiendo (knees to elbows) -->
  <g class="f2">
    <circle cx="100" cy="60" r="13" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="76" y1="38" x2="74" y2="56"/><line x1="74" y1="56" x2="84" y2="72"/>
      <line x1="124" y1="38" x2="126" y2="56"/><line x1="126" y1="56" x2="116" y2="72"/>
      <line x1="84" y1="72" x2="116" y2="72"/>
      <line x1="100" y1="73" x2="100" y2="112"/>
      <!-- Piernas dobladas subiendo -->
      <line x1="96" y1="112" x2="80" y2="90"/><line x1="80" y1="90" x2="70" y2="74"/>
      <line x1="104" y1="112" x2="120" y2="90"/><line x1="120" y1="90" x2="130" y2="74"/>
    </g>
    <circle cx="80" cy="90" r="5" fill="#64748b"/><circle cx="120" cy="90" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 3: Pies tocando la barra -->
  <g class="f3">
    <circle cx="100" cy="66" r="13" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="76" y1="38" x2="72" y2="58"/><line x1="72" y1="58" x2="82" y2="76"/>
      <line x1="124" y1="38" x2="128" y2="58"/><line x1="128" y1="58" x2="118" y2="76"/>
      <line x1="82" y1="76" x2="118" y2="76"/>
      <line x1="100" y1="76" x2="100" y2="105"/>
      <!-- Piernas extendidas tocando la barra -->
      <line x1="96" y1="105" x2="78" y2="56"/><line x1="104" y1="105" x2="122" y2="56"/>
      <!-- Pies en la barra -->
      <line x1="70" y1="38" x2="86" y2="38"/><line x1="114" y1="38" x2="130" y2="38"/>
    </g>
    <circle cx="72" cy="58" r="5" fill="#64748b"/><circle cx="128" cy="58" r="5" fill="#64748b"/>
  </g>
</svg>
