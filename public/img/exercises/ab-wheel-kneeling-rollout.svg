<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
  <rect width="200" height="230" fill="#111827" rx="12"/>
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>

  <!-- Frame 1: Arrodillado erguido, rueda cerca -->
  <g class="f1" stroke="#94a3b8" stroke-width="3.5" stroke-linecap="round" fill="none">
    <circle cx="70" cy="55" r="13" fill="#94a3b8" stroke="none"/>
    <!-- Torso vertical -->
    <line x1="70" y1="68" x2="72" y2="118"/>
    <!-- Brazos extendidos hacia la rueda -->
    <line x1="72" y1="82" x2="118" y2="148"/>
    <!-- Muslo vertical (rodilla debajo de cadera) -->
    <line x1="72" y1="118" x2="72" y2="170"/>
    <!-- Espinilla apoyada en el suelo -->
    <line x1="72" y1="170" x2="50" y2="180"/>
    <!-- Rodilla -->
    <circle cx="72" cy="170" r="4" fill="#64748b" stroke="none"/>
    <!-- Rueda ab wheel -->
    <circle cx="126" cy="157" r="10" stroke="#64748b" stroke-width="2.5"/>
    <line x1="118" y1="149" x2="134" y2="165" stroke="#64748b" stroke-width="2"/>
  </g>

  <!-- Frame 2: ~45° extendido, torso inclinado -->
  <g class="f2" stroke="#94a3b8" stroke-width="3.5" stroke-linecap="round" fill="none">
    <circle cx="112" cy="95" r="13" fill="#94a3b8" stroke="none"/>
    <!-- Torso inclinado -->
    <line x1="112" y1="108" x2="88" y2="155"/>
    <!-- Brazos extendidos -->
    <line x1="112" y1="120" x2="153" y2="154"/>
    <!-- Muslo desde rodilla -->
    <line x1="70" y1="178" x2="88" y2="155"/>
    <!-- Espinilla -->
    <line x1="70" y1="178" x2="48" y2="182"/>
    <!-- Rodilla -->
    <circle cx="70" cy="178" r="4" fill="#64748b" stroke="none"/>
    <!-- Rueda ab wheel -->
    <circle cx="161" cy="161" r="10" stroke="#64748b" stroke-width="2.5"/>
    <line x1="153" y1="154" x2="169" y2="168" stroke="#64748b" stroke-width="2"/>
  </g>

  <!-- Frame 3: Totalmente extendido, cuerpo casi horizontal -->
  <g class="f3" stroke="#94a3b8" stroke-width="3.5" stroke-linecap="round" fill="none">
    <circle cx="148" cy="128" r="13" fill="#94a3b8" stroke="none"/>
    <!-- Torso casi horizontal -->
    <line x1="148" y1="141" x2="94" y2="163"/>
    <!-- Brazos completamente extendidos -->
    <line x1="150" y1="146" x2="172" y2="160"/>
    <!-- Muslo desde rodilla -->
    <line x1="65" y1="180" x2="94" y2="163"/>
    <!-- Espinilla -->
    <line x1="65" y1="180" x2="43" y2="183"/>
    <!-- Rodilla -->
    <circle cx="65" cy="180" r="4" fill="#64748b" stroke="none"/>
    <!-- Rueda ab wheel -->
    <circle cx="179" cy="167" r="10" stroke="#64748b" stroke-width="2.5"/>
    <line x1="172" y1="160" x2="186" y2="174" stroke="#64748b" stroke-width="2"/>
  </g>

  <line x1="30" y1="210" x2="170" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="100" y="225" font-family="sans-serif" font-size="9" fill="#475569" text-anchor="middle" letter-spacing="0.5">AB WHEEL ROLLOUT</text>
</svg>
