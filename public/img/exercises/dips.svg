<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="200" height="230" fill="#111827" rx="12"/>
  <!-- Barras paralelas (siempre visibles) -->
  <line x1="50" y1="62" x2="50" y2="100" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
  <line x1="150" y1="62" x2="150" y2="100" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
  <line x1="38" y1="62" x2="62" y2="62" stroke="#374151" stroke-width="6" stroke-linecap="round"/>
  <line x1="138" y1="62" x2="162" y2="62" stroke="#374151" stroke-width="6" stroke-linecap="round"/>
  <text x="100" y="226" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" font-weight="700" fill="#475569" letter-spacing="2">DIPS</text>
  <!-- Frame 1: Arriba (brazos extendidos) -->
  <g class="f1">
    <circle cx="100" cy="34" r="14" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="100" y1="48" x2="100" y2="110"/>
      <line x1="78" y1="60" x2="122" y2="60"/>
      <!-- Brazos extendidos a las barras -->
      <line x1="78" y1="60" x2="52" y2="62"/><line x1="122" y1="60" x2="148" y2="62"/>
      <!-- Piernas colgando rectas -->
      <line x1="95" y1="110" x2="93" y2="168"/><line x1="93" y1="168" x2="95" y2="215"/>
      <line x1="105" y1="110" x2="107" y2="168"/><line x1="107" y1="168" x2="105" y2="215"/>
    </g>
  </g>
  <!-- Frame 2: A mitad (codos ~90°) -->
  <g class="f2">
    <circle cx="100" cy="58" r="14" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="100" y1="72" x2="100" y2="130"/>
      <line x1="80" y1="84" x2="120" y2="84"/>
      <!-- Brazos doblados (codos atrás) -->
      <line x1="80" y1="84" x2="64" y2="74"/><line x1="64" y1="74" x2="52" y2="62"/>
      <line x1="120" y1="84" x2="136" y2="74"/><line x1="136" y1="74" x2="148" y2="62"/>
      <!-- Piernas -->
      <line x1="95" y1="130" x2="93" y2="185"/><line x1="93" y1="185" x2="95" y2="218"/>
      <line x1="105" y1="130" x2="107" y2="185"/><line x1="107" y1="185" x2="105" y2="218"/>
    </g>
    <circle cx="64" cy="74" r="5" fill="#64748b"/><circle cx="136" cy="74" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 3: Abajo (pecho entre las barras) -->
  <g class="f3">
    <circle cx="100" cy="76" r="14" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="100" y1="90" x2="100" y2="146"/>
      <line x1="80" y1="102" x2="120" y2="102"/>
      <!-- Brazos totalmente doblados -->
      <line x1="80" y1="102" x2="58" y2="82"/><line x1="58" y1="82" x2="52" y2="62"/>
      <line x1="120" y1="102" x2="142" y2="82"/><line x1="142" y1="82" x2="148" y2="62"/>
      <!-- Piernas -->
      <line x1="95" y1="146" x2="93" y2="198"/><line x1="93" y1="198" x2="95" y2="222"/>
      <line x1="105" y1="146" x2="107" y2="198"/><line x1="107" y1="198" x2="105" y2="222"/>
    </g>
    <circle cx="58" cy="82" r="5" fill="#64748b"/><circle cx="142" cy="82" r="5" fill="#64748b"/>
  </g>
</svg>
