<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 230">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="220" height="230" fill="#111827" rx="12"/>
  <line x1="20" y1="210" x2="200" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="110" y="225" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="9" font-weight="700" fill="#475569" letter-spacing="2">FRONT SQUAT</text>
  <!-- Frame 1: Standing, bar in front rack -->
  <g class="f1">
    <line x1="42" y1="96" x2="178" y2="96" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <rect x="36" y="88" width="8" height="16" rx="2" fill="#475569"/>
    <rect x="176" y="88" width="8" height="16" rx="2" fill="#475569"/>
    <circle cx="110" cy="44" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="110" y1="56" x2="110" y2="110"/>
      <line x1="90" y1="68" x2="130" y2="68"/>
      <!-- Front rack elbows high -->
      <line x1="90" y1="68" x2="74" y2="96"/>
      <line x1="130" y1="68" x2="146" y2="96"/>
      <line x1="104" y1="110" x2="100" y2="160"/><line x1="100" y1="160" x2="96" y2="210"/>
      <line x1="116" y1="110" x2="120" y2="160"/><line x1="120" y1="160" x2="124" y2="210"/>
    </g>
    <circle cx="100" cy="160" r="5" fill="#64748b"/>
    <circle cx="120" cy="160" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 2: Parallel squat -->
  <g class="f2">
    <line x1="42" y1="112" x2="178" y2="112" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <rect x="36" y="104" width="8" height="16" rx="2" fill="#475569"/>
    <rect x="176" y="104" width="8" height="16" rx="2" fill="#475569"/>
    <circle cx="110" cy="70" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="110" y1="82" x2="110" y2="130"/>
      <line x1="90" y1="94" x2="130" y2="94"/>
      <line x1="90" y1="94" x2="74" y2="112"/>
      <line x1="130" y1="94" x2="146" y2="112"/>
      <line x1="104" y1="130" x2="84" y2="170"/><line x1="84" y1="170" x2="72" y2="210"/>
      <line x1="116" y1="130" x2="136" y2="170"/><line x1="136" y1="170" x2="148" y2="210"/>
    </g>
    <circle cx="84" cy="170" r="5" fill="#64748b"/>
    <circle cx="136" cy="170" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 3: Deep squat, torso upright -->
  <g class="f3">
    <line x1="42" y1="128" x2="178" y2="128" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <rect x="36" y="120" width="8" height="16" rx="2" fill="#475569"/>
    <rect x="176" y="120" width="8" height="16" rx="2" fill="#475569"/>
    <circle cx="110" cy="96" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="110" y1="108" x2="110" y2="152"/>
      <line x1="90" y1="118" x2="130" y2="118"/>
      <line x1="90" y1="118" x2="74" y2="128"/>
      <line x1="130" y1="118" x2="146" y2="128"/>
      <!-- Deep squat -->
      <line x1="104" y1="152" x2="70" y2="184"/><line x1="70" y1="184" x2="58" y2="210"/>
      <line x1="116" y1="152" x2="150" y2="184"/><line x1="150" y1="184" x2="162" y2="210"/>
    </g>
    <circle cx="70" cy="184" r="5" fill="#64748b"/>
    <circle cx="150" cy="184" r="5" fill="#64748b"/>
  </g>
</svg>
