<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="200" height="230" fill="#111827" rx="12"/>
  <line x1="30" y1="210" x2="170" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="100" y="226" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" font-weight="700" fill="#475569" letter-spacing="2">PUSH PRESS</text>
  <!-- Frame 1: Dip (rodillas levemente dobladas, barra en hombros) -->
  <g class="f1">
    <line x1="52" y1="72" x2="148" y2="72" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <rect x="46" y="64" width="8" height="16" rx="2" fill="#475569"/>
    <rect x="146" y="64" width="8" height="16" rx="2" fill="#475569"/>
    <circle cx="100" cy="38" r="13" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="100" y1="51" x2="100" y2="118"/>
      <line x1="78" y1="64" x2="122" y2="64"/>
      <line x1="78" y1="64" x2="62" y2="72"/><line x1="122" y1="64" x2="138" y2="72"/>
      <!-- Dip: rodillas dobladas -->
      <line x1="95" y1="118" x2="88" y2="168"/><line x1="88" y1="168" x2="90" y2="205"/>
      <line x1="105" y1="118" x2="114" y2="168"/><line x1="114" y1="168" x2="110" y2="205"/>
      <line x1="76" y1="205" x2="104" y2="205"/><line x1="98" y1="205" x2="124" y2="205"/>
    </g>
    <circle cx="88" cy="168" r="5" fill="#64748b"/><circle cx="114" cy="168" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 2: Drive (piernas extendiendo, barra saliendo) -->
  <g class="f2">
    <line x1="52" y1="46" x2="148" y2="46" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <rect x="46" y="38" width="8" height="16" rx="2" fill="#475569"/>
    <rect x="146" y="38" width="8" height="16" rx="2" fill="#475569"/>
    <circle cx="100" cy="62" r="13" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="100" y1="75" x2="100" y2="128"/>
      <line x1="78" y1="86" x2="122" y2="86"/>
      <line x1="78" y1="86" x2="66" y2="58"/><line x1="122" y1="86" x2="134" y2="58"/>
      <line x1="95" y1="128" x2="93" y2="175"/><line x1="93" y1="175" x2="93" y2="205"/>
      <line x1="105" y1="128" x2="107" y2="175"/><line x1="107" y1="175" x2="107" y2="205"/>
      <line x1="79" y1="205" x2="107" y2="205"/><line x1="93" y1="205" x2="121" y2="205"/>
    </g>
    <circle cx="66" cy="58" r="5" fill="#64748b"/><circle cx="134" cy="58" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 3: Lockout overhead -->
  <g class="f3">
    <line x1="52" y1="18" x2="148" y2="18" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <rect x="46" y="10" width="8" height="16" rx="2" fill="#475569"/>
    <rect x="146" y="10" width="8" height="16" rx="2" fill="#475569"/>
    <circle cx="100" cy="48" r="13" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="100" y1="61" x2="100" y2="122"/>
      <line x1="78" y1="73" x2="122" y2="73"/>
      <line x1="78" y1="73" x2="68" y2="38"/><line x1="68" y1="38" x2="68" y2="18"/>
      <line x1="122" y1="73" x2="132" y2="38"/><line x1="132" y1="38" x2="132" y2="18"/>
      <line x1="95" y1="122" x2="93" y2="172"/><line x1="93" y1="172" x2="93" y2="205"/>
      <line x1="105" y1="122" x2="107" y2="172"/><line x1="107" y1="172" x2="107" y2="205"/>
      <line x1="79" y1="205" x2="107" y2="205"/><line x1="93" y1="205" x2="121" y2="205"/>
    </g>
  </g>
</svg>
