<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
<rect width="200" height="230" fill="#111827" rx="12"/>
<style>
.f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
@keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
@keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
@keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
</style>
<!-- F1: Flat on back, arms overhead with weight, legs flat -->
<g class="f1">
  <circle cx="40" cy="148" r="12" fill="#94a3b8"/>
  <line x1="52" y1="148" x2="145" y2="145" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="38" y1="140" x2="38" y2="120" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="38" y1="120" x2="30" y2="103" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <circle cx="27" cy="97" r="9" fill="#64748b"/>
  <line x1="145" y1="145" x2="165" y2="148" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="165" y1="148" x2="175" y2="152" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
</g>
<!-- F2: Hollow body hold - shoulders + legs lifted, weight overhead -->
<g class="f2">
  <circle cx="48" cy="138" r="12" fill="#94a3b8"/>
  <line x1="60" y1="135" x2="148" y2="128" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="46" y1="128" x2="40" y2="110" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="40" y1="110" x2="30" y2="93" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <circle cx="26" cy="86" r="9" fill="#64748b"/>
  <line x1="148" y1="128" x2="165" y2="125" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="165" y1="125" x2="177" y2="122" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
</g>
<!-- F3: Rocking - slightly tilted back -->
<g class="f3">
  <circle cx="42" cy="155" r="12" fill="#94a3b8"/>
  <line x1="54" y1="152" x2="148" y2="138" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="40" y1="145" x2="36" y2="126" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="36" y1="126" x2="28" y2="110" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <circle cx="24" cy="103" r="9" fill="#64748b"/>
  <line x1="148" y1="138" x2="165" y2="130" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="165" y1="130" x2="177" y2="123" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
</g>
<line x1="30" y1="210" x2="170" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
<text x="100" y="225" text-anchor="middle" font-family="monospace" font-size="9" fill="#475569">WEIGHTED HOLLOW ROCK</text>
</svg>
