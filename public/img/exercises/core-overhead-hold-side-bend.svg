<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
  <rect width="200" height="230" fill="#111827" rx="12"/>
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>

  <!-- Frame 1: De pie, brazo derecho con mancuerna overhead -->
  <g class="f1" stroke="#94a3b8" stroke-width="3.5" stroke-linecap="round" fill="none">
    <circle cx="100" cy="26" r="13" fill="#94a3b8" stroke="none"/>
    <line x1="100" y1="39" x2="100" y2="108"/>
    <!-- Brazo derecho overhead sosteniendo mancuerna -->
    <line x1="100" y1="52" x2="125" y2="30"/>
    <!-- Mancuerna arriba -->
    <rect x="118" y="18" width="14" height="5" fill="#475569" rx="2" stroke="#64748b" stroke-width="1.5"/>
    <rect x="121" y="14" width="8" height="4" fill="#64748b" rx="1"/>
    <!-- Brazo izquierdo al costado -->
    <line x1="100" y1="52" x2="78" y2="78"/>
    <line x1="85" y1="108" x2="115" y2="108"/>
    <line x1="87" y1="108" x2="85" y2="158"/>
    <line x1="85" y1="158" x2="84" y2="205"/>
    <line x1="113" y1="108" x2="115" y2="158"/>
    <line x1="115" y1="158" x2="116" y2="205"/>
    <circle cx="85" cy="158" r="4" fill="#64748b" stroke="none"/>
    <circle cx="115" cy="158" r="4" fill="#64748b" stroke="none"/>
  </g>

  <!-- Frame 2: Side bend hacia la izquierda, mancuerna manteniéndose overhead -->
  <g class="f2" stroke="#94a3b8" stroke-width="3.5" stroke-linecap="round" fill="none">
    <circle cx="95" cy="30" r="13" fill="#94a3b8" stroke="none"/>
    <!-- Torso inclinado -->
    <line x1="95" y1="43" x2="88" y2="112"/>
    <!-- Brazo derecho overhead inclinado -->
    <line x1="95" y1="58" x2="112" y2="28"/>
    <rect x="106" y="16" width="14" height="5" fill="#475569" rx="2" stroke="#64748b" stroke-width="1.5"/>
    <rect x="109" y="12" width="8" height="4" fill="#64748b" rx="1"/>
    <!-- Brazo izquierdo más bajo en el bend -->
    <line x1="95" y1="58" x2="70" y2="85"/>
    <line x1="73" y1="112" x2="103" y2="112"/>
    <line x1="75" y1="112" x2="73" y2="162"/>
    <line x1="73" y1="162" x2="72" y2="205"/>
    <line x1="101" y1="112" x2="103" y2="162"/>
    <line x1="103" y1="162" x2="104" y2="205"/>
    <circle cx="73" cy="162" r="4" fill="#64748b" stroke="none"/>
    <circle cx="103" cy="162" r="4" fill="#64748b" stroke="none"/>
  </g>

  <!-- Frame 3: Side bend máximo, arco lateral completo -->
  <g class="f3" stroke="#94a3b8" stroke-width="3.5" stroke-linecap="round" fill="none">
    <circle cx="90" cy="35" r="13" fill="#94a3b8" stroke="none"/>
    <!-- Torso en arco lateral máximo -->
    <line x1="90" y1="48" x2="80" y2="115"/>
    <!-- Brazo derecho overhead en el arco -->
    <line x1="90" y1="63" x2="100" y2="30"/>
    <rect x="93" y="18" width="14" height="5" fill="#475569" rx="2" stroke="#64748b" stroke-width="1.5"/>
    <rect x="96" y="14" width="8" height="4" fill="#64748b" rx="1"/>
    <!-- Brazo izquierdo estirado hacia afuera -->
    <line x1="90" y1="63" x2="62" y2="90"/>
    <line x1="65" y1="115" x2="95" y2="115"/>
    <line x1="67" y1="115" x2="65" y2="163"/>
    <line x1="65" y1="163" x2="64" y2="205"/>
    <line x1="93" y1="115" x2="95" y2="163"/>
    <line x1="95" y1="163" x2="96" y2="205"/>
    <circle cx="65" cy="163" r="4" fill="#64748b" stroke="none"/>
    <circle cx="95" cy="163" r="4" fill="#64748b" stroke="none"/>
  </g>

  <line x1="30" y1="210" x2="170" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="100" y="225" font-family="sans-serif" font-size="7.5" fill="#475569" text-anchor="middle" letter-spacing="0.5">OVERHEAD HOLD SIDE BEND</text>
</svg>
