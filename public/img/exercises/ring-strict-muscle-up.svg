<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 250">
  <style>
    .fr1{animation:f1 4s linear infinite}
    .fr2{animation:f2 4s linear infinite}
    .fr3{animation:f3 4s linear infinite}
    @keyframes f1{0%,33%{opacity:1}34%,100%{opacity:0}}
    @keyframes f2{0%,33%{opacity:0}34%,66%{opacity:1}67%,100%{opacity:0}}
    @keyframes f3{0%,66%{opacity:0}67%,100%{opacity:1}}
  </style>
  <rect width="200" height="250" fill="#111827"/>
  <!-- barra/rig superior -->
  <line x1="50" y1="8" x2="150" y2="8" stroke="#475569" stroke-width="4" stroke-linecap="round"/>

  <!-- correas y anillas fijas -->
  <line x1="80" y1="8" x2="80" y2="48" stroke="#64748b" stroke-width="2"/>
  <circle cx="80" cy="54" r="7" fill="none" stroke="#64748b" stroke-width="2"/>
  <line x1="120" y1="8" x2="120" y2="48" stroke="#64748b" stroke-width="2"/>
  <circle cx="120" cy="54" r="7" fill="none" stroke="#64748b" stroke-width="2"/>

  <!-- Frame 1: colgado, brazos extendidos -->
  <g class="fr1" fill="none" stroke-linecap="round">
    <!-- manos en anillas -->
    <line x1="80" y1="61" x2="82" y2="75" stroke="#94a3b8" stroke-width="4"/>
    <line x1="120" y1="61" x2="118" y2="75" stroke="#94a3b8" stroke-width="4"/>
    <!-- hombros -->
    <line x1="82" y1="75" x2="118" y2="75" stroke="#94a3b8" stroke-width="4"/>
    <!-- cabeza -->
    <circle cx="100" cy="65" r="10" fill="#94a3b8"/>
    <!-- torso hacia abajo -->
    <line x1="100" y1="75" x2="100" y2="145" stroke="#94a3b8" stroke-width="4"/>
    <!-- piernas colgando -->
    <line x1="100" y1="145" x2="90" y2="200" stroke="#94a3b8" stroke-width="4"/>
    <line x1="90" y1="200" x2="86" y2="240" stroke="#94a3b8" stroke-width="4"/>
    <line x1="100" y1="145" x2="110" y2="200" stroke="#94a3b8" stroke-width="4"/>
    <line x1="110" y1="200" x2="114" y2="240" stroke="#94a3b8" stroke-width="4"/>
  </g>

  <!-- Frame 2: tirón, anillas al pecho (transición) -->
  <g class="fr2" fill="none" stroke-linecap="round">
    <!-- anillas al nivel del pecho, brazos muy doblados -->
    <line x1="80" y1="61" x2="72" y2="88" stroke="#94a3b8" stroke-width="4"/>
    <line x1="120" y1="61" x2="128" y2="88" stroke="#94a3b8" stroke-width="4"/>
    <line x1="72" y1="88" x2="128" y2="88" stroke="#94a3b8" stroke-width="4"/>
    <!-- cabeza arriba -->
    <circle cx="100" cy="75" r="10" fill="#94a3b8"/>
    <!-- torso -->
    <line x1="100" y1="88" x2="100" y2="158" stroke="#94a3b8" stroke-width="4"/>
    <!-- piernas -->
    <line x1="100" y1="158" x2="90" y2="210" stroke="#94a3b8" stroke-width="4"/>
    <line x1="90" y1="210" x2="86" y2="245" stroke="#94a3b8" stroke-width="4"/>
    <line x1="100" y1="158" x2="110" y2="210" stroke="#94a3b8" stroke-width="4"/>
    <line x1="110" y1="210" x2="114" y2="245" stroke="#94a3b8" stroke-width="4"/>
  </g>

  <!-- Frame 3: por encima de las anillas, brazos extendidos (soporte) -->
  <g class="fr3" fill="none" stroke-linecap="round">
    <!-- cuerpo por encima de las anillas -->
    <circle cx="100" cy="38" r="10" fill="#94a3b8"/>
    <!-- torso sobre las anillas -->
    <line x1="100" y1="48" x2="100" y2="118" stroke="#94a3b8" stroke-width="4"/>
    <!-- brazos extendidos hacia abajo a las anillas -->
    <line x1="100" y1="68" x2="80" y2="90" stroke="#94a3b8" stroke-width="4"/>
    <line x1="80" y1="90" x2="80" y2="61" stroke="#94a3b8" stroke-width="3"/>
    <line x1="100" y1="68" x2="120" y2="90" stroke="#94a3b8" stroke-width="4"/>
    <line x1="120" y1="90" x2="120" y2="61" stroke="#94a3b8" stroke-width="3"/>
    <!-- piernas colgando -->
    <line x1="100" y1="118" x2="90" y2="175" stroke="#94a3b8" stroke-width="4"/>
    <line x1="90" y1="175" x2="86" y2="225" stroke="#94a3b8" stroke-width="4"/>
    <line x1="100" y1="118" x2="110" y2="175" stroke="#94a3b8" stroke-width="4"/>
    <line x1="110" y1="175" x2="114" y2="225" stroke="#94a3b8" stroke-width="4"/>
  </g>
</svg>
