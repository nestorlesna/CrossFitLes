<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="200" height="240" fill="#111827" rx="12"/>
  <!-- Bar -->
  <line x1="30" y1="30" x2="170" y2="30" stroke="#475569" stroke-width="6" stroke-linecap="round"/>
  <line x1="30" y1="22" x2="30" y2="38" stroke="#475569" stroke-width="4" stroke-linecap="round"/>
  <line x1="170" y1="22" x2="170" y2="38" stroke="#475569" stroke-width="4" stroke-linecap="round"/>
  <text x="100" y="237" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" font-weight="700" fill="#475569" letter-spacing="2">BAR MUSCLE-UP</text>
  <!-- Frame 1: Kipping swing, body behind bar -->
  <g class="f1">
    <circle cx="100" cy="68" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="88" y1="58" x2="80" y2="30"/><line x1="112" y1="58" x2="120" y2="30"/>
      <line x1="88" y1="58" x2="112" y2="58"/>
      <line x1="100" y1="80" x2="100" y2="138"/>
      <!-- Legs swinging forward -->
      <line x1="95" y1="138" x2="72" y2="158"/><line x1="72" y1="158" x2="62" y2="195"/>
      <line x1="105" y1="138" x2="128" y2="162"/><line x1="128" y1="162" x2="138" y2="200"/>
    </g>
    <circle cx="80" cy="30" r="5" fill="#64748b"/>
    <circle cx="120" cy="30" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 2: Transition - hips to bar, pulling over -->
  <g class="f2">
    <circle cx="100" cy="40" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Hips near bar level, elbows bending -->
      <line x1="88" y1="32" x2="80" y2="30"/><line x1="112" y1="32" x2="120" y2="30"/>
      <line x1="88" y1="32" x2="112" y2="32"/>
      <line x1="100" y1="52" x2="100" y2="100"/>
      <!-- Body nearly horizontal, hips high -->
      <line x1="95" y1="100" x2="70" y2="88"/><line x1="70" y1="88" x2="52" y2="106"/>
      <line x1="105" y1="100" x2="130" y2="92"/><line x1="130" y1="92" x2="150" y2="110"/>
    </g>
    <circle cx="80" cy="30" r="5" fill="#64748b"/>
    <circle cx="120" cy="30" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 3: Support position - chest over bar, arms extended -->
  <g class="f3">
    <circle cx="100" cy="55" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Body above bar, arms pressing -->
      <line x1="88" y1="48" x2="78" y2="30"/><line x1="112" y1="48" x2="122" y2="30"/>
      <line x1="88" y1="48" x2="112" y2="48"/>
      <!-- Torso upright above bar -->
      <line x1="100" y1="67" x2="100" y2="118"/>
      <line x1="95" y1="118" x2="88" y2="170"/><line x1="88" y1="170" x2="84" y2="215"/>
      <line x1="105" y1="118" x2="112" y2="170"/><line x1="112" y1="170" x2="116" y2="215"/>
    </g>
    <circle cx="78" cy="30" r="5" fill="#64748b"/>
    <circle cx="122" cy="30" r="5" fill="#64748b"/>
  </g>
</svg>
