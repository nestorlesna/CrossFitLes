<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="220" height="220" fill="#111827" rx="12"/>
  <line x1="20" y1="200" x2="200" y2="200" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="110" y="215" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="8" font-weight="700" fill="#475569" letter-spacing="1">DB ALT BENT OVER ROW</text>
  <!-- Frame 1: Both DBs hanging, hinged -->
  <g class="f1">
    <circle cx="110" cy="52" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="110" y1="64" x2="110" y2="118"/>
      <line x1="90" y1="76" x2="130" y2="76"/>
      <line x1="90" y1="76" x2="76" y2="152"/>
      <line x1="130" y1="76" x2="144" y2="152"/>
      <line x1="104" y1="118" x2="96" y2="164"/><line x1="96" y1="164" x2="88" y2="200"/>
      <line x1="116" y1="118" x2="124" y2="164"/><line x1="124" y1="164" x2="132" y2="200"/>
    </g>
    <circle cx="96" cy="164" r="5" fill="#64748b"/>
    <!-- DBs hanging -->
    <rect x="64" y="148" width="18" height="8" rx="2" fill="#475569"/>
    <rect x="132" y="148" width="18" height="8" rx="2" fill="#475569"/>
  </g>
  <!-- Frame 2: Left arm pulling up, right hanging -->
  <g class="f2">
    <circle cx="110" cy="50" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="110" y1="62" x2="110" y2="116"/>
      <line x1="90" y1="74" x2="130" y2="74"/>
      <!-- Left arm pulling up, elbow back -->
      <line x1="90" y1="74" x2="66" y2="58"/><line x1="66" y1="58" x2="70" y2="120"/>
      <!-- Right arm hanging -->
      <line x1="130" y1="74" x2="144" y2="150"/>
      <line x1="104" y1="116" x2="96" y2="162"/><line x1="96" y1="162" x2="88" y2="200"/>
      <line x1="116" y1="116" x2="124" y2="162"/><line x1="124" y1="162" x2="132" y2="200"/>
    </g>
    <circle cx="66" cy="58" r="5" fill="#64748b"/>
    <rect x="58" y="116" width="18" height="8" rx="2" fill="#475569"/>
    <rect x="132" y="146" width="18" height="8" rx="2" fill="#475569"/>
  </g>
  <!-- Frame 3: Right arm pulling up, left hanging -->
  <g class="f3">
    <circle cx="110" cy="50" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="110" y1="62" x2="110" y2="116"/>
      <line x1="90" y1="74" x2="130" y2="74"/>
      <!-- Left arm hanging -->
      <line x1="90" y1="74" x2="76" y2="150"/>
      <!-- Right arm pulling -->
      <line x1="130" y1="74" x2="154" y2="58"/><line x1="154" y1="58" x2="150" y2="120"/>
      <line x1="104" y1="116" x2="96" y2="162"/><line x1="96" y1="162" x2="88" y2="200"/>
      <line x1="116" y1="116" x2="124" y2="162"/><line x1="124" y1="162" x2="132" y2="200"/>
    </g>
    <circle cx="154" cy="58" r="5" fill="#64748b"/>
    <rect x="64" y="146" width="18" height="8" rx="2" fill="#475569"/>
    <rect x="140" y="116" width="18" height="8" rx="2" fill="#475569"/>
  </g>
</svg>
