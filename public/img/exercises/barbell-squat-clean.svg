<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 230">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="220" height="230" fill="#111827" rx="12"/>
  <line x1="20" y1="210" x2="200" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="110" y="225" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="9" font-weight="700" fill="#475569" letter-spacing="2">SQUAT CLEAN</text>
  <!-- Frame 1: Setup - bar on floor -->
  <g class="f1">
    <line x1="36" y1="188" x2="184" y2="188" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <rect x="30" y="180" width="8" height="16" rx="2" fill="#475569"/>
    <rect x="182" y="180" width="8" height="16" rx="2" fill="#475569"/>
    <circle cx="110" cy="72" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="110" y1="84" x2="110" y2="132"/>
      <line x1="90" y1="94" x2="130" y2="94"/>
      <line x1="90" y1="94" x2="68" y2="188"/>
      <line x1="130" y1="94" x2="152" y2="188"/>
      <line x1="104" y1="132" x2="96" y2="175"/><line x1="96" y1="175" x2="88" y2="210"/>
      <line x1="116" y1="132" x2="124" y2="175"/><line x1="124" y1="175" x2="132" y2="210"/>
    </g>
    <circle cx="96" cy="175" r="5" fill="#64748b"/>
    <circle cx="124" cy="175" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 2: High pull - shrug, elbows up -->
  <g class="f2">
    <line x1="36" y1="106" x2="184" y2="106" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <rect x="30" y="98" width="8" height="16" rx="2" fill="#475569"/>
    <rect x="182" y="98" width="8" height="16" rx="2" fill="#475569"/>
    <circle cx="110" cy="48" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="110" y1="60" x2="110" y2="112"/>
      <line x1="88" y1="72" x2="132" y2="72"/>
      <line x1="88" y1="72" x2="64" y2="60"/><line x1="64" y1="60" x2="70" y2="106"/>
      <line x1="132" y1="72" x2="156" y2="60"/><line x1="156" y1="60" x2="150" y2="106"/>
      <line x1="104" y1="112" x2="96" y2="162"/><line x1="96" y1="162" x2="90" y2="210"/>
      <line x1="116" y1="112" x2="124" y2="162"/><line x1="124" y1="162" x2="130" y2="210"/>
    </g>
    <circle cx="64" cy="60" r="5" fill="#64748b"/>
    <circle cx="156" cy="60" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 3: Full squat catch - deep front squat with bar in rack -->
  <g class="f3">
    <line x1="36" y1="124" x2="184" y2="124" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <rect x="30" y="116" width="8" height="16" rx="2" fill="#475569"/>
    <rect x="182" y="116" width="8" height="16" rx="2" fill="#475569"/>
    <circle cx="110" cy="88" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Upright torso in deep squat -->
      <line x1="110" y1="100" x2="110" y2="140"/>
      <!-- Front rack elbows high -->
      <line x1="88" y1="108" x2="132" y2="108"/>
      <line x1="88" y1="108" x2="70" y2="124"/>
      <line x1="132" y1="108" x2="150" y2="124"/>
      <!-- Deep squat legs -->
      <line x1="104" y1="140" x2="76" y2="174"/><line x1="76" y1="174" x2="70" y2="210"/>
      <line x1="116" y1="140" x2="144" y2="174"/><line x1="144" y1="174" x2="150" y2="210"/>
    </g>
    <circle cx="76" cy="174" r="5" fill="#64748b"/>
    <circle cx="144" cy="174" r="5" fill="#64748b"/>
  </g>
</svg>
