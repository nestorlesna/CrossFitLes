<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="200" height="230" fill="#111827" rx="12"/>
  <!-- Pared -->
  <line x1="170" y1="10" x2="170" y2="210" stroke="#374151" stroke-width="4" stroke-linecap="round"/>
  <line x1="30" y1="210" x2="170" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <!-- Marca en la pared (target) -->
  <line x1="162" y1="62" x2="170" y2="62" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
  <text x="95" y="226" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" font-weight="700" fill="#475569" letter-spacing="2">WALL BALL</text>
  <!-- Frame 1: Squat profundo, pelota al pecho -->
  <g class="f1">
    <circle cx="100" cy="88" r="13" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="100" y1="101" x2="97" y2="152"/>
      <line x1="78" y1="114" x2="122" y2="114"/>
      <line x1="78" y1="114" x2="66" y2="126"/><line x1="122" y1="114" x2="134" y2="126"/>
      <line x1="93" y1="152" x2="66" y2="170"/><line x1="66" y1="170" x2="70" y2="205"/>
      <line x1="101" y1="152" x2="130" y2="170"/><line x1="130" y1="170" x2="126" y2="205"/>
      <line x1="54" y1="205" x2="82" y2="205"/><line x1="114" y1="205" x2="140" y2="205"/>
    </g>
    <circle cx="66" cy="170" r="5" fill="#64748b"/><circle cx="130" cy="170" r="5" fill="#64748b"/>
    <!-- Pelota al pecho -->
    <circle cx="100" cy="124" r="12" fill="none" stroke="#64748b" stroke-width="4"/>
  </g>
  <!-- Frame 2: Subiendo, empujando la pelota -->
  <g class="f2">
    <circle cx="95" cy="52" r="13" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="95" y1="65" x2="95" y2="122"/>
      <line x1="74" y1="78" x2="116" y2="78"/>
      <line x1="74" y1="78" x2="62" y2="90"/><line x1="116" y1="78" x2="132" y2="84"/>
      <line x1="62" y1="90" x2="78" y2="106"/><line x1="132" y1="84" x2="118" y2="100"/>
      <line x1="90" y1="122" x2="76" y2="165"/><line x1="76" y1="165" x2="78" y2="205"/>
      <line x1="100" y1="122" x2="118" y2="165"/><line x1="118" y1="165" x2="114" y2="205"/>
      <line x1="64" y1="205" x2="92" y2="205"/><line x1="102" y1="205" x2="128" y2="205"/>
    </g>
    <circle cx="76" cy="165" r="5" fill="#64748b"/><circle cx="118" cy="165" r="5" fill="#64748b"/>
    <!-- Pelota empujando hacia arriba -->
    <circle cx="105" cy="85" r="12" fill="none" stroke="#64748b" stroke-width="4"/>
  </g>
  <!-- Frame 3: De pie, pelota en la pared arriba -->
  <g class="f3">
    <circle cx="90" cy="36" r="13" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="90" y1="49" x2="90" y2="112"/>
      <line x1="68" y1="62" x2="112" y2="62"/>
      <!-- Brazos extendidos hacia la pared -->
      <line x1="68" y1="62" x2="55" y2="82"/><line x1="112" y1="62" x2="140" y2="50"/>
      <line x1="140" y1="50" x2="152" y2="62"/>
      <line x1="85" y1="112" x2="83" y2="165"/><line x1="83" y1="165" x2="83" y2="205"/>
      <line x1="95" y1="112" x2="97" y2="165"/><line x1="97" y1="165" x2="97" y2="205"/>
      <line x1="69" y1="205" x2="97" y2="205"/><line x1="83" y1="205" x2="111" y2="205"/>
    </g>
    <!-- Pelota en la pared (alta) -->
    <circle cx="158" cy="62" r="12" fill="none" stroke="#64748b" stroke-width="4"/>
  </g>
</svg>
