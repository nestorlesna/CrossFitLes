<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="200" height="230" fill="#111827" rx="12"/>
  <line x1="30" y1="210" x2="170" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="100" y="226" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" font-weight="700" fill="#475569" letter-spacing="2">CLEAN &amp; JERK</text>
  <!-- Frame 1: Front rack (después del clean) -->
  <g class="f1">
    <line x1="52" y1="76" x2="148" y2="76" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <rect x="46" y="68" width="8" height="16" rx="2" fill="#475569"/>
    <rect x="146" y="68" width="8" height="16" rx="2" fill="#475569"/>
    <circle cx="100" cy="40" r="13" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="100" y1="53" x2="100" y2="118"/>
      <line x1="78" y1="66" x2="122" y2="66"/>
      <line x1="78" y1="66" x2="58" y2="76"/><line x1="122" y1="66" x2="142" y2="76"/>
      <line x1="95" y1="118" x2="93" y2="168"/><line x1="93" y1="168" x2="93" y2="205"/>
      <line x1="105" y1="118" x2="107" y2="168"/><line x1="107" y1="168" x2="107" y2="205"/>
      <line x1="79" y1="205" x2="107" y2="205"/><line x1="93" y1="205" x2="121" y2="205"/>
    </g>
  </g>
  <!-- Frame 2: Dip del jerk (rodillas levemente dobladas) -->
  <g class="f2">
    <line x1="52" y1="82" x2="148" y2="82" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <rect x="46" y="74" width="8" height="16" rx="2" fill="#475569"/>
    <rect x="146" y="74" width="8" height="16" rx="2" fill="#475569"/>
    <circle cx="100" cy="48" r="13" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="100" y1="61" x2="100" y2="122"/>
      <line x1="78" y1="73" x2="122" y2="73"/>
      <line x1="78" y1="73" x2="58" y2="82"/><line x1="122" y1="73" x2="142" y2="82"/>
      <!-- Dip: rodillas levemente dobladas -->
      <line x1="95" y1="122" x2="90" y2="170"/><line x1="90" y1="170" x2="92" y2="205"/>
      <line x1="105" y1="122" x2="112" y2="170"/><line x1="112" y1="170" x2="108" y2="205"/>
      <line x1="78" y1="205" x2="106" y2="205"/><line x1="96" y1="205" x2="122" y2="205"/>
    </g>
    <circle cx="90" cy="170" r="5" fill="#64748b"/><circle cx="112" cy="170" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 3: Jerk overhead (split o power jerk) -->
  <g class="f3">
    <line x1="52" y1="18" x2="148" y2="18" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <rect x="46" y="10" width="8" height="16" rx="2" fill="#475569"/>
    <rect x="146" y="10" width="8" height="16" rx="2" fill="#475569"/>
    <circle cx="100" cy="46" r="13" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="100" y1="59" x2="100" y2="120"/>
      <line x1="78" y1="72" x2="122" y2="72"/>
      <!-- Brazos extendidos overhead -->
      <line x1="78" y1="72" x2="68" y2="38"/><line x1="122" y1="72" x2="132" y2="38"/>
      <line x1="68" y1="38" x2="68" y2="18"/><line x1="132" y1="38" x2="132" y2="18"/>
      <!-- Split jerk: pierna delantera adelante, trasera atrás -->
      <line x1="95" y1="120" x2="72" y2="168"/><line x1="72" y1="168" x2="68" y2="205"/>
      <line x1="105" y1="120" x2="128" y2="162"/><line x1="128" y1="162" x2="140" y2="205"/>
      <line x1="54" y1="205" x2="82" y2="205"/><line x1="128" y1="200" x2="152" y2="200"/>
    </g>
    <circle cx="72" cy="168" r="5" fill="#64748b"/><circle cx="128" cy="162" r="5" fill="#64748b"/>
  </g>
</svg>
