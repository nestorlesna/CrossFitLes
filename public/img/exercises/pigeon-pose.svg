<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
<rect width="200" height="230" fill="#111827" rx="12"/>
<style>
.f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
@keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
@keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
@keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
</style>
<!-- F1: Starting position on hands and knees -->
<g class="f1">
  <circle cx="145" cy="90" r="12" fill="#94a3b8"/>
  <line x1="133" y1="98" x2="80" y2="115" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="133" y1="98" x2="148" y2="145" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="148" y1="145" x2="155" y2="175" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="155" y1="175" x2="158" y2="205" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="80" y1="115" x2="55" y2="145" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="55" y1="145" x2="48" y2="175" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="48" y1="175" x2="44" y2="205" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <circle cx="148" cy="145" r="5" fill="#64748b"/>
  <circle cx="55" cy="145" r="5" fill="#64748b"/>
  <circle cx="158" cy="205" r="6" fill="#64748b"/>
  <circle cx="44" cy="205" r="6" fill="#64748b"/>
</g>
<!-- F2: Pigeon setup, front leg bent, upper body raised -->
<g class="f2">
  <circle cx="130" cy="80" r="12" fill="#94a3b8"/>
  <line x1="120" y1="90" x2="85" y2="128" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="100" y1="108" x2="60" y2="118" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="60" y1="118" x2="38" y2="145" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="100" y1="108" x2="120" y2="120" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="85" y1="128" x2="68" y2="162" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="68" y1="162" x2="78" y2="195" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="85" y1="128" x2="148" y2="148" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="148" y1="148" x2="162" y2="180" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <circle cx="68" cy="162" r="5" fill="#64748b"/>
  <circle cx="148" cy="148" r="5" fill="#64748b"/>
</g>
<!-- F3: Full pigeon, torso lowered over bent leg -->
<g class="f3">
  <circle cx="115" cy="118" r="12" fill="#94a3b8"/>
  <line x1="104" y1="126" x2="65" y2="150" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="85" y1="138" x2="50" y2="148" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="50" y1="148" x2="30" y2="165" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="85" y1="138" x2="118" y2="148" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="118" y1="148" x2="142" y2="158" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="65" y1="150" x2="55" y2="175" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="55" y1="175" x2="62" y2="200" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="65" y1="150" x2="148" y2="162" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="148" y1="162" x2="162" y2="185" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <circle cx="55" cy="175" r="5" fill="#64748b"/>
  <circle cx="148" cy="162" r="5" fill="#64748b"/>
</g>
<line x1="30" y1="210" x2="170" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
<text x="100" y="225" text-anchor="middle" font-family="monospace" font-size="10" fill="#475569">PIGEON POSE</text>
</svg>
