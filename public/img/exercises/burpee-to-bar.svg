<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
  <rect width="200" height="230" fill="#111827" rx="12"/>
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>

  <!-- barra de dominadas fija -->
  <line x1="55" y1="22" x2="145" y2="22" stroke="#64748b" stroke-width="5" stroke-linecap="round"/>
  <line x1="55" y1="18" x2="55" y2="26" stroke="#64748b" stroke-width="3"/>
  <line x1="145" y1="18" x2="145" y2="26" stroke="#64748b" stroke-width="3"/>

  <!-- F1: de pie, posición inicial -->
  <g class="f1" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" fill="none">
    <circle cx="100" cy="50" r="14" fill="#94a3b8" stroke="none"/>
    <line x1="100" y1="64" x2="100" y2="132"/>
    <line x1="100" y1="84" x2="78" y2="112"/>
    <line x1="100" y1="84" x2="122" y2="112"/>
    <line x1="100" y1="132" x2="88" y2="175"/>
    <line x1="88" y1="175" x2="88" y2="205"/>
    <line x1="100" y1="132" x2="112" y2="175"/>
    <line x1="112" y1="175" x2="112" y2="205"/>
    <line x1="78" y1="205" x2="98" y2="205"/>
    <line x1="102" y1="205" x2="122" y2="205"/>
  </g>

  <!-- F2: plancha baja (posición burpee abajo) -->
  <g class="f2" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" fill="none">
    <circle cx="152" cy="100" r="13" fill="#94a3b8" stroke="none"/>
    <!-- cuerpo horizontal -->
    <line x1="139" y1="110" x2="62" y2="120"/>
    <!-- brazos extendidos en suelo -->
    <line x1="139" y1="110" x2="132" y2="140"/>
    <line x1="139" y1="110" x2="146" y2="140"/>
    <circle cx="132" cy="142" r="4" fill="#64748b" stroke="none"/>
    <circle cx="146" cy="142" r="4" fill="#64748b" stroke="none"/>
    <!-- piernas hacia atrás -->
    <line x1="62" y1="120" x2="48" y2="152"/>
    <line x1="48" y1="152" x2="42" y2="175"/>
    <line x1="62" y1="120" x2="72" y2="152"/>
    <line x1="72" y1="152" x2="70" y2="175"/>
    <line x1="32" y1="175" x2="52" y2="175"/>
    <line x1="60" y1="175" x2="80" y2="175"/>
  </g>

  <!-- F3: saltando, manos agarrando la barra -->
  <g class="f3" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" fill="none">
    <circle cx="100" cy="44" r="13" fill="#94a3b8" stroke="none"/>
    <!-- brazos extendidos hacia arriba agarrando la barra -->
    <line x1="100" y1="58" x2="82" y2="28"/>
    <line x1="100" y1="58" x2="118" y2="28"/>
    <circle cx="82" cy="26" r="4" fill="#64748b" stroke="none"/>
    <circle cx="118" cy="26" r="4" fill="#64748b" stroke="none"/>
    <!-- cuerpo en el aire -->
    <line x1="100" y1="58" x2="100" y2="128"/>
    <!-- piernas dobladas en el aire -->
    <line x1="100" y1="128" x2="85" y2="165"/>
    <line x1="85" y1="165" x2="88" y2="190"/>
    <line x1="100" y1="128" x2="115" y2="165"/>
    <line x1="115" y1="165" x2="112" y2="190"/>
  </g>

  <line x1="30" y1="210" x2="170" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="100" y="225" text-anchor="middle" font-family="monospace" font-size="10" fill="#475569">BURPEE TO BAR</text>
</svg>
