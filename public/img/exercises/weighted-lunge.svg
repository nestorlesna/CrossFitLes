<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
<rect width="200" height="230" fill="#111827" rx="12"/>
<style>
.f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
@keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
@keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
@keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
</style>
<!-- F1: Standing, weight at shoulders -->
<g class="f1">
  <circle cx="100" cy="26" r="13" fill="#94a3b8"/>
  <line x1="100" y1="39" x2="100" y2="108" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="100" y1="52" x2="76" y2="60" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="76" y1="60" x2="72" y2="80" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="100" y1="52" x2="124" y2="60" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="124" y1="60" x2="128" y2="80" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <circle cx="100" cy="50" r="8" fill="#64748b" opacity="0.6"/>
  <line x1="100" y1="108" x2="86" y2="162" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="86" y1="162" x2="82" y2="205" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="100" y1="108" x2="114" y2="162" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="114" y1="162" x2="118" y2="205" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
</g>
<!-- F2: Lunge step forward (left leg forward) -->
<g class="f2">
  <circle cx="100" cy="35" r="13" fill="#94a3b8"/>
  <line x1="100" y1="48" x2="100" y2="115" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="100" y1="60" x2="76" y2="68" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="76" y1="68" x2="72" y2="88" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="100" y1="60" x2="124" y2="68" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="124" y1="68" x2="128" y2="88" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <circle cx="100" cy="58" r="8" fill="#64748b" opacity="0.6"/>
  <line x1="100" y1="115" x2="72" y2="160" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="72" y1="160" x2="60" y2="205" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="100" y1="115" x2="118" y2="158" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="118" y1="158" x2="118" y2="205" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <circle cx="72" cy="160" r="5" fill="#64748b"/>
  <circle cx="118" cy="158" r="5" fill="#64748b"/>
</g>
<!-- F3: Bottom of lunge, back knee near ground -->
<g class="f3">
  <circle cx="100" cy="42" r="13" fill="#94a3b8"/>
  <line x1="100" y1="55" x2="100" y2="122" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="100" y1="68" x2="76" y2="76" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="76" y1="76" x2="72" y2="96" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="100" y1="68" x2="124" y2="76" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="124" y1="76" x2="128" y2="96" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <circle cx="100" cy="66" r="8" fill="#64748b" opacity="0.6"/>
  <line x1="100" y1="122" x2="68" y2="168" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="68" y1="168" x2="56" y2="205" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="100" y1="122" x2="122" y2="165" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="122" y1="165" x2="128" y2="205" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <circle cx="68" cy="168" r="5" fill="#64748b"/>
  <circle cx="122" cy="165" r="5" fill="#64748b"/>
</g>
<line x1="30" y1="210" x2="170" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
<text x="100" y="225" text-anchor="middle" font-family="monospace" font-size="10" fill="#475569">WEIGHTED LUNGE</text>
</svg>
