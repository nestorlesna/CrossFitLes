<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="200" height="230" fill="#111827" rx="12"/>
  <line x1="20" y1="210" x2="180" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="100" y="225" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="9" font-weight="700" fill="#475569" letter-spacing="2">KB FRONT SQUAT</text>
  <!-- Frame 1: Standing, KB in rack position at shoulder -->
  <g class="f1">
    <circle cx="100" cy="40" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="100" y1="52" x2="100" y2="114"/>
      <line x1="80" y1="64" x2="120" y2="64"/>
      <!-- KBs racked at shoulders -->
      <line x1="80" y1="64" x2="70" y2="88"/>
      <line x1="120" y1="64" x2="130" y2="88"/>
      <line x1="94" y1="114" x2="90" y2="164"/><line x1="90" y1="164" x2="84" y2="210"/>
      <line x1="106" y1="114" x2="110" y2="164"/><line x1="110" y1="164" x2="116" y2="210"/>
    </g>
    <circle cx="90" cy="164" r="5" fill="#64748b"/>
    <circle cx="110" cy="164" r="5" fill="#64748b"/>
    <!-- KB icons at elbows -->
    <circle cx="68" cy="92" r="9" fill="none" stroke="#475569" stroke-width="4"/>
    <line x1="62" y1="84" x2="74" y2="84" stroke="#475569" stroke-width="3" stroke-linecap="round"/>
    <circle cx="132" cy="92" r="9" fill="none" stroke="#475569" stroke-width="4"/>
    <line x1="126" y1="84" x2="138" y2="84" stroke="#475569" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- Frame 2: Parallel squat, KBs still racked -->
  <g class="f2">
    <circle cx="100" cy="72" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="100" y1="84" x2="100" y2="138"/>
      <line x1="80" y1="96" x2="120" y2="96"/>
      <line x1="80" y1="96" x2="70" y2="118"/>
      <line x1="120" y1="96" x2="130" y2="118"/>
      <!-- Parallel squat -->
      <line x1="94" y1="138" x2="78" y2="172"/><line x1="78" y1="172" x2="68" y2="210"/>
      <line x1="106" y1="138" x2="122" y2="172"/><line x1="122" y1="172" x2="132" y2="210"/>
    </g>
    <circle cx="78" cy="172" r="5" fill="#64748b"/>
    <circle cx="122" cy="172" r="5" fill="#64748b"/>
    <circle cx="68" cy="122" r="9" fill="none" stroke="#475569" stroke-width="4"/>
    <line x1="62" y1="114" x2="74" y2="114" stroke="#475569" stroke-width="3" stroke-linecap="round"/>
    <circle cx="132" cy="122" r="9" fill="none" stroke="#475569" stroke-width="4"/>
    <line x1="126" y1="114" x2="138" y2="114" stroke="#475569" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- Frame 3: Deep squat -->
  <g class="f3">
    <circle cx="100" cy="100" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="100" y1="112" x2="100" y2="154"/>
      <line x1="80" y1="124" x2="120" y2="124"/>
      <line x1="80" y1="124" x2="70" y2="148"/>
      <line x1="120" y1="124" x2="130" y2="148"/>
      <!-- Deep squat legs wide -->
      <line x1="94" y1="154" x2="68" y2="182"/><line x1="68" y1="182" x2="58" y2="210"/>
      <line x1="106" y1="154" x2="132" y2="182"/><line x1="132" y1="182" x2="142" y2="210"/>
    </g>
    <circle cx="68" cy="182" r="5" fill="#64748b"/>
    <circle cx="132" cy="182" r="5" fill="#64748b"/>
    <circle cx="68" cy="152" r="9" fill="none" stroke="#475569" stroke-width="4"/>
    <line x1="62" y1="144" x2="74" y2="144" stroke="#475569" stroke-width="3" stroke-linecap="round"/>
    <circle cx="132" cy="152" r="9" fill="none" stroke="#475569" stroke-width="4"/>
    <line x1="126" y1="144" x2="138" y2="144" stroke="#475569" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
