<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 230">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="240" height="230" fill="#111827" rx="12"/>
  <line x1="20" y1="210" x2="220" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="120" y="225" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="8" font-weight="700" fill="#475569" letter-spacing="1">LATERAL RAISE TO OH</text>
  <!-- Frame 1: Arms at sides, discs hanging -->
  <g class="f1">
    <circle cx="120" cy="26" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="120" y1="38" x2="120" y2="110"/>
      <line x1="96" y1="50" x2="144" y2="50"/>
      <line x1="96" y1="50" x2="86" y2="100"/>
      <line x1="144" y1="50" x2="154" y2="100"/>
      <line x1="120" y1="110" x2="113" y2="162"/><line x1="113" y1="162" x2="113" y2="205"/>
      <line x1="120" y1="110" x2="127" y2="162"/><line x1="127" y1="162" x2="127" y2="205"/>
      <line x1="98" y1="205" x2="126" y2="205"/>
      <line x1="114" y1="205" x2="142" y2="205"/>
    </g>
    <circle cx="113" cy="162" r="4" fill="#64748b"/>
    <circle cx="127" cy="162" r="4" fill="#64748b"/>
    <rect x="74" y="97" width="16" height="7" rx="2" fill="#475569"/>
    <rect x="150" y="97" width="16" height="7" rx="2" fill="#475569"/>
  </g>
  <!-- Frame 2: Arms at horizontal (T) - lateral raise position -->
  <g class="f2">
    <circle cx="120" cy="26" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="120" y1="38" x2="120" y2="110"/>
      <line x1="96" y1="50" x2="144" y2="50"/>
      <line x1="96" y1="50" x2="34" y2="50"/>
      <line x1="144" y1="50" x2="206" y2="50"/>
      <line x1="120" y1="110" x2="113" y2="162"/><line x1="113" y1="162" x2="113" y2="205"/>
      <line x1="120" y1="110" x2="127" y2="162"/><line x1="127" y1="162" x2="127" y2="205"/>
      <line x1="98" y1="205" x2="126" y2="205"/>
      <line x1="114" y1="205" x2="142" y2="205"/>
    </g>
    <circle cx="113" cy="162" r="4" fill="#64748b"/>
    <circle cx="127" cy="162" r="4" fill="#64748b"/>
    <rect x="18" y="46" width="18" height="7" rx="2" fill="#475569"/>
    <rect x="203" y="46" width="18" height="7" rx="2" fill="#475569"/>
  </g>
  <!-- Frame 3: Arms overhead, completed -->
  <g class="f3">
    <circle cx="120" cy="26" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="120" y1="38" x2="120" y2="110"/>
      <line x1="96" y1="50" x2="144" y2="50"/>
      <line x1="96" y1="50" x2="80" y2="14"/>
      <line x1="144" y1="50" x2="160" y2="14"/>
      <line x1="120" y1="110" x2="113" y2="162"/><line x1="113" y1="162" x2="113" y2="205"/>
      <line x1="120" y1="110" x2="127" y2="162"/><line x1="127" y1="162" x2="127" y2="205"/>
      <line x1="98" y1="205" x2="126" y2="205"/>
      <line x1="114" y1="205" x2="142" y2="205"/>
    </g>
    <circle cx="113" cy="162" r="4" fill="#64748b"/>
    <circle cx="127" cy="162" r="4" fill="#64748b"/>
    <rect x="70" y="7" width="16" height="7" rx="2" fill="#475569"/>
    <rect x="152" y="7" width="16" height="7" rx="2" fill="#475569"/>
  </g>
</svg>
