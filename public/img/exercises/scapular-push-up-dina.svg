<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
  <rect width="200" height="230" fill="#111827" rx="12"/>
  <style>
    .f1{animation:sh1 4s linear infinite}
    .f2{animation:sh2 4s linear infinite}
    .f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>

  <!-- Frame 1: Cuadrupedia neutral – espalda plana -->
  <g class="f1">
    <circle cx="43" cy="118" r="12" fill="#94a3b8"/>
    <circle cx="55" cy="158" r="4" fill="#64748b"/>
    <circle cx="148" cy="200" r="5" fill="#64748b"/>
    <g stroke="#94a3b8" stroke-width="3.5" stroke-linecap="round" fill="none">
      <!-- Cuello -->
      <line x1="43" y1="106" x2="66" y2="112"/>
      <!-- Torso plano -->
      <line x1="66" y1="112" x2="142" y2="116"/>
      <!-- Brazo superior -->
      <line x1="66" y1="112" x2="55" y2="158"/>
      <!-- Antebrazo -->
      <line x1="55" y1="158" x2="48" y2="202"/>
      <!-- Mano en el suelo -->
      <line x1="38" y1="207" x2="58" y2="207"/>
      <!-- Muslo -->
      <line x1="142" y1="116" x2="148" y2="200"/>
      <!-- Espinilla y pie en el suelo (hacia atrás) -->
      <line x1="148" y1="200" x2="168" y2="207"/>
    </g>
  </g>

  <!-- Frame 2: Protracción – "perro malo", espalda arqueada hacia arriba -->
  <g class="f2">
    <circle cx="43" cy="125" r="12" fill="#94a3b8"/>
    <circle cx="53" cy="165" r="4" fill="#64748b"/>
    <circle cx="146" cy="200" r="5" fill="#64748b"/>
    <g stroke="#94a3b8" stroke-width="3.5" stroke-linecap="round" fill="none">
      <!-- Cuello (cabeza cae, mira al suelo) -->
      <line x1="43" y1="113" x2="64" y2="120"/>
      <!-- Torso arqueado HACIA ARRIBA (espalda de gato) -->
      <path d="M 64,120 Q 103,100 140,118" fill="none"/>
      <!-- Brazo superior -->
      <line x1="64" y1="120" x2="53" y2="165"/>
      <!-- Antebrazo -->
      <line x1="53" y1="165" x2="46" y2="202"/>
      <!-- Mano en el suelo -->
      <line x1="36" y1="207" x2="56" y2="207"/>
      <!-- Muslo -->
      <line x1="140" y1="118" x2="146" y2="200"/>
      <!-- Espinilla -->
      <line x1="146" y1="200" x2="166" y2="207"/>
    </g>
  </g>

  <!-- Frame 3: Retracción – "perro bueno", omóplatos juntos, pecho abre -->
  <g class="f3">
    <circle cx="43" cy="112" r="12" fill="#94a3b8"/>
    <circle cx="57" cy="155" r="4" fill="#64748b"/>
    <circle cx="149" cy="200" r="5" fill="#64748b"/>
    <g stroke="#94a3b8" stroke-width="3.5" stroke-linecap="round" fill="none">
      <!-- Cuello (cabeza levantada, mira al frente) -->
      <line x1="43" y1="100" x2="67" y2="110"/>
      <!-- Torso con leve hundimiento (espalda ligeramente arqueada hacia abajo) -->
      <path d="M 67,110 Q 104,124 143,114" fill="none"/>
      <!-- Brazo superior -->
      <line x1="67" y1="110" x2="57" y2="155"/>
      <!-- Antebrazo -->
      <line x1="57" y1="155" x2="50" y2="202"/>
      <!-- Mano en el suelo -->
      <line x1="40" y1="207" x2="60" y2="207"/>
      <!-- Muslo -->
      <line x1="143" y1="114" x2="149" y2="200"/>
      <!-- Espinilla -->
      <line x1="149" y1="200" x2="169" y2="207"/>
    </g>
  </g>

  <!-- Línea de suelo y etiqueta -->
  <line x1="20" y1="210" x2="180" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="100" y="225" font-family="sans-serif" font-size="9" fill="#475569" text-anchor="middle" letter-spacing="0.5">SCAPULAR PUSH-UP</text>
</svg>
