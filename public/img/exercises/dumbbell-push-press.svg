<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 230">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="220" height="230" fill="#111827" rx="12"/>
  <line x1="20" y1="210" x2="200" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="110" y="225" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="9" font-weight="700" fill="#475569" letter-spacing="2">DB PUSH PRESS</text>
  <!-- Frame 1: Dip - DBs in rack, knees slightly bent -->
  <g class="f1">
    <circle cx="110" cy="30" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="110" y1="42" x2="110" y2="112"/>
      <line x1="86" y1="58" x2="134" y2="58"/>
      <!-- Arms in rack position (elbows forward) -->
      <line x1="86" y1="58" x2="76" y2="74"/>
      <line x1="134" y1="58" x2="144" y2="74"/>
      <!-- Knees slightly bent (dip) -->
      <line x1="110" y1="112" x2="102" y2="162"/><line x1="102" y1="162" x2="100" y2="205"/>
      <line x1="110" y1="112" x2="118" y2="162"/><line x1="118" y1="162" x2="120" y2="205"/>
      <line x1="85" y1="205" x2="113" y2="205"/>
      <line x1="106" y1="205" x2="134" y2="205"/>
    </g>
    <circle cx="102" cy="162" r="4" fill="#64748b"/>
    <circle cx="118" cy="162" r="4" fill="#64748b"/>
    <!-- DBs at rack (shoulder height, forearms vertical) -->
    <rect x="60" y="68" width="18" height="8" rx="2" fill="#475569"/>
    <rect x="140" y="68" width="18" height="8" rx="2" fill="#475569"/>
  </g>
  <!-- Frame 2: Drive - legs extending, DBs starting to press -->
  <g class="f2">
    <circle cx="110" cy="24" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="110" y1="36" x2="110" y2="106"/>
      <line x1="86" y1="52" x2="134" y2="52"/>
      <!-- Arms starting to press -->
      <line x1="86" y1="52" x2="72" y2="32"/>
      <line x1="134" y1="52" x2="148" y2="32"/>
      <!-- Legs nearly straight -->
      <line x1="110" y1="106" x2="104" y2="158"/><line x1="104" y1="158" x2="102" y2="200"/>
      <line x1="110" y1="106" x2="116" y2="158"/><line x1="116" y1="158" x2="118" y2="200"/>
      <line x1="87" y1="200" x2="115" y2="200"/>
      <line x1="104" y1="200" x2="132" y2="200"/>
    </g>
    <circle cx="104" cy="158" r="4" fill="#64748b"/>
    <circle cx="116" cy="158" r="4" fill="#64748b"/>
    <rect x="56" y="25" width="18" height="8" rx="2" fill="#475569"/>
    <rect x="144" y="25" width="18" height="8" rx="2" fill="#475569"/>
  </g>
  <!-- Frame 3: Lockout - DBs overhead, on toes -->
  <g class="f3">
    <circle cx="110" cy="24" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="110" y1="36" x2="110" y2="110"/>
      <line x1="86" y1="52" x2="134" y2="52"/>
      <!-- Arms fully extended overhead -->
      <line x1="86" y1="52" x2="74" y2="12"/>
      <line x1="134" y1="52" x2="146" y2="12"/>
      <!-- On toes, legs straight -->
      <line x1="110" y1="110" x2="104" y2="160"/><line x1="104" y1="160" x2="102" y2="200"/>
      <line x1="110" y1="110" x2="116" y2="160"/><line x1="116" y1="160" x2="118" y2="200"/>
      <line x1="87" y1="200" x2="115" y2="200"/>
      <line x1="104" y1="200" x2="132" y2="200"/>
    </g>
    <circle cx="104" cy="160" r="4" fill="#64748b"/>
    <circle cx="116" cy="160" r="4" fill="#64748b"/>
    <!-- DBs overhead -->
    <rect x="58" y="6" width="18" height="8" rx="2" fill="#475569"/>
    <rect x="142" y="6" width="18" height="8" rx="2" fill="#475569"/>
  </g>
</svg>
