<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
<rect width="200" height="230" fill="#111827" rx="12"/>
<style>
.f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
@keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
@keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
@keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
</style>
<!-- F1: Lying on back, arms at sides, flat -->
<g class="f1">
  <circle cx="38" cy="148" r="12" fill="#94a3b8"/>
  <line x1="50" y1="146" x2="150" y2="143" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="38" y1="140" x2="38" y2="120" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="38" y1="120" x2="28" y2="108" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="150" y1="143" x2="168" y2="146" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="168" y1="146" x2="178" y2="150" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
</g>
<!-- F2: Arms overhead, slight arch in back -->
<g class="f2">
  <circle cx="38" cy="145" r="12" fill="#94a3b8"/>
  <line x1="50" y1="140" x2="150" y2="138" stroke="#94a3b8" stroke-width="5" stroke-linecap="round"/>
  <line x1="38" y1="135" x2="34" y2="115" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="34" y1="115" x2="28" y2="97" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="150" y1="138" x2="168" y2="142" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="168" y1="142" x2="178" y2="148" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
</g>
<!-- F3: Full stretch, torso arched, arms far overhead -->
<g class="f3">
  <circle cx="42" cy="142" r="12" fill="#94a3b8"/>
  <line x1="54" y1="135" x2="152" y2="130" stroke="#94a3b8" stroke-width="5" stroke-linecap="round"/>
  <line x1="40" y1="130" x2="34" y2="108" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="34" y1="108" x2="26" y2="88" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="26" y1="88" x2="20" y2="70" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="152" y1="130" x2="168" y2="135" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="168" y1="135" x2="178" y2="142" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
</g>
<line x1="30" y1="210" x2="170" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
<text x="100" y="225" text-anchor="middle" font-family="monospace" font-size="9" fill="#475569">SUPINE ABD STRETCH</text>
</svg>
