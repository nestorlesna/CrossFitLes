<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 180">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="260" height="180" fill="#111827" rx="12"/>
  <line x1="20" y1="148" x2="240" y2="148" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="130" y="167" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" font-weight="700" fill="#475569" letter-spacing="2">HOLLOW ROCK</text>
  <!-- Frame 1: Rocking forward - upper body raised, legs slightly up -->
  <g class="f1">
    <circle cx="152" cy="70" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Body in hollow, rocked forward -->
      <line x1="152" y1="82" x2="118" y2="118"/>
      <line x1="130" y1="90" x2="168" y2="82"/>
      <!-- Arms extended overhead/forward -->
      <line x1="130" y1="90" x2="98" y2="78"/>
      <!-- Legs slightly raised -->
      <line x1="118" y1="118" x2="82" y2="112"/>
      <line x1="82" y1="112" x2="46" y2="108"/>
    </g>
    <circle cx="118" cy="118" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 2: Mid rock - balanced, body like a banana -->
  <g class="f2">
    <circle cx="130" cy="74" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Lower back on floor, both ends up -->
      <line x1="130" y1="86" x2="110" y2="118"/>
      <line x1="112" y1="86" x2="148" y2="88"/>
      <!-- Arms overhead -->
      <line x1="112" y1="86" x2="80" y2="76"/>
      <!-- Legs raised -->
      <line x1="110" y1="118" x2="82" y2="108"/>
      <line x1="82" y1="108" x2="50" y2="98"/>
    </g>
    <circle cx="110" cy="118" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 3: Rocked back - feet higher, shoulders up -->
  <g class="f3">
    <circle cx="110" cy="78" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Body rocked backward -->
      <line x1="110" y1="90" x2="100" y2="122"/>
      <line x1="92" y1="90" x2="128" y2="92"/>
      <!-- Arms stretched back/overhead -->
      <line x1="92" y1="90" x2="68" y2="78"/>
      <!-- Feet higher, legs angled up more -->
      <line x1="100" y1="122" x2="78" y2="106"/>
      <line x1="78" y1="106" x2="52" y2="90"/>
    </g>
    <circle cx="100" cy="122" r="5" fill="#64748b"/>
  </g>
</svg>
