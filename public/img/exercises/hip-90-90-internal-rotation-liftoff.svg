<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="200" height="230" fill="#111827" rx="12"/>
  <line x1="20" y1="168" x2="180" y2="168" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="100" y="226" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="8" font-weight="700" fill="#475569" letter-spacing="1">90/90 HIP INT ROT LIFT</text>

  <!-- Frame 1: Seated 90/90, both legs on floor -->
  <g class="f1" stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <circle cx="100" cy="48" r="12" fill="#94a3b8" stroke="none"/>
    <line x1="100" y1="60" x2="100" y2="108"/>
    <line x1="86" y1="74" x2="70" y2="96"/>
    <line x1="114" y1="74" x2="130" y2="96"/>
    <line x1="100" y1="108" x2="62" y2="122"/>
    <line x1="62" y1="122" x2="50" y2="165"/>
    <line x1="100" y1="108" x2="138" y2="122"/>
    <line x1="138" y1="122" x2="150" y2="165"/>
    <circle cx="62" cy="122" r="4" fill="#64748b" stroke="none"/>
    <circle cx="138" cy="122" r="4" fill="#64748b" stroke="none"/>
  </g>

  <!-- Frame 2: Right shin halfway up (internal rotation starting) -->
  <g class="f2" stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <circle cx="100" cy="48" r="12" fill="#94a3b8" stroke="none"/>
    <line x1="100" y1="60" x2="100" y2="108"/>
    <line x1="86" y1="74" x2="70" y2="96"/>
    <line x1="114" y1="74" x2="130" y2="96"/>
    <line x1="100" y1="108" x2="62" y2="122"/>
    <line x1="62" y1="122" x2="50" y2="165"/>
    <line x1="100" y1="108" x2="138" y2="122"/>
    <line x1="138" y1="122" x2="155" y2="140"/>
    <circle cx="62" cy="122" r="4" fill="#64748b" stroke="none"/>
    <circle cx="138" cy="122" r="4" fill="#64748b" stroke="none"/>
  </g>

  <!-- Frame 3: Right shin fully lifted (max internal rotation) -->
  <g class="f3" stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <circle cx="100" cy="48" r="12" fill="#94a3b8" stroke="none"/>
    <line x1="100" y1="60" x2="100" y2="108"/>
    <line x1="86" y1="74" x2="70" y2="96"/>
    <line x1="114" y1="74" x2="130" y2="96"/>
    <line x1="100" y1="108" x2="62" y2="122"/>
    <line x1="62" y1="122" x2="50" y2="165"/>
    <line x1="100" y1="108" x2="138" y2="122"/>
    <line x1="138" y1="122" x2="163" y2="115"/>
    <circle cx="62" cy="122" r="4" fill="#64748b" stroke="none"/>
    <circle cx="138" cy="122" r="4" fill="#64748b" stroke="none"/>
  </g>
</svg>
