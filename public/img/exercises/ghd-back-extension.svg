<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="240" height="200" fill="#111827" rx="12"/>
  <!-- GHD machine frame -->
  <line x1="60" y1="170" x2="200" y2="170" stroke="#374151" stroke-width="4" stroke-linecap="round"/>
  <line x1="100" y1="130" x2="100" y2="170" stroke="#374151" stroke-width="5" stroke-linecap="round"/>
  <line x1="160" y1="110" x2="160" y2="170" stroke="#374151" stroke-width="5" stroke-linecap="round"/>
  <!-- Hip pad -->
  <rect x="90" y="122" width="24" height="10" rx="3" fill="#374151"/>
  <!-- Foot anchor -->
  <rect x="148" y="102" width="24" height="10" rx="3" fill="#374151"/>
  <text x="120" y="190" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="9" font-weight="700" fill="#475569" letter-spacing="2">GHD BACK EXT</text>
  <!-- Frame 1: Body parallel to ground (lowered) -->
  <g class="f1">
    <circle cx="52" cy="132" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Torso horizontal forward -->
      <line x1="52" y1="144" x2="102" y2="132"/>
      <!-- Arms hanging down -->
      <line x1="66" y1="142" x2="66" y2="158"/>
      <!-- Hips at pad -->
      <line x1="102" y1="132" x2="160" y2="116"/>
      <!-- Legs horizontal back -->
      <line x1="160" y1="116" x2="200" y2="112"/>
    </g>
    <circle cx="102" cy="132" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 2: Body at 45° rising -->
  <g class="f2">
    <circle cx="66" cy="106" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Torso rising 45° -->
      <line x1="66" y1="118" x2="102" y2="132"/>
      <!-- Arms at sides -->
      <line x1="78" y1="122" x2="84" y2="138"/>
      <!-- Hips at pad -->
      <line x1="102" y1="132" x2="160" y2="116"/>
      <line x1="160" y1="116" x2="200" y2="112"/>
    </g>
    <circle cx="102" cy="132" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 3: Body fully extended (hyperextension) -->
  <g class="f3">
    <circle cx="80" cy="86" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Torso fully upright/extended -->
      <line x1="80" y1="98" x2="102" y2="132"/>
      <!-- Arms behind head -->
      <line x1="84" y1="104" x2="96" y2="92"/>
      <!-- Hips at pad -->
      <line x1="102" y1="132" x2="160" y2="116"/>
      <line x1="160" y1="116" x2="200" y2="112"/>
    </g>
    <circle cx="102" cy="132" r="5" fill="#64748b"/>
  </g>
</svg>
