<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 230">
  <style>
    .fr1{animation:f1 4s linear infinite}
    .fr2{animation:f2 4s linear infinite}
    .fr3{animation:f3 4s linear infinite}
    @keyframes f1{0%,33%{opacity:1}34%,100%{opacity:0}}
    @keyframes f2{0%,33%{opacity:0}34%,66%{opacity:1}67%,100%{opacity:0}}
    @keyframes f3{0%,66%{opacity:0}67%,100%{opacity:1}}
  </style>
  <rect width="220" height="230" fill="#111827"/>
  <!-- suelo -->
  <line x1="10" y1="210" x2="210" y2="210" stroke="#374151" stroke-width="2"/>
  <!-- box fijo -->
  <rect x="82" y="170" width="58" height="40" rx="3" fill="#1f2937" stroke="#475569" stroke-width="2"/>

  <!-- Frame 1: de pie junto al box, balón medicinal en pecho -->
  <g class="fr1" fill="none" stroke-linecap="round">
    <circle cx="52" cy="88" r="10" fill="#94a3b8"/>
    <line x1="52" y1="98" x2="52" y2="168" stroke="#94a3b8" stroke-width="4"/>
    <!-- brazos sosteniendo el balón -->
    <line x1="52" y1="118" x2="68" y2="138" stroke="#94a3b8" stroke-width="4"/>
    <line x1="52" y1="118" x2="36" y2="138" stroke="#94a3b8" stroke-width="4"/>
    <!-- balón medicinal -->
    <circle cx="52" cy="148" r="14" fill="#374151" stroke="#475569" stroke-width="2"/>
    <!-- piernas -->
    <line x1="52" y1="168" x2="44" y2="210" stroke="#94a3b8" stroke-width="4"/>
    <line x1="52" y1="168" x2="62" y2="210" stroke="#94a3b8" stroke-width="4"/>
  </g>

  <!-- Frame 2: pie sobre el box, subiendo con balón -->
  <g class="fr2" fill="none" stroke-linecap="round">
    <circle cx="100" cy="72" r="10" fill="#94a3b8"/>
    <line x1="100" y1="82" x2="100" y2="152" stroke="#94a3b8" stroke-width="4"/>
    <!-- brazos con balón -->
    <line x1="100" y1="102" x2="116" y2="122" stroke="#94a3b8" stroke-width="4"/>
    <line x1="100" y1="102" x2="84" y2="122" stroke="#94a3b8" stroke-width="4"/>
    <!-- balón -->
    <circle cx="100" cy="132" r="14" fill="#374151" stroke="#475569" stroke-width="2"/>
    <!-- pierna delantera sobre el box -->
    <line x1="100" y1="152" x2="96" y2="170" stroke="#94a3b8" stroke-width="4"/>
    <!-- pierna trasera en el suelo -->
    <line x1="100" y1="152" x2="118" y2="190" stroke="#94a3b8" stroke-width="4"/>
    <line x1="118" y1="190" x2="125" y2="210" stroke="#94a3b8" stroke-width="4"/>
  </g>

  <!-- Frame 3: al otro lado del box, completando el paso -->
  <g class="fr3" fill="none" stroke-linecap="round">
    <circle cx="162" cy="88" r="10" fill="#94a3b8"/>
    <line x1="162" y1="98" x2="162" y2="168" stroke="#94a3b8" stroke-width="4"/>
    <!-- brazos con balón -->
    <line x1="162" y1="118" x2="178" y2="138" stroke="#94a3b8" stroke-width="4"/>
    <line x1="162" y1="118" x2="146" y2="138" stroke="#94a3b8" stroke-width="4"/>
    <!-- balón -->
    <circle cx="162" cy="148" r="14" fill="#374151" stroke="#475569" stroke-width="2"/>
    <!-- piernas -->
    <line x1="162" y1="168" x2="154" y2="210" stroke="#94a3b8" stroke-width="4"/>
    <line x1="162" y1="168" x2="172" y2="210" stroke="#94a3b8" stroke-width="4"/>
  </g>
</svg>
