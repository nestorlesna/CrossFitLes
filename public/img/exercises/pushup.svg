<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 180">
  <style>
    .f1{animation:sh1 4s linear infinite}
    .f2{animation:sh2 4s linear infinite}
    .f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>

  <rect width="240" height="180" fill="#111827" rx="12"/>
  <!-- Suelo (siempre visible) -->
  <line x1="20" y1="152" x2="220" y2="152" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="120" y="170" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" font-weight="700" fill="#475569" letter-spacing="2">PUSH-UP</text>

  <!-- ── FRAME 1: Posición alta (brazos extendidos) ─────────────────────── -->
  <g class="f1">
    <circle cx="50" cy="91" r="13" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Cuello → hombro -->
      <line x1="50"  y1="104" x2="70"  y2="112"/>
      <!-- Torso (plancha) -->
      <line x1="70"  y1="112" x2="162" y2="131"/>
      <!-- Brazo extendido -->
      <line x1="70"  y1="112" x2="62"  y2="134"/>
      <line x1="62"  y1="134" x2="48"  y2="152"/>
      <!-- Mano en suelo -->
      <line x1="38"  y1="152" x2="58"  y2="152"/>
      <!-- Pierna → pie (punta) -->
      <line x1="162" y1="131" x2="177" y2="142"/>
      <line x1="177" y1="142" x2="190" y2="152"/>
      <line x1="182" y1="152" x2="200" y2="152"/>
    </g>
    <circle cx="62"  cy="134" r="5" fill="#64748b"/>
    <circle cx="70"  cy="112" r="5" fill="#64748b"/>
    <circle cx="162" cy="131" r="5" fill="#64748b"/>
    <circle cx="177" cy="142" r="5" fill="#64748b"/>
  </g>

  <!-- ── FRAME 2: A mitad (codo a 90°) ─────────────────────────────────── -->
  <g class="f2">
    <circle cx="48" cy="103" r="13" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="48"  y1="116" x2="65"  y2="124"/>
      <line x1="65"  y1="124" x2="158" y2="140"/>
      <!-- Brazo doblando -->
      <line x1="65"  y1="124" x2="54"  y2="140"/>
      <line x1="54"  y1="140" x2="48"  y2="152"/>
      <line x1="38"  y1="152" x2="58"  y2="152"/>
      <!-- Pierna -->
      <line x1="158" y1="140" x2="173" y2="147"/>
      <line x1="173" y1="147" x2="186" y2="152"/>
      <line x1="178" y1="152" x2="198" y2="152"/>
    </g>
    <circle cx="54"  cy="140" r="5" fill="#64748b"/>
    <circle cx="65"  cy="124" r="5" fill="#64748b"/>
    <circle cx="158" cy="140" r="5" fill="#64748b"/>
    <circle cx="173" cy="147" r="5" fill="#64748b"/>
  </g>

  <!-- ── FRAME 3: Posición baja (pecho cerca del suelo) ────────────────── -->
  <g class="f3">
    <circle cx="46" cy="114" r="13" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="46"  y1="127" x2="61"  y2="134"/>
      <line x1="61"  y1="134" x2="155" y2="147"/>
      <!-- Brazo casi horizontal (codo muy doblado) -->
      <line x1="61"  y1="134" x2="52"  y2="145"/>
      <line x1="52"  y1="145" x2="48"  y2="152"/>
      <line x1="38"  y1="152" x2="58"  y2="152"/>
      <!-- Pierna casi plana -->
      <line x1="155" y1="147" x2="172" y2="151"/>
      <line x1="172" y1="151" x2="184" y2="152"/>
      <line x1="177" y1="152" x2="196" y2="152"/>
    </g>
    <circle cx="52"  cy="145" r="5" fill="#64748b"/>
    <circle cx="61"  cy="134" r="5" fill="#64748b"/>
    <circle cx="155" cy="147" r="5" fill="#64748b"/>
    <circle cx="172" cy="151" r="5" fill="#64748b"/>
  </g>
</svg>
