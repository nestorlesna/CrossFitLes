<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 180">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="240" height="180" fill="#111827" rx="12"/>
  <line x1="20" y1="148" x2="220" y2="148" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="120" y="165" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="8" font-weight="700" fill="#475569" letter-spacing="1">PLANK OPP. TOE TOUCH</text>
  <!-- Frame 1: High plank (flat body) -->
  <g class="f1">
    <circle cx="48" cy="122" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="60" y1="128" x2="178" y2="130"/>
      <line x1="65" y1="128" x2="52" y2="142"/>
      <line x1="170" y1="130" x2="182" y2="130"/>
      <line x1="182" y1="130" x2="200" y2="142"/>
    </g>
    <circle cx="52" cy="142" r="4" fill="#64748b"/>
    <circle cx="200" cy="142" r="4" fill="#64748b"/>
  </g>
  <!-- Frame 2: Pike — hips elevated, right arm reaching to left foot -->
  <g class="f2">
    <circle cx="52" cy="116" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Left arm on ground -->
      <line x1="64" y1="122" x2="56" y2="142"/>
      <!-- Torso up to pike -->
      <line x1="64" y1="122" x2="128" y2="88"/>
      <!-- Legs down from pike -->
      <line x1="128" y1="88" x2="188" y2="130"/>
      <line x1="188" y1="130" x2="202" y2="142"/>
      <!-- Right arm crossing to opposite foot -->
      <line x1="105" y1="96" x2="192" y2="138"/>
    </g>
    <circle cx="128" cy="88" r="5" fill="#64748b"/>
    <circle cx="56" cy="142" r="4" fill="#64748b"/>
    <circle cx="202" cy="142" r="4" fill="#64748b"/>
  </g>
  <!-- Frame 3: Return to high plank -->
  <g class="f3">
    <circle cx="48" cy="122" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="60" y1="128" x2="178" y2="130"/>
      <line x1="65" y1="128" x2="52" y2="142"/>
      <line x1="170" y1="130" x2="182" y2="130"/>
      <line x1="182" y1="130" x2="200" y2="142"/>
      <!-- Hint: left arm slightly raised, about to reach -->
      <line x1="172" y1="130" x2="196" y2="118"/>
    </g>
    <circle cx="52" cy="142" r="4" fill="#64748b"/>
    <circle cx="200" cy="142" r="4" fill="#64748b"/>
  </g>
</svg>
