<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="200" height="230" fill="#111827" rx="12"/>
  <line x1="20" y1="175" x2="180" y2="175" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="100" y="226" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="8" font-weight="700" fill="#475569" letter-spacing="1">DEAD BUG HOLD + DB</text>

  <!-- Frame 1: Supine, arms at chest level, legs tabletop -->
  <g class="f1" stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <circle cx="28" cy="112" r="12" fill="#94a3b8" stroke="none"/>
    <line x1="40" y1="116" x2="160" y2="116"/>
    <line x1="65" y1="116" x2="55" y2="90"/>
    <line x1="80" y1="116" x2="75" y2="90"/>
    <circle cx="60" cy="87" r="6" fill="#64748b" stroke="none"/>
    <line x1="130" y1="116" x2="125" y2="90"/>
    <line x1="130" y1="90" x2="140" y2="90"/>
    <circle cx="130" cy="82" r="4" fill="#64748b" stroke="none"/>
    <circle cx="140" cy="82" r="4" fill="#64748b" stroke="none"/>
    <circle cx="125" cy="90" r="4" fill="#64748b" stroke="none"/>
  </g>

  <!-- Frame 2: Arms extending up with dumbbell, one leg extending -->
  <g class="f2" stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <circle cx="28" cy="112" r="12" fill="#94a3b8" stroke="none"/>
    <line x1="40" y1="116" x2="160" y2="116"/>
    <line x1="65" y1="116" x2="60" y2="78"/>
    <line x1="80" y1="116" x2="75" y2="78"/>
    <circle cx="65" cy="74" r="6" fill="#64748b" stroke="none"/>
    <line x1="130" y1="116" x2="125" y2="88"/>
    <line x1="125" y1="88" x2="140" y2="82"/>
    <circle cx="125" cy="88" r="4" fill="#64748b" stroke="none"/>
  </g>

  <!-- Frame 3: Full hold — arms up with dumbbell overhead, legs tabletop sustained -->
  <g class="f3" stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <circle cx="28" cy="112" r="12" fill="#94a3b8" stroke="none"/>
    <line x1="40" y1="116" x2="160" y2="116"/>
    <line x1="65" y1="116" x2="60" y2="68"/>
    <line x1="80" y1="116" x2="75" y2="68"/>
    <circle cx="65" cy="64" r="6" fill="#64748b" stroke="none"/>
    <circle cx="73" cy="64" r="6" fill="#64748b" stroke="none"/>
    <line x1="130" y1="116" x2="125" y2="90"/>
    <line x1="125" y1="90" x2="145" y2="88"/>
    <circle cx="125" cy="90" r="4" fill="#64748b" stroke="none"/>
    <circle cx="145" cy="88" r="4" fill="#64748b" stroke="none"/>
  </g>
</svg>
