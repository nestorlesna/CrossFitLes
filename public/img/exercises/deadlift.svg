<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="200" height="230" fill="#111827" rx="12"/>
  <line x1="30" y1="210" x2="170" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="100" y="226" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" font-weight="700" fill="#475569" letter-spacing="2">DEADLIFT</text>
  <!-- Barbell helper: bar + plates -->
  <!-- Frame 1: Setup (inclinado, barra en el suelo) -->
  <g class="f1">
    <!-- Barra en el suelo -->
    <line x1="45" y1="205" x2="155" y2="205" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <rect x="40" y="196" width="8" height="18" rx="2" fill="#475569"/>
    <rect x="152" y="196" width="8" height="18" rx="2" fill="#475569"/>
    <circle cx="68" cy="100" r="13" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Espalda inclinada (paralela casi al suelo) -->
      <line x1="68" y1="113" x2="128" y2="130"/>
      <line x1="80" y1="118" x2="76" y2="130"/><!-- shoulder line hint -->
      <!-- Brazos hacia barra -->
      <line x1="76" y1="124" x2="80" y2="205"/>
      <!-- Piernas dobladas -->
      <line x1="128" y1="130" x2="148" y2="170"/><line x1="148" y1="170" x2="150" y2="205"/>
      <line x1="126" y1="132" x2="110" y2="172"/><line x1="110" y1="172" x2="108" y2="205"/>
    </g>
    <circle cx="148" cy="170" r="5" fill="#64748b"/><circle cx="110" cy="172" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 2: Mid-pull (barra a las rodillas) -->
  <g class="f2">
    <line x1="45" y1="168" x2="155" y2="168" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <rect x="40" y="159" width="8" height="18" rx="2" fill="#475569"/>
    <rect x="152" y="159" width="8" height="18" rx="2" fill="#475569"/>
    <circle cx="78" cy="72" r="13" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="78" y1="85" x2="108" y2="108"/>
      <line x1="85" y1="91" x2="82" y2="104"/>
      <line x1="82" y1="98" x2="86" y2="168"/><!-- brazo bajando a barra -->
      <line x1="108" y1="108" x2="132" y2="152"/><line x1="132" y1="152" x2="135" y2="205"/>
      <line x1="106" y1="110" x2="90" y2="154"/><line x1="90" y1="154" x2="88" y2="205"/>
    </g>
    <circle cx="132" cy="152" r="5" fill="#64748b"/><circle cx="90" cy="154" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 3: Lockout (de pie, barra a la cadera) -->
  <g class="f3">
    <line x1="45" y1="156" x2="155" y2="156" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <rect x="40" y="147" width="8" height="18" rx="2" fill="#475569"/>
    <rect x="152" y="147" width="8" height="18" rx="2" fill="#475569"/>
    <circle cx="100" cy="36" r="13" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="100" y1="49" x2="100" y2="112"/>
      <line x1="78" y1="62" x2="122" y2="62"/>
      <!-- Brazos rectos hacia abajo sosteniendo barra -->
      <line x1="78" y1="62" x2="76" y2="156"/><line x1="122" y1="62" x2="124" y2="156"/>
      <line x1="95" y1="112" x2="93" y2="164"/><line x1="93" y1="164" x2="93" y2="205"/>
      <line x1="105" y1="112" x2="107" y2="164"/><line x1="107" y1="164" x2="107" y2="205"/>
      <line x1="79" y1="205" x2="107" y2="205"/><line x1="93" y1="205" x2="121" y2="205"/>
    </g>
  </g>
</svg>
