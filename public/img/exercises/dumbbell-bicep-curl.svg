<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="200" height="230" fill="#111827" rx="12"/>
  <line x1="20" y1="210" x2="180" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="100" y="225" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="9" font-weight="700" fill="#475569" letter-spacing="2">BICEP CURL</text>
  <!-- Frame 1: Arms hanging, DBs at sides -->
  <g class="f1">
    <circle cx="100" cy="44" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="100" y1="56" x2="100" y2="116"/>
      <line x1="80" y1="68" x2="120" y2="68"/>
      <line x1="80" y1="68" x2="76" y2="128"/>
      <line x1="120" y1="68" x2="124" y2="128"/>
      <line x1="94" y1="116" x2="90" y2="165"/><line x1="90" y1="165" x2="86" y2="210"/>
      <line x1="106" y1="116" x2="110" y2="165"/><line x1="110" y1="165" x2="114" y2="210"/>
    </g>
    <circle cx="90" cy="165" r="5" fill="#64748b"/>
    <circle cx="110" cy="165" r="5" fill="#64748b"/>
    <rect x="64" y="124" width="18" height="8" rx="2" fill="#475569"/>
    <rect x="118" y="124" width="18" height="8" rx="2" fill="#475569"/>
  </g>
  <!-- Frame 2: Mid curl - elbows bent ~90° -->
  <g class="f2">
    <circle cx="100" cy="42" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="100" y1="54" x2="100" y2="114"/>
      <line x1="80" y1="66" x2="120" y2="66"/>
      <!-- Elbows at 90° -->
      <line x1="80" y1="66" x2="76" y2="100"/><line x1="76" y1="100" x2="58" y2="96"/>
      <line x1="120" y1="66" x2="124" y2="100"/><line x1="124" y1="100" x2="142" y2="96"/>
      <line x1="94" y1="114" x2="90" y2="163"/><line x1="90" y1="163" x2="86" y2="210"/>
      <line x1="106" y1="114" x2="110" y2="163"/><line x1="110" y1="163" x2="114" y2="210"/>
    </g>
    <circle cx="76" cy="100" r="5" fill="#64748b"/>
    <circle cx="124" cy="100" r="5" fill="#64748b"/>
    <rect x="46" y="92" width="18" height="8" rx="2" fill="#475569"/>
    <rect x="136" y="92" width="18" height="8" rx="2" fill="#475569"/>
  </g>
  <!-- Frame 3: Full curl - DBs at shoulders -->
  <g class="f3">
    <circle cx="100" cy="42" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="100" y1="54" x2="100" y2="114"/>
      <line x1="80" y1="66" x2="120" y2="66"/>
      <!-- Arms fully curled -->
      <line x1="80" y1="66" x2="76" y2="100"/><line x1="76" y1="100" x2="64" y2="70"/>
      <line x1="120" y1="66" x2="124" y2="100"/><line x1="124" y1="100" x2="136" y2="70"/>
      <line x1="94" y1="114" x2="90" y2="163"/><line x1="90" y1="163" x2="86" y2="210"/>
      <line x1="106" y1="114" x2="110" y2="163"/><line x1="110" y1="163" x2="114" y2="210"/>
    </g>
    <circle cx="76" cy="100" r="5" fill="#64748b"/>
    <circle cx="124" cy="100" r="5" fill="#64748b"/>
    <rect x="52" y="66" width="18" height="8" rx="2" fill="#475569"/>
    <rect x="130" y="66" width="18" height="8" rx="2" fill="#475569"/>
  </g>
</svg>
