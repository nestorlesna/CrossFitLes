<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 230">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="220" height="230" fill="#111827" rx="12"/>
  <line x1="20" y1="210" x2="200" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="110" y="225" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="9" font-weight="700" fill="#475569" letter-spacing="2">DB SPLIT CLEAN</text>
  <!-- Frame 1: Setup - hinged forward, DBs at sides near floor -->
  <g class="f1">
    <circle cx="110" cy="80" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Torso hinged forward -->
      <line x1="110" y1="92" x2="110" y2="140"/>
      <line x1="90" y1="100" x2="130" y2="100"/>
      <!-- Arms hanging with DBs -->
      <line x1="90" y1="100" x2="72" y2="138"/>
      <line x1="130" y1="100" x2="148" y2="138"/>
      <!-- Stance -->
      <line x1="104" y1="140" x2="96" y2="180"/><line x1="96" y1="180" x2="96" y2="210"/>
      <line x1="116" y1="140" x2="122" y2="180"/><line x1="122" y1="180" x2="122" y2="210"/>
    </g>
    <!-- Dumbbell left -->
    <rect x="62" y="134" width="20" height="8" rx="2" fill="#475569"/>
    <!-- Dumbbell right -->
    <rect x="138" y="134" width="20" height="8" rx="2" fill="#475569"/>
  </g>
  <!-- Frame 2: High pull - explosive pull, elbows high -->
  <g class="f2">
    <circle cx="110" cy="60" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Upright torso -->
      <line x1="110" y1="72" x2="110" y2="132"/>
      <line x1="90" y1="82" x2="130" y2="82"/>
      <!-- Elbows high -->
      <line x1="90" y1="82" x2="72" y2="65"/><line x1="72" y1="65" x2="80" y2="90"/>
      <line x1="130" y1="82" x2="148" y2="65"/><line x1="148" y1="65" x2="140" y2="90"/>
      <!-- Split stance start -->
      <line x1="104" y1="132" x2="92" y2="172"/><line x1="92" y1="172" x2="84" y2="210"/>
      <line x1="116" y1="132" x2="128" y2="172"/><line x1="128" y1="172" x2="136" y2="210"/>
    </g>
    <circle cx="72" cy="65" r="5" fill="#64748b"/>
    <circle cx="148" cy="65" r="5" fill="#64748b"/>
    <rect x="68" y="86" width="20" height="8" rx="2" fill="#475569"/>
    <rect x="132" y="86" width="20" height="8" rx="2" fill="#475569"/>
  </g>
  <!-- Frame 3: Split catch - DBs at shoulders, split lunge position -->
  <g class="f3">
    <circle cx="110" cy="72" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Upright torso -->
      <line x1="110" y1="84" x2="110" y2="138"/>
      <!-- Arms in front rack with DBs at shoulders -->
      <line x1="90" y1="96" x2="130" y2="96"/>
      <line x1="90" y1="96" x2="78" y2="88"/>
      <line x1="130" y1="96" x2="142" y2="88"/>
      <!-- Split lunge: front leg -->
      <line x1="104" y1="138" x2="82" y2="162"/><line x1="82" y1="162" x2="68" y2="210"/>
      <!-- Back leg -->
      <line x1="116" y1="138" x2="138" y2="162"/><line x1="138" y1="162" x2="150" y2="185"/>
    </g>
    <circle cx="82" cy="162" r="5" fill="#64748b"/>
    <rect x="64" y="84" width="20" height="8" rx="2" fill="#475569"/>
    <rect x="136" y="84" width="20" height="8" rx="2" fill="#475569"/>
  </g>
</svg>
