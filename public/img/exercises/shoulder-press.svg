<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="200" height="230" fill="#111827" rx="12"/>
  <line x1="30" y1="210" x2="170" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="100" y="226" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" font-weight="700" fill="#475569" letter-spacing="2">SHOULDER PRESS</text>
  <!-- Frame 1: Barra en hombros (rack position) -->
  <g class="f1">
    <line x1="52" y1="65" x2="148" y2="65" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <rect x="46" y="57" width="8" height="16" rx="2" fill="#475569"/>
    <rect x="146" y="57" width="8" height="16" rx="2" fill="#475569"/>
    <circle cx="100" cy="30" r="13" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="100" y1="43" x2="100" y2="115"/>
      <line x1="78" y1="56" x2="122" y2="56"/>
      <!-- Codos apuntando adelante, manos en la barra -->
      <line x1="78" y1="56" x2="68" y2="65"/><line x1="122" y1="56" x2="132" y2="65"/>
      <line x1="95" y1="115" x2="93" y2="165"/><line x1="93" y1="165" x2="93" y2="205"/>
      <line x1="105" y1="115" x2="107" y2="165"/><line x1="107" y1="165" x2="107" y2="205"/>
      <line x1="79" y1="205" x2="107" y2="205"/><line x1="93" y1="205" x2="121" y2="205"/>
    </g>
  </g>
  <!-- Frame 2: Barra a mitad del press (altura de ojos) -->
  <g class="f2">
    <line x1="52" y1="38" x2="148" y2="38" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <rect x="46" y="30" width="8" height="16" rx="2" fill="#475569"/>
    <rect x="146" y="30" width="8" height="16" rx="2" fill="#475569"/>
    <circle cx="100" cy="55" r="13" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="100" y1="68" x2="100" y2="128"/>
      <line x1="78" y1="80" x2="122" y2="80"/>
      <!-- Brazos en extensión media -->
      <line x1="78" y1="80" x2="68" y2="56"/><line x1="122" y1="80" x2="132" y2="56"/>
      <line x1="95" y1="128" x2="93" y2="178"/><line x1="93" y1="178" x2="93" y2="205"/>
      <line x1="105" y1="128" x2="107" y2="178"/><line x1="107" y1="178" x2="107" y2="205"/>
      <line x1="79" y1="205" x2="107" y2="205"/><line x1="93" y1="205" x2="121" y2="205"/>
    </g>
    <circle cx="68" cy="56" r="5" fill="#64748b"/><circle cx="132" cy="56" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 3: Brazos completamente extendidos overhead -->
  <g class="f3">
    <line x1="52" y1="18" x2="148" y2="18" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <rect x="46" y="10" width="8" height="16" rx="2" fill="#475569"/>
    <rect x="146" y="10" width="8" height="16" rx="2" fill="#475569"/>
    <circle cx="100" cy="50" r="13" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="100" y1="63" x2="100" y2="124"/>
      <line x1="78" y1="76" x2="122" y2="76"/>
      <!-- Brazos extendidos al techo -->
      <line x1="78" y1="76" x2="70" y2="38"/><line x1="122" y1="76" x2="130" y2="38"/>
      <line x1="70" y1="38" x2="70" y2="18"/><line x1="130" y1="38" x2="130" y2="18"/>
      <line x1="95" y1="124" x2="93" y2="174"/><line x1="93" y1="174" x2="93" y2="205"/>
      <line x1="105" y1="124" x2="107" y2="174"/><line x1="107" y1="174" x2="107" y2="205"/>
      <line x1="79" y1="205" x2="107" y2="205"/><line x1="93" y1="205" x2="121" y2="205"/>
    </g>
  </g>
</svg>
