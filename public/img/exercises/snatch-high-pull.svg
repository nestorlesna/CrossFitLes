<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
  <rect width="200" height="230" fill="#111827" rx="12"/>
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <!-- Frame 1: Starting position -->
  <g class="f1" stroke="#94a3b8" stroke-width="3.5" stroke-linecap="round" fill="none">
    <circle cx="100" cy="62" r="13"/>
    <line x1="100" y1="75" x2="100" y2="118"/>
    <line x1="100" y1="88" x2="68" y2="100"/>
    <line x1="68" y1="100" x2="58" y2="108"/>
    <line x1="100" y1="88" x2="132" y2="100"/>
    <line x1="132" y1="100" x2="142" y2="108"/>
    <line x1="100" y1="118" x2="78" y2="155"/>
    <circle cx="78" cy="155" r="4.5" fill="#64748b"/>
    <line x1="78" y1="155" x2="74" y2="205"/>
    <line x1="67" y1="205" x2="81" y2="205"/>
    <line x1="100" y1="118" x2="122" y2="155"/>
    <circle cx="122" cy="155" r="4.5" fill="#64748b"/>
    <line x1="122" y1="155" x2="126" y2="205"/>
    <line x1="119" y1="205" x2="133" y2="205"/>
    <!-- Barbell on floor, wide snatch grip -->
    <line x1="38" y1="108" x2="162" y2="108" stroke="#64748b" stroke-width="5"/>
    <rect x="28" y="100" width="10" height="16" rx="2" fill="#475569" stroke="#64748b"/>
    <rect x="162" y="100" width="10" height="16" rx="2" fill="#475569" stroke="#64748b"/>
  </g>
  <!-- Frame 2: Pull to knees -->
  <g class="f2" stroke="#94a3b8" stroke-width="3.5" stroke-linecap="round" fill="none">
    <circle cx="100" cy="38" r="13"/>
    <line x1="100" y1="51" x2="100" y2="108"/>
    <line x1="100" y1="65" x2="70" y2="82"/>
    <line x1="70" y1="82" x2="62" y2="92"/>
    <line x1="100" y1="65" x2="130" y2="82"/>
    <line x1="130" y1="82" x2="138" y2="92"/>
    <line x1="100" y1="108" x2="82" y2="155"/>
    <circle cx="82" cy="155" r="4.5" fill="#64748b"/>
    <line x1="82" y1="155" x2="78" y2="205"/>
    <line x1="71" y1="205" x2="85" y2="205"/>
    <line x1="100" y1="108" x2="118" y2="155"/>
    <circle cx="118" cy="155" r="4.5" fill="#64748b"/>
    <line x1="118" y1="155" x2="122" y2="205"/>
    <line x1="115" y1="205" x2="129" y2="205"/>
    <!-- Barbell at knee level -->
    <line x1="44" y1="92" x2="156" y2="92" stroke="#64748b" stroke-width="5"/>
    <rect x="34" y="84" width="10" height="16" rx="2" fill="#475569" stroke="#64748b"/>
    <rect x="156" y="84" width="10" height="16" rx="2" fill="#475569" stroke="#64748b"/>
  </g>
  <!-- Frame 3: High pull - bar at chest, wide arms -->
  <g class="f3" stroke="#94a3b8" stroke-width="3.5" stroke-linecap="round" fill="none">
    <circle cx="100" cy="26" r="13"/>
    <line x1="100" y1="39" x2="100" y2="108"/>
    <line x1="100" y1="55" x2="62" y2="52"/>
    <line x1="62" y1="52" x2="55" y2="58"/>
    <line x1="100" y1="55" x2="138" y2="52"/>
    <line x1="138" y1="52" x2="145" y2="58"/>
    <line x1="100" y1="108" x2="82" y2="155"/>
    <circle cx="82" cy="155" r="4.5" fill="#64748b"/>
    <line x1="82" y1="155" x2="78" y2="205"/>
    <line x1="71" y1="205" x2="85" y2="205"/>
    <line x1="100" y1="108" x2="118" y2="155"/>
    <circle cx="118" cy="155" r="4.5" fill="#64748b"/>
    <line x1="118" y1="155" x2="122" y2="205"/>
    <line x1="115" y1="205" x2="129" y2="205"/>
    <!-- Barbell at chest height, wide arms extended -->
    <line x1="38" y1="58" x2="162" y2="58" stroke="#64748b" stroke-width="5"/>
    <rect x="28" y="50" width="10" height="16" rx="2" fill="#475569" stroke="#64748b"/>
    <rect x="162" y="50" width="10" height="16" rx="2" fill="#475569" stroke="#64748b"/>
  </g>
  <line x1="30" y1="210" x2="170" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="100" y="225" font-family="sans-serif" font-size="9" fill="#475569" text-anchor="middle" letter-spacing="0.5">SNATCH HIGH PULL</text>
</svg>
