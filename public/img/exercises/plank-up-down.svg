<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
<rect width="200" height="230" fill="#111827" rx="12"/>
<style>
.f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
@keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
@keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
@keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
</style>
<!-- F1: High plank (hands on ground) -->
<g class="f1">
  <circle cx="158" cy="90" r="12" fill="#94a3b8"/>
  <line x1="145" y1="96" x2="60" y2="108" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="145" y1="96" x2="148" y2="145" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="148" y1="145" x2="155" y2="175" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="155" y1="175" x2="160" y2="205" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="60" y1="108" x2="52" y2="145" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="52" y1="145" x2="48" y2="175" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="48" y1="175" x2="44" y2="205" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <circle cx="155" cy="205" r="6" fill="#64748b"/>
  <circle cx="44" cy="205" r="6" fill="#64748b"/>
</g>
<!-- F2: Transition - one elbow down -->
<g class="f2">
  <circle cx="158" cy="100" r="12" fill="#94a3b8"/>
  <line x1="145" y1="107" x2="60" y2="118" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="145" y1="107" x2="148" y2="155" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="148" y1="155" x2="155" y2="185" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="155" y1="185" x2="160" y2="205" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="60" y1="118" x2="50" y2="148" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="50" y1="148" x2="46" y2="175" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="46" y1="175" x2="42" y2="205" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="60" y1="118" x2="65" y2="165" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <circle cx="65" cy="165" r="7" fill="#64748b"/>
  <circle cx="155" cy="205" r="6" fill="#64748b"/>
  <circle cx="42" cy="205" r="6" fill="#64748b"/>
</g>
<!-- F3: Low plank (forearms on ground) -->
<g class="f3">
  <circle cx="158" cy="112" r="12" fill="#94a3b8"/>
  <line x1="145" y1="120" x2="60" y2="130" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="145" y1="120" x2="150" y2="165" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="150" y1="165" x2="155" y2="185" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="155" y1="185" x2="160" y2="205" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="60" y1="130" x2="52" y2="165" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="52" y1="165" x2="46" y2="185" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="46" y1="185" x2="42" y2="205" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="145" y1="120" x2="120" y2="170" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="60" y1="130" x2="75" y2="175" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <circle cx="120" cy="170" r="7" fill="#64748b"/>
  <circle cx="75" cy="175" r="7" fill="#64748b"/>
  <circle cx="160" cy="205" r="6" fill="#64748b"/>
  <circle cx="42" cy="205" r="6" fill="#64748b"/>
</g>
<line x1="30" y1="210" x2="170" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
<text x="100" y="225" text-anchor="middle" font-family="monospace" font-size="10" fill="#475569">PLANK UP-DOWN</text>
</svg>
