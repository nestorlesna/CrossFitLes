<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="200" height="230" fill="#111827" rx="12"/>
  <line x1="20" y1="210" x2="180" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="100" y="226" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" font-weight="700" fill="#475569" letter-spacing="2">WALKING LUNGE</text>
  <!-- Frame 1: De pie -->
  <g class="f1">
    <circle cx="100" cy="26" r="14" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="100" y1="40" x2="100" y2="108"/><line x1="78" y1="52" x2="122" y2="52"/>
      <line x1="78" y1="52" x2="74" y2="100"/><line x1="122" y1="52" x2="126" y2="100"/>
      <line x1="95" y1="108" x2="93" y2="162"/><line x1="93" y1="162" x2="93" y2="205"/>
      <line x1="105" y1="108" x2="107" y2="162"/><line x1="107" y1="162" x2="107" y2="205"/>
      <line x1="78" y1="205" x2="106" y2="205"/><line x1="94" y1="205" x2="122" y2="205"/>
    </g>
  </g>
  <!-- Frame 2: Paso adelante, pie aterrizando -->
  <g class="f2">
    <circle cx="95" cy="36" r="14" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="95" y1="50" x2="95" y2="115"/><line x1="74" y1="63" x2="116" y2="63"/>
      <line x1="74" y1="63" x2="70" y2="112"/><line x1="116" y1="63" x2="120" y2="112"/>
      <!-- Pierna delantera (derecha, paso al frente) -->
      <line x1="100" y1="115" x2="130" y2="160"/><line x1="130" y1="160" x2="128" y2="205"/>
      <!-- Pierna trasera (izquierda, semi-extendida atrás) -->
      <line x1="90" y1="115" x2="68" y2="158"/><line x1="68" y1="158" x2="72" y2="205"/>
      <line x1="118" y1="205" x2="144" y2="205"/><line x1="58" y1="205" x2="84" y2="205"/>
    </g>
    <circle cx="130" cy="160" r="5" fill="#64748b"/><circle cx="68" cy="158" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 3: Rodilla trasera tocando suelo (lunge completo) -->
  <g class="f3">
    <circle cx="95" cy="58" r="14" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="95" y1="72" x2="95" y2="132"/><line x1="74" y1="85" x2="116" y2="85"/>
      <line x1="74" y1="85" x2="70" y2="128"/><line x1="116" y1="85" x2="120" y2="128"/>
      <!-- Pierna delantera (90°, rodilla sobre tobillo) -->
      <line x1="100" y1="132" x2="132" y2="165"/><line x1="132" y1="165" x2="132" y2="205"/>
      <!-- Pierna trasera (rodilla en suelo) -->
      <line x1="90" y1="132" x2="65" y2="175"/><line x1="65" y1="175" x2="75" y2="205"/>
      <line x1="122" y1="205" x2="148" y2="205"/><line x1="56" y1="200" x2="88" y2="200"/>
    </g>
    <circle cx="132" cy="165" r="5" fill="#64748b"/><circle cx="65" cy="175" r="5" fill="#64748b"/>
  </g>
</svg>
