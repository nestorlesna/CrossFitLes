<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="240" height="200" fill="#111827" rx="12"/>
  <line x1="20" y1="168" x2="220" y2="168" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="120" y="185" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="8" font-weight="700" fill="#475569" letter-spacing="1">STABILITY BALL PLATE CRUNCH</text>
  <!-- Stability ball (always visible) -->
  <circle cx="120" cy="128" r="32" fill="#1a2535" stroke="#374151" stroke-width="3"/>
  <!-- Frame 1: Extended back on ball, plate behind head -->
  <g class="f1">
    <circle cx="68" cy="90" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Torso lying across ball -->
      <line x1="80" y1="98" x2="158" y2="96"/>
      <!-- Arms extended back with plate -->
      <line x1="88" y1="98" x2="58" y2="114"/>
      <!-- Leg bent, foot on ground -->
      <line x1="158" y1="96" x2="172" y2="128"/><line x1="172" y1="128" x2="192" y2="168"/>
    </g>
    <circle cx="172" cy="128" r="4" fill="#64748b"/>
    <!-- Plate (disc) held behind head -->
    <circle cx="50" cy="118" r="10" fill="none" stroke="#475569" stroke-width="4"/>
    <circle cx="50" cy="118" r="4" fill="#475569"/>
  </g>
  <!-- Frame 2: Mid-crunch, plate moving overhead -->
  <g class="f2">
    <circle cx="82" cy="78" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="94" y1="86" x2="158" y2="96"/>
      <line x1="96" y1="86" x2="76" y2="60"/>
      <line x1="158" y1="96" x2="172" y2="128"/><line x1="172" y1="128" x2="192" y2="168"/>
    </g>
    <circle cx="172" cy="128" r="4" fill="#64748b"/>
    <!-- Plate overhead -->
    <circle cx="70" cy="52" r="10" fill="none" stroke="#475569" stroke-width="4"/>
    <circle cx="70" cy="52" r="4" fill="#475569"/>
  </g>
  <!-- Frame 3: Full crunch, plate high and forward -->
  <g class="f3">
    <circle cx="98" cy="66" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="110" y1="74" x2="158" y2="96"/>
      <line x1="112" y1="74" x2="97" y2="48"/>
      <line x1="158" y1="96" x2="172" y2="128"/><line x1="172" y1="128" x2="192" y2="168"/>
    </g>
    <circle cx="172" cy="128" r="4" fill="#64748b"/>
    <!-- Plate high forward -->
    <circle cx="91" cy="41" r="10" fill="none" stroke="#475569" stroke-width="4"/>
    <circle cx="91" cy="41" r="4" fill="#475569"/>
  </g>
</svg>
