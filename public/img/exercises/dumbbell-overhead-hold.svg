<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="200" height="230" fill="#111827" rx="12"/>
  <line x1="30" y1="210" x2="170" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="100" y="226" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="9" font-weight="700" fill="#475569" letter-spacing="1">DUMBBELL OH HOLD</text>

  <!-- Frame 1: Dumbbells at shoulder level -->
  <g class="f1" stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <circle cx="100" cy="26" r="12" fill="#94a3b8" stroke="none"/>
    <line x1="100" y1="38" x2="100" y2="108"/>
    <line x1="78" y1="50" x2="62" y2="50"/>
    <line x1="122" y1="50" x2="138" y2="50"/>
    <line x1="100" y1="108" x2="88" y2="162"/>
    <line x1="100" y1="108" x2="112" y2="162"/>
    <line x1="88" y1="162" x2="82" y2="205"/>
    <line x1="112" y1="162" x2="118" y2="205"/>
    <line x1="72" y1="205" x2="90" y2="205"/>
    <line x1="108" y1="205" x2="128" y2="205"/>
    <circle cx="88" cy="162" r="4" fill="#64748b" stroke="none"/>
    <circle cx="112" cy="162" r="4" fill="#64748b" stroke="none"/>
    <circle cx="60" cy="50" r="6" fill="#64748b" stroke="none"/>
    <circle cx="140" cy="50" r="6" fill="#64748b" stroke="none"/>
  </g>

  <!-- Frame 2: Dumbbells at 45° up -->
  <g class="f2" stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <circle cx="100" cy="26" r="12" fill="#94a3b8" stroke="none"/>
    <line x1="100" y1="38" x2="100" y2="108"/>
    <line x1="78" y1="50" x2="65" y2="36"/>
    <line x1="122" y1="50" x2="135" y2="36"/>
    <line x1="100" y1="108" x2="88" y2="162"/>
    <line x1="100" y1="108" x2="112" y2="162"/>
    <line x1="88" y1="162" x2="82" y2="205"/>
    <line x1="112" y1="162" x2="118" y2="205"/>
    <line x1="72" y1="205" x2="90" y2="205"/>
    <line x1="108" y1="205" x2="128" y2="205"/>
    <circle cx="88" cy="162" r="4" fill="#64748b" stroke="none"/>
    <circle cx="112" cy="162" r="4" fill="#64748b" stroke="none"/>
    <circle cx="63" cy="34" r="6" fill="#64748b" stroke="none"/>
    <circle cx="137" cy="34" r="6" fill="#64748b" stroke="none"/>
  </g>

  <!-- Frame 3: Dumbbells fully overhead (hold) -->
  <g class="f3" stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <circle cx="100" cy="26" r="12" fill="#94a3b8" stroke="none"/>
    <line x1="100" y1="38" x2="100" y2="108"/>
    <line x1="78" y1="50" x2="72" y2="22"/>
    <line x1="122" y1="50" x2="128" y2="22"/>
    <line x1="100" y1="108" x2="88" y2="162"/>
    <line x1="100" y1="108" x2="112" y2="162"/>
    <line x1="88" y1="162" x2="82" y2="205"/>
    <line x1="112" y1="162" x2="118" y2="205"/>
    <line x1="72" y1="205" x2="90" y2="205"/>
    <line x1="108" y1="205" x2="128" y2="205"/>
    <circle cx="88" cy="162" r="4" fill="#64748b" stroke="none"/>
    <circle cx="112" cy="162" r="4" fill="#64748b" stroke="none"/>
    <circle cx="70" cy="19" r="6" fill="#64748b" stroke="none"/>
    <circle cx="130" cy="19" r="6" fill="#64748b" stroke="none"/>
  </g>
</svg>
