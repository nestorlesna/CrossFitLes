<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
  <rect width="200" height="230" fill="#111827" rx="12"/>
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>

  <!-- Frame 1: De pie junto a la pared, brazo levantado apoyado -->
  <g class="f1" stroke="#94a3b8" stroke-width="3.5" stroke-linecap="round" fill="none">
    <!-- Pared -->
    <line x1="150" y1="20" x2="150" y2="210" stroke="#374151" stroke-width="4"/>
    <!-- Cabeza -->
    <circle cx="100" cy="30" r="13" fill="#94a3b8" stroke="none"/>
    <!-- Torso -->
    <line x1="100" y1="43" x2="100" y2="110"/>
    <!-- Brazo derecho subido apoyado en pared -->
    <line x1="100" y1="58" x2="140" y2="35"/>
    <line x1="140" y1="35" x2="150" y2="30"/>
    <!-- Brazo izquierdo abajo -->
    <line x1="100" y1="58" x2="80" y2="90"/>
    <!-- Caderas -->
    <line x1="85" y1="110" x2="115" y2="110"/>
    <!-- Pierna izquierda -->
    <line x1="87" y1="110" x2="85" y2="160"/>
    <line x1="85" y1="160" x2="84" y2="205"/>
    <!-- Pierna derecha -->
    <line x1="113" y1="110" x2="115" y2="160"/>
    <line x1="115" y1="160" x2="116" y2="205"/>
    <!-- Rodillas -->
    <circle cx="85" cy="160" r="4" fill="#64748b" stroke="none"/>
    <circle cx="115" cy="160" r="4" fill="#64748b" stroke="none"/>
  </g>

  <!-- Frame 2: Inclinando el cuerpo hacia el costado, estirando el lat -->
  <g class="f2" stroke="#94a3b8" stroke-width="3.5" stroke-linecap="round" fill="none">
    <!-- Pared -->
    <line x1="150" y1="20" x2="150" y2="210" stroke="#374151" stroke-width="4"/>
    <!-- Cabeza más inclinada hacia la pared -->
    <circle cx="108" cy="35" r="13" fill="#94a3b8" stroke="none"/>
    <!-- Torso inclinado -->
    <line x1="108" y1="48" x2="100" y2="115"/>
    <!-- Brazo derecho extendido hacia la pared arriba -->
    <line x1="108" y1="63" x2="148" y2="28"/>
    <line x1="148" y1="28" x2="150" y2="25"/>
    <!-- Brazo izquierdo al costado -->
    <line x1="108" y1="63" x2="78" y2="92"/>
    <!-- Caderas -->
    <line x1="85" y1="115" x2="115" y2="115"/>
    <!-- Piernas -->
    <line x1="87" y1="115" x2="85" y2="162"/>
    <line x1="85" y1="162" x2="84" y2="205"/>
    <line x1="113" y1="115" x2="115" y2="162"/>
    <line x1="115" y1="162" x2="116" y2="205"/>
    <circle cx="85" cy="162" r="4" fill="#64748b" stroke="none"/>
    <circle cx="115" cy="162" r="4" fill="#64748b" stroke="none"/>
  </g>

  <!-- Frame 3: Estiramiento máximo, cuerpo en arco lateral -->
  <g class="f3" stroke="#94a3b8" stroke-width="3.5" stroke-linecap="round" fill="none">
    <!-- Pared -->
    <line x1="150" y1="20" x2="150" y2="210" stroke="#374151" stroke-width="4"/>
    <!-- Cabeza muy inclinada -->
    <circle cx="115" cy="42" r="13" fill="#94a3b8" stroke="none"/>
    <!-- Torso en arco -->
    <line x1="115" y1="55" x2="97" y2="118"/>
    <!-- Brazo extendido al máximo hacia la pared -->
    <line x1="115" y1="70" x2="150" y2="38"/>
    <!-- Brazo izquierdo al costado -->
    <line x1="115" y1="70" x2="74" y2="95"/>
    <!-- Caderas -->
    <line x1="82" y1="118" x2="112" y2="118"/>
    <!-- Piernas -->
    <line x1="84" y1="118" x2="82" y2="163"/>
    <line x1="82" y1="163" x2="81" y2="205"/>
    <line x1="110" y1="118" x2="112" y2="163"/>
    <line x1="112" y1="163" x2="113" y2="205"/>
    <circle cx="82" cy="163" r="4" fill="#64748b" stroke="none"/>
    <circle cx="112" cy="163" r="4" fill="#64748b" stroke="none"/>
  </g>

  <line x1="30" y1="210" x2="170" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="100" y="225" font-family="sans-serif" font-size="9" fill="#475569" text-anchor="middle" letter-spacing="0.5">WALL LAT STRETCH</text>
</svg>
