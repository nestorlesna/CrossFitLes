<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 210">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="240" height="210" fill="#111827" rx="12"/>
  <line x1="20" y1="182" x2="220" y2="182" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="120" y="198" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="9" font-weight="700" fill="#475569" letter-spacing="1">DUMBBELL FRONT RAISE</text>
  <!-- Frame 1: Arms at sides, DBs hanging -->
  <g class="f1">
    <circle cx="120" cy="42" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="120" y1="54" x2="120" y2="110"/>
      <line x1="98" y1="68" x2="142" y2="68"/>
      <line x1="98" y1="68" x2="86" y2="110"/>
      <line x1="142" y1="68" x2="154" y2="110"/>
      <line x1="113" y1="110" x2="104" y2="152"/><line x1="104" y1="152" x2="100" y2="182"/>
      <line x1="127" y1="110" x2="136" y2="152"/><line x1="136" y1="152" x2="140" y2="182"/>
    </g>
    <circle cx="104" cy="152" r="4" fill="#64748b"/>
    <circle cx="136" cy="152" r="4" fill="#64748b"/>
    <rect x="74" y="107" width="18" height="7" rx="2" fill="#475569"/>
    <rect x="148" y="107" width="18" height="7" rx="2" fill="#475569"/>
  </g>
  <!-- Frame 2: Arms at ~45° forward -->
  <g class="f2">
    <circle cx="120" cy="42" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="120" y1="54" x2="120" y2="110"/>
      <line x1="98" y1="68" x2="142" y2="68"/>
      <line x1="98" y1="68" x2="118" y2="46"/>
      <line x1="142" y1="68" x2="162" y2="46"/>
      <line x1="113" y1="110" x2="104" y2="152"/><line x1="104" y1="152" x2="100" y2="182"/>
      <line x1="127" y1="110" x2="136" y2="152"/><line x1="136" y1="152" x2="140" y2="182"/>
    </g>
    <circle cx="104" cy="152" r="4" fill="#64748b"/>
    <circle cx="136" cy="152" r="4" fill="#64748b"/>
    <rect x="110" y="36" width="18" height="7" rx="2" fill="#475569"/>
    <rect x="154" y="36" width="18" height="7" rx="2" fill="#475569"/>
  </g>
  <!-- Frame 3: Arms horizontal (90°) — DBs at shoulder height -->
  <g class="f3">
    <circle cx="120" cy="42" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="120" y1="54" x2="120" y2="110"/>
      <line x1="98" y1="68" x2="142" y2="68"/>
      <line x1="98" y1="68" x2="58" y2="68"/>
      <line x1="142" y1="68" x2="182" y2="68"/>
      <line x1="113" y1="110" x2="104" y2="152"/><line x1="104" y1="152" x2="100" y2="182"/>
      <line x1="127" y1="110" x2="136" y2="152"/><line x1="136" y1="152" x2="140" y2="182"/>
    </g>
    <circle cx="104" cy="152" r="4" fill="#64748b"/>
    <circle cx="136" cy="152" r="4" fill="#64748b"/>
    <rect x="38" y="64" width="22" height="8" rx="2" fill="#475569"/>
    <rect x="178" y="64" width="22" height="8" rx="2" fill="#475569"/>
  </g>
</svg>
