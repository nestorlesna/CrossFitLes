<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 230">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="220" height="230" fill="#111827" rx="12"/>
  <line x1="20" y1="210" x2="200" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="110" y="225" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="9" font-weight="700" fill="#475569" letter-spacing="2">POWER SNATCH</text>
  <!-- Frame 1: Setup - wide grip, bar on floor -->
  <g class="f1">
    <line x1="22" y1="188" x2="198" y2="188" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <rect x="16" y="180" width="8" height="16" rx="2" fill="#475569"/>
    <rect x="196" y="180" width="8" height="16" rx="2" fill="#475569"/>
    <circle cx="110" cy="72" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="110" y1="84" x2="110" y2="130"/>
      <!-- Wide grip shoulders -->
      <line x1="84" y1="94" x2="136" y2="94"/>
      <line x1="84" y1="94" x2="58" y2="188"/>
      <line x1="136" y1="94" x2="162" y2="188"/>
      <line x1="104" y1="130" x2="98" y2="175"/><line x1="98" y1="175" x2="92" y2="210"/>
      <line x1="116" y1="130" x2="122" y2="175"/><line x1="122" y1="175" x2="128" y2="210"/>
    </g>
    <circle cx="98" cy="175" r="5" fill="#64748b"/>
    <circle cx="122" cy="175" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 2: High pull - explosive pull, elbows high wide -->
  <g class="f2">
    <line x1="22" y1="100" x2="198" y2="100" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <rect x="16" y="92" width="8" height="16" rx="2" fill="#475569"/>
    <rect x="196" y="92" width="8" height="16" rx="2" fill="#475569"/>
    <circle cx="110" cy="46" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="110" y1="58" x2="110" y2="112"/>
      <line x1="86" y1="70" x2="134" y2="70"/>
      <!-- Elbows flared wide and high -->
      <line x1="86" y1="70" x2="54" y2="58"/><line x1="54" y1="58" x2="62" y2="100"/>
      <line x1="134" y1="70" x2="166" y2="58"/><line x1="166" y1="58" x2="158" y2="100"/>
      <line x1="104" y1="112" x2="98" y2="162"/><line x1="98" y1="162" x2="92" y2="210"/>
      <line x1="116" y1="112" x2="122" y2="162"/><line x1="122" y1="162" x2="128" y2="210"/>
    </g>
    <circle cx="54" cy="58" r="5" fill="#64748b"/>
    <circle cx="166" cy="58" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 3: Power catch - slight squat, bar overhead wide grip -->
  <g class="f3">
    <line x1="22" y1="40" x2="198" y2="40" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <rect x="16" y="32" width="8" height="16" rx="2" fill="#475569"/>
    <rect x="196" y="32" width="8" height="16" rx="2" fill="#475569"/>
    <circle cx="110" cy="68" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="110" y1="80" x2="110" y2="132"/>
      <!-- Arms fully extended overhead wide -->
      <line x1="88" y1="92" x2="132" y2="92"/>
      <line x1="88" y1="92" x2="52" y2="40"/>
      <line x1="132" y1="92" x2="168" y2="40"/>
      <!-- Slight power catch squat -->
      <line x1="104" y1="132" x2="96" y2="168"/><line x1="96" y1="168" x2="90" y2="210"/>
      <line x1="116" y1="132" x2="124" y2="168"/><line x1="124" y1="168" x2="130" y2="210"/>
    </g>
    <circle cx="96" cy="168" r="5" fill="#64748b"/>
    <circle cx="124" cy="168" r="5" fill="#64748b"/>
  </g>
</svg>
