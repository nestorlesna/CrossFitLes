<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 230">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="220" height="230" fill="#111827" rx="12"/>
  <line x1="20" y1="210" x2="200" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="110" y="225" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="9" font-weight="700" fill="#475569" letter-spacing="2">BARBELL DEADLIFT</text>
  <!-- Frame 1: Setup - bar on floor, hinged -->
  <g class="f1">
    <!-- Bar -->
    <line x1="32" y1="185" x2="188" y2="185" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <rect x="26" y="177" width="8" height="16" rx="2" fill="#475569"/>
    <rect x="186" y="177" width="8" height="16" rx="2" fill="#475569"/>
    <circle cx="110" cy="68" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Hinged torso -->
      <line x1="110" y1="80" x2="110" y2="128"/>
      <line x1="90" y1="90" x2="130" y2="90"/>
      <!-- Arms hanging to bar -->
      <line x1="90" y1="90" x2="76" y2="185"/>
      <line x1="130" y1="90" x2="144" y2="185"/>
      <!-- Legs bent -->
      <line x1="104" y1="128" x2="96" y2="175"/><line x1="96" y1="175" x2="90" y2="210"/>
      <line x1="116" y1="128" x2="124" y2="175"/><line x1="124" y1="175" x2="130" y2="210"/>
    </g>
    <circle cx="96" cy="175" r="5" fill="#64748b"/>
    <circle cx="124" cy="175" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 2: Mid pull - bar at knees -->
  <g class="f2">
    <!-- Bar at knees -->
    <line x1="32" y1="152" x2="188" y2="152" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <rect x="26" y="144" width="8" height="16" rx="2" fill="#475569"/>
    <rect x="186" y="144" width="8" height="16" rx="2" fill="#475569"/>
    <circle cx="110" cy="52" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Torso more upright -->
      <line x1="110" y1="64" x2="110" y2="118"/>
      <line x1="90" y1="76" x2="130" y2="76"/>
      <!-- Arms to bar -->
      <line x1="90" y1="76" x2="78" y2="152"/>
      <line x1="130" y1="76" x2="142" y2="152"/>
      <!-- Legs straightening -->
      <line x1="104" y1="118" x2="98" y2="162"/><line x1="98" y1="162" x2="90" y2="210"/>
      <line x1="116" y1="118" x2="122" y2="162"/><line x1="122" y1="162" x2="130" y2="210"/>
    </g>
    <circle cx="98" cy="162" r="5" fill="#64748b"/>
    <circle cx="122" cy="162" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 3: Lockout - fully standing -->
  <g class="f3">
    <!-- Bar at hips -->
    <line x1="32" y1="118" x2="188" y2="118" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <rect x="26" y="110" width="8" height="16" rx="2" fill="#475569"/>
    <rect x="186" y="110" width="8" height="16" rx="2" fill="#475569"/>
    <circle cx="110" cy="38" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Upright torso -->
      <line x1="110" y1="50" x2="110" y2="110"/>
      <line x1="90" y1="62" x2="130" y2="62"/>
      <!-- Arms hanging holding bar -->
      <line x1="90" y1="62" x2="80" y2="118"/>
      <line x1="130" y1="62" x2="140" y2="118"/>
      <!-- Straight legs -->
      <line x1="104" y1="110" x2="100" y2="162"/><line x1="100" y1="162" x2="96" y2="210"/>
      <line x1="116" y1="110" x2="120" y2="162"/><line x1="120" y1="162" x2="124" y2="210"/>
    </g>
    <circle cx="100" cy="162" r="5" fill="#64748b"/>
    <circle cx="120" cy="162" r="5" fill="#64748b"/>
  </g>
</svg>
