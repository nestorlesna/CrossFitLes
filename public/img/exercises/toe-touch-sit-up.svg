<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 180">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="240" height="180" fill="#111827" rx="12"/>
  <line x1="20" y1="148" x2="220" y2="148" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="120" y="165" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="9" font-weight="700" fill="#475569" letter-spacing="1">TOE TOUCH SIT-UP</text>
  <!-- Frame 1: Lying flat, arms extended overhead -->
  <g class="f1">
    <circle cx="48" cy="130" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="60" y1="137" x2="178" y2="140"/>
      <line x1="78" y1="136" x2="36" y2="118"/>
      <line x1="168" y1="139" x2="212" y2="141"/>
    </g>
    <circle cx="185" cy="140" r="4" fill="#64748b"/>
  </g>
  <!-- Frame 2: Torso at ~45°, arms reaching toward feet -->
  <g class="f2">
    <circle cx="103" cy="100" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="103" y1="112" x2="158" y2="137"/>
      <line x1="116" y1="116" x2="168" y2="132"/>
      <line x1="158" y1="137" x2="208" y2="140"/>
    </g>
    <circle cx="158" cy="137" r="4" fill="#64748b"/>
  </g>
  <!-- Frame 3: Fully seated, hands touching toes -->
  <g class="f3">
    <circle cx="143" cy="90" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="143" y1="102" x2="146" y2="136"/>
      <line x1="130" y1="108" x2="195" y2="136"/>
      <line x1="146" y1="136" x2="203" y2="135"/>
    </g>
    <circle cx="146" cy="136" r="4" fill="#64748b"/>
    <circle cx="203" cy="135" r="4" fill="#64748b"/>
  </g>
</svg>
