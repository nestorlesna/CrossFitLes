<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 200">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="220" height="200" fill="#111827" rx="12"/>
  <line x1="20" y1="168" x2="200" y2="168" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="110" y="185" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" font-weight="700" fill="#475569" letter-spacing="2">RUNNING</text>
  <!-- Frame 1: Contacto (pie derecho en suelo, rodilla izquierda arriba) -->
  <g class="f1">
    <circle cx="108" cy="36" r="13" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="108" y1="49" x2="110" y2="108"/><!-- torso leve inclinación -->
      <line x1="90" y1="63" x2="128" y2="60"/><!-- hombros -->
      <!-- Brazo izquierdo adelante -->
      <line x1="90" y1="63" x2="74" y2="92"/>
      <!-- Brazo derecho atrás -->
      <line x1="128" y1="60" x2="144" y2="88"/>
      <!-- Pierna derecha en suelo -->
      <line x1="105" y1="108" x2="108" y2="142"/><line x1="108" y1="142" x2="112" y2="168"/>
      <!-- Pierna izquierda (rodilla arriba) -->
      <line x1="115" y1="108" x2="130" y2="128"/><line x1="130" y1="128" x2="138" y2="108"/>
    </g>
    <circle cx="108" cy="142" r="5" fill="#64748b"/><circle cx="130" cy="128" r="5" fill="#64748b"/>
    <line x1="100" y1="168" x2="124" y2="168" stroke="#94a3b8" stroke-width="5" stroke-linecap="round"/>
  </g>
  <!-- Frame 2: Drive (empujando, cuerpo extendido) -->
  <g class="f2">
    <circle cx="108" cy="32" r="13" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="108" y1="45" x2="106" y2="106"/>
      <line x1="88" y1="59" x2="126" y2="56"/>
      <!-- Brazos en movimiento -->
      <line x1="88" y1="59" x2="70" y2="86"/>
      <line x1="126" y1="56" x2="146" y2="82"/>
      <!-- Pierna de apoyo extendida, empujando -->
      <line x1="102" y1="106" x2="100" y2="148"/><line x1="100" y1="148" x2="104" y2="168"/>
      <!-- Pierna libre hacia atrás y arriba -->
      <line x1="110" y1="106" x2="92" y2="130"/><line x1="92" y1="130" x2="80" y2="112"/>
    </g>
    <circle cx="100" cy="148" r="5" fill="#64748b"/><circle cx="92" cy="130" r="5" fill="#64748b"/>
    <line x1="92" y1="168" x2="116" y2="168" stroke="#94a3b8" stroke-width="5" stroke-linecap="round"/>
  </g>
  <!-- Frame 3: Vuelo (ambos pies en el aire, zancada abierta) -->
  <g class="f3">
    <circle cx="110" cy="28" r="13" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="110" y1="41" x2="108" y2="102"/>
      <line x1="90" y1="55" x2="128" y2="52"/>
      <!-- Brazos opuestos -->
      <line x1="90" y1="55" x2="68" y2="80"/>
      <line x1="128" y1="52" x2="150" y2="76"/>
      <!-- Pierna delantera (rodilla doblada adelante) -->
      <line x1="112" y1="102" x2="128" y2="130"/><line x1="128" y1="130" x2="148" y2="158"/>
      <!-- Pierna trasera (extendida atrás) -->
      <line x1="104" y1="102" x2="88" y2="130"/><line x1="88" y1="130" x2="72" y2="148"/>
    </g>
    <circle cx="128" cy="130" r="5" fill="#64748b"/><circle cx="88" cy="130" r="5" fill="#64748b"/>
  </g>
</svg>
