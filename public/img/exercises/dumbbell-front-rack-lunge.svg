<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 230">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="220" height="230" fill="#111827" rx="12"/>
  <line x1="20" y1="210" x2="200" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="110" y="225" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="9" font-weight="700" fill="#475569" letter-spacing="2">DB FRONT RACK LUNGE</text>
  <!-- Frame 1: Standing, DBs at shoulders -->
  <g class="f1">
    <circle cx="110" cy="42" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="110" y1="54" x2="110" y2="112"/>
      <line x1="88" y1="66" x2="132" y2="66"/>
      <line x1="88" y1="66" x2="74" y2="86"/>
      <line x1="132" y1="66" x2="146" y2="86"/>
      <line x1="104" y1="112" x2="100" y2="160"/><line x1="100" y1="160" x2="96" y2="210"/>
      <line x1="116" y1="112" x2="120" y2="160"/><line x1="120" y1="160" x2="124" y2="210"/>
    </g>
    <circle cx="100" cy="160" r="5" fill="#64748b"/>
    <circle cx="120" cy="160" r="5" fill="#64748b"/>
    <rect x="60" y="82" width="18" height="8" rx="2" fill="#475569"/>
    <rect x="142" y="82" width="18" height="8" rx="2" fill="#475569"/>
  </g>
  <!-- Frame 2: Step forward, DBs still racked -->
  <g class="f2">
    <circle cx="110" cy="52" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="110" y1="64" x2="110" y2="120"/>
      <line x1="88" y1="76" x2="132" y2="76"/>
      <line x1="88" y1="76" x2="74" y2="94"/>
      <line x1="132" y1="76" x2="146" y2="94"/>
      <line x1="104" y1="120" x2="76" y2="158"/><line x1="76" y1="158" x2="64" y2="210"/>
      <line x1="116" y1="120" x2="130" y2="158"/><line x1="130" y1="158" x2="140" y2="210"/>
    </g>
    <circle cx="76" cy="158" r="5" fill="#64748b"/>
    <rect x="60" y="90" width="18" height="8" rx="2" fill="#475569"/>
    <rect x="142" y="90" width="18" height="8" rx="2" fill="#475569"/>
  </g>
  <!-- Frame 3: Full lunge, DBs in rack -->
  <g class="f3">
    <circle cx="110" cy="62" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="110" y1="74" x2="110" y2="130"/>
      <line x1="88" y1="86" x2="132" y2="86"/>
      <line x1="88" y1="86" x2="74" y2="104"/>
      <line x1="132" y1="86" x2="146" y2="104"/>
      <line x1="104" y1="130" x2="70" y2="172"/><line x1="70" y1="172" x2="56" y2="210"/>
      <line x1="116" y1="130" x2="140" y2="168"/><line x1="140" y1="168" x2="152" y2="196"/>
    </g>
    <circle cx="70" cy="172" r="5" fill="#64748b"/>
    <circle cx="140" cy="168" r="5" fill="#64748b"/>
    <rect x="60" y="100" width="18" height="8" rx="2" fill="#475569"/>
    <rect x="142" y="100" width="18" height="8" rx="2" fill="#475569"/>
  </g>
</svg>
