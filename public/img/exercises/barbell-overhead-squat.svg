<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 230">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="220" height="230" fill="#111827" rx="12"/>
  <line x1="20" y1="210" x2="200" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="110" y="225" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="9" font-weight="700" fill="#475569" letter-spacing="2">OVERHEAD SQUAT</text>
  <!-- Frame 1: Standing, bar overhead wide grip -->
  <g class="f1">
    <line x1="22" y1="50" x2="198" y2="50" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <rect x="16" y="42" width="8" height="16" rx="2" fill="#475569"/>
    <rect x="196" y="42" width="8" height="16" rx="2" fill="#475569"/>
    <circle cx="110" cy="76" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="110" y1="88" x2="110" y2="140"/>
      <!-- Wide arms overhead -->
      <line x1="88" y1="100" x2="132" y2="100"/>
      <line x1="88" y1="100" x2="52" y2="50"/>
      <line x1="132" y1="100" x2="168" y2="50"/>
      <!-- Standing legs -->
      <line x1="104" y1="140" x2="100" y2="178"/><line x1="100" y1="178" x2="96" y2="210"/>
      <line x1="116" y1="140" x2="120" y2="178"/><line x1="120" y1="178" x2="124" y2="210"/>
    </g>
    <circle cx="100" cy="178" r="5" fill="#64748b"/>
    <circle cx="120" cy="178" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 2: Parallel squat, bar stays overhead -->
  <g class="f2">
    <line x1="22" y1="62" x2="198" y2="62" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <rect x="16" y="54" width="8" height="16" rx="2" fill="#475569"/>
    <rect x="196" y="54" width="8" height="16" rx="2" fill="#475569"/>
    <circle cx="110" cy="96" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Torso slight forward lean -->
      <line x1="110" y1="108" x2="106" y2="158"/>
      <line x1="88" y1="118" x2="132" y2="118"/>
      <line x1="88" y1="118" x2="52" y2="62"/>
      <line x1="132" y1="118" x2="168" y2="62"/>
      <!-- Parallel squat legs -->
      <line x1="102" y1="158" x2="82" y2="186"/><line x1="82" y1="186" x2="72" y2="210"/>
      <line x1="110" y1="158" x2="130" y2="186"/><line x1="130" y1="186" x2="140" y2="210"/>
    </g>
    <circle cx="82" cy="186" r="5" fill="#64748b"/>
    <circle cx="130" cy="186" r="5" fill="#64748b"/>
  </g>
  <!-- Frame 3: Deep overhead squat -->
  <g class="f3">
    <line x1="22" y1="72" x2="198" y2="72" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <rect x="16" y="64" width="8" height="16" rx="2" fill="#475569"/>
    <rect x="196" y="64" width="8" height="16" rx="2" fill="#475569"/>
    <circle cx="110" cy="115" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Upright torso in deep squat -->
      <line x1="110" y1="127" x2="108" y2="164"/>
      <line x1="90" y1="136" x2="130" y2="136"/>
      <!-- Arms still overhead, locked -->
      <line x1="90" y1="136" x2="52" y2="72"/>
      <line x1="130" y1="136" x2="168" y2="72"/>
      <!-- Deep squat legs wide -->
      <line x1="104" y1="164" x2="70" y2="188"/><line x1="70" y1="188" x2="58" y2="210"/>
      <line x1="112" y1="164" x2="148" y2="188"/><line x1="148" y1="188" x2="160" y2="210"/>
    </g>
    <circle cx="70" cy="188" r="5" fill="#64748b"/>
    <circle cx="148" cy="188" r="5" fill="#64748b"/>
  </g>
</svg>
