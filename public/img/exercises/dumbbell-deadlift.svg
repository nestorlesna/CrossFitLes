<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 230">
  <style>
    .f1{animation:sh1 4s linear infinite}.f2{animation:sh2 4s linear infinite}.f3{animation:sh3 4s linear infinite}
    @keyframes sh1{0%,27%{opacity:1}33%,90%{opacity:0}100%{opacity:1}}
    @keyframes sh2{0%,33%{opacity:0}40%,60%{opacity:1}66%,100%{opacity:0}}
    @keyframes sh3{0%,66%{opacity:0}72%,93%{opacity:1}100%{opacity:0}}
  </style>
  <rect width="220" height="230" fill="#111827" rx="12"/>
  <line x1="20" y1="210" x2="200" y2="210" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="110" y="225" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="9" font-weight="700" fill="#475569" letter-spacing="2">DB DEADLIFT</text>
  <!-- Frame 1: Standing, DBs at sides -->
  <g class="f1">
    <circle cx="110" cy="28" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="110" y1="40" x2="110" y2="110"/>
      <line x1="88" y1="54" x2="132" y2="54"/>
      <line x1="88" y1="54" x2="80" y2="110"/>
      <line x1="132" y1="54" x2="140" y2="110"/>
      <line x1="110" y1="110" x2="103" y2="162"/><line x1="103" y1="162" x2="101" y2="205"/>
      <line x1="110" y1="110" x2="117" y2="162"/><line x1="117" y1="162" x2="119" y2="205"/>
      <line x1="86" y1="205" x2="114" y2="205"/>
      <line x1="106" y1="205" x2="134" y2="205"/>
    </g>
    <circle cx="103" cy="162" r="4" fill="#64748b"/>
    <circle cx="117" cy="162" r="4" fill="#64748b"/>
    <!-- DBs at sides -->
    <rect x="64" y="106" width="18" height="8" rx="2" fill="#475569"/>
    <rect x="136" y="106" width="18" height="8" rx="2" fill="#475569"/>
  </g>
  <!-- Frame 2: Mid descent - torso hinged, DBs at knee level -->
  <g class="f2">
    <circle cx="110" cy="60" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Hinged torso -->
      <line x1="110" y1="72" x2="112" y2="124"/>
      <line x1="86" y1="86" x2="134" y2="84"/>
      <!-- Arms hanging to DBs at knee -->
      <line x1="86" y1="86" x2="76" y2="158"/>
      <line x1="134" y1="84" x2="144" y2="158"/>
      <!-- Knees bent -->
      <line x1="106" y1="124" x2="96" y2="170"/><line x1="96" y1="170" x2="90" y2="210"/>
      <line x1="118" y1="124" x2="126" y2="170"/><line x1="126" y1="170" x2="130" y2="210"/>
    </g>
    <circle cx="96" cy="170" r="5" fill="#64748b"/>
    <circle cx="126" cy="170" r="5" fill="#64748b"/>
    <!-- DBs at knee height -->
    <rect x="60" y="154" width="18" height="8" rx="2" fill="#475569"/>
    <rect x="140" y="154" width="18" height="8" rx="2" fill="#475569"/>
  </g>
  <!-- Frame 3: Bottom - DBs near floor, full squat/hinge -->
  <g class="f3">
    <circle cx="110" cy="76" r="12" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Torso near horizontal -->
      <line x1="110" y1="88" x2="114" y2="140"/>
      <line x1="84" y1="104" x2="132" y2="100"/>
      <!-- Arms long, DBs near ground -->
      <line x1="84" y1="104" x2="74" y2="190"/>
      <line x1="132" y1="100" x2="146" y2="190"/>
      <!-- Deep knee bend -->
      <line x1="108" y1="140" x2="92" y2="180"/><line x1="92" y1="180" x2="86" y2="210"/>
      <line x1="120" y1="140" x2="132" y2="180"/><line x1="132" y1="180" x2="136" y2="210"/>
    </g>
    <circle cx="92" cy="180" r="5" fill="#64748b"/>
    <circle cx="132" cy="180" r="5" fill="#64748b"/>
    <!-- DBs near floor -->
    <rect x="58" y="186" width="18" height="8" rx="2" fill="#475569"/>
    <rect x="142" y="186" width="18" height="8" rx="2" fill="#475569"/>
  </g>
</svg>
