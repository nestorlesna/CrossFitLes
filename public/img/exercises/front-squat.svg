  <text x="100" y="226" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" font-weight="700" fill="#475569" letter-spacing="2">FRONT SQUAT</text>
  <!-- Frame 1: De pie, barra en front rack -->
  <g class="f1">
